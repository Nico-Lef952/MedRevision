      {type:'qcu',q:'Trois ligands stimulent la pompe à protons via des récepteurs au pôle basal de la cellule pariétale. Lesquels ?',
       opts:['Sécrétine, somatostatine, prostaglandines','Gastrine, histamine, acétylcholine','Glucagon, CCK, insuline','Ghréline, leptine, GLP-1'],correct:[1],
       explanation:'Les trois stimulateurs de la cellule pariétale : (1) GASTRINE (récepteur CCK2) ; (2) HISTAMINE (récepteur H2) ; (3) ACÉTYLCHOLINE (récepteur muscarinique M3). Ils activent des seconds messagers (AMPc, IP3, Ca2+) → cascade de MAPkinases → phosphorylation de la pompe à protons → sécrétion acide.'},
      {type:'qcu',q:'La sécrétine inhibe la sécrétion acide gastrique et est libérée par :',
       opts:['Les cellules à gastrine antrales en réponse aux acides aminés','Les cellules S duodénales en réponse à l\'acidification du duodénum (pH bas)','Les cellules pariétales du fundus en rétrocontrôle négatif','Les cellules chromaffines en réponse à l\'histamine'],correct:[1],
       explanation:'La sécrétine est libérée par les cellules S de l\'épithélium duodénal en réponse à l\'arrivée d\'ions H+ (pH bas dans le duodénum). Elle agit sur la cellule pariétale (↓ HCl) et sur les cellules ductulaires pancréatiques (↑ HCO3-). C\'est la première hormone découverte au monde (Bayliss et Starling, début du 20e siècle).'},
      {type:'qcu',q:'La cytoprotection muqueuse gastrique est assurée par les prostaglandines. Elles agissent en :',
       opts:['Stimulant la sécrétion d\'HCl pour acidifier la couche de mucus','Inhibant la production de mucus pour concentrer les bicarbonates','Stimulant le mucus, les bicarbonates, le renouvellement cellulaire et le débit sanguin gastrique','Activant directement la pompe à protons pour réguler le pH intracellulaire'],correct:[2],
       explanation:'Les prostaglandines (surtout via COX1) assurent la cytoprotection gastrique : ↑ sécrétion de mucus + ↑ sécrétion de HCO3- + ↑ renouvellement cellulaire + ↑ débit sanguin gastrique + ↓ rétrodiffusion des H+. En inhibant les COX non sélectivement, les AINS suppriment tous ces mécanismes → risque d\'ulcère.'},
      {type:'qcu',q:'La COX1 et la COX2 diffèrent par leur mode d\'expression :',
       opts:['COX1 inductible lors de l\'inflammation ; COX2 constitutive en permanence','COX1 constitutive (produite en permanence) ; COX2 inductible (produite lors de l\'inflammation)','Les deux sont constitutives mais COX2 est plus abondante dans l\'estomac','Les deux sont inductibles mais par des stimuli différents'],correct:[1],
       explanation:'COX1 = constitutive (toujours présente → assure la cytoprotection gastrique de base). COX2 = inductible (exprimée lors des processus inflammatoires → prostaglandines pro-inflammatoires). Les AINS classiques (aspirine, ibuprofène) inhibent les deux → effets anti-inflammatoires (COX2) MAIS ulcère (COX1). Les anti-COX2 sélectifs (coxibs) épargnent la COX1 → moins d\'ulcères.'},
      {type:'qcu',q:'Les cellules acineuses du pancréas sécrètent :',
       opts:['De l\'eau et du bicarbonate en réponse à la sécrétine','Des enzymes et proenzymes digestifs contenus dans les grains de zymogène','De la lithostatine pour éviter la précipitation des cristaux calciques','Du glucagon et de l\'insuline dans la circulation porte'],correct:[1],
       explanation:'Les cellules ACINEUSES contiennent des grains de ZYMOGÈNE → sécrètent enzymes et proenzymes (trypsine, chymotrypsine, lipase, amylase...). Les cellules DUCTULAIRES sécrètent H2O + HCO3- (sécrétion hydro-bicarbonatée). La lithostatine est aussi sécrétée par le pancréas exocrine (prévient la précipitation calcique dans les canalicules).'},
      {type:'qcu',q:'Le pH optimal d\'activité de la trypsine est d\'environ :',
       opts:['pH 1-2 (très acide, comme dans l\'estomac)','pH 4-5 (légèrement acide)','pH 7-8 (neutre à légèrement alcalin)','pH 9-10 (alcalin)'],correct:[2],
       explanation:'La trypsine a un pH optimal d\'activité autour de 7-8. Le bol alimentaire sort de l\'estomac à pH 1 → les cellules ductulaires pancréatiques sécrètent des HCO3- sous l\'influence de la sécrétine → alcalinisation du duodénum → pH optimal pour la trypsine et les autres enzymes pancréatiques.'},
      {type:'qcu',q:'La mucoviscidose résulte d\'une mutation du gène codant :',
       opts:['L\'anhydrase carbonique des cellules ductulaires pancréatiques','Le CFTR (Cystic Fibrosis Transmembrane conductance Regulator)','La lithostatine, causant une obstruction des canalicules pancréatiques','La pompe Na+/H+ des cellules épithéliales bronchiques et pancréatiques'],correct:[1],
       explanation:'La mucoviscidose = mutation du CFTR (canal ionique qui permet le retour des ions Cl- dans la lumière des canalicules pancréatiques pour maintenir le gradient nécessaire à l\'export de HCO3-). Sans CFTR fonctionnel : ↓ HCO3- et Cl- dans la lumière → sécrétions très épaisses et visqueuses → obstruction des canalicules pancréatiques → insuffisance pancréatique exocrine + bronches.'},
      {type:'qcu',q:'Les IPP (inhibiteurs de la pompe à protons) nécessitent d\'être pris 30 min avant le repas car :',
       opts:['Le repas active la sécrétion de gastrine qui phosphoryle l\'IPP, l\'inactivant','L\'IPP nécessite un pH gastrique très acide (< 2) pour s\'activer, ce qui n\'existe qu\'à jeun','L\'IPP doit être absorbé à jeun pour atteindre une concentration sanguine maximale avant le repas','Le repas dilue l\'IPP dans le contenu gastrique, réduisant son efficacité'],correct:[1],
       explanation:'Les IPP sont des prodrogues inactives à pH sanguin (7,4). Ils s\'activent uniquement à pH < 2 (lumière gastrique à jeun). Si pris pendant ou après le repas → l\'effet tampon du repas élève le pH gastrique → l\'IPP ne peut pas s\'activer. Pris 30 min avant : pH encore acide (< 2) → activation → liaison covalente à la pompe → blocage durable.'},
      {type:'qcu',q:'Helicobacter pylori augmente la sécrétion acide gastrique en :',
       opts:['Stimulant directement les cellules pariétales par une toxine sécrétée','Détruisant les cellules à somatostatine → levée de l\'inhibition de la gastrine → ↑ sécrétion acide','Inhibant les prostaglandines COX1 comme les AINS','Produisant directement de l\'HCl par ses enzymes bactériennes'],correct:[1],
       explanation:'H. pylori déclenche une réaction inflammatoire locale (IL-8) qui détruit les cellules à somatostatine (SST). Or la SST inhibe normalement la sécrétion de gastrine. Sans SST → dérépression des cellules à gastrine → ↑ gastrine → ↑ HCl → ↑ risque d\'ulcère gastro-duodénal. H. pylori crée aussi des brèches épithéliales → rétrodiffusion des H+.'},
      {type:'qcu',q:'Le réflexe gastrocolique se déclenche lors de :',
       opts:['La distension colique provoquant une relaxation gastrique réflexe','L\'ingestion d\'un repas provoquant des HAPC coliques pour faire de la place','La défécation provoquant une vidange gastrique accélérée','Le stress aigu inhibant à la fois la motricité gastrique et colique'],correct:[1],
       explanation:'Le réflexe gastrocolique : l\'ingestion d\'un repas → distension gastrique → signal (neural + hormonal) → côlon → déclenchement de HAPC → progression des matières fécales vers le rectum → besoin d\'exonération. C\'est pourquoi beaucoup de personnes ressentent un besoin d\'aller à la selle peu après un repas, surtout le matin.'},
      {type:'qcu',q:'L\'effet tampon du repas désigne :',
       opts:['La neutralisation de la sécrétine duodénale par les aliments basiques','Le fait que le pH gastrique augmente pendant le repas malgré une sécrétion acide maximale car les aliments tamponnent les H+','Le fait que les lipides ralentissent la vidange gastrique, diluant l\'acidité','L\'alcalinisation de l\'estomac par les bicarbonates salivaires pendant la mastication'],correct:[1],
       explanation:'Paradoxalement, le moment où la sécrétion acide est maximale (phase gastrique) est aussi le moment où le pH gastrique est le plus élevé (4-6), car les aliments tamponnent les ions H+ produits. Ce "tampon alimentaire" est le premier mécanisme de protection de la muqueuse gastrique vis-à-vis de l\'acidité.'},
    ]},
    medium:{label:'Moyen',desc:'Mécanismes intégrés, interactions médicamenteuses',questions:[
      {type:'qcu',q:'Les AINS classiques causent des ulcères gastriques principalement car :',
       opts:['Ils inhibent sélectivement la COX2, réduisant les défenses muqueuses','Ils inhibent les deux COX (1 et 2) → ↓ prostaglandines constitutives → ↓ mucus, HCO3-, débit sanguin et renouvellement cellulaire','Ils stimulent directement la sécrétion d\'HCl en activant les cellules pariétales','Ils diminuent la sécrétion de gastrine, déséquilibrant la régulation acide'],correct:[1],
       explanation:'Les AINS non sélectifs inhibent COX1 (constitutive) ET COX2 → ↓ prostaglandines cytoprotectrices → (1) ↓ mucus, (2) ↓ HCO3-, (3) ↓ débit sanguin gastrique, (4) ↓ renouvellement cellulaire, (5) ↑ rétrodiffusion des H+. Les anti-COX2 sélectifs (coxibs) inhibent principalement COX2 (inflammatoire) en épargnant davantage COX1 → moins d\'ulcères (mais ↑ risque cardiovasculaire).'},
      {type:'qcu',q:'La phase intestinale de la sécrétion gastrique diminue le débit acide via deux voies hormonales principales. Lesquelles ?',
       opts:['Gastrine et histamine (amplification gastrique)','Sécrétine (cellules S, pH bas) et somatostatine (cellules D, AA)','GLP-1 et PYY (iléon)','CCK et motiline (duodénum-jéjunum)'],correct:[1],
       explanation:'Phase intestinale : l\'arrivée du bol dans le duodénum → (1) cellules S → SÉCRÉTINE (en réponse au pH bas → ↓ vidange gastrique + ↓ sécrétion HCl) ; (2) cellules D → SOMATOSTATINE (en réponse aux AA → inhibition paracrine des cellules pariétales et endocrine des cellules à gastrine antrales). Ensemble, elles constituent le "frein duodénal".'},
      {type:'qcu',q:'Un patient présente des troubles de la coagulation après résection iléale étendue + antibiothérapie prolongée. Quelle vitamine est en cause et quel mécanisme ?',
       opts:['Vitamine B12 : son absorption iléale est bloquée → anémie mégaloblastique → faux troubles coagulatoires','Vitamine K : son absorption nécessite la bile (liposoluble) ; la stéatorrhée post-résection réduit l\'absorption + l\'antibiothérapie élimine les bactéries intestinales qui en synthétisent','Vitamine C : son déficit fragilise les vaisseaux → microhémorragies','Vitamine D : son déficit en cas de stéatorrhée perturbe le métabolisme du calcium nécessaire à la coagulation'],correct:[1],
       explanation:'Double mécanisme de carence en vitamine K : (1) Stéatorrhée post-iléale → ↓ absorption des vitamines liposolubles (A, D, E, K) car les AB nécessaires à l\'émulsification sont insuffisants ; (2) Antibiothérapie → élimination des bactéries coliques productrices de vitamine K2 (ménaquinone). VitK carence → ↓ facteurs II, VII, IX, X (VitK-dépendants) → TP effondré.'},
      {type:'qcu',q:'Pourquoi les antihistaminiques H2 (cimétidine, ranitidine) sont-ils moins efficaces que les IPP pour traiter un ulcère gastrique ?',
       opts:['Les anti-H2 ne bloquent qu\'un seul des trois stimulateurs de la pompe à protons (histamine), laissant gastrine et ACh activer la pompe','Les anti-H2 sont métabolisés trop rapidement et ne peuvent pas bloquer la sécrétion nocturne','Les anti-H2 stimulent la production de gastrine en rétrocontrôle, annulant leur effet','Les anti-H2 bloquent aussi le récepteur H1 gastrique, induisant une hypersécrétion paradoxale'],correct:[0],
       explanation:'Les anti-H2 ne bloquent QUE la voie histamine → gastrine et ACh peuvent toujours activer la pompe à protons directement. Les IPP, en bloquant la pompe elle-même (cible finale commune des trois voies), sont efficaces quelle que soit la voie de stimulation. C\'est pourquoi les IPP ont largement supplanté les anti-H2 dans le traitement des ulcères et du RGO.'},
      {type:'qcu',q:'Le trypsinogène est une proenzyme sécrétée par les cellules acineuses. Quel mécanisme empêche son activation prématurée dans le pancréas ?',
       opts:['Le milieu pancréatique très acide (pH 4) maintient le trypsinogène sous forme inactive','Le trypsinogène n\'a pas de site de clivage accessible dans un milieu riche en HCO3- et à pH alcalin ; l\'entérokinase duodénale est nécessaire pour l\'activer','Le trypsinogène est stocké lié à un inhibiteur (PSTI/SPINK1) et n\'est activé que dans la lumière duodénale','Les deux mécanismes b et c sont corrects mais le plus important est b'],correct:[2],
       explanation:'Plusieurs mécanismes protègent contre l\'autodigestion : (1) Les proenzymes sont séquestrées dans les granules de zymogène (membrane les isolant du cytoplasme) ; (2) Le PSTI (pancreatic secretory trypsin inhibitor / SPINK1) inhibe toute trypsine activée accidentellement ; (3) L\'entérokinase duodénale est nécessaire pour l\'activation normale (clive le trypsinogène → trypsine → active les autres proenzymes en cascade). Une mutation du SPINK1 → pancreatite chronique.'},
      {type:'qcu',q:'Le mécanisme d\'action des IPP est une liaison covalente irréversible à la pompe à protons. Quelle conséquence clinique pratique cela implique-t-il ?',
       opts:['L\'efficacité des IPP est immédiate et maximale dès la 1ère prise','Après arrêt des IPP, la sécrétion acide ne reprend que lorsque de nouvelles pompes sont synthétisées (renouvellement cellulaire 24-48h)','Les IPP doivent être pris toutes les heures car la liaison se dissocie rapidement','Les IPP ne peuvent pas être associés aux anti-H2 car ils compétent pour le même site'],correct:[1],
       explanation:'Les IPP forment une liaison covalente (pont disulfure) avec la pompe → la pompe est définitivement bloquée. La sécrétion acide ne reprend que quand de nouvelles pompes H+/K+-ATPase sont synthétisées par les cellules pariétales (renouvellement 24-48h). Conséquence : l\'effet des IPP est prolongé bien au-delà de leur demi-vie plasmatique et s\'accumule avec les prises répétées (efficacité maximale atteinte en 3-5 jours de traitement).'},
      {type:'qcu',q:'La sécrétine est libérée par le duodénum lors de l\'acidification. Quelles sont ses deux principales actions sur la digestion ?',
       opts:['↑ sécrétion de gastrine antrale + ↑ motricité duodénale','↓ sécrétion acide gastrique (frein) + ↑ sécrétion de HCO3- pancréatique (tampon duodénal)','↑ vidange gastrique + ↑ contraction de la vésicule biliaire','↓ motricité du grêle + ↑ absorption des lipides'],correct:[1],
       explanation:'La sécrétine a deux actions principales coordonnées : (1) Frein gastrique : ↓ sécrétion d\'HCl par la cellule pariétale + ↓ vidange gastrique → évite d\'inonder le duodénum d\'acide ; (2) ↑ sécrétion hydro-bicarbonatée par les cellules ductulaires pancréatiques → tampon les H+ gastriques dans le duodénum → pH optimal pour les enzymes pancréatiques.'},
      {type:'qcu',q:'Un patient infecté par H. pylori développe un ulcère duodénal. Pourquoi l\'ulcère est-il duodénal et non gastrique dans ce cas ?',
       opts:['H. pylori ne peut coloniser que le bulbe duodénal et non l\'estomac','La destruction des cellules à SST antrales → ↑ gastrine → ↑ HCl → ↑ charge acide dans le duodénum dépassant les capacités tampons locales → ulcère duodénal','H. pylori sécrète des cytotoxines spécifiquement toxiques pour la muqueuse duodénale','La muqueuse gastrique résiste à H. pylori alors que la muqueuse duodénale est plus sensible'],correct:[1],
       explanation:'Mécanisme de l\'ulcère duodénal à H. pylori : (1) H. pylori colonise l\'antre gastrique → inflammation → ↓ cellules à SST → ↓ frein sur la gastrine → ↑ gastrine → ↑ HCl gastrique → ↑ charge acide dans le duodénum ; (2) La muqueuse duodénale, non adaptée à une acidité chronique élevée → ulcère bulbaire. H. pylori n\'est généralement PAS dans le duodénum lui-même.'},
      {type:'qcu',q:'La sécrétion hydro-bicarbonatée pancréatique repose sur le CFTR. Quel est son rôle précis dans ce mécanisme ?',
       opts:['Le CFTR exporte directement les HCO3- de la cellule ductulaire vers la lumière','Le CFTR permet le retour des Cl- dans la lumière après l\'échange Cl-/HCO3-, maintenant le gradient pour continuer à exporter des HCO3-','Le CFTR active l\'anhydrase carbonique pour produire les HCO3-','Le CFTR est la pompe Na+/H+ permettant l\'équilibre électrique de la sécrétion'],correct:[1],
       explanation:'Mécanisme : (1) Échangeur apical HCO3-/Cl- exporte du HCO3- en échange de Cl- → le Cl- s\'accumule dans la cellule ; (2) Le CFTR recycle ce Cl- vers la lumière → maintient le gradient de Cl- intracellulaire permettant à l\'échangeur de continuer à fonctionner. Sans CFTR → accumulation de Cl- intracellulaire → l\'échangeur s\'arrête → ↓ HCO3- dans la lumière → sécrétions épaisses.'},
      {type:'vf',q:'Les anticholinergiques (antimuscariniques) utilisés comme antidépresseurs ou antiépileptiques peuvent paradoxalement aggraver un ulcère gastrique.',
       opts:['Vrai','Faux'],correct:[1],
       explanation:'FAUX. Les anticholinergiques DIMINUENT la sécrétion gastrique en bloquant le récepteur muscarinique M3 de la cellule pariétale (un des trois stimulateurs de la pompe à protons). Historiquement, avant les IPP, on utilisait les anticholinergiques et les vagotomies pour traiter les ulcères. Les sécheresses buccales et la constipation des antidépresseurs sont des effets antimuscariniques, pas des aggravations d\'ulcères.'},
      {type:'qcu',q:'La lithostatine est produite par le pancréas exocrine pour prévenir :',
       opts:['L\'activation prématurée de la trypsine dans les canaux pancréatiques','La précipitation de cristaux de bicarbonate de calcium (CaHCO3) obstruant les canalicules','La formation de calculs cholestéroliques dans les voies biliaires hépatiques','L\'autodigestion du pancréas par les phospholipases sécrétées dans les acini'],correct:[1],
       explanation:'La lithostatine (ou PSTP = pancreatic stone protein) inhibe la nucléation et la précipitation du CaHCO3 qui, au vu des concentrations élevées de Ca2+ et HCO3- dans le suc pancréatique, précipiterait spontanément. L\'alcool chronique réduit la lithostatine → cristaux → bouchons calcifiés → obstruction canaliculaire → pancréatite calcifiante chronique.'},
      {type:'qcu',q:'Pourquoi la trypsine peut-elle provoquer une pancréatite aiguë si elle est activée prématurément dans le pancréas ?',
       opts:['Elle inhibe les cellules de Cajal pancréatiques, causant une stase du suc','Elle active en cascade toutes les autres proenzymes pancréatiques (chymotrypsinogène, pro-élastase, pro-phospholipase) → autodigestion du parenchyme','Elle induit une hypersécrétion de CCK qui surcharge le pancréas en proenzymes','Elle stimule la sécrétion d\'insuline, causant une hypoglycémie sévère nécrosante'],correct:[1],
       explanation:'La trypsine est l\'enzyme-clé d\'activation : elle clive les autres proenzymes pancréatiques (chymotrypsinogène → chymotrypsine, pro-élastase → élastase, pro-phospholipase → phospholipase...). Si cette activation survient à l\'intérieur du pancréas → les enzymes actives digèrent le parenchyme → nécrose pancréatique → pancréatite aiguë. Causes fréquentes d\'activation prématurée : lithiase biliaire (calcul bloquant le canal de Wirsung) et alcool.'},
    ]},
    hard:{label:'Difficile',desc:'Cas cliniques, physiopathologie avancée',questions:[
      {type:'cc',context:'Homme 52 ans. Brûlures épigastriques nocturnes et dysphagie progressive depuis 3 mois. pH-métrie œsophagienne 24h : 180 épisodes de reflux acide/jour (N < 70). Manométrie : SIO pression de repos = 8 mmHg (N : 15-30 mmHg).',
       q:'Quel facteur anatomique explique la faible pression du SIO chez ce patient et quel traitement de fond est indiqué ?',
       opts:['Destruction des fibres musculaires du SIO par les acides gastriques → dilatation pneumatique','Hypotonie du SIO d\'origine neurologique (perte de neurones nitrergiques) → IPP à vie uniquement','Hernie hiatale probable (le SIO est tiré en position thoracique, perd le renfort diaphragmatique) → fundoplicature après bilan endoscopique','Excès de NO systémique (syndrome carcinoïde) → traitement de la tumeur carcinoïde'],correct:[2],
       explanation:'Un SIO hypotonique (8 mmHg) avec RGO sévère chez un adulte de 52 ans → chercher une hernie hiatale (déplacement de la jonction œso-gastrique en position intra-thoracique → perte du renfort des piliers diaphragmatiques + perte de l\'œsophage intra-abdominal → SIO hypotone). Traitement : IPP au long cours + fundoplicature (Nissen) pour restaurer la barrière anti-reflux si résistance aux IPP ou complications (endobrachyœsophage).'},
      {type:'cc',context:'Nourrisson 6 semaines. Vomissements en jet non bilieux après chaque tétée, prise de poids insuffisante, palper abdominal : masse olivaire en épigastre droit. Échographie : épaississement du pylore (> 4 mm).',
       q:'Quel est le diagnostic et quel mécanisme physiopathologique explique l\'alcalose métabolique hypochlorémique souvent associée ?',
       opts:['Atrésie duodénale (vomissements bilieux) → chirurgie d\'emblée, sans alcalose','Sténose hypertrophique du pylore → vomissements d\'HCl sans HCO3- → perte de H+ et Cl- → alcalose métabolique hypochlorémique','Syndrome de Zollinger-Ellison → hypersécrétion acide → vomissements acides → alcalose','Invagination intestinale aiguë → vomissements bilieux + alcalose mixte'],correct:[1],
       explanation:'Sténose hypertrophique du pylore (SHP) : hypertrophie de la musculeuse pylorique → obstruction → vomissements en jet NON bilieux (la sécrétion gastrique acide est évacuée avant d\'atteindre le duodénum → pas de bile dans les vomissements). Mécanisme de l\'alcalose : perte massive de HCl (H+ et Cl-) → ↓ H+ → alcalose métabolique + ↓ Cl- (hypochlorémie). Compensation rénale tardive (réabsorption de HCO3- réduite). Traitement : pyloromyotomie de Ramstedt.'},
      {type:'qcu',q:'Dans le syndrome de Zollinger-Ellison (gastrinome), le pH gastrique est souvent < 1 et les IPP sont nécessaires à haute dose. Pourquoi des doses standards d\'IPP sont-elles insuffisantes ?',
       opts:['La gastrine du gastrinome active la pompe à protons par une voie non bloquée par les IPP','La tumeur sécrète des quantités massives de gastrine → hyperstimulation permanente des cellules pariétales → ↑ nombre de pompes à synthétiser > capacité de blocage par des doses standards','Les IPP standards ne bloquent que les récepteurs H2, pas la pompe à protons stimulée par la gastrine','La gastrinomie induit une résistance aux IPP par mutation de la pompe à protons'],correct:[1],
       explanation:'Dans le ZES, l\'hypergastrinosémie permanente → hyperplasie des cellules pariétales (↑ masse cellulaire) + stimulation maximal de chaque cellule pariétale → ↑ massif du nombre de pompes à protons actives. Des doses standard d\'IPP ne bloquent qu\'une partie des pompes. Il faut des doses élevées (ex: oméprazole 40-60 mg/j ou plus) pour bloquer suffisamment de pompes et contrôler l\'hypersécrétion acide. Les analogues de la somatostatine (octréotide) peuvent aussi réduire la sécrétion tumorale de gastrine.'},
      {type:'cc',context:'Enfant 8 ans porteur d\'une mucoviscidose (CF). Bilan : stéatorrhée massive (graisses fécales > 20 g/j), dénutrition protéino-calorique, retard de croissance. La fonction pulmonaire est encore préservée.',
       q:'Quel est le mécanisme précis de la stéatorrhée dans ce contexte et quelle supplémentation est indispensable ?',
       opts:['Hypersécrétion de gastrine → hyperacidité → destruction des enzymes pancréatiques → stéatorrhée → supplémentation en IPP uniquement','Mutation CFTR → ↓ sécrétion de HCO3- et Cl- pancréatiques → sécrétion visqueuse → obstruction des canalicules → insuffisance pancréatique exocrine → ↓ lipase → maldigestion des graisses → stéatorrhée → extraits pancréatiques + vitamines ADEK','Déficit génétique en lithostatine → obstruction biliaire → ↓ bile → stéatorrhée → acide ursodésoxycholique','Atrophie villositaire jéjunale par maladie cœliaque associée → malabsorption → régime sans gluten'],correct:[1],
       explanation:'Mucoviscidose : CFTR muté → ↓ HCO3- et Cl- dans les canalicules pancréatiques → sécrétion très visqueuse → obstruction progressive → destruction du parenchyme exocrine → ↓ production de lipase, amylase, protéases → maldigestion des graisses → STÉATORRHÉE. Supplémentation : (1) Extraits pancréatiques (Créon®) pris avant chaque repas ; (2) Vitamines liposolubles ADEK (leur absorption est compromise par la stéatorrhée).'},
      {type:'qcu',q:'La pH-impédancemétrie œsophagienne détecte les RGO non acides que la pH-métrie seule ne peut pas détecter. Quel principe physique est utilisé ?',
       opts:['La mesure de la pression intraluminale par des capteurs piézométriques','La mesure de la conductance électrique entre des paires d\'électrodes : l\'eau conduit bien (faible résistance), le gaz conduit peu (haute résistance) → détection de mouvements liquidiens ou gazeux','La détection des vibrations mécaniques de la paroi œsophagienne lors du reflux','La mesure de la température intraluminale : le contenu gastrique est plus chaud que l\'air dégluti'],correct:[1],
       explanation:'L\'impédancemétrie mesure la conductance électrique (U = RI) entre des paires d\'électrodes placées dans l\'œsophage. L\'eau et les liquides conduisent bien (↓ résistance = ↑ conductance). L\'air conduit peu (↑ résistance = ↓ conductance). Un reflux LIQUIDE → baisse synchrone rétropropagée du signal d\'impédance. Un reflux GAZEUX (éructation) → hausse. Cela détecte les reflux non acides (pH > 4, que la pH-métrie manque) mais symptomatiques.'},
      {type:'cc',context:'Femme 68 ans, arthrose sévère traitée par kétoprofène 150 mg/j depuis 6 mois. Consultation pour épigastralgies postprandiales. Gastroscopie : ulcère gastrique antral de 12 mm, biopsie H. pylori negative.',
       q:'Quel est le mécanisme exact de cet ulcère et quelle est la stratégie thérapeutique la plus adaptée ?',
       opts:['Ulcère par hypersécrétion de gastrine induit par les AINS → anti-H2 seuls suffisent','Ulcère par inhibition de COX1 → ↓ prostaglandines cytoprotectrices → ↓ mucus, HCO3-, débit sanguin → érosion muqueuse → ulcère ; stratégie : IPP (cicatrisation + protection) + réévaluation du traitement AINS (switch vers anti-COX2 sélectif ou paracétamol si possible)','Ulcère par toxicité directe des AINS sur les cellules pariétales → les IPP seuls sont insuffisants, chirurgie nécessaire','Ulcère par réaction allergique au kétoprofène → corticoïdes + arrêt définitif de tout AINS'],correct:[1],
       explanation:'Mécanisme : kétoprofène (AINS) → inhibition COX1 et COX2 → ↓ prostaglandines cytoprotectrices → ↓ mucus + ↓ HCO3- + ↓ débit sanguin gastrique → érosion → ulcère. Absence de H. pylori (confirmée) → cause uniquement médicamenteuse. Stratégie : (1) IPP (cicatrisation de l\'ulcère + protection) ; (2) Évaluer si le kétoprofène peut être remplacé par paracétamol ou un anti-COX2 sélectif (moins ulcérogène) + protection par IPP si AINS incontournable.'},
      {type:'qcu',q:'La pancréatite aiguë par calcul biliaire résulte de l\'obstruction de quel orifice anatomique ?',
       opts:['Le sphincter d\'Oddi au niveau de la papille de Vater (cholédoque + canal de Wirsung en commun)','Le canal de Wirsung uniquement, le calcul migrant dans le duodénum sans toucher le cholédoque','Le canal cystique bloquant la vésicule biliaire et provoquant une cholécystite sans atteinte pancréatique','Le sphincter pylori, ralentissant la vidange gastrique et majorant la pression sur la papille'],correct:[0],
       explanation:'Mécanisme de la pancréatite lithiasique : calcul migrant dans le cholédoque → impaction au niveau de l\'ampoule de Vater (sphincter d\'Oddi) → obstruction commune du cholédoque ET du canal de Wirsung → ↑ pression intra-pancréatique + reflux biliaire dans le canal de Wirsung → activation du trypsinogène dans le pancréas → autodigestion → pancréatite aiguë. L\'ERCP (cholangiopancréatographie rétrograde endoscopique) peut désobstruer en urgence.'},
      {type:'vf',q:'L\'Helicobacter pylori peut être détectée par une biopsie gastrique uniquement ; il n\'existe pas de test non invasif fiable.',
       opts:['Vrai','Faux'],correct:[1],
       explanation:'FAUX. Plusieurs tests non invasifs existent et sont fiables : (1) Test respiratoire à l\'urée marquée (13C-UBT) : le patient ingère de l\'urée marquée au 13C → si H. pylori présente → son uréase hydrolyse l\'urée → 13CO2 expiré → positif. Sensibilité/spécificité > 95 %. (2) Antigène fécal d\'H. pylori (EIA) : détection de protéines bactériennes dans les selles. (3) Sérologie (moins fiable pour l\'infection active, ne distingue pas infection active de cicatricielles). La biopsie reste le gold standard mais n\'est pas le seul test.'},
      {type:'cc',context:'Garçon 14 ans, mucoviscidose connue. Développe brutalement des douleurs épigastriques irradiant dans le dos, vomissements, lipasémie = 8 fois la normale.',
       q:'Quelle complication digestive classique de la mucoviscidose est ici en cause et par quel mécanisme ?',
       opts:['Invagination intestinale aiguë par épaississement muqueux iléal','Pancréatite aiguë : les sécrétions pancréatiques épaisses (CFTR muté) obstruction des canalicules → activation prématurée des proenzymes intraparenchymateuse → autodigestion','Ulcère gastrique perforé par excès d\'AINS pour les douleurs articulaires associées','Appendicite aiguë par obstruction appendiculaire par des bouchons muqueux'],correct:[1],
       explanation:'Pancréatite aiguë dans la mucoviscidose : le CFTR muté → sécrétions pancréatiques très épaisses (↓ HCO3- et eau) → obstruction progressive des canalicules → ↑ pression intraductal → activation prématurée des proenzymes (trypsinogène → trypsine) dans le parenchyme → autodigestion → pancréatite. La mucoviscidose prédispose à la fois à l\'insuffisance pancréatique exocrine chronique ET aux épisodes aigus de pancréatite.'},
      {type:'qcu',q:'Un patient sous AINS chroniques doit absolument continuer ce traitement. Quelle stratégie préventive est la plus efficace contre les complications ulcéreuses ?',
       opts:['Prendre les AINS pendant le repas pour diminuer l\'irritation directe de la muqueuse gastrique','Associer systématiquement un IPP au traitement AINS, qui prévient l\'ulcère en restaurant les prostaglandines gastro-protectrices','Associer systématiquement un IPP au traitement AINS, qui protège la muqueuse indépendamment des prostaglandines en réduisant l\'acidité','Supplémenter en prostaglandines exogènes (misoprostol), plus efficace que les IPP'],correct:[2],
       explanation:'La meilleure stratégie : associer un IPP. Les IPP ne "restaurent" pas les prostaglandines (les AINS les inhibent toujours), mais ils réduisent l\'acidité gastrique → moins d\'agression acide sur une muqueuse déjà fragilisée (sans prostaglandines) → ↓ risque d\'ulcère. Le misoprostol (analogue des prostaglandines) est aussi efficace mais moins bien toléré (diarrhées, crampes). La prise pendant le repas réduit l\'irritation directe mais ne protège pas contre l\'effet systémique des AINS sur les COX.'},
    ]}
  }
}

{
  id:'pancreas2',title:'Absorption Intestinale & Microbiote',icon:'🦠',color:'#0891b2',iconBg:'#ecfeff',
  tags:['Absorption','Transporteurs','Vitamines','Fer','Microbiote','Vomissement'],
  levels:{
    easy:{label:'Facile',desc:'Bases de l\'absorption intestinale, vitamines, microbiote',questions:[
      {type:'qcu',q:'L\'objectif de la digestion est de transformer les aliments en molécules absorbables. Ces trois molécules finales sont :',
       opts:['Disaccharides, dipeptides et triglycérides','Acides aminés, glucose et acides gras','Polypeptides, maltose et monoglycérides','Peptides, fructose et cholestérol'],correct:[1],
       explanation:'La digestion produit trois catégories de molécules simples : ACIDES AMINÉS (protéines → AA), GLUCOSE/monosaccharides (glucides → glucose, galactose, fructose) et ACIDES GRAS + monoglycérides (lipides → AG + MG). C\'est uniquement sous ces formes que l\'intestin grêle peut assurer l\'absorption.'},
      {type:'qcu',q:'Le transporteur SGLT1 qui absorbe le glucose et le galactose au pôle apical de l\'entérocyte fonctionne grâce à :',
       opts:['Un gradient de potassium','Un cotransport avec le sodium (Na+)','Une diffusion passive simple','Un gradient de pH acide duodénal'],correct:[1],
       explanation:'Le SGLT1 (Sodium-Glucose Linked Transporter 1) est un COTRANSPORTEUR : il transporte une molécule de glucose ou galactose en échange d\'un Na+ entrant. Ce mécanisme dépend du gradient de Na+ maintenu par la pompe Na+/K+-ATPase au pôle basal. C\'est le principe de la SRO (solution de réhydratation orale) : glucose + sel → absorption mutuelle même lors du choléra.'},
      {type:'qcu',q:'Le fructose est absorbé par quel transporteur au pôle apical des entérocytes ?',
       opts:['SGLT1 (cotransport Na+/Glu)','GLUT-2 (efflux basal)','GLUT-5 (diffusion facilitée)','DMT-1 (transport actif)'],correct:[2],
       explanation:'FRUCTOSE : absorbé au pôle APICAL par GLUT-5 (diffusion facilitée, sans Na+). Puis, au pôle BASAL, glucose + galactose + fructose sortent tous par GLUT-2 vers la veine porte. Mémo : SGLT1 = glucose + galactose apical ; GLUT-5 = fructose apical ; GLUT-2 = glucose + galactose + fructose basal.'},
      {type:'qcu',q:'Après absorption par les entérocytes, les acides aminés et le glucose rejoignent :',
       opts:['La circulation lymphatique puis la veine cave supérieure','La veine porte puis le foie','L\'artère mésentérique supérieure directement','La veine sus-hépatique'],correct:[1],
       explanation:'Les AA et monosaccharides (hydrophiles) → VEINE PORTE → foie. Les lipides (hydrophobes), incorporés dans les chylomicrons, empruntent les vaisseaux CHYLIFÈRES LYMPHATIQUES → canal thoracique → veine cave supérieure. Cette différence explique pourquoi le plasma devient "lactescent" après un repas gras.'},
      {type:'qcu',q:'L\'émulsification des triglycérides dans le duodénum est réalisée par :',
       opts:['La trypsine pancréatique','La lipase gastrique','Les acides biliaires (amphiphiles)','La colipase seule'],correct:[2],
       explanation:'Les ACIDES BILIAIRES sont amphiphiles (pôle hydrophobe + pôle hydrophile). Ils s\'insèrent à l\'interface eau/lipides des grosses gouttelettes graisseuses → réduisent la tension de surface → fragmentation en petites gouttelettes → ↑ surface de contact pour la lipase. Sans acides biliaires → émulsification impossible → stéatorrhée.'},
      {type:'qcu',q:'La vitamine B12 est absorbée dans l\'iléon distal sous forme complexée avec :',
       opts:['L\'albumine','La protéine R (haptocorrine) qui la protège','Le facteur intrinsèque (FI) sécrété par les cellules pariétales','La bilirubine conjuguée'],correct:[2],
       explanation:'Absorption de la B12 : (1) FI sécrété par les cellules pariétales du fundus ; (2) dans le duodénum, la B12 se lie au FI (après clivage de la protéine R par la trypsine) ; (3) le complexe B12-FI est reconnu par les récepteurs CUBILINE de l\'iléon distal → absorption. Sans FI (gastrite auto-immune, gastrectomie) → anémie de Biermer.'},
      {type:'qcu',q:'L\'absorption du fer alimentaire nécessite sa réduction en Fe2+. Quel élément assure cette réduction ?',
       opts:['La trypsine pancréatique dans le duodénum','La lipase gastrique','L\'acidité gastrique (HCl) qui réduit Fe3+ en Fe2+','Les acides biliaires dans la lumière intestinale'],correct:[2],
       explanation:'HCl gastrique → (1) libère le Fe3+ des protéines alimentaires ; (2) réduit Fe3+ (ferrique, non absorbable) en Fe2+ (ferreux, absorbable par le DMT-1 duodénal). Conséquence : les IPP (↓ HCl) ou la gastrectomie → ↓ absorption du fer → anémie ferriprive.'},
      {type:'qcu',q:'Les vitamines liposolubles (A, D, E, K) sont absorbées en même temps que les lipides car :',
       opts:['Elles possèdent un transporteur commun avec les acides gras (FATP)','Étant hydrophobes, elles s\'intègrent aux micelles biliaires et sont absorbées par diffusion passive','Elles se lient au facteur intrinsèque pour traverser la bordure en brosse','Elles empruntent la voie porte avec le fructose'],correct:[1],
       explanation:'Vitamines ADEK (liposolubles = hydrophobes) → s\'intègrent aux MICELLES biliaires dans l\'intestin grêle → absorbées par diffusion passive dans les entérocytes → incorporées dans les CHYLOMICRONS → circulation lymphatique. Toute pathologie réduisant les AB (résection iléale, cholestase) → carence en ADEK.'},
      {type:'qcu',q:'La surface d\'absorption de l\'intestin grêle est amplifiée par trois niveaux anatomiques. Lesquels ?',
       opts:['Haustrations, sphincters iléaux et valvule de Bauhin','Valvules conniventes, villosités et microvillosités (bordure en brosse)','Cellules de Cajal, plexus myentérique et plexus sous-muqueux','Cryptes de Lieberkühn, cellules de Paneth et cellules entérochromaffines'],correct:[1],
       explanation:'Triple amplification de la surface intestinale : (1) VALVULES CONNIVENTES (replis permanents de la muqueuse) ; (2) VILLOSITÉS (projections digitiformes) ; (3) MICROVILLOSITÉS (bordure en brosse des entérocytes). Ces trois niveaux multiplient la surface par 600 → superficie ≈ terrain de tennis, pour optimiser l\'absorption.'},
      {type:'qcu',q:'Le microbiote intestinal est principalement concentré dans quel segment du tube digestif ?',
       opts:['L\'estomac (10^8-10^9 UFC, milieu chaud et humide)','L\'intestin grêle proximal (jéjunum)','Le côlon (10^9-10^11 UFC)','L\'œsophage distal (10^6-10^7 UFC)'],correct:[2],
       explanation:'Distribution bactérienne décroissante oro-aboral : estomac (pH 1) = 10^2-10^3 UFC (quasi stérile grâce à l\'HCl) ; intestin grêle = 10^4-10^6 UFC (contrôlé par bile, enzymes, IgA, phases III) ; CÔLON = 10^9-10^11 UFC (milieu anaérobie, chaud, temps de transit long → prolifération maximale).'},
      {type:'qcu',q:'Les acides gras à chaîne courte (AGCC) produits par le microbiote colique servent principalement de :',
       opts:['Substrat énergétique exporté vers les muscles squelettiques','Première source d\'énergie pour les colonocytes','Signal hormonal inhibant la sécrétion pancréatique','Précurseurs pour la synthèse de vitamines liposolubles'],correct:[1],
       explanation:'Les AGCC (butyrate, propionate, acétate) issus de la fermentation bactérienne des fibres alimentaires sont la PREMIÈRE SOURCE D\'ÉNERGIE des COLONOCYTES. Le butyrate est particulièrement important pour la santé de la muqueuse colique (anti-inflammatoire, anti-tumorale). Le propionate rejoint le foie. C\'est une raison majeure des bénéfices des fibres alimentaires.'},
      {type:'qcu',q:'Le vomissement est coordonné par quel centre nerveux dans le tronc cérébral ?',
       opts:['L\'area postrema seule','Le noyau du tractus solitaire (NTS)','Le noyau ambigu du nerf X','La substance réticulée pontique'],correct:[1],
       explanation:'Le NOYAU DU TRACTUS SOLITAIRE (NTS) est le centre intégrateur du vomissement. Il reçoit des afférences : gastriques (nerf vague, distension, inflammation → 5-HT/5-HT3 et NK/NK1), toxiques (area postrema, pas de BHE) et corticales/vestibulaires. Il coordonne la réponse : ouverture du SIO, fermeture du pylore, contraction abdominale, clôture des VAS.'},
      {type:'qcu',q:'L\'area postrema peut détecter les toxines circulantes (alcool, chimiothérapies, opioïdes) car :',
       opts:['Elle est très vascularisée avec une BHE très imperméable','Elle est dépourvue de barrière hémato-encéphalique','Elle contient des récepteurs membranaires spécifiques aux toxines bactériennes','Elle communique directement avec l\'estomac par le nerf vague afférent'],correct:[1],
       explanation:'L\'AREA POSTREMA est un organe circumventriculaire SANS BHE → les molécules circulantes (toxines, médicaments, alcool, chimiothérapies) peuvent directement activer ses neurones → signal au NTS → vomissement. C\'est le mécanisme des nausées chimio-induites (antagonistes des D2 et 5-HT3 de l\'area postrema sont des antiémétiques).'},
      {type:'qcu',q:'La dysbiose intestinale désigne :',
       opts:['Une augmentation pathologique du nombre total de bactéries dans le côlon','Une modification qualitative (composition) du microbiote perturbant l\'équilibre de l\'écosystème','Une disparition complète du microbiote après antibiothérapie','Une translocation des bactéries coliques dans la circulation sanguine'],correct:[1],
       explanation:'La DYSBIOSE = déséquilibre QUALITATIF (et parfois quantitatif) du microbiote intestinal, pas forcément une augmentation du nombre total de bactéries. Causes : antibiotiques (↓ diversité), infections, alimentation (↓ fibres → ↓ diversité), âge, stress. Conséquences : ↑ susceptibilité aux infections (C. difficile), dysrégulation immunitaire, liens avec l\'obésité, les MICI, la dépression.'},
      {type:'qcu',q:'Le SIBO (Small Intestinal Bacterial Overgrowth) peut survenir après résection iléo-cæcale. Pourquoi ?',
       opts:['La résection supprime les cellules de Paneth productrices de défensines','La résection de la valvule iléo-cæcale supprime la barrière physique empêchant le reflux des bactéries coliques vers l\'intestin grêle','La résection diminue la sécrétion de sécrétine → ↓ pH duodénal → milieu favorable aux bactéries','La résection supprime les phases III de nettoyage de l\'iléon'],correct:[1],
       explanation:'La VALVULE ILÉO-CÆCALE est une barrière physique empêchant le reflux des bactéries très abondantes du côlon (10^9-10^11 UFC) vers l\'intestin grêle (qui doit rester à 10^4-10^6 UFC). Sa résection (colectomie droite, résection iléo-cæcale pour maladie de Crohn) supprime cette barrière → reflux bactérien → SIBO → diarrhée, ballonnements, malabsorption.'},
    ]},
    medium:{label:'Moyen',desc:'Physiopathologie de l\'absorption, transporteurs, microbiote intégré',questions:[
      {type:'qcu',q:'La maladie cœliaque provoque une atrophie villositaire. Pourquoi le fer et les folates sont-ils spécifiquement déficitaires avant les vitamines B12 ?',
       opts:['Le fer et les folates sont moins stables chimiquement et se dégradent en premier','L\'atrophie touche préférentiellement le duodéno-jéjunum (site d\'absorption du fer et des folates), tandis que la B12 est absorbée dans l\'iléon distal (souvent épargné au début)','Les folates et le fer ont le même transporteur duodénal qui est le premier détruit','La B12 est stockée en grande quantité dans le foie et ses réserves couvrent plusieurs années'],correct:[1],
       explanation:'Distribution anatomique de l\'absorption : FER (DMT-1, duodénum proximal) + FOLATES (conjugase jéjunale, jéjunum proximal) → absorbés dans le duodéno-jéjunum, PREMIER TOUCHÉ par l\'atrophie cœliaque → carence précoce. VITAMINE B12 (récepteur cubiline, iléon distal) → épargné au début + réserves hépatiques pour 3-5 ans → carence tardive. Séquence diagnostique : anémie ferriprive ± mégaloblastique → bilan cœliaque.'},
      {type:'qcu',q:'Le choléra provoque des diarrhées sécrétoires massives (jusqu\'à 20L/jour). Quel est le mécanisme précis ?',
       opts:['La bactérie détruit les microvillosités → malabsorption osmotique massive','La toxine cholérique active l\'adénylate cyclase (ADP-ribosylation de Gs) → ↑ AMPc → activation du CFTR → hypersécrétion de Cl- → Na+ et eau suivent → diarrhée sécrétoire massive, SGLT1 reste intact','La toxine inhibe la pompe Na+/K+-ATPase → accumulation intracellulaire de Na+ → œdème osmotique','La toxine stimule les cellules entérochromaffines → ↑ 5-HT → contraction intestinale spastique'],correct:[1],
       explanation:'La TOXINE CHOLÉRIQUE : ADP-ribosylation constitutive de la sous-unité Gs → ↑↑ AMPc → activation du CFTR → hypersécrétion de Cl- dans la lumière → Na+ et eau suivent passivement → jusqu\'à 20L/jour. L\'épithélium est INTACT (SGLT1 fonctionnel) → la SRO (eau + sel + glucose) exploite le SGLT1 pour faire rentrer Na+ + eau même en présence de la toxine → réhydratation orale efficace.'},
      {type:'qcu',q:'Un patient sous IPP depuis 3 ans développe une anémie ferriprive et de l\'ostéoporose. Quel mécanisme physiopathologique unifie ces deux déficits ?',
       opts:['Les IPP inhibent directement la synthèse de ferritine et de vitamine D dans le foie','Les IPP bloquent l\'HCl gastrique → (1) ↓ réduction Fe3+ en Fe2+ absorbable → ↓ absorption du fer ; (2) ↓ acidité → ↓ solubilisation du calcium alimentaire → ↓ absorption du calcium → ↓ densité osseuse','Les IPP induisent une dysbiose sévère → déconjugaison des AB → malabsorption des vitamines liposolubles','Les IPP stimulent la parathormone → augmentation de la résorption osseuse'],correct:[1],
       explanation:'LES IPP au long cours causent des carences par manque d\'HCl : (1) ↓ HCl → pas de réduction Fe3+ → Fe2+ → ↓ captation par DMT-1 → anémie ferriprive (carence en fer) ; (2) ↓ HCl → ↓ solubilisation du calcium alimentaire (CaCO3 insoluble à pH neutre) → ↓ absorption calcique → ↓ densité osseuse → ostéoporose. Autres carences signalées : magnésium (TRPM6/7), B12 (si gastrite associée).'},
      {type:'qcu',q:'Dans l\'intolérance au lactose de l\'adulte (hypolactasie), pourquoi les produits laitiers fermentés (yaourt, fromage affiné) sont-ils souvent mieux tolérés que le lait ?',
       opts:['La fermentation augmente le pH du produit laitier, facilitant l\'absorption du lactose restant','Les bactéries lactiques de la fermentation produisent leur propre lactase qui prédigère partiellement le lactose → moins de lactose résiduel à digérer + vidange gastrique ralentie par la texture épaisse','Le fromage affiné ne contient plus de lactose car il est entièrement transformé en acide lactique','La fermentation active les transporteurs SGLT1 du jéjunum qui compensent le déficit en lactase'],correct:[1],
       explanation:'Dans les produits fermentés : (1) Les bactéries lactiques ont leur propre β-galactosidase (lactase) → prédigestion du lactose → ↓ lactose résiduel à digérer par l\'hôte ; (2) Les yaourts ont une texture épaisse → vidange gastrique plus lente → arrivée progressive du lactose dans l\'intestin → dépassement moins important des capacités de la lactase résiduelle. Le fromage affiné a très peu de lactose (sérum extrait + fermentation prolongée).'},
      {type:'qcu',q:'La transplantation de microbiote fécal (FMT) est efficace dans les infections récidivantes à C. difficile. Quel principe justifie son efficacité ?',
       opts:['Le microbiote du donneur produit des anticorps anti-toxines de C. difficile','Restauration d\'un microbiote diversifié → réoccupation des niches écologiques → résistance à la colonisation → C. difficile ne peut plus proliférer','Le microbiote transplanté sécrète des antibiotiques naturels actifs sur C. difficile (bactériocines uniquement)','Le microbiote du donneur stimule directement la production d\'IgA anti-C. difficile'],correct:[1],
       explanation:'RÉSISTANCE À LA COLONISATION : un microbiote sain et diversifié occupe toutes les niches intestinales (compétition nutritive, production d\'AGCC → ↓ pH colique → défavorable pour C. difficile, bactériocines, occupation de l\'épithélium). L\'antibiothérapie détruit cette diversité → niches libérées → C. difficile prolifère. La FMT restaure cette diversité → restauration de la résistance → efficacité > 90% dans les formes récidivantes.'},
      {type:'qcu',q:'Un patient souffre de stéatorrhée après cholécystectomie lors des repas très riches en graisses. Quel mécanisme est en cause ?',
       opts:['La cholécystectomie supprime la sécrétion de CCK duodénale → ↓ activation des lipases pancréatiques','Sans vésicule biliaire, la bile hépatocytaire diluée s\'écoule en continu ; le pic de bile concentrée post-prandial n\'existe plus → émulsification insuffisante pour les repas très lipidiques','La cholécystectomie entraîne un rétrécissement du cholédoque → obstruction biliaire partielle','La cholécystectomie inactive les transporteurs ASBT de l\'iléon → cycle entéro-hépatique rompu'],correct:[1],
       explanation:'Après cholécystectomie : sans vésicule pour CONCENTRER et STOCKER la bile, la bile hépatocytaire diluée s\'écoule en continu (500-800 mL/j). Lors d\'un repas très riche en graisses, le pic de bile concentrée (normalement libéré sous CCK) n\'existe plus → émulsification insuffisante → malabsorption lipidique légère. Pour les repas normaux, l\'adaptation est généralement suffisante.'},
      {type:'qcu',q:'La pancréatite familiale (mutation du trypsinogène) et la mucoviscidose (mutation CFTR) conduisent toutes deux à une pancréatite, mais par des mécanismes distincts. Quelle affirmation distingue correctement ces deux mécanismes ?',
       opts:['Mucoviscidose : activation prématurée intra-pancréatique ; pancréatite familiale : obstruction canaliculaire','Pancréatite familiale : mutation du trypsinogène → PSTI ne peut plus inhiber la trypsine → autodigestion intra-pancréatique ; mucoviscidose : CFTR muté → sécrétions épaisses → obstruction canaliculaire → ↑ pression → activation enzymatique secondaire','Mucoviscidose : déficit en lithostatine ; pancréatite familiale : déficit en entérokinase duodénale','Elles ont le même mécanisme : toutes deux provoquent une activation prématurée de la trypsine intra-pancréatique'],correct:[1],
       explanation:'DISTINCTION mécanistique : PANCRÉATITE FAMILIALE → mutation du trypsinogène → trypsine résistante à l\'inhibition par le PSTI → toute trypsine activée prématurément dans le pancréas n\'est plus neutralisée → AUTODIGESTION directe. MUCOVISCIDOSE → CFTR muté → ↓ HCO3- + eau → sécrétion visqueuse → OBSTRUCTION canaliculaire → ↑ pression → activation enzymatique sous pression. Deux mécanismes distincts pour arriver à la même conséquence.'},
      {type:'qcu',q:'Un patient dialysé chronique a des carences en vitamines C, B1 et B2 malgré une alimentation normale. Quel mécanisme explique ces carences spécifiques ?',
       opts:['La dialyse inactive les transporteurs intestinaux des vitamines hydrosolubles','Les vitamines hydrosolubles, de faible poids moléculaire, sont dialysées (éliminées lors des séances de dialyse)','La dialyse cause une dysbiose sévère réduisant la synthèse microbienne de ces vitamines','L\'insuffisance rénale chronique réduit la réabsorption tubulaire de ces vitamines'],correct:[1],
       explanation:'Les vitamines HYDROSOLUBLES (C, B1, B2, B6, folates) ont une faible masse moléculaire → DIALYSÉES lors des séances d\'hémodialyse (passent facilement à travers la membrane de dialyse). Contrairement aux vitamines liposolubles (ADEK) qui sont liées aux protéines ou aux lipides plasmatiques et donc retenues. Conséquence : les patients dialysés nécessitent une supplémentation systématique en vitamines hydrosolubles après chaque séance.'},
      {type:'qcu',q:'Les récepteurs D2 (dopamine), H1 (histamine) et aux opioïdes dans l\'area postrema sont des cibles thérapeutiques antiémétiques. Comment agit chaque classe de médicament ?',
       opts:['Antagoniste D2 (métoclopramide) → ↑ vomissement ; anti-H1 → traitement du mal des transports ; antagoniste opioïde → traitement des nausées chimio-induites','Antagoniste D2 (métoclopramide) → antiémétique ; anti-H1 (dimenhydrinate) → traitement du mal des transports (vestibulaire) ; antagoniste 5-HT3 (ondansétron) → nausées chimio-induites (pas opioïde)','Agoniste D2 → antiémétique ; agoniste H1 → antiémétique ; antagoniste µ → antiémétique','Les trois classes agissent uniquement sur le NTS, pas sur l\'area postrema'],correct:[1],
       explanation:'CIBLES ANTIÉMÉTIQUES : (1) ANTAGONISTE D2 (métoclopramide, dompéridone) → ↓ stimulation dopaminergique de l\'area postrema → antiémétique + effet prokinétique gastrique ; (2) ANTAGONISTE H1 (dimenhydrinate, méclizine) → ↓ stimulation vestibulaire → mal des transports, vertiges ; (3) ANTAGONISTE 5-HT3 (ondansétron) → ↓ activation vagale et centrale par la 5-HT → NAUSÉES CHIMIO-INDUITES. Les antagonistes NK1 (aprépitant) bloquent la neurokinine → chimiothérapies hautement émétisantes.'},
      {type:'vf',q:'Après colectomie totale (ablation complète du côlon), le patient développe une malabsorption sévère des glucides et des protéines car le côlon participe à leur absorption finale.',
       opts:['Vrai','Faux'],correct:[1],
       explanation:'FAUX. Le côlon N\'ABSORBE PAS les glucides, protides ou lipides (ces absorptions sont terminées dans l\'intestin grêle). Après colectomie totale : le patient produit davantage de selles (600g-1L/j vs 100-300g/j normal) mais SANS MALABSORPTION NUTRITIONNELLE. Le problème est uniquement la RÉABSORPTION D\'EAU ET D\'ÉLECTROLYTES (le côlon réabsorbe normalement 1L d\'eau/j) → diarrhée hydrique, déshydratation possible.'},
      {type:'qcu',q:'Le syndrome de pullulation bactérienne (SIBO) après résection de la valvule iléo-cæcale provoque une déconjugaison des acides biliaires. Quelle double conséquence résulte de cette déconjugaison ?',
       opts:['↑ absorption des vitamines liposolubles et diarrhée osmotique','Stéatorrhée (AB déconjugués → micelles inefficaces → ↓ absorption lipidique) + diarrhée cholérétique (AB déconjugués arrivent en excès dans le côlon → effet pro-sécrétoire)','Anémie ferriprive et hypocalcémie par compétition des AB avec les transporteurs','↑ formation de calculs biliaires et pancréatite secondaire'],correct:[1],
       explanation:'CONSÉQUENCES de la déconjugaison des AB par les bactéries du SIBO : (1) AB déconjugués → moins amphiphiles → MICELLES INEFFICACES → lipides non émulsifiés → STÉATORRHÉE (malabsorption des graisses et vitamines ADEK) ; (2) AB déconjugués arrivent en excès dans le côlon → effet PRO-SÉCRÉTOIRE direct (activation de l\'adénylate cyclase via récepteurs TGR5) → DIARRHÉE CHOLÉRÉTIQUE. La double conséquence est donc stéatorrhée + diarrhée.'},
    ]},
    hard:{label:'Difficile',desc:'Cas cliniques complexes, physiopathologie intégrée',questions:[
      {type:'cc',context:'Femme 32 ans, maladie cœliaque non traitée (pas de régime sans gluten depuis 5 ans). Bilan : Hb = 9 g/dL (VGM = 72 fL, microcytaire), folates = 1,1 ng/mL (bas), vitamine D = 12 ng/mL (bas), stéatorrhée, ostéoporose (T-score = -2,9). B12 = 280 pg/mL (normale).',
       q:'Pourquoi la vitamine B12 est-elle normale alors que les folates, le fer et la vitamine D sont carencés ?',
       opts:['La B12 est mieux protégée que les folates car liée à l\'albumine dans la lumière intestinale','L\'atrophie cœliaque touche préférentiellement le duodéno-jéjunum (site d\'absorption du fer, des folates et des vitamines ADEK), épargnant l\'iléon distal (site d\'absorption de la B12) + les réserves hépatiques de B12 couvrent 3-5 ans','La B12 est produite par le microbiote colique et n\'est pas affectée par l\'atrophie villositaire','Les folates et le fer ont une demi-vie plus courte que la B12 donc ils se carencent plus rapidement'],correct:[1],
       explanation:'SÉQUENCE ANATOMIQUE des carences cœliaques : l\'atrophie villositaire débute dans le DUODÉNO-JÉJUNUM et progresse distalement. Or : FER = duodénum proximal (DMT-1) ; FOLATES = jéjunum (conjugase) ; VITAMINES ADEK = tout l\'intestin grêle (micelles). Ces carences surviennent tôt. B12 = ILÉON DISTAL (souvent épargné au début) + réserves hépatiques pour 3-5 ans. La B12 normale est cohérente avec une maladie cœliaque évoluant depuis moins de 5 ans.'},
      {type:'cc',context:'Nourrisson 5 mois allaité exclusivement. Mère végétalienne stricte depuis 8 ans. B12 maternelle = 95 pg/mL (N : 200-900 pg/mL). Enfant : anémie mégaloblastique, léthargie, hypotonie, régression des acquisitions motrices.',
       q:'Expliquer le mécanisme de la carence chez le nourrisson alors que la mère est "asymptomatique".',
       opts:['Le lait maternel contient naturellement peu de B12 indépendamment du statut maternel','La B12 maternelle franchit le placenta en limitant ses propres réserves hépatiques (priorisation fœtale) ; les réserves hépatiques néonatales s\'épuisent en 3-5 mois car le lait d\'une mère carencée en apporte trop peu pour les renouveler','Le nourrisson n\'a pas encore de facteur intrinsèque fonctionnel avant 6 mois','La B12 est détruite par la pasteurisation du lait maternel'],correct:[1],
       explanation:'MÉCANISME SÉQUENTIEL : (1) IN UTERO : le fœtus est prioritairement approvisionné en B12 maternelle via le placenta → constitution de réserves hépatiques néonatales. (2) POST-NATAL : le lait maternel contient de la B12 proportionnellement aux taux maternels. Mère carencée (B12 = 95 pg/mL) → lait appauvri en B12 → réserves néonatales non renouvelées → épuisement en 3-5 mois → CARENCE NEUROLOGIQUE AIGUË. La mère est "asymptomatique" car ses propres réserves hépatiques adultes (qui constituent plusieurs années de stock) ne sont qu\'à moitié épuisées.'},
      {type:'qcu',q:'La résection iléale étendue cause une hyperoxalurie rénale secondaire (lithiase oxalique). Quel mécanisme précis est en cause ?',
       opts:['L\'iléon synthétise une enzyme (oxalate décarboxylase) qui dégrade l\'oxalate ; sa résection → accumulation','Les graisses non absorbées (stéatorrhée) se lient au calcium luminal → oxalate alimentaire non piégé → libre → absorbé dans le côlon → hyperoxalurie → calculs rénaux d\'oxalate','Les AB non réabsorbés dans le côlon forment des complexes avec l\'oxalate empêchant son élimination fécale','La résection iléale compromet la réabsorption rénale de l\'oxalate filtré'],correct:[1],
       explanation:'HYPEROXALURIE ENTÉRIQUE : normalement, le calcium luminal se lie à l\'oxalate alimentaire → sel insoluble (oxalate de calcium) → éliminé dans les selles. Dans la stéatorrhée post-iléale : les AG libres non absorbés CAPTENT PRÉFÉRENTIELLEMENT le calcium → calcium-AG → le calcium n\'est plus disponible pour l\'oxalate → OXALATE LIBRE → absorbé dans le côlon (muqueuse perméable à l\'oxalate libre) → hyperoxalurie → lithiase rénale oxalique récidivante. Traitement : ↓ graisses + Ca oral aux repas.'},
      {type:'qcu',q:'Dans le syndrome de renutrition (refeeding syndrome) chez un patient dénutri, quel électrolyte chute dangereusement et par quel mécanisme ?',
       opts:['Sodium : la réintroduction glucidique → expansion volémique → dilution du Na+','Phosphore : la reprise alimentaire → ↑ insuline → ↑ entrée de phosphate dans les cellules (phosphorylation oxydative) → hypophosphatémie → déficit en ATP → défaillances cardio-respiratoires et neurologiques','Potassium : l\'insuline stimule la Na+/K+-ATPase → K+ intracellulaire → hypokaliémie','Magnésium : les glucides complexes chélatent le magnésium intestinal → malabsorption'],correct:[1],
       explanation:'SYNDROME DE RENUTRITION : lors de la dénutrition sévère, le phosphate extracellulaire est épuisé (déficit global mais maintien de la calcémie aux dépens des réserves intracellulaires). À la reprise alimentaire : ↑ insuline → ↑ captation cellulaire de glucose + ↑ synthèse d\'ATP → ↑ consommation de PHOSPHATE intracellulaire → HYPOPHOSPHATÉMIE PROFONDE → déficit en ATP → (1) insuffisance cardiaque aiguë ; (2) paralysie respiratoire (diaphragme) ; (3) encéphalopathie. Mortalité élevée si non prévenu.'},
      {type:'cc',context:'Homme 45 ans, leucémie aiguë myéloïde, sous chimiothérapie intensive (cytarabine + daunorubicine). Développe des vomissements incoercibles malgré l\'ondansétron (antagoniste 5-HT3). L\'ajout d\'aprépitant (antagoniste NK1) contrôle partiellement les symptômes.',
       q:'Pourquoi l\'ondansétron seul est-il insuffisant pour les chimiothérapies hautement émétisantes ?',
       opts:['L\'ondansétron est inactif sur l\'area postrema car cette structure est dépourvue de récepteurs 5-HT3','Les chimiothérapies hautement émétisantes activent DEUX voies émétisantes : la voie 5-HT3 (cellules entérochromaffines → nerf vague → NTS) et la voie NK1 (substance P → NTS direct) ; l\'ondansétron ne bloque que la voie 5-HT3','L\'ondansétron est inactivé par l\'induction enzymatique de la cytarabine sur le CYP3A4','L\'ondansétron provoque une résistance aux récepteurs 5-HT3 après 48h d\'utilisation'],correct:[1],
       explanation:'Les chimiothérapies hautement émétisantes (cisplatine, anthracyclines) activent DEUX VOIES parallèles : (1) VOIE 5-HT3 : lésion intestinale → libération massive de 5-HT par les cellules entérochromaffines → récepteurs 5-HT3 vagaux afférents → NTS → vomissement (phase aiguë, 0-24h) → BLOQUÉE par ondansétron ; (2) VOIE NK1 : substance P libérée dans le NTS et l\'area postrema → récepteurs NK1 → vomissement retardé (24-96h) → BLOQUÉE par aprépitant. Les deux antagonistes ensemble = protection optimale.'},
      {type:'qcu',q:'Lors du syndrome de Ménière (maladie vestibulaire), des nausées sévères surviennent sans pathologie gastrique. Quel circuit neurophysiologique est en cause ?',
       opts:['Le saccule et l\'utricule communiquent directement avec les cellules entérochromaffines gastriques via le nerf vague','La perturbation vestibulaire (noyau du VIII) → connexions avec le NTS → activation du centre du vomissement → nausées et vomissements d\'origine "centrale" sans pathologie digestive','Le Ménière stimule l\'area postrema via une toxine endolymphatique circulante','Le cortex pariétal (orientation spatiale) envoie directement des signaux au pylore via le nerf honteux'],correct:[1],
       explanation:'Circuit vestibulo-émétique : noyaux VESTIBULAIRES (VIII) → connexions directes avec le NOYAU DU TRACTUS SOLITAIRE (NTS) → le NTS est activé sans signal périphérique digestif → nausées et vomissements. C\'est pourquoi les perturbations de l\'équilibre (Ménière, vertiges, mal des transports) causent des nausées même à jeun. Traitement : ANTI-H1 (dimenhydrinate, méclizine) qui bloquent la stimulation histaminergique des noyaux vestibulaires et du NTS.'},
      {type:'qcu',q:'Dans la maladie de Crohn iléale sévère, quelles sont les deux conséquences nutritionnelles majeures liées à l\'atteinte spécifique de l\'iléon distal ?',
       opts:['Déficit en zinc et en phosphore par malabsorption sélective iléale','Carence en vitamine B12 (absorption iléale exclusive) et malabsorption des acides biliaires → stéatorrhée ou diarrhée cholérétique selon l\'étendue de la résection','Malabsorption du glucose et du galactose par destruction des transporteurs SGLT1 iléaux','Déficit en folates et en fer par atteinte de la muqueuse iléale productrices de ferritine'],correct:[1],
       explanation:'Atteinte de l\'ILÉON DISTAL dans la maladie de Crohn → deux conséquences spécifiques : (1) VITAMINE B12 : absorption EXCLUSIVE dans l\'iléon distal via récepteurs cubiline → carence si > 60 cm d\'iléon atteint/réséqué ; (2) ACIDES BILIAIRES : réabsorption active à 90% dans l\'iléon distal → si atteinte légère : AB en excès dans le côlon → DIARRHÉE CHOLÉRÉTIQUE ; si atteinte sévère (> 100 cm) : pool d\'AB insuffisant → STÉATORRHÉE. Ces deux déficits sont spécifiques à l\'atteinte iléale (vs colite de Crohn → peu d\'impact nutritionnel).'},
      {type:'qcu',q:'Un patient cirrhotique avec shunts porto-systémiques majeurs développe une encéphalopathie hépatique. Le rifaximine (antibiotique non absorbé) améliore son état. Quel mécanisme justifie ce traitement ?',
       opts:['Le rifaximine inhibe l\'entérokinase duodénale → ↓ absorption des protéines → ↓ substrats pour la production d\'ammoniac','Le rifaximine réduit la flore bactérienne colique productrice d\'ammoniac (NH3) ; le NH3 ne pouvant plus être détoxifié par un foie shunté, ↓ sa production à la source → ↓ encéphalopathie','Le rifaximine stimule directement le cycle de l\'urée hépatique en activant les carbamoyl-phosphate synthétases','Le rifaximine est converti en lactulose par la flore intestinale → acidification du côlon → NH3 piégé sous forme NH4+'],correct:[1],
       explanation:'ENCÉPHALOPATHIE HÉPATIQUE : NH3 produit par les bactéries coliques (désamination des AA, uréase bactérienne) + shunts porto-systémiques → NH3 bypass le foie → cerveau → dysfonction. RIFAXIMINE : antibiotique non absorbé à large spectre → ↓ flore bactérienne productrice d\'NH3 dans le côlon → ↓ production d\'NH3 à la source → ↓ encéphalopathie. Complément du lactulose (acidification → NH4+ non absorbable, mais mécanisme différent).'},
      {type:'cc',context:'Enfant 7 ans, diarrhée chronique depuis 6 mois, distension abdominale, retard de croissance. Biopsie duodénale : atrophie villositaire totale, hypertrophie des cryptes, lymphocytes intra-épithéliaux > 30/100 entérocytes. Anticorps anti-transglutaminase = 850 U/mL (N < 10). Régime sans gluten instauré.',
       q:'Après 6 mois de régime strict sans gluten, quels paramètres biologiques et histologiques doivent normaliser en premier, et quel déficit peut persister le plus longtemps ?',
