<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM Cardiologie — Banque de Questions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4f8;--surface:#fff;--border:#dde3ec;--text:#1a2332;--muted:#6b7a96;
  --accent:#2563eb;--accent-l:#eff6ff;--accent-d:#1d4ed8;
  --green:#16a34a;--green-l:#f0fdf4;--green-b:#bbf7d0;
  --red:#dc2626;--red-l:#fef2f2;--red-b:#fecaca;
  --orange:#ea580c;--orange-l:#fff7ed;
  --purple:#7c3aed;--purple-l:#f5f3ff;
  --yellow:#ca8a04;--yellow-l:#fefce8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --r:10px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}

/* ---- HEADER ---- */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
.hdr-brand{display:flex;align-items:center;gap:.65rem}
.hdr-logo{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;font-weight:700;flex-shrink:0}
.hdr-title{font-weight:700;font-size:1rem;line-height:1.2}
.hdr-sub{font-size:.72rem;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:.5rem}
#btn-home{display:none;align-items:center;gap:.4rem;background:none;border:1px solid var(--border);color:var(--muted);padding:.35rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .15s}
#btn-home:hover{border-color:var(--accent);color:var(--accent)}
#btn-home.vis{display:flex}
.score-badge{background:var(--accent-l);color:var(--accent);border:1px solid #bfdbfe;padding:.3rem .75rem;border-radius:6px;font-size:.8rem;font-weight:600;display:none}
.score-badge.vis{display:block}

/* ---- HOME ---- */
#home{max-width:1080px;margin:0 auto;padding:2.5rem 1.5rem}
.hero{text-align:center;margin-bottom:2.5rem}
.hero h1{font-size:2rem;font-weight:800;margin-bottom:.5rem;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);max-width:520px;margin:0 auto}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.2rem}
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.course-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--c,#2563eb);border-radius:var(--r) var(--r) 0 0}
.course-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--c,#2563eb)}
.cc-head{display:flex;align-items:flex-start;gap:.85rem;margin-bottom:.85rem}
.cc-icon{width:44px;height:44px;border-radius:10px;background:var(--ic,#eff6ff);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.cc-title{font-weight:700;font-size:.98rem;line-height:1.3;margin-bottom:.2rem}
.cc-sub{font-size:.75rem;color:var(--muted)}
.cc-meta{display:flex;gap:.5rem;flex-wrap:wrap}
.cc-tag{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:.15rem .5rem;font-size:.72rem;color:var(--muted)}
.cc-tag.accent{background:var(--accent-l);border-color:#bfdbfe;color:var(--accent)}
.cc-prog{margin-top:1rem}
.cc-prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:.3rem}
.cc-prog-fill{height:100%;background:var(--c,#2563eb);border-radius:3px;transition:width .4s;width:0}
.cc-prog-txt{font-size:.72rem;color:var(--muted);display:flex;justify-content:space-between}

/* ---- QUIZ VIEW ---- */
#quiz-view{display:none;max-width:820px;margin:0 auto;padding:1.5rem}
.qv-header{margin-bottom:1.5rem}
.qv-title{font-size:1.3rem;font-weight:800;margin-bottom:.25rem}
.qv-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted)}
.qv-prog-wrap{margin-top:.75rem}
.qv-prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.qv-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:3px;transition:width .3s}
.qv-prog-txt{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:.3rem}

/* question card */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.2rem;transition:border-color .2s}
.q-card.answered{border-color:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,.08)}
.q-card.answered.wrong{border-color:var(--red);box-shadow:0 0 0 2px rgba(220,38,38,.08)}
.q-top{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:1rem}
.q-num{background:var(--accent-l);color:var(--accent);border:1px solid #bfdbfe;border-radius:6px;padding:.2rem .55rem;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:.1rem}
.q-type{font-size:.72rem;padding:.18rem .5rem;border-radius:4px;font-weight:600;flex-shrink:0;margin-top:.1rem}
.q-type.qcu{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.q-type.qcm{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.q-type.vf{background:#fefce8;color:#ca8a04;border:1px solid #fde68a}
.q-type.cc{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
.q-text{font-weight:600;font-size:.95rem;line-height:1.55;flex:1}
.q-context{background:#f8fafc;border-left:3px solid var(--accent);padding:.65rem .9rem;border-radius:0 6px 6px 0;font-size:.85rem;margin-bottom:1rem;line-height:1.6;color:#374151}

/* options */
.q-opts{display:flex;flex-direction:column;gap:.5rem}
.opt{display:flex;align-items:flex-start;gap:.7rem;padding:.75rem .9rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;user-select:none}
.opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-l)}
.opt.selected{border-color:var(--accent);background:var(--accent-l)}
.opt.correct{border-color:var(--green)!important;background:var(--green-l)!important}
.opt.incorrect{border-color:var(--red)!important;background:var(--red-l)!important}
.opt.disabled{cursor:default}
.opt.show-correct{border-color:var(--green);background:var(--green-l);opacity:.7}
.opt-marker{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem;font-size:.65rem;font-weight:700;transition:all .15s}
.opt.selected .opt-marker{border-color:var(--accent);background:var(--accent);color:#fff}
.opt.correct .opt-marker{border-color:var(--green);background:var(--green);color:#fff}
.opt.incorrect .opt-marker{border-color:var(--red);background:var(--red);color:#fff}
.opt-label{font-size:.88rem;line-height:1.5;flex:1}
.opt-marker.sq{border-radius:4px}

/* submit / feedback */
.q-actions{margin-top:.9rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.btn-submit{background:var(--accent);color:#fff;border:none;padding:.5rem 1.2rem;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:600;font-family:inherit;transition:background .15s}
.btn-submit:hover{background:var(--accent-d)}
.btn-submit:disabled{opacity:.4;cursor:default}
.feedback{padding:.75rem 1rem;border-radius:8px;font-size:.84rem;line-height:1.6;display:none;flex:1}
.feedback.correct{background:var(--green-l);border:1px solid var(--green-b);color:#14532d}
.feedback.incorrect{background:var(--red-l);border:1px solid var(--red-b);color:#7f1d1d}
.feedback strong{display:block;margin-bottom:.2rem;font-size:.88rem}
.feedback.vis{display:block}

/* nav buttons */
.qv-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;gap:.75rem}
.btn-nav{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.55rem 1.1rem;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:500;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:.4rem}
.btn-nav:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-nav:disabled{opacity:.35;cursor:default}
.btn-nav.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-nav.primary:hover:not(:disabled){background:var(--accent-d)}
.q-counter{font-size:.82rem;color:var(--muted);text-align:center;flex:1}

/* results */
#results-view{display:none;max-width:680px;margin:0 auto;padding:2rem 1.5rem;text-align:center}
.res-circle{width:130px;height:130px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-weight:800}
.res-pct{font-size:2.2rem;line-height:1}
.res-label{font-size:.75rem;font-weight:500;margin-top:.2rem}
.res-title{font-size:1.6rem;font-weight:800;margin-bottom:.4rem}
.res-sub{color:var(--muted);margin-bottom:2rem}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:2rem}
.res-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem;text-align:center}
.res-stat-n{font-size:1.5rem;font-weight:800;margin-bottom:.2rem}
.res-stat-l{font-size:.75rem;color:var(--muted)}
.res-btns{display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap}
.btn-res{padding:.6rem 1.4rem;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:600;font-family:inherit;transition:all .15s}
.btn-res.primary{background:var(--accent);color:#fff;border:none}
.btn-res.primary:hover{background:var(--accent-d)}
.btn-res.secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-res.secondary:hover{border-color:var(--accent);color:var(--accent)}

/* question jump grid */
.q-grid{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:1rem}
.q-dot{width:28px;height:28px;border-radius:5px;border:1px solid var(--border);font-size:.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface);color:var(--muted)}
.q-dot:hover{border-color:var(--accent);color:var(--accent)}
.q-dot.done-ok{background:var(--green-l);border-color:var(--green);color:var(--green)}
.q-dot.done-bad{background:var(--red-l);border-color:var(--red);color:var(--red)}
.q-dot.current{border-color:var(--accent);background:var(--accent);color:#fff}

@media(max-width:640px){
  .courses-grid{grid-template-columns:1fr}
  .res-stats{grid-template-columns:1fr 1fr}
  .hero h1{font-size:1.5rem}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">♥</div>
    <div>
      <div class="hdr-title">QCM Cardiologie</div>
      <div class="hdr-sub">Banque de questions — 2ème année Médecine</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="score-badge" id="score-badge">Score : 0/0</div>
    <button id="btn-home" onclick="goHome()">← Cours</button>
  </div>
</header>

<!-- HOME -->
<div id="home">
  <div class="hero">
    <h1>Banque de QCM</h1>
    <p>Sélectionne un cours pour commencer. Chaque cours contient ~100 questions : QCU, QCM, Vrai/Faux et cas cliniques.</p>
  </div>
  <div class="courses-grid" id="courses-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz-view">
  <div class="qv-header">
    <div class="qv-title" id="qv-title"></div>
    <div class="qv-meta">
      <span id="qv-count"></span>
      <span id="qv-score-inline"></span>
    </div>
    <div class="qv-prog-wrap">
      <div class="qv-prog-bar"><div class="qv-prog-fill" id="qv-bar"></div></div>
      <div class="qv-prog-txt"><span id="qv-prog-l"></span><span id="qv-prog-r"></span></div>
    </div>
    <div class="q-grid" id="q-dot-grid"></div>
  </div>
  <div id="q-container"></div>
  <div class="qv-nav">
    <button class="btn-nav" id="btn-prev" onclick="navigate(-1)">← Préc.</button>
    <div class="q-counter" id="q-counter"></div>
    <button class="btn-nav" id="btn-next" onclick="navigate(1)">Suiv. →</button>
    <button class="btn-nav primary" id="btn-results" onclick="showResults()" style="display:none">Voir les résultats</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results-view">
  <div class="res-circle" id="res-circle">
    <div class="res-pct" id="res-pct"></div>
    <div class="res-label">Score</div>
  </div>
  <div class="res-title" id="res-title"></div>
  <div class="res-sub" id="res-sub"></div>
  <div class="res-stats">
    <div class="res-stat"><div class="res-stat-n" id="rs-correct" style="color:var(--green)"></div><div class="res-stat-l">Correctes</div></div>
    <div class="res-stat"><div class="res-stat-n" id="rs-wrong" style="color:var(--red)"></div><div class="res-stat-l">Incorrectes</div></div>
    <div class="res-stat"><div class="res-stat-n" id="rs-skip" style="color:var(--muted)"></div><div class="res-stat-l">Non répondues</div></div>
  </div>
  <div class="res-btns">
    <button class="btn-res primary" onclick="restartQuiz()">Recommencer</button>
    <button class="btn-res secondary" onclick="goHome()">Choisir un cours</button>
  </div>
</div>

<script>
// ============================================================
// DATA — 6 COURSES × ~100 QUESTIONS
// Types: 'qcu' (single), 'qcm' (multiple), 'vf', 'cc' (cas clinique = qcu with context)
// Structure: { type, q, opts, correct (array of indices), explanation, context? }
// ============================================================

const COURSES = [

// ==================== COURS 1 : PHYSIOLOGIE ====================
{
  id:'physio',
  title:'Physiologie de la Circulation',
  icon:'🫀',
  color:'#2563eb',
  iconBg:'#eff6ff',
  tags:['PA','Débit cardiaque','Régulation'],
  questions:[
    {type:'qcu',q:'Quelle est la formule de la pression artérielle moyenne (PAM) ?',opts:['PAM = FC × VES','PAM = DC × RPT','PAM = (systolique – diastolique) / 2','PAM = systolique + diastolique'],correct:[1],explanation:'La PAM = Débit Cardiaque × Résistances Périphériques Totales. C\'est la variable principale régulée du système vasculaire.'},
    {type:'qcu',q:'Quel pourcentage du volume sanguin total est contenu dans le compartiment veineux ?',opts:['10 %','20 %','50 %','70 %'],correct:[2],explanation:'50 % du sang est dans les veines (réservoir principal). Les artères n\'en contiennent que 10 %.'},
    {type:'vf',q:'Les capillaires représentent 5 % du volume sanguin total et sont le principal siège des échanges.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Malgré leur faible volume (5 %), les capillaires sont le seul site d\'échanges gazeux et métaboliques.'},
    {type:'qcu',q:'Le débit cardiaque (DC) se décompose en :',opts:['Volume d\'éjection systolique (VES) × Pression artérielle','FC × VES','FC × RPT','VES / PAM'],correct:[1],explanation:'DC = VES × FC. Toute modification de l\'un ou l\'autre de ces paramètres modifie le débit cardiaque.'},
    {type:'qcu',q:'Où est situé le centre vasomoteur de régulation de la PA ?',opts:['Hypothalamus','Cortex préfrontal','Tronc cérébral (bulbe)','Moelle épinière'],correct:[2],explanation:'Le centre vasomoteur se trouve dans le tronc cérébral (bulbe), au niveau du NTS (noyau du tractus solitaire).'},
    {type:'qcm',q:'Quelles sont les afférences du centre vasomoteur bulbaire ? (Plusieurs réponses possibles)',opts:['Barorécepteurs du sinus carotidien','Barorécepteurs de la crosse aortique','Thermorécepteurs cutanés','Informations du nœud sinusal'],correct:[0,1,3],explanation:'Les afférences comprennent les barorécepteurs du sinus carotidien, de la crosse aortique, et les informations provenant du nœud sinusal.'},
    {type:'vf',q:'Le nœud auriculo-ventriculaire est la seule structure permettant le passage de l\'influx électrique des oreillettes vers les ventricules en situation normale.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. C\'est la seule voie de conduction normale entre oreillettes et ventricules. C\'est aussi un filtre qui ralentit la transmission.'},
    {type:'qcu',q:'La pression artérielle diastolique est maintenue grâce à :',opts:['La contraction active du ventricule gauche','L\'étanchéité de la valve aortique et la restitution de l\'énergie élastique aortique','La contraction du ventricule droit','L\'activation des barorécepteurs'],correct:[1],explanation:'Pendant la diastole, la valve aortique fermée + l\'élasticité de l\'aorte restituant son énergie permettent de maintenir la PAD.'},
    {type:'qcu',q:'Le zéro de référence de la PAM correspond à :',opts:['La PA au niveau du ventricule gauche à la systole','La PA dans l\'oreillette droite à la diastole','La PA au niveau de l\'aorte ascendante','La PA au niveau des capillaires'],correct:[1],explanation:'Le zéro est arbitrairement fixé à la PA dans l\'oreillette droite en diastole — c\'est le point de référence du système.'},
    {type:'qcu',q:'Quelle est la principale résistance vasculaire dans le système circulatoire ?',opts:['Les veines caves','Les capillaires','Les artérioles','Les artères élastiques'],correct:[2],explanation:'Les artérioles, riches en cellules musculaires lisses, sont le principal site de résistance périphérique.'},
    {type:'vf',q:'La pression artérielle normale est inférieure à 140/90 mmHg.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Au-dessus de 140/90 mmHg mesurée lors de différentes consultations, on parle d\'hypertension artérielle (HTA).'},
    {type:'qcu',q:'Lors d\'une hémorragie, quelle est la réponse IMMÉDIATE du système sympathique ?',opts:['Vasodilatation artérielle + bradycardie','Vasoconstriction + tachycardie + ↑ RPT','Diminution de la sécrétion de rénine','Inhibition des barorécepteurs'],correct:[1],explanation:'Le sympathique déclenche vasoconstriction + tachycardie + ↑RPT pour tenter de maintenir la PAM.'},
    {type:'qcm',q:'Le système RAA comprend quels éléments actifs ? (Plusieurs réponses)',opts:['Rénine (rein)','Angiotensine I','Angiotensine II (active)','Aldostérone (cortex surrénalien)'],correct:[0,2,3],explanation:'La rénine, l\'angiotensine II et l\'aldostérone sont les éléments actifs. L\'angiotensine I est un précurseur inactif.'},
    {type:'qcu',q:'L\'angiotensine II a comme effet PRINCIPAL sur les artérioles :',opts:['Vasodilatation','Vasoconstriction','Aucun effet','Augmentation de leur diamètre'],correct:[1],explanation:'L\'angiotensine II est un puissant vasoconstricteur artériolaire, augmentant les RPT et donc la PAM.'},
    {type:'qcu',q:'Quel est le rôle principal de l\'aldostérone dans la régulation de la PA ?',opts:['Vasoconstriction directe','Rétention sodée (et hydrique) → ↑ volémie → ↑ PAM','Augmentation de la FC','Inhibition des barorécepteurs'],correct:[1],explanation:'L\'aldostérone agit sur le tube collecteur rénal pour réabsorber le sodium (et l\'eau suit) → augmentation de la volémie → ↑ PAM.'},
    {type:'vf',q:'L\'ADH (vasopressine) provient de l\'hypophyse et provoque une vasoconstriction.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. L\'ADH (produite par l\'hypothalamus, libérée par l\'hypophyse) provoque vasoconstriction et rétention hydrique.'},
    {type:'qcu',q:'Dans la circulation cérébrale, que se passe-t-il en cas de chute de la PAM systémique ?',opts:['Vasoconstriction cérébrale pour économiser le sang','Vasodilatation artériolaire cérébrale pour maintenir la pression constante','Pas de modification au niveau cérébral','Augmentation de la FC cérébrale'],correct:[1],explanation:'La circulation cérébrale s\'autorégule : en cas de chute de PAM, vasodilatation artériolaire pour maintenir une pression constante au cerveau.'},
    {type:'qcu',q:'L\'OAP (œdème aigu pulmonaire) survient quand la pression capillaire pulmonaire dépasse :',opts:['10 mmHg','15 mmHg','25 mmHg','40 mmHg'],correct:[2],explanation:'Au-delà de 25 mmHg, la membrane alvéolo-capillaire est dépassée → passage de liquide dans les alvéoles → OAP.'},
    {type:'qcu',q:'Dans l\'emphysème, pourquoi développe-t-on une insuffisance ventriculaire droite ?',opts:['L\'hypercapnie dilate les artères pulmonaires','L\'hypoxémie entraîne une vasoconstriction pulmonaire → ↑ RPT pulmonaires → ↑ pression VD','La destruction alvéolaire comprime directement le VD','Le VD est trop proche des alvéoles'],correct:[1],explanation:'Dans l\'emphysème : hypoxémie → vasoconstriction des artères pulmonaires (réflexe unique à la circulation pulmonaire) → surcharge du VD.'},
    {type:'qcu',q:'Le système porte draine :',opts:['Le sang de la tête','L\'ensemble des capillaires intestinaux vers le foie','Le sang du cœur gauche','Les artères iliaques'],correct:[1],explanation:'La veine porte draine tous les capillaires intestinaux vers le foie avant de rejoindre la circulation générale.'},
    {type:'vf',q:'La vascularisation coronaire se fait principalement pendant la systole.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Les artères coronaires sont écrasées pendant la systole → la vascularisation coronaire se fait principalement pendant la DIASTOLE.'},
    {type:'qcu',q:'L\'angor d\'effort est causé par :',opts:['Un caillot dans une coronaire','L\'incapacité des coronaires athéromateuses à se dilater à l\'effort → ↓ apport O2','Une arythmie ventriculaire','Une insuffisance valvulaire'],correct:[1],explanation:'L\'angor survient à l\'effort car les coronaires malades ne peuvent pas se dilater pour augmenter le débit → ischémie → douleur.'},
    {type:'qcu',q:'La circulation lymphatique réabsorbe environ :',opts:['1 L/jour','4 L/jour','10 L/jour','0,1 L/jour'],correct:[1],explanation:'La lymphe réabsorbe environ 4 L/jour de liquide interstitiel, dont 9/10 ont été réabsorbés par les capillaires.'},
    {type:'qcm',q:'Quels mécanismes assurent le retour veineux ? (Plusieurs réponses)',opts:['Pompe musculaire du mollet','Valvules veineuses','Dépression respiratoire inspiratoire','Contraction active des veines'],correct:[0,1,2],explanation:'Le retour veineux est assuré par la pompe musculaire, les valvules anti-reflux et la dépression inspiratoire thoracique.'},
    {type:'qcu',q:'L\'équilibre de Starling au niveau capillaire est déterminé par :',opts:['Uniquement la pression hydrostatique','La différence entre pression hydrostatique et pression oncotique','Uniquement la pression oncotique','Le débit cardiaque seul'],correct:[1],explanation:'L\'équilibre de Starling = différence entre pression hydrostatique (filtration) et pression oncotique (réabsorption). Les modifications des deux entraînent des œdèmes.'},
    {type:'qcu',q:'Que provoque une diminution des protéines plasmatiques (hypoprotidémie) ?',opts:['↑ réabsorption capillaire → sécheresse','↓ pression oncotique → fuite vers l\'interstitium → œdème','Hypertension artérielle','Tachycardie réflexe'],correct:[1],explanation:'↓ protéines → ↓ pression oncotique → l\'eau reste dans l\'interstitium → ŒDÈME par déséquilibre de Starling.'},
    {type:'vf',q:'Chez le sujet sain, c\'est la fonction respiratoire qui limite l\'effort physique maximal.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Chez le sujet sain, c\'est la FONCTION CARDIOVASCULAIRE qui limite l\'effort. Il existe toujours une réserve ventilatoire (~50 L).'},
    {type:'qcu',q:'La FC maximale théorique est estimée à :',opts:['150 – âge','180 – âge','220 – âge','200 – âge/2'],correct:[2],explanation:'FC max = 220 – âge. C\'est la valeur classiquement utilisée pour estimer la limite cardiovasculaire à l\'effort.'},
    {type:'qcu',q:'En anaérobie, le cycle de Krebs s\'arrête à la formation de :',opts:['CO2 + H2O','Glucose-6-phosphate','Acide lactique','ATP directement'],correct:[2],explanation:'En anaérobie : le cycle de Krebs s\'arrête à l\'acide lactique → passage dans le sang → acidose métabolique → hyperventilation.'},
    {type:'qcu',q:'Qu\'est-ce que l\'arythmie respiratoire ?',opts:['Une FA liée à la respiration','Une variation physiologique de la FC avec la respiration (↑ inspiration, ↓ expiration)','Une extrasystole provoquée par l\'inspiration','Un trouble du rythme grave'],correct:[1],explanation:'L\'arythmie respiratoire est un phénomène PHYSIOLOGIQUE normal (surtout chez le jeune) : FC ↑ à l\'inspiration, ↓ à l\'expiration (influence du parasympathique).'},
    {type:'vf',q:'La noradrénaline provoque une vasoconstriction veineuse via les récepteurs alpha.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La noradrénaline agit sur les récepteurs alpha des veines (qui ont aussi des cellules musculaires lisses) → vasoconstriction → mobilisation du réservoir veineux.'},
    {type:'qcu',q:'Lors d\'un effort musculaire, la vasodilatation artériolaire locale est principalement due à :',opts:['L\'activation du parasympathique','L\'accumulation locale de CO2 et de H+ (métabolites)','L\'inhibition des barorécepteurs','La chute de la PAM'],correct:[1],explanation:'Autorégulation locale : les métabolites de l\'exercice (CO2, H+, adénosine) provoquent une vasodilatation artériolaire → ↑ débit local.'},
    {type:'qcu',q:'Le NO (monoxyde d\'azote) produit par l\'endothélium a pour effet :',opts:['Vasoconstriction puissante','Vasodilatation artériolaire','Augmentation de la FC','Stimulation de la rénine'],correct:[1],explanation:'Le NO est un puissant vasodilatateur endothélial, agissant via la GMPc sur les cellules musculaires lisses.'},
    {type:'cc',context:'Un patient de 45 ans présente une PA de 145/95 mmHg, une FC de 82 bpm, une SaO2 de 97 %. Après 5 minutes de repos allongé, la PA est de 142/92 mmHg.',q:'Quelle est la conclusion correcte concernant la PA de ce patient ?',opts:['PA normale','HTA confirmée (> 140/90 mmHg)','Hypotension orthostatique','PA indéterminée sans plus de mesures'],correct:[1],explanation:'PA > 140/90 mmHg → HTA. Il faudra confirmer par 3 séries de 3 mesures sur plusieurs consultations, mais les valeurs sont d\'emblée pathologiques.'},
    {type:'cc',context:'À l\'effort, un patient ayant une sténose coronaire à 80 % ressent une douleur thoracique constrictive qui cède après 3 minutes de repos.',q:'Quel mécanisme explique cette douleur ?',opts:['Spasme coronaire au repos','À l\'effort, l\'artère coronaire ne peut pas se dilater → ischémie myocardique → douleur angineuse','Embolie pulmonaire d\'effort','Dissection aortique'],correct:[1],explanation:'Angor d\'effort typique : sténose coronaire fixe → impossibilité de dilater à l\'effort → ischémie transitoire → douleur qui cède au repos.'},
    {type:'qcu',q:'Le signe clinique d\'une turgescence jugulaire évoque :',opts:['Insuffisance coronarienne','Insuffisance cardiaque droite (↑ pression veineuse centrale)','Dissection aortique','Tamponnade péricardique'],correct:[1],explanation:'La turgescence jugulaire = distension des veines jugulaires → reflet d\'une augmentation de la pression dans le système veineux → IC droite.'},
    {type:'vf',q:'La PAM diminue progressivement de l\'aorte jusqu\'aux veines caves.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La PAM diminue continûment de l\'aorte (haute pression) vers les veines caves (pression proche de zéro) → c\'est ce gradient qui fait circuler le sang.'},
    {type:'qcu',q:'Lors d\'une forte tachycardie, quelle structure est la plus exposée au risque ischémique ?',opts:['Le poumon','Le cerveau','Le myocarde (vascularisation coronaire diastolique)','Le foie'],correct:[2],explanation:'Les coronaires se remplissent pendant la diastole. Une tachycardie réduit la durée de diastole → ↓ perfusion coronaire → risque ischémique.'},
    {type:'qcu',q:'Le débit de filtration glomérulaire (DFG) est augmenté par l\'angiotensine II car :',opts:['Elle dilate l\'artériole afférente','Elle constricte l\'artériole efférente → ↑ pression dans le glomérule → ↑ DFG','Elle augmente la FC','Elle dilate les capillaires rénaux'],correct:[1],explanation:'L\'Ang II constricte l\'artériole efférente → le sang reste plus longtemps dans le glomérule → ↑ DFG. Les IEC lèvent cet effet → ↓ DFG → protection néphronique à long terme.'},
    {type:'qcm',q:'Parmi les éléments suivants, lesquels font partie de l\'équilibre de Starling ? (Plusieurs réponses)',opts:['Pression hydrostatique capillaire','Pression oncotique capillaire','Pression hydrostatique interstitielle','Fréquence cardiaque'],correct:[0,1,2],explanation:'L\'équilibre de Starling implique les pressions hydrostatiques (capillaire + interstitielle) et oncotiques (capillaire + interstitielle), pas la FC.'},
    {type:'vf',q:'La circulation pulmonaire est une circulation à haute pression.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. La circulation pulmonaire est une circulation à BASSE pression (PAP normale ≈ 25/10 mmHg), contrairement à la circulation systémique.'},
    {type:'qcu',q:'Un patient en choc hémorragique a une PA normale mais une FC à 140 bpm. Quelle est l\'interprétation ?',opts:['Le patient est stable, la PA est normale','C\'est une tachycardie bénigne de stress','Hémorragie interne COMPENSÉE — la tachycardie est le signal d\'alarme','FA paroxystique'],correct:[2],explanation:'La PA peut être maintenue par la compensation sympathique (vasoconstriction + tachycardie) même avec une hémorragie significative. La tachycardie isolée est le premier signe.'},
    {type:'qcu',q:'L\'index cardiaque à l\'effort :',opts:['Reste constant','Diminue linéairement','Augmente linéairement jusqu\'à son maximum','Oscille de façon aléatoire'],correct:[2],explanation:'L\'index cardiaque augmente de façon linéaire avec l\'intensité de l\'effort, jusqu\'à atteindre un maximum à l\'effort maximal.'},
    {type:'vf',q:'Les barorécepteurs sont les plus sensibles entre 80 et 140 mmHg.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. C\'est dans cette plage que les barorécepteurs du sinus carotidien et de la crosse aortique ont la meilleure sensibilité de détection.'},
    {type:'qcu',q:'Qu\'appelle-t-on la « pression pulsée » ?',opts:['PAM','PA systolique × diastolique','PA systolique – PA diastolique','PA diastolique × 2'],correct:[2],explanation:'Pression pulsée = PAS – PAD. Elle représente l\'amplitude de variation de pression à chaque cycle cardiaque.'},
    {type:'qcu',q:'Quelle est la formule de la PAM en pratique clinique ?',opts:['(PAS + PAD) / 2','(PAS + 2×PAD) / 3','(2×PAS + PAD) / 3','PAS / PAD'],correct:[1],explanation:'PAM = (PAS + 2 × PAD) / 3. Cette pondération reflète le fait que la diastole dure plus longtemps que la systole.'},
    {type:'qcu',q:'Quelle est la principale différence entre athérosclérose et artériosclérose ?',opts:['L\'athérosclérose touche la média des artérioles, l\'artériosclérose touche l\'intima','L\'athérosclérose touche l\'intima des grosses artères, l\'artériosclérose est un vieillissement naturel de la paroi','Elles sont synonymes','L\'artériosclérose est plus grave'],correct:[1],explanation:'Athérosclérose = maladie inflammatoire de l\'intima des grosses artères (plaques). Artériosclérose = vieillissement naturel de la paroi artérielle (sclérose de la média).'},
    {type:'qcu',q:'Le retour veineux dans les membres inférieurs est principalement assuré par :',opts:['La pression artérielle systolique','La pompe musculaire du mollet +++','L\'activité sympathique des veines','La gravité seule'],correct:[1],explanation:'La pompe musculaire du mollet (compression des veines lors de la contraction musculaire + valvules anti-reflux) est le principal mécanisme de retour veineux des MI.'},
    {type:'cc',context:'Un patient de 60 ans présentant une IVG sévère développe une toux avec expectorations rosées mousseuses, une dyspnée intense et des crépitants bilatéraux à l\'auscultation.',q:'Quel mécanisme explique ce tableau clinique ?',opts:['Pneumopathie bactérienne','Embolie pulmonaire','OAP : ↑ pression capillaire pulmonaire > 25 mmHg → rupture membrane alvéolo-capillaire → inondation alvéolaire','Asthme cardiaque'],correct:[2],explanation:'L\'IVG → ↑ pression veines pulmonaires → ↑ pression capillaires pulmonaires > 25 mmHg → OAP. Les expectorations rosées et mousseuses sont pathognomoniques.'},
    {type:'qcu',q:'Le seuil anaérobie correspond à :',opts:['Le moment où la FC atteint 120 bpm','Le début de l\'accumulation d\'acide lactique (épuration < production)','L\'arrêt complet du cycle de Krebs','La limite maximale de la VO2'],correct:[1],explanation:'Au seuil anaérobie, la production d\'acide lactique dépasse la capacité d\'épuration musculaire → acidose métabolique progressive.'},
    {type:'vf',q:'La dépression respiratoire lors de l\'inspiration favorise le retour veineux vers le cœur.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. À l\'inspiration, la pression intrathoracique diminue → aspiration du sang des veines caves vers l\'OD → facilitation du retour veineux.'},
    {type:'qcu',q:'Les fibres musculaires lisses des artérioles sont contrôlées par quel neurotransmetteur sympathique ?',opts:['Acétylcholine','Noradrénaline (récepteurs alpha)','Adrénaline (récepteurs bêta)','GABA'],correct:[1],explanation:'La noradrénaline agit sur les récepteurs alpha-1 des cellules musculaires lisses artériolaires → vasoconstriction → ↑ RPT.'},
  ]
},

// ==================== COURS 2 : DOULEURS THORACIQUES ====================
{
  id:'douleurs',
  title:'Douleurs Thoraciques',
  icon:'⚡',

  tags:['Angor','IDM','Péricardite','Dissection'],
  questions:[
    {type:'qcu',q:'Quel est le signe clinique pathognomonique d\'une péricardite aiguë ?',opts:['Douleur rétrosternale constrictive','Frottement péricardique auscultatoire','Sus-décalage ST systématisé','Tachycardie sinusale'],correct:[1],explanation:'Le frottement péricardique est pathognomonique de la péricardite. Il est méso- ou systolo-diastolique, superficiel (crissement de cuir neuf), et persiste en apnée.'},
    {type:'qcu',q:'Quel est le signe ECG typique de l\'IDM aigu ?',opts:['Sus-décalage ST diffus et concave','Sus-décalage ST systématisé et convexe (onde de Pardee) ± signe en miroir','Sous-décalage ST en miroir uniquement','PR allongé > 200 ms'],correct:[1],explanation:'L\'IDM = sus-décalage ST systématisé dans un territoire coronaire, convexe vers le haut (onde de Pardee), quasi-immédiat. Signe en miroir possible mais inconstant.'},
    {type:'vf',q:'La trinitrine soulage la douleur angineuse en moins d\'une minute.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La trinitrine sublinguale soulage l\'angor en < 1 minute (test diagnostique). En cas d\'IDM, elle est inefficace (artère bouchée).'},
    {type:'qcu',q:'La dissection aortique se distingue de l\'IDM par :',opts:['Une douleur brève < 5 min','Une irradiation dans le bras gauche uniquement','Une douleur MIGRATRICE irradiant dans le dos et un ECG NORMAL','Un sus-décalage ST systématisé'],correct:[2],explanation:'Dissection aortique : douleur déchirante, brutale, migratrice (suit le trajet de la déchirure) → dos → lombes. L\'ECG est typiquement NORMAL.'},
    {type:'qcm',q:'Quels sont les 4 urgences vitales devant une douleur thoracique ? (Plusieurs réponses)',opts:['IDM','Tamponnade','Embolie pulmonaire','Dissection aortique','Péricardite aiguë'],correct:[0,1,2,3],explanation:'Les 4 urgences absolues : IDM, Tamponnade, EP, Dissection aortique. La péricardite est fréquente mais le plus souvent bénigne.'},
    {type:'qcu',q:'L\'angor typique dure :',opts:['< 30 secondes','Entre 5 et 15 minutes','Plus de 30 minutes','Plusieurs heures'],correct:[1],explanation:'L\'angor typique dure entre 5 et 15 minutes, impose l\'arrêt de l\'effort et cède spontanément ou sous trinitrine.'},
    {type:'vf',q:'L\'IDM survient le plus souvent au repos, suite à la rupture d\'une plaque de cholestérol instable.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. L\'IDM est causé par la rupture d\'une plaque instable → thrombus → occlusion coronaire totale. Il survient souvent au repos (≠ angor d\'effort).'},
    {type:'qcu',q:'La péricardite aiguë touche préférentiellement :',opts:['Les patients âgés avec FRCV multiples','Les sujets jeunes, sportifs, en contexte viral','Les femmes enceintes','Les diabétiques'],correct:[1],explanation:'La péricardite touche typiquement les sujets jeunes, sportifs, dans un contexte viral (semaines précédentes). Terrain très différent de l\'IDM.'},
    {type:'qcu',q:'Comment différencier un sus-décalage ST d\'un IDM de celui d\'une péricardite sur l\'ECG ?',opts:['L\'IDM a un sus-décalage concave, la péricardite a un sus-décalage convexe','L\'IDM a un sus-décalage SYSTÉMATISÉ + CONVEXE + miroir ; la péricardite a un sus-décalage DIFFUS + CONCAVE sans miroir','L\'IDM a un ST diffus, la péricardite a un ST focal','Ils sont identiques sur l\'ECG'],correct:[1],explanation:'IDM : systématisé (territoire) + convexe + signe en miroir. Péricardite : diffus (toutes dérivations) + concave + sous-décalage PQ + PAS de miroir.'},
    {type:'qcu',q:'La fièvre de la péricardite se distingue de celle de l\'IDM par :',opts:['Elle est plus élevée dans l\'IDM','Dans la péricardite, elle est présente DÈS le début ; dans l\'IDM, elle est retardée de 24h (nécrose)','Elles sont identiques','La fièvre n\'existe pas dans la péricardite'],correct:[1],explanation:'Péricardite : fièvre modérée présente dès le début (inflammation). IDM : fièvre retardée de 24h (signe de la nécrose myocardique).'},
    {type:'vf',q:'La douleur de péricardite est soulagée par la position assise et aggravée en décubitus.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Caractéristique majeure de la péricardite : douleur ↑ en décubitus et à l\'inspiration profonde, ↓ en position assise penchée en avant.'},
    {type:'qcu',q:'L\'embolie pulmonaire se manifeste le plus souvent par une douleur :',opts:['Rétrosternale constrictive','Latéro-thoracique (point de côté) augmentée à l\'inspiration','Dorsale migratrice','En étau bilatérale'],correct:[1],explanation:'L\'EP donne une douleur latéro-thoracique, type point de côté, augmentée à l\'inspiration (pleurésie réactionnelle associée).'},
    {type:'qcu',q:'Quel est le signe de gravité d\'une embolie pulmonaire ?',opts:['Douleur thoracique','Tachycardie sinusale','SYNCOPE','Fièvre modérée'],correct:[2],explanation:'La syncope dans une EP est un signe de GRAVITÉ (EP massive avec effondrement du débit cardiaque). La tachycardie et la douleur thoracique sont communes.'},
    {type:'qcm',q:'Quels facteurs favorisent la survenue d\'une embolie pulmonaire ? (Plusieurs réponses)',opts:['Cancer actif','Alitement prolongé','Chirurgie orthopédique récente','Troubles de l\'hémostase (thrombophilie)','L\'âge seul'],correct:[0,1,2,3],explanation:'L\'âge SEUL n\'est pas un facteur favorisant retenu. Les facteurs de Virchow sont : stase (alitement), hypercoagulabilité (cancer, thrombophilie), lésion vasculaire (chirurgie).'},
    {type:'qcu',q:'La PA aux deux bras est systématiquement mesurée devant une douleur thoracique pour :',opts:['Mesurer la résistance vasculaire globale','Chercher une asymétrie > 25 mmHg évoquant une dissection aortique','Évaluer la fonction cardiaque gauche','Diagnostiquer une HTA secondaire'],correct:[1],explanation:'Une asymétrie de PA entre les 2 bras > 25 mmHg (et asymétrie des pouls) est un signe clinique majeur de dissection aortique.'},
    {type:'vf',q:'Un ECG normal exclut formellement une dissection aortique.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai dans ce sens : l\'ECG est NORMAL dans la dissection aortique. Donc un ECG normal ne rassure PAS — c\'est même un élément qui oriente vers la dissection.'},
    {type:'qcu',q:'Le signe de Nikolski est positif dans :',opts:['La péricardite','Le pemphigus (acantholyse dermique) — pas de rapport avec la cardio','L\'IDM','La dissection aortique'],correct:[1],explanation:'Question piège. Le signe de Nikolski concerne la dermatologie (pemphigus). Il n\'a pas de rapport avec la cardiologie.'},
    {type:'qcu',q:'Concernant le frottement péricardique, qu\'est-ce qui le distingue d\'un frottement pleural ?',opts:['Il est plus fort','Il PERSISTE EN APNÉE (≠ frottement pleural qui disparaît)','Il n\'est audible qu\'à gauche','Il est perçu uniquement en systole'],correct:[1],explanation:'Le frottement péricardique persiste en apnée car il est lié aux mouvements cardiaques et non aux mouvements respiratoires. C\'est le signe clinique différentiel essentiel.'},
    {type:'qcu',q:'L\'angor instable nécessite :',opts:['Simple surveillance ambulatoire','Hospitalisation urgente (risque d\'IDM imminent)','Prescription de trinitrine orale','Repos à domicile 48h'],correct:[1],explanation:'L\'angor instable (de novo, aggravé, ou spontané) → hospitalisation urgente car risque élevé d\'IDM dans les heures suivantes.'},
    {type:'cc',context:'Un homme de 58 ans, fumeur 30 PA, HTA, présente depuis 1h une douleur rétrosternale intense, irradiant dans le bras gauche et la mâchoire, sans soulagement sous 2 pulvérisations de trinitrine.',q:'Quel diagnostic retenir en priorité ?',opts:['Angor stable','Péricardite aiguë','IDM aigu en cours — appeler le SAMU','Douleur musculaire intercostale'],correct:[2],explanation:'IDM : FRCV multiples + douleur constrictive > 15 min + irradiations typiques + résistance à la trinitrine = IDM jusqu\'à preuve du contraire → SAMU en urgence.'},
    {type:'cc',context:'Une jeune femme de 23 ans, sportive, consulte pour une douleur thoracique survenue 3 jours après un épisode grippal. La douleur est augmentée à l\'inspiration et diminue en s\'asseyant. T° = 37,8°C. À l\'auscultation : frottement.',q:'Quel diagnostic ?',opts:['IDM chez une femme jeune','Péricardite aiguë d\'étiologie virale probable','Dissection aortique','Embolie pulmonaire'],correct:[1],explanation:'Péricardite virale : terrain jeune, sportive, contexte viral, fièvre modérée précoce, douleur augmentée à l\'inspiration et soulagée assis, frottement auscultatoire.'},
    {type:'qcu',q:'Le RGO (reflux gastro-œsophagien) peut simuler une douleur angineuse. Quel critère oriente vers le RGO ?',opts:['La douleur survient à l\'effort','La douleur est constrictive et irradie dans le bras gauche','La douleur est de type brûlure, post-prandiale, favorisée par l\'antéflexion et le décubitus','La douleur est soulagée par la trinitrine'],correct:[2],explanation:'RGO : brûlure rétrosternale ascendante, post-prandiale, déclenchée par l\'antéflexion ou le décubitus. Traitement par IPP.'},
    {type:'qcu',q:'Le syndrome de Tietze se caractérise par :',opts:['Des palpitations à l\'effort','Des douleurs para-sternales reproduites par la PALPATION des articulations chondro-sternales','Une douleur rétrosternale constrictive','Un OAP bilatéral'],correct:[1],explanation:'Syndrome de Tietze = douleurs pariétales para-sternales reproduites (et accentuées) par la palpation des articulations chondro-sternales. Étiologie non cardiaque.'},
    {type:'vf',q:'Les algies précordiales d\'origine nerveuse sont un diagnostic d\'élimination.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Les algies nerveuses (punctiformes, chez sujet anxieux, sans lien à l\'effort) ne peuvent être retenues qu\'APRÈS avoir éliminé toutes les causes graves.'},
    {type:'qcu',q:'L\'angor de Prinzmetal (spastique) se caractérise par :',opts:['Une sténose coronaire fixe > 70 %','Un spasme coronaire sur artère saine, survenant au repos, cédant sous dérivés nitrés','Une plaque instable avec rupture immédiate','Un bloc de branche gauche',''],correct:[1],explanation:'Angor de Prinzmetal = spasme coronaire sur artère (souvent) saine → angor SPONTANÉ (au repos) → cède sous dérivés nitrés. Pronostic différent de l\'angor d\'effort.'},
    {type:'qcu',q:'L\'IDM peut provoquer une fibrillation ventriculaire. Quelle est la conséquence immédiate ?',opts:['Hypertension sévère','Mort subite (arrêt cardiaque)','Bradycardie simple','Syncope fugace'],correct:[1],explanation:'La FV = activité électrique ventriculaire anarchique → pas de contraction efficace → arrêt cardiaque → mort subite si non défibrillée immédiatement.'},
    {type:'qcu',q:'La trinitrine (nitroglycérine) doit être administrée en quelle position ?',opts:['Couché strict','Debout','ASSIS (risque d\'hypotension orthostatique)','Décubitus latéral'],correct:[2],explanation:'La trinitrine est un puissant vasodilatateur → risque d\'hypotension → administrer ASSIS pour éviter le malaise vasovagal.'},
    {type:'qcm',q:'Quelles étiologies cardiaques peuvent donner des douleurs thoraciques ? (Plusieurs réponses)',opts:['Angor / IDM','Péricardite aiguë','Troubles du rythme rapides','Tamponnade'],correct:[0,1,2,3],explanation:'Toutes ces étiologies cardiaques peuvent donner des douleurs thoraciques. Les troubles du rythme peuvent provoquer un angor fonctionnel par augmentation des besoins en O2.'},
    {type:'qcu',q:'Quelle est la durée d\'une douleur intercostale ?',opts:['Quelques secondes','Quelques minutes','Plusieurs heures','Plusieurs jours'],correct:[0],explanation:'Les douleurs intercostales (névralgie) durent quelques secondes, sont punctiformes et non liées à l\'effort. À distinguer de l\'angor (> 5 min).'},
    {type:'vf',q:'Une douleur thoracique irradiant dans les trapèzes est évocatrice de péricardite.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. L\'irradiation vers les TRAPÈZES est très évocatrice de péricardite (irritation du nerf phrénique au contact du péricarde inflammé).'},
    {type:'qcu',q:'Quelle est la principale indication à mesurer la PA aux 2 bras devant une douleur thoracique ?',opts:['Évaluer une HTA','Chercher une asymétrie > 25 mmHg → dissection aortique','Diagnostiquer une embolie pulmonaire','Confirmer un IDM'],correct:[1],explanation:'Asymétrie PA > 25 mmHg entre les bras est un signe clinique clé de la dissection aortique (occlusion possible d\'une artère sous-clavière ou carotide).'},
    {type:'cc',context:'Un homme de 68 ans, hypertendu, consulte pour une douleur thoracique d\'apparition brutale, « en déchirure », irradiant dans le dos, puis dans les lombes. PA droite = 160/90, PA gauche = 120/70. ECG normal.',q:'Quel diagnostic évoquer en priorité ?',opts:['IDM antérieur étendu','Péricardite aiguë','DISSECTION AORTIQUE — urgence médico-chirurgicale','Embolie pulmonaire massive'],correct:[2],explanation:'Dissection aortique : terrain HTA + douleur déchirante brutale + migratrice (thorax → dos → lombes) + asymétrie PA entre les bras + ECG NORMAL = dissection jusqu\'à preuve du contraire.'},
    {type:'qcu',q:'L\'angor fonctionnel diffère de l\'angor d\'effort classique car :',opts:['Il est plus grave','Il survient sur coronaires NORMALES, secondaire à une cause extracardiaque (anémie, tachycardie, HVG)','Il ne répond pas aux dérivés nitrés','Il dure > 30 minutes'],correct:[1],explanation:'Angor fonctionnel = ischémie sur coronaires saines par déséquilibre besoins/apports : anémie (↓ transport O2), tachycardie (↓ diastole), HVG (↑ besoins) → traiter la cause.'},
    {type:'qcm',q:'Signes d\'accompagnement fréquents de l\'IDM : (Plusieurs réponses)',opts:['Nausées','Vomissements','Sueurs','Fièvre immédiate (< 1h)'],correct:[0,1,2],explanation:'IDM : nausées, vomissements et sueurs sont fréquents. La fièvre est retardée de 24h (signe de nécrose). La fièvre immédiate oriente plutôt vers la péricardite.'},
    {type:'vf',q:'Le signe en miroir à l\'ECG est pathognomonique de la péricardite.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Le signe en miroir (sous-décalage ST dans le territoire opposé) est caractéristique de l\'IDM. La péricardite n\'a PAS de signe en miroir.'},
    {type:'qcu',q:'Devant un IDM suspecté, quelle est l\'attitude préhospitalière correcte ?',opts:['Attendre à domicile si la douleur cède','Conduire soi-même aux urgences','Appeler le SAMU — le patient ne doit pas se déplacer seul (risque d\'arrêt cardiaque)','Prendre un antalgique et attendre'],correct:[2],explanation:'IDM = appel SAMU obligatoire. Le patient ne doit JAMAIS conduire seul (risque de FV et arrêt cardiaque). Nécessite monitoring scope continu jusqu\'à la salle de cath.'},
    {type:'qcu',q:'L\'examen clinique de l\'angor d\'effort est le plus souvent :',opts:['Riche avec souffle systolique','Pauvre (on ne peut pas ausculter des artères coronaires)','Anormal avec crépitants','Toujours pathologique'],correct:[1],explanation:'L\'examen clinique de l\'angor est pauvre car les artères coronaires ne sont pas auscultables. Le diagnostic repose sur l\'interrogatoire et l\'ECG.'},
    {type:'qcu',q:'Un sous-décalage du segment PQ à l\'ECG est évocateur de :',opts:['IDM inférieur','PÉRICARDITE (micro-signe)','BAV du 1er degré','Bloc de branche droit'],correct:[1],explanation:'Le sous-décalage du segment PQ est un micro-signe ECG évocateur de péricardite (inflammation du péricarde atteignant le myocarde auriculaire).'},
    {type:'qcu',q:'L\'hémoptysie dans le contexte d\'une douleur thoracique évoque en premier lieu :',opts:['Angor','EMBOLIE PULMONAIRE (infarctus pulmonaire)','IDM','Dissection aortique'],correct:[1],explanation:'Hémoptysie + douleur thoracique latérale + dyspnée + contexte (TVP, alitement) = embolie pulmonaire avec infarctus pulmonaire.'},
    {type:'vf',q:'La zone irriguée par la coronaire droite comprend la paroi inférieure du VG.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La coronaire droite vascularise la paroi inférieure (D2, D3, aVF) et souvent la paroi latérale basse. Un IDM inférieur = sus-décalage en D2, D3, aVF.'},
    {type:'qcu',q:'La tamponnade péricardique est causée par :',opts:['Un épaississement du péricarde','Un épanchement péricardique comprimant le cœur — urgence chirurgicale','Une arythmie ventriculaire','Un IDM transmural'],correct:[1],explanation:'Tamponnade = accumulation liquidienne dans le péricarde → compression du cœur → chute du débit → état de choc → urgence vitale absolue (péricardiocentèse).'},
    {type:'cc',context:'Un patient de 45 ans se plaint de douleurs para-sternales droites reproduites par la pression du 3ème cartilage chondro-sternal. ECG normal. Troponines normales.',q:'Quel diagnostic retenir ?',opts:['IDM antérieur','Péricardite aiguë','Syndrome de Tietze (douleur pariétale chondro-sternale)','Embolie pulmonaire'],correct:[2],explanation:'Syndrome de Tietze : douleur para-sternale reproduite par la palpation des articulations chondro-sternales. ECG et biomarqueurs normaux. Diagnostic d\'élimination des urgences.'},
  ]
},

  questions:[
    {type:'qcu',q:'Quelle est la 1ère cause de décès dans le monde ?',opts:['Le cancer','Les maladies coronariennes (pathologie cardiovasculaire)','Les accidents de la route','Le diabète'],correct:[1],explanation:'Les maladies coronariennes sont la 1ère cause de mortalité mondiale avec 18 millions de décès/an (7,4M IDM + 6,7M AVC).'},
    {type:'vf',q:'En France, les maladies cardiovasculaires sont la 1ère cause de décès.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. En France, le cancer est la 1ère cause de décès. Les maladies cardiovasculaires sont la 2ème cause (180 000 décès/an).'},
    {type:'qcu',q:'Quel est le 1er facteur de risque cardiovasculaire modifiable ?',opts:['HTA','Diabète','TABAC','Obésité'],correct:[2],explanation:'Le tabac est le 1er FDR cardiovasculaire modifiable — il est à l\'origine d\'1 décès sur 4 et a un impact dès les premières cigarettes.'},
    {type:'qcm',q:'Quels sont les 4 FDR cardiovasculaires MODIFIABLES les plus déterminants ? (Plusieurs réponses)',opts:['Tabac','Dyslipidémie','HTA','Diabète','Âge'],correct:[0,1,2,3],explanation:'Les 4 FDR modifiables les plus déterminants : Tabac, Dyslipidémie, HTA, Diabète. L\'âge est non modifiable.'},
    {type:'qcu',q:'Comment calcule-t-on la consommation tabagique en paquets-années (PA) ?',opts:['Nombre de cigarettes × années de tabagisme','Nombre de paquets/jour × nombre d\'années','Nombre d\'années depuis le début','Nombre total de paquets fumés'],correct:[1],explanation:'PA = nombre de paquets/jour × nombre d\'années de tabagisme. Le risque cardiovasculaire est clairement démontré au-delà de 20 PA.'},
    {type:'vf',q:'Le tabagisme passif représente également un facteur de risque cardiovasculaire.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Le tabagisme passif est aussi un FDR CV. Toutes les formes de tabac sont nocives : cigarette, chicha, cannabis.'},
    {type:'qcu',q:'En France, quel est le pourcentage de fumeurs actuels ?',opts:['15 %','25 %','34,5 %','50 %'],correct:[2],explanation:'34,5 % de la population française est fumeuse actuellement.'},
    {type:'qcu',q:'Quel est le seuil définissant l\'HTA en consultation ?',opts:['PA > 120/80 mmHg','PA > 130/85 mmHg','PA > 140/90 mmHg','PA > 160/95 mmHg'],correct:[2],explanation:'HTA = PA > 140/90 mmHg mesurée au cabinet lors de différentes consultations. Il n\'y a pas de niveau absolu — c\'est un seuil consensuel.'},
    {type:'qcu',q:'L\'HTA peut toucher :',opts:['Uniquement les personnes âgées','Uniquement les hommes','Tous les âges, avec risque plus élevé chez l\'homme et augmentant avec l\'âge','Uniquement les diabétiques'],correct:[2],explanation:'L\'HTA peut toucher tous les âges. Risque plus élevé chez l\'homme, augmente avec l\'âge, très fréquente en Asie.'},
    {type:'qcm',q:'Quelles sont les complications de l\'HTA ? (Plusieurs réponses)',opts:['Athérosclérose','AVC','HVG (hypertrophie ventriculaire gauche)','Insuffisance rénale','Fibrillation auriculaire'],correct:[0,1,2,3,4],explanation:'L\'HTA entraîne : athérosclérose, AVC, démences, HVG (visible à l\'ECG !), IC, FA, IR. C\'est la maladie la plus fréquente au monde.'},
    {type:'qcu',q:'Quelle est la formule de l\'IMC (Indice de Masse Corporelle) ?',opts:['Poids (kg) × taille (m)','Poids (kg) / taille² (m²)','Taille (cm) – poids (kg) – 100','Poids (kg) / taille (cm)'],correct:[1],explanation:'IMC = poids (kg) / taille² (m²). Normal entre 18 et 25 kg/m².'},
    {type:'vf',q:'Un IMC entre 18 et 25 kg/m² est considéré normal.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. 18-25 kg/m² = normal. > 25 = surpoids. > 30 = obésité. > 40 = obésité morbide.'},
    {type:'qcu',q:'Le LDL-cholestérol est surnommé « mauvais cholestérol » car il :',opts:['Transporte le cholestérol du foie vers les tissus → favorise les plaques d\'athérome','Transporte le cholestérol des tissus vers le foie','Inhibe la production de rénine','Diminue la PA'],correct:[0],explanation:'LDL = transporte le cholestérol vers les tissus → accumulation dans la paroi artérielle → formation des plaques d\'athérome.'},
    {type:'qcu',q:'Le HDL-cholestérol est « bon » car il :',opts:['Forme des plaques d\'athérome','Transporte le cholestérol DES tissus VERS le foie (épuration)','Augmente la PA','Inhibe l\'aldostérone'],correct:[1],explanation:'HDL = reverse cholesterol transport : emmène le cholestérol des tissus vers le foie pour son élimination → effet anti-athérogène.'},
    {type:'qcu',q:'À partir de quel âge le dépistage du cholestérol est-il recommandé ?',opts:['50 ans','40 ans','30 ans','18 ans'],correct:[2],explanation:'Le dépistage du cholestérol est recommandé dès 30 ans. Le taux normal est de 1,16 g/L.'},
    {type:'qcm',q:'Quelles peuvent être les causes d\'une dyslipidémie secondaire ? (Plusieurs réponses)',opts:['Diabète','Hypothyroïdie','Syndrome néphrotique','Corticoïdes','Bêtabloquants'],correct:[0,1,2,3,4],explanation:'Toutes ces causes peuvent entraîner une dyslipidémie secondaire. Important à rechercher avant de traiter une dyslipidémie primitive.'},
    {type:'vf',q:'Les xanthomes tendineux (bosses au tendon d\'Achille) peuvent être le signe d\'une hypercholestérolémie familiale.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Les xanthomes tendineux (dépôts de cholestérol) au tendon d\'Achille ou sur les métacarpiens sont un signe clinique d\'hypercholestérolémie familiale sévère.'},
    {type:'qcu',q:'Quelle classification des dyslipidémies distingue les types IIa et IIb comme les plus fréquents ?',opts:['Classification de Framingham','Classification de Fredrickson','Classification OMS','Classification ESC'],correct:[1],explanation:'La classification de Fredrickson (types I à V) est la référence. Les types IIa (hypercholestérolémie pure) et IIb (hyperlipidémie mixte) sont les plus fréquents.'},
    {type:'qcu',q:'L\'athérosclérose se forme en combien d\'étapes ?',opts:['2 étapes','3 étapes','5 étapes','7 étapes'],correct:[2],explanation:'Formation de la plaque en 5 étapes : 1) Accumulation LDL dans l\'intima → 2) Oxydation des LDL → 3) Recrutement monocytes-macrophages → 4) Cellules spumeuses → 5) Chape fibreuse.'},
    {type:'qcu',q:'Les plaques d\'athérome vulnérables sont :',opts:['Plus fréquentes chez les personnes âgées et plus stables','Plus fréquentes chez les jeunes et plus susceptibles de se rompre','Toujours calcifiées et stables','Présentes uniquement dans les coronaires'],correct:[1],explanation:'Plaques vulnérables : chape fibreuse fine + noyau lipidique volumineux → fréquentes chez les JEUNES → se rompent facilement → IDM plus graves chez les jeunes (moins de collatérales aussi).'},
    {type:'vf',q:'L\'athérosclérose touche l\'intima des artères de gros et moyen calibre.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. L\'athérosclérose est une maladie de l\'INTIMA des artères de gros et moyen calibre (≠ artériosclérose = sclérose de la média des artérioles = vieillissement naturel).'},
    {type:'qcu',q:'L\'IDM avant 50 ans est associé au tabagisme dans quel pourcentage chez les hommes ?',opts:['5 %','10 %','20 %','35 %'],correct:[2],explanation:'20 % des hommes victimes d\'un IDM avant 50 ans sont fumeurs. 8 % des femmes dans le même groupe. Le tabac est responsable des décès CV précoces.'},
    {type:'qcu',q:'Le diabète de type 2 favorise l\'athérosclérose par quel mécanisme principal ?',opts:['Augmentation de la coagulabilité sanguine','Hyperglycémie chronique → endothélium perméable → passage d\'éléments → formation de plaques','Hypoglycémie répétée → lésions artérielles','Diminution de la pression artérielle'],correct:[1],explanation:'Diabète de type 2 : hyperglycémie chronique → altération de l\'endothélium → perméabilité accrue → formation de plaques. La gravité est liée au temps d\'exposition.'},
    {type:'qcu',q:'L\'obésité et la sédentarité sont des FDR cardiovasculaires car :',opts:['Ils augmentent directement la PA','Ils sont associés à d\'autres FDR (HTA, diabète, dyslipidémie)','Ils causent directement des thromboses','Ils réduisent le débit cardiaque'],correct:[1],explanation:'L\'obésité et la sédentarité sont des FDR INDIRECTS car ils sont fortement associés à d\'autres FDR directs (HTA, diabète, dyslipidémie).'},
    {type:'qcu',q:'Le risque cardiovasculaire est évalué par un score basé sur le cumul des FDR. Quelle couleur correspond au risque fort ?',opts:['Vert','Orange','Rouge','Bleu'],correct:[1],explanation:'Score de risque CV : Vert = faible risque / Orange = risque fort / Rouge = risque très fort. Permet d\'adapter l\'intensité de la prise en charge.'},
    {type:'qcm',q:'Parmi les éléments suivants, lesquels ne sont PAS des FRCV mais sont utiles à l\'évaluation ? (Plusieurs réponses)',opts:['Alcool','Tabac','Cocaïne / toxicomanie','Consommation en sel'],correct:[0,2,3],explanation:'Le tabac EST un FRCV classique. L\'alcool (cardiopathies dilatées + HTA), la cocaïne, et la consommation en sel sont utiles à évaluer mais ne font pas partie des FRCV formels.'},
    {type:'vf',q:'La France est l\'un des pays les plus touchés au monde par les maladies cardiovasculaires.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. La France est l\'un des pays LES MOINS touchés par les maladies cardiovasculaires (paradoxe français).'},
    {type:'qcu',q:'L\'antécédent familial de coronaropathie est retenu comme FRCV si l\'IDM chez un parent du 1er degré masculin survient avant :',opts:['40 ans','45 ans','50 ans','55 ans'],correct:[3],explanation:'FRCV familial : IDM avant 55 ans chez le père ou le frère / IDM avant 65 ans chez la mère ou la sœur.'},
    {type:'qcu',q:'L\'alcool, sans être un FRCV classique, peut favoriser :',opts:['Une coronaropathie directement','Des cardiopathies dilatées et jouer un rôle dans l\'HTA','Une sténose valvulaire','Un IDM par spasme coronaire'],correct:[1],explanation:'L\'alcool chronique → cardiopathie dilatée alcoolique (dilatation des cavités cardiaques avec altération de la fonction) + rôle facilitateur dans l\'HTA.'},
    {type:'qcu',q:'Quels facteurs favorisent l\'HTA (parmi les facteurs modifiables) ?',opts:['Âge et génétique uniquement','Sel, alcool, surcharge pondérale, sédentarité','Hémophilie','Insuffisance rénale seule'],correct:[1],explanation:'Facteurs favorisant l\'HTA (modifiables) : sel, alcool, surcharge pondérale, sédentarité. La génétique est non modifiable. Une HTA secondaire (cause précise) doit être cherchée.'},
    {type:'cc',context:'M. D., 52 ans, fumeur à 25 PA, PA 150/95 mmHg, LDL = 1,8 g/L, HDL = 0,35 g/L, IMC = 28 kg/m², père décédé d\'IDM à 48 ans.',q:'Combien de facteurs de risque cardiovasculaires présente ce patient ?',opts:['2','3','5','6'],correct:[2],explanation:'FDR de M.D. : 1) Âge ≥ 50 ans homme 2) Tabac (25 PA, actif) 3) HTA (150/95 > 140/90) 4) Dyslipidémie (LDL ≥ 1,60 g/L et HDL < 0,40 g/L) 5) ATCD familial (père IDM à 48 ans < 55 ans) → 5 FDR.'},
    {type:'qcu',q:'L\'HVG (hypertrophie ventriculaire gauche) liée à l\'HTA est visible sur :',opts:['La radiographie thoracique uniquement','L\'ECG (indice de Sokolow SV1+RV5 > 35 mm)','L\'auscultation cardiaque','Le bilan lipidique'],correct:[1],explanation:'L\'HVG est mise en évidence à l\'ECG par l\'indice de Sokolow (SV1+RV5 > 35 mm). C\'est une complication cardiaque directe de l\'HTA.'},
    {type:'vf',q:'Le taux de cholestérol normal est de 1,16 g/L.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La valeur normale du cholestérol total est de 1,16 g/L. Le dépistage est recommandé dès 30 ans.'},
    {type:'qcu',q:'La dyslipidémie est liée à l\'alimentation. Concernant les habitudes alimentaires à modifier :',opts:['Augmenter les graisses saturées','Éviter les aliments riches en cholestérol et graisses saturées (conseils hygiéno-diététiques)','Augmenter la consommation de sel','Diminuer les fruits et légumes'],correct:[1],explanation:'La dyslipidémie d\'origine alimentaire nécessite des mesures hygiéno-diététiques : éviter graisses saturées, produits transformés, excès de cholestérol alimentaire.'},
    {type:'qcu',q:'Quel mécanisme explique que les IDM soient souvent plus graves chez les jeunes ?',opts:['Les jeunes ont des coronaires plus petites','Plaques vulnérables + absence de réseau de collatérales développé','Les jeunes ont une PA plus élevée','Les jeunes prennent moins de médicaments'],correct:[1],explanation:'Chez les jeunes : plaques vulnérables (chape fibreuse fine, se rompent facilement) + pas de réseau de collatérales (n\'a pas eu le temps de se développer) → IDM plus grave.'},
    {type:'qcu',q:'Quelle est la prévalence de l\'obésité/surpoids en France ?',opts:['5 % de la population','15 % (dont 1 % d\'obésité morbide)','30 % (dont 10 % d\'obésité morbide)','50 % de la population'],correct:[1],explanation:'En France : 15 % de la population est en surpoids/obésité, dont 1 % avec une obésité morbide. L\'IMC cible est < 25 kg/m².'},
    {type:'vf',q:'Le tabagisme passif ne représente pas un risque cardiovasculaire significatif.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Le tabagisme passif joue également un rôle — toute consommation de tabac (active ou passive, chicha, cannabis) est nocive et augmente le risque CV.'},
    {type:'qcu',q:'Quel paramètre biologique surveille-t-on principalement pour le diabète de type 2 ?',opts:['La créatinine','La glycémie à jeun et l\'HbA1c','La kaliémie','Le BNP'],correct:[1],explanation:'Pour le diabète : glycémie à jeun et HbA1c (hémoglobine glyquée = reflet de l\'équilibre glycémique sur 3 mois). La gravité est liée au temps d\'exposition à l\'hyperglycémie.'},
    {type:'qcu',q:'L\'artériosclérose se distingue de l\'athérosclérose par :',opts:['Elle est plus grave','Elle touche l\'intima des grosses artères','C\'est une sclérose de la MÉDIA des artérioles, secondaire au VIEILLISSEMENT naturel','Elle provoque des plaques lipidiques'],correct:[2],explanation:'Artériosclérose = sclérose de la média des artérioles, processus de vieillissement naturel, non lié aux FDR CV. À distinguer de l\'athérosclérose (maladie inflammatoire de l\'intima).'},
    {type:'cc',context:'Mme L., 62 ans, ménopausée, consulte pour un bilan cardiovasculaire. Elle a une HTA traitée (PA = 135/85 sous traitement), un diabète de type 2 depuis 8 ans, fume 10 cigarettes/jour depuis 30 ans, et son père a fait un IDM à 62 ans.',q:'Quel est son statut tabagique en paquets-années ?',opts:['10 PA','15 PA','20 PA','30 PA'],correct:[1],explanation:'PA = 0,5 paquet/jour × 30 ans = 15 PA. Le risque CV est clairement démontré au-delà de 20 PA, mais 15 PA restent significatifs en présence d\'autres FDR.'},
    {type:'qcu',q:'L\'hypertension artérielle (HTA) secondaire à une cause précise représente :',opts:['La majorité des cas d\'HTA','Une minorité des cas — l\'HTA essentielle (sans cause identifiée) est la plus fréquente','Tous les cas chez les jeunes','Un mécanisme uniquement rénal'],correct:[1],explanation:'L\'HTA essentielle (sans cause retrouvée) représente la grande majorité des cas. L\'HTA secondaire (causes identifiables : HTA réno-vasculaire, hyperaldostéronisme, etc.) est minoritaire.'},
    {type:'vf',q:'La sédentarité est associée à une augmentation du risque de développer une HTA.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La sédentarité est un facteur favorisant l\'HTA (directement et indirectement via l\'obésité). L\'activité physique régulière réduit la PA.'},
  ]
},
