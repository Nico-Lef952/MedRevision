<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM Physiologie Digestive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4f8;--surface:#fff;--border:#dde3ec;--text:#1a2332;--muted:#6b7a96;
  --accent:#2563eb;--accent-l:#eff6ff;--accent-d:#1d4ed8;
  --green:#16a34a;--green-l:#f0fdf4;--green-b:#bbf7d0;
  --red:#dc2626;--red-l:#fef2f2;--red-b:#fecaca;
  --orange:#ea580c;--orange-l:#fff7ed;--orange-b:#fed7aa;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);--r:10px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
.hdr-brand{display:flex;align-items:center;gap:.65rem}
.hdr-logo{width:34px;height:34px;background:linear-gradient(135deg,#059669,#2563eb);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;font-weight:700}
.hdr-title{font-weight:700;font-size:1rem}
.hdr-sub{font-size:.72rem;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:.5rem}
#btn-home,#btn-levels{display:none;align-items:center;gap:.4rem;background:none;border:1px solid var(--border);color:var(--muted);padding:.35rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .15s}
#btn-home:hover,#btn-levels:hover{border-color:var(--accent);color:var(--accent)}
#btn-home.vis,#btn-levels.vis{display:flex}
.score-badge{background:var(--accent-l);color:var(--accent);border:1px solid #bfdbfe;padding:.3rem .75rem;border-radius:6px;font-size:.8rem;font-weight:600;display:none}
.score-badge.vis{display:block}
#home{max-width:1080px;margin:0 auto;padding:2.5rem 1.5rem}
.hero{text-align:center;margin-bottom:2.5rem}
.hero h1{font-size:2rem;font-weight:800;margin-bottom:.5rem;background:linear-gradient(135deg,#059669,#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);max-width:520px;margin:0 auto}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.2rem}
.course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.course-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--c,#2563eb);border-radius:var(--r) var(--r) 0 0}
.course-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--c)}
.cc-head{display:flex;align-items:flex-start;gap:.85rem;margin-bottom:.85rem}
.cc-icon{width:44px;height:44px;border-radius:10px;background:var(--ic,#eff6ff);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.cc-title{font-weight:700;font-size:.98rem;line-height:1.3;margin-bottom:.2rem}
.cc-sub{font-size:.75rem;color:var(--muted)}
.cc-levels{display:flex;gap:.4rem;margin-top:.8rem}
.cc-level-pill{flex:1;text-align:center;padding:.3rem .5rem;border-radius:6px;font-size:.72rem;font-weight:600;border:1px solid}
.cc-level-pill.easy{background:#f0fdf4;color:var(--green);border-color:var(--green-b)}
.cc-level-pill.medium{background:#fff7ed;color:var(--orange);border-color:var(--orange-b)}
.cc-level-pill.hard{background:#fef2f2;color:var(--red);border-color:var(--red-b)}
.cc-level-pill .lp-n{display:block;font-size:1rem;font-weight:800;line-height:1.2}
#level-view{display:none;max-width:680px;margin:0 auto;padding:2.5rem 1.5rem}
.lv-course-name{font-size:1.4rem;font-weight:800;margin-bottom:.3rem}
.lv-sub{color:var(--muted);margin-bottom:2rem;font-size:.9rem}
.level-cards{display:flex;flex-direction:column;gap:1rem}
.level-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:1.4rem 1.6rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:1.2rem}
.level-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.level-card.easy:hover,.level-card.easy.active{border-color:var(--green);background:#f0fdf4}
.level-card.medium:hover,.level-card.medium.active{border-color:var(--orange);background:#fff7ed}
.level-card.hard:hover,.level-card.hard.active{border-color:var(--red);background:#fef2f2}
.lc-badge{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.level-card.easy .lc-badge{background:#dcfce7}
.level-card.medium .lc-badge{background:#ffedd5}
.level-card.hard .lc-badge{background:#fee2e2}
.lc-info{flex:1}
.lc-title{font-weight:700;font-size:1rem;margin-bottom:.15rem}
.lc-desc{font-size:.8rem;color:var(--muted)}
.lc-meta{font-size:.75rem;color:var(--muted);margin-top:.3rem}
.btn-start-level{background:var(--accent);color:#fff;border:none;padding:.65rem 1.8rem;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;font-family:inherit;transition:background .15s;margin-top:1.5rem;width:100%}
.btn-start-level:hover{background:var(--accent-d)}
#quiz-view{display:none;max-width:820px;margin:0 auto;padding:1.5rem}
.qv-header{margin-bottom:1.5rem}
.qv-title{font-size:1.1rem;font-weight:800;margin-bottom:.15rem}
.qv-level-badge{display:inline-block;padding:.18rem .6rem;border-radius:5px;font-size:.72rem;font-weight:700;margin-bottom:.4rem}
.qv-level-badge.easy{background:#dcfce7;color:var(--green)}
.qv-level-badge.medium{background:#ffedd5;color:var(--orange)}
.qv-level-badge.hard{background:#fee2e2;color:var(--red)}
.qv-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted)}
.qv-prog-wrap{margin-top:.75rem}
.qv-prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.qv-prog-fill{height:100%;border-radius:3px;transition:width .3s}
.qv-prog-fill.easy{background:var(--green)}
.qv-prog-fill.medium{background:var(--orange)}
.qv-prog-fill.hard{background:var(--red)}
.qv-prog-txt{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:.3rem}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.2rem;transition:border-color .2s}
.q-card.answered{border-color:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,.08)}
.q-card.answered.wrong{border-color:var(--red);box-shadow:0 0 0 2px rgba(220,38,38,.08)}
.q-top{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:1rem}
.q-num{background:var(--accent-l);color:var(--accent);border:1px solid #bfdbfe;border-radius:6px;padding:.2rem .55rem;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:.1rem}
.q-type{font-size:.72rem;padding:.18rem .5rem;border-radius:4px;font-weight:600;flex-shrink:0;margin-top:.1rem}
.q-type.qcu{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.q-type.qcm{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.q-type.vf{background:#fefce8;color:#ca8a04;border:1px solid #fde68a}
.q-type.cc{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
.q-text{font-weight:600;font-size:.95rem;line-height:1.55;flex:1}
.q-context{background:#f8fafc;border-left:3px solid var(--accent);padding:.65rem .9rem;border-radius:0 6px 6px 0;font-size:.85rem;margin-bottom:1rem;line-height:1.6;color:#374151}
.q-opts{display:flex;flex-direction:column;gap:.5rem}
.opt{display:flex;align-items:flex-start;gap:.7rem;padding:.75rem .9rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;user-select:none}
.opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-l)}
.opt.selected{border-color:var(--accent);background:var(--accent-l)}
.opt.correct{border-color:var(--green)!important;background:var(--green-l)!important}
.opt.incorrect{border-color:var(--red)!important;background:var(--red-l)!important}
.opt.disabled{cursor:default}
.opt.show-correct{border-color:var(--green);background:var(--green-l);opacity:.7}
.opt-marker{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.15rem;font-size:.65rem;font-weight:700;transition:all .15s}
.opt.selected .opt-marker{border-color:var(--accent);background:var(--accent);color:#fff}
.opt.correct .opt-marker{border-color:var(--green);background:var(--green);color:#fff}
.opt.incorrect .opt-marker{border-color:var(--red);background:var(--red);color:#fff}
.opt-label{font-size:.88rem;line-height:1.5;flex:1}
.opt-marker.sq{border-radius:4px}
.q-actions{margin-top:.9rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.btn-submit{background:var(--accent);color:#fff;border:none;padding:.5rem 1.2rem;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:600;font-family:inherit;transition:background .15s}
.btn-submit:hover{background:var(--accent-d)}
.btn-submit:disabled{opacity:.4;cursor:default}
.feedback{padding:.75rem 1rem;border-radius:8px;font-size:.84rem;line-height:1.6;display:none;flex:1}
.feedback.correct{background:var(--green-l);border:1px solid var(--green-b);color:#14532d}
.feedback.incorrect{background:var(--red-l);border:1px solid var(--red-b);color:#7f1d1d}
.feedback strong{display:block;margin-bottom:.2rem}
.feedback.vis{display:block}
.qv-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;gap:.75rem}
.btn-nav{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.55rem 1.1rem;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:500;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:.4rem}
.btn-nav:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-nav:disabled{opacity:.35;cursor:default}
.btn-nav.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-nav.primary:hover:not(:disabled){background:var(--accent-d)}
.q-counter{font-size:.82rem;color:var(--muted);text-align:center;flex:1}
.q-grid{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:1rem}
.q-dot{width:28px;height:28px;border-radius:5px;border:1px solid var(--border);font-size:.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface);color:var(--muted)}
.q-dot:hover{border-color:var(--accent);color:var(--accent)}
.q-dot.done-ok{background:var(--green-l);border-color:var(--green);color:var(--green)}
.q-dot.done-bad{background:var(--red-l);border-color:var(--red);color:var(--red)}
.q-dot.current{border-color:var(--accent);background:var(--accent);color:#fff}
#results-view{display:none;max-width:680px;margin:0 auto;padding:2rem 1.5rem;text-align:center}
.res-circle{width:130px;height:130px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-weight:800}
.res-pct{font-size:2.2rem;line-height:1}
.res-label{font-size:.75rem;font-weight:500;margin-top:.2rem}
.res-title{font-size:1.6rem;font-weight:800;margin-bottom:.4rem}
.res-sub{color:var(--muted);margin-bottom:2rem}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:2rem}
.res-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem}
.res-stat-n{font-size:1.5rem;font-weight:800;margin-bottom:.2rem}
.res-stat-l{font-size:.75rem;color:var(--muted)}
.res-btns{display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap}
.btn-res{padding:.6rem 1.4rem;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:600;font-family:inherit;transition:all .15s}
.btn-res.primary{background:var(--accent);color:#fff;border:none}
.btn-res.primary:hover{background:var(--accent-d)}
.btn-res.secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-res.secondary:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:640px){.courses-grid{grid-template-columns:1fr}.res-stats{grid-template-columns:1fr 1fr}.hero h1{font-size:1.5rem}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🏥</div>
    <div><div class="hdr-title">QCM Physiologie Digestive</div><div class="hdr-sub">Banque de questions — Médecine</div></div>
  </div>
  <div class="hdr-right">
    <div class="score-badge" id="score-badge">Score : 0/0</div>
    <button id="btn-levels" onclick="goLevels()">← Niveaux</button>
    <button id="btn-home" onclick="goHome()">← Cours</button>
  </div>
</header>

<div id="home">
  <div class="hero"><h1>Banque de QCM</h1><p>Sélectionne un cours puis choisis ton niveau.</p></div>
  <div class="courses-grid" id="courses-grid"></div>
</div>
<div id="level-view">
  <div class="lv-course-name" id="lv-name"></div>
  <div class="lv-sub" id="lv-sub"></div>
  <div class="level-cards" id="level-cards"></div>
  <button class="btn-start-level" id="btn-start" onclick="startLevel(currentLevel)" disabled>Commencer</button>
</div>
<div id="quiz-view">
  <div class="qv-header">
    <div class="qv-level-badge" id="qv-badge"></div>
    <div class="qv-title" id="qv-title"></div>
    <div class="qv-prog-wrap">
      <div class="qv-prog-bar"><div class="qv-prog-fill" id="qv-fill"></div></div>
      <div class="qv-prog-txt"><span id="qv-done">0 répondues</span><span id="qv-total-txt"></span></div>
    </div>
    <div class="q-grid" id="q-grid"></div>
  </div>
  <div id="questions-container"></div>
  <div class="qv-nav">
    <button class="btn-nav" id="btn-prev" onclick="navigate(-1)">← Préc.</button>
    <div class="q-counter" id="q-counter"></div>
    <button class="btn-nav" id="btn-next" onclick="navigate(1)">Suiv. →</button>
    <button class="btn-nav primary" id="btn-finish" onclick="showResults()" style="display:none">Terminer</button>
  </div>
</div>
<div id="results-view">
  <div class="res-circle" id="res-circle"><div class="res-pct" id="res-pct">0%</div><div class="res-label">Score</div></div>
  <div class="res-title" id="res-title"></div>
  <div class="res-sub" id="res-sub"></div>
  <div class="res-stats">
    <div class="res-stat"><div class="res-stat-n" id="rs-correct" style="color:var(--green)">0</div><div class="res-stat-l">Correctes</div></div>
    <div class="res-stat"><div class="res-stat-n" id="rs-wrong" style="color:var(--red)">0</div><div class="res-stat-l">Incorrectes</div></div>
    <div class="res-stat"><div class="res-stat-n" id="rs-skip" style="color:var(--muted)">0</div><div class="res-stat-l">Non répondues</div></div>
  </div>
  <div class="res-btns">
    <button class="btn-res primary" onclick="restartQuiz()">Recommencer</button>
    <button class="btn-res secondary" onclick="goLevels()">Autre niveau</button>
    <button class="btn-res secondary" onclick="goHome()">Accueil</button>
  </div>
</div>

<script>
const COURSES = [
{
  id:'livret9',title:'Réponse Physiologique au Repas',icon:'🍽️',color:'#059669',iconBg:'#ecfdf5',
  tags:['Hypothalamus','Péristaltisme','Vidange gastrique','Motricité','Continence'],
  levels:{
    easy:{label:'Facile',desc:'Hormones, transit, motricité de base',questions:[
      {type:'qcu',q:'Quelle est la seule hormone qui stimule directement l\'appétit ?',
       opts:['La leptine','La ghréline','Le GLP-1','Le PYY'],correct:[1],
       explanation:'La ghréline, produite par le fundus gastrique, est la seule hormone orexigène connue. Sa sécrétion est maximale avant le repas et chute après. Leptine, GLP-1 et PYY sont tous anorexigènes.'},
      {type:'qcu',q:'La ghréline est principalement produite par :',
       opts:['L\'iléon terminal','Le pancréas','Le fundus gastrique','Le tissu adipeux'],correct:[2],
       explanation:'La ghréline est synthétisée par les cellules fundiques de l\'estomac (cellules X/A-like). C\'est pourquoi les chirurgies excluant le fundus (sleeve, bypass) réduisent significativement la sécrétion de ghréline.'},
      {type:'qcu',q:'Le noyau arqué de l\'hypothalamus est particulièrement sensible aux signaux hormonaux circulants car :',
       opts:['Il est directement innervé par le nerf vague','La barrière hémato-encéphalique y est poreuse','Il contient les neurones à orexines','Il est adjacent à l\'hypophyse postérieure'],correct:[1],
       explanation:'Le noyau arqué (ARC) est situé au contact de capillaires dont la BHE est fenêtrée (poreuse), ce qui lui permet de détecter en temps réel les fluctuations hormonales (leptine, insuline, ghréline...) sans délai de passage.'},
      {type:'qcu',q:'Les neurones à NPY du noyau arqué sont activés par :',
       opts:['La leptine et l\'insuline','Le GLP-1 et la CCK','La ghréline','Le PYY et le GLP-1'],correct:[2],
       explanation:'La ghréline active la voie orexigène via les neurones à NPY (Neuropeptide Y). Ces neurones inhibent le PVN (supprimant la satiété) et activent les neurones à orexines (augmentant la faim). Leptine, insuline, GLP-1 et PYY activent la voie opposée (α-MSH, anorexigène).'},
      {type:'qcu',q:'Quel neurotransmetteur est libéré en amont du bolus pour induire la contraction musculaire lors du péristaltisme ?',
       opts:['Le monoxyde d\'azote (NO)','La sérotonine (5-HT)','L\'acétylcholine (ACh)','La substance P'],correct:[2],
       explanation:'Dans le réflexe péristaltique : en amont du bolus, les neurones moteurs excitateurs libèrent de l\'ACh → contraction → pousse le bolus. En aval, les neurones inhibiteurs libèrent du NO → relaxation → ouvre le passage. 5-HT déclenche le réflexe mais n\'est pas le médiateur final de la contraction.'},
      {type:'qcu',q:'Quel médiateur est libéré en aval du bolus pour induire la relaxation musculaire lors du péristaltisme ?',
       opts:['L\'acétylcholine (ACh)','La substance P','Le monoxyde d\'azote (NO)','La sérotonine (5-HT)'],correct:[2],
       explanation:'Les neurones myentériques moteurs inhibiteurs libèrent du NO → activation de la guanylate cyclase → ↑ GMPc → relaxation du muscle lisse. C\'est le médiateur principal de la relaxation en aval du bolus, assurant l\'ouverture du passage.'},
      {type:'qcu',q:'La fréquence des ondes lentes gastriques générées par les cellules de Cajal est de :',
       opts:['12 par minute','3 par minute','6 par minute','1 par minute'],correct:[1],
       explanation:'Dans l\'estomac, les cellules interstitielles de Cajal génèrent des ondes lentes à 3/min. Dans l\'intestin grêle, cette fréquence est de 12/min. Ces ondes ne déclenchent pas directement une contraction : il faut qu\'elles soient renforcées par des signaux nerveux et hormonaux pour atteindre le seuil des potentiels de pointe.'},
      {type:'qcu',q:'Parmi ces aliments, lequel est vidangé en dernier par l\'estomac ?',
       opts:['Les glucides simples en solution','Les liquides non caloriques','Les protéines solides broyées','Les lipides'],correct:[3],
       explanation:'Ordre de vidange : liquides > glucides > protéines > lipides (les derniers). Les lipides sont très caloriques, flottent à la surface du contenu gastrique, et s\'agrègent avec les solides. L\'estomac régule la vidange selon le contenu calorique, pas le volume.'},
      {type:'qcu',q:'La relaxation réceptive gastrique est médiée par :',
       opts:['Le système nerveux sympathique via les fibres α','Le nerf vague (fibres non adrénergiques non cholinergiques)','La gastrine libérée par l\'antre','La CCK libérée par le duodénum'],correct:[1],
       explanation:'La relaxation réceptive est un réflexe vago-vagal : l\'arrivée d\'aliments dans l\'estomac → nerf vague → libération de NO et VIP par les neurones inhibiteurs → relaxation des fibres longitudinales du fundus → accommodation du volume sans augmentation de pression.'},
      {type:'qcu',q:'La phase III de la motricité interdigestive de l\'intestin grêle est aussi appelée :',
       opts:['Réflexe gastrocolique','Front d\'activité moteur (housekeeper)','Contraction de segmentation','Onde lente péristaltique'],correct:[1],
       explanation:'La phase III est surnommée "housekeeper" (femme de ménage) car elle balaye le tube digestif de ses résidus non digestibles toutes les 90 min à 2h. Elle survient en période interdigestive (jeûne) et disparaît dès l\'ingestion d\'un repas.'},
      {type:'qcu',q:'Le RRAI (réflexe recto-anal inhibiteur) provoque :',
       opts:['La contraction du sphincter anal externe','La relaxation réflexe du sphincter anal interne','La contraction du sphincter anal interne','La relaxation du plancher pelvien uniquement'],correct:[1],
       explanation:'Le RRAI : distension du rectum → relaxation du sphincter anal INTERNE (muscle lisse, SNE). Cette relaxation permet l\'échantillonnage du contenu rectal dans le canal anal. Le sphincter anal externe (muscle strié) se contracte en réponse via le RRAE pour maintenir la continence.'},
      {type:'qcu',q:'Le temps de transit dans le côlon est d\'environ :',
       opts:['1 à 3 heures','7 à 9 heures','25 à 30 heures','Plus de 48 heures'],correct:[2],
       explanation:'Transit colique : 25 à 30 heures. Pour comparaison : œsophage ~10 secondes, estomac 1-3h, intestin grêle 7-9h, rectum plusieurs heures à jours. Plus le bol progresse vers le bas, plus le transit ralentit, sauf lors des HAPC.'},
      {type:'qcu',q:'Le sphincter anal interne est composé de :',
       opts:['Muscle strié sous contrôle cortical','Muscle lisse sous contrôle du SN entérique','Tissu élastique sous contrôle sympathique','Muscle strié sous contrôle du nerf honteux'],correct:[1],
       explanation:'Le sphincter anal interne (SAI) est un muscle lisse contrôlé par le système nerveux entérique. Il maintient un tonus de repos permanent assurant la continence basale. Le sphincter anal externe (SAE) est strié, sous contrôle volontaire (nerf honteux), acquis lors de l\'apprentissage de la propreté.'},
      {type:'qcu',q:'La distension gastrique induit une diminution de l\'appétit via :',
       opts:['La libération de ghréline par les cellules fundiques','L\'activation de mécanorécepteurs transmettant le signal via le nerf vague','La libération de leptine par le fundus distendu','L\'activation directe du noyau paraventriculaire par voie humorale'],correct:[1],
       explanation:'Des mécanorécepteurs situés dans la paroi gastrique détectent la distension et transmettent le signal via les fibres sensitives du nerf vague jusqu\'à l\'hypothalamus, inhibant l\'appétit. Ce mécanisme est indépendant des hormones (il fonctionne même avec de l\'eau simple, sans nutriments).'},
      {type:'qcu',q:'Les HAPC (High Amplitude Propagative Contractions) coliques surviennent en réponse à : (plusieurs réponses possibles — choisir la proposition correcte)',
       opts:['L\'ingestion d\'un repas uniquement (réflexe gastrocolique)','Le réveil matinal, l\'ingestion d\'un repas, et un stress aigu','Le jeûne prolongé et l\'activité physique intense','La présence de bile dans le côlon gauche'],correct:[1],
       explanation:'Les HAPC surviennent dans trois situations : (1) le matin au réveil, (2) après l\'ingestion d\'un repas (réflexe gastrocolique), (3) lors d\'un stress aigu (activation sympathique + acétylcholine). Elles naissent dans le côlon proximal et se propagent vers le rectum, déclenchant souvent un besoin d\'exonération.'},
    ]},
    medium:{label:'Moyen',desc:'Mécanismes intégrés et régulation fine',questions:[
      {type:'qcu',q:'Un patient présente une gastroparésie diabétique sévère. Quel mécanisme est en cause ?',
       opts:['Hypersécrétion de gastrine antrale → spasme pylorique permanent','Neuropathie autonome vagale → perte de la relaxation réceptive et retard de vidange','Hypersécrétion de CCK duodénale → inhibition extrême de la vidange','Ischémie des cellules de Cajal par microangiopathie gastrique'],correct:[1],
       explanation:'La neuropathie autonome diabétique touche précocement le nerf vague → perte de la relaxation réceptive du fundus + retard de vidange antrale. Les cellules de Cajal peuvent aussi être atteintes (microangiopathie), mais c\'est la neuropathie vagale qui est le mécanisme dominant et le plus précoce.'},
      {type:'qcu',q:'Lors de la défécation physiologique, le gradient de pression s\'inverse grâce à :',
       opts:['La contraction volontaire du sphincter anal externe et la relaxation du rectum','La contraction spontanée du rectum et le relâchement du sphincter anal interne','La poussée abdominale active et l\'ouverture du SAE','La relaxation simultanée des deux sphincters sous contrôle cérébral'],correct:[1],
       explanation:'Défécation physiologique (programme du tronc cérébral, sans effort) : (1) contraction spontanée du rectum → ↑ pression intra-rectale ; (2) relâchement du SAI → ↓ pression anale. Le gradient s\'inverse → évacuation. La poussée abdominale (contraction des muscles abdominaux) est le mécanisme de la défécation volontaire "sociologique".'},
      {type:'qcu',q:'La leptino-résistance observée dans l\'obésité s\'explique par :',
       opts:['Une mutation de perte de fonction du récepteur à la leptine dans tous les cas','Une désensibilisation des voies de signalisation hypothalamiques due à une exposition chronique à des taux élevés','Une destruction des adipocytes sécrétant la leptine','Une conversion de la leptine en ghréline au niveau hépatique'],correct:[1],
       explanation:'Dans l\'obésité, les taux de leptine sont chroniquement élevés → désensibilisation des récepteurs et des voies de transduction dans le noyau arqué → la voie α-MSH ne répond plus correctement → l\'hyperphagie persiste malgré des taux élevés de leptine. C\'est analogue à la résistance à l\'insuline dans le diabète de type 2.'},
      {type:'qcu',q:'L\'ondansétron (antagoniste 5-HT3) utilisé contre les nausées chimiothérapiques cause souvent une constipation car :',
       opts:['Il inhibe directement les cellules de Cajal en bloquant leur dépolarisation','Il bloque les récepteurs 5-HT3 des neurones afférents entériques, réduisant l\'activation du réflexe péristaltique','Il inhibe la sécrétion d\'acétylcholine dans le plexus myentérique','Il stimule les récepteurs µ opioïdes des neurones myentériques'],correct:[1],
       explanation:'La 5-HT libérée par les cellules entérochromaffines active les NAPI via les récepteurs 5-HT3, initiant le péristaltisme. En bloquant ces récepteurs, l\'ondansétron réduit cette activation → ↓ péristaltisme → constipation. C\'est un effet secondaire prévisible, à l\'opposé de son effet antiémétique central.'},
      {type:'qcu',q:'La hernie hiatale par glissement compromet le système anti-reflux principalement en :',
       opts:['Détruisant directement le sphincter inférieur de l\'œsophage','Déplaçant la jonction œso-gastrique en position intra-thoracique → perte du renfort diaphragmatique et de l\'œsophage intra-abdominal','Augmentant la sécrétion acide gastrique par hypergastrinosémie réactionnelle','Provoquant un spasme permanent de l\'angle de Hiss'],correct:[1],
       explanation:'Dans la hernie hiatale par glissement : la jonction œso-gastrique monte dans le thorax → (1) les piliers du diaphragme ne peuvent plus renforcer le SIO à l\'inspiration ; (2) l\'œsophage intra-abdominal disparaît → lors d\'une augmentation de pression abdominale, seul l\'estomac la subit → déséquilibre → reflux. L\'angle de Hiss est souvent altéré en conséquence.'},
      {type:'qcu',q:'L\'ingestion d\'un repas de 750 kcal provoque sur la motricité intestinale :',
       opts:['Une apparition immédiate de phases III de nettoyage pour traiter les nutriments','La disparition des phases III et le passage à une motricité postprandiale plus anarchique favorisant le mélange','Une augmentation de la fréquence des ondes lentes à 20/min','Un arrêt complet de la motricité intestinale pendant 2 heures'],correct:[1],
       explanation:'Dès l\'ingestion, les phases III interdigestives disparaissent → la motricité postprandiale s\'installe : contractions moins organisées, favorisant le mélange du chyme avec les sécrétions digestives et ralentissant le transit pour optimiser l\'absorption. La motricité interdigestive (phases III) reprend environ 90 min à 2h après.'},
      {type:'qcu',q:'La compliance rectale agit en quelle durée pour atténuer un besoin exonérateur ?',
       opts:['5 secondes','20 secondes','2 minutes','10 minutes'],correct:[1],
       explanation:'En environ 20 secondes, le rectum se distend pour s\'adapter aux matières, réduisant la pression intra-rectale sous le seuil de perception. Cette durée est plus courte que la capacité de contraction maximale du sphincter anal externe (40 secondes max), ce qui permet d\'assurer la continence le temps que la compliance s\'installe.'},
      {type:'qcu',q:'La motiline et la ghréline partagent quel rôle commun en période de jeûne ?',
       opts:['Inhibition du péristaltisme pour économiser l\'énergie','Stimulation de la motricité digestive et de la vidange gastrique','Induction de la phase III dans le côlon gauche','Stimulation de la sécrétion pancréatique exocrine'],correct:[1],
       explanation:'En période de jeûne, la motiline et la ghréline favorisent la motricité digestive et la vidange gastrique. La motiline déclenche notamment les phases III de l\'intestin grêle. C\'est sur cette base que les macrolides (érythromycine), agonistes des récepteurs à la motiline, sont utilisés comme prokinétiques dans les gastroparésies.'},
      {type:'qcu',q:'L\'achalasie est due à la destruction des neurones nitrergiques du SIO. Quel médicament peut temporairement soulager la dysphagie et par quel mécanisme ?',
       opts:['Les IPP (inhibiteurs de la pompe à protons) en inhibant l\'acidité résiduelle','Les dérivés nitrés en apportant du NO exogène → relaxation du muscle lisse du SIO','Les anticholinergiques en bloquant la contraction cholinergique du SIO','Les β-bloquants en diminuant la pression de repos du SIO'],correct:[1],
       explanation:'Dans l\'achalasie, l\'absence de neurones nitrergiques → le SIO ne reçoit plus de NO → il reste contracté en permanence. Les dérivés nitrés (donneurs de NO exogène) → relaxation du muscle lisse via ↑ GMPc → soulagement temporaire. Traitement définitif : myotomie de Heller ou dilatation pneumatique.'},
      {type:'qcu',q:'Dans l\'obésité, le bypass gastrique réduit la faim avant même la perte de poids car :',
       opts:['La restriction de volume gastrique active en permanence les mécanorécepteurs','La diminution de ghréline (fundus exclu) et l\'augmentation précoce de GLP-1/PYY (chyme en iléon direct) activent la voie anorexigène','L\'hyperglycémie postopératoire immédiate supprime la faim via l\'insuline','Le bypass sectionne les fibres afférentes vagales gastriques'],correct:[1],
       explanation:'Double mécanisme hormonal : (1) fundus gastrique exclu du transit → ↓ ghréline → ↓ stimulation NPY ; (2) chyme arrive directement dans l\'iléon → stimulation précoce et intense des cellules L → ↑ GLP-1 et PYY → activation de la voie α-MSH → satiété rapide. Ces effets hormonaux précèdent la perte de poids de plusieurs semaines.'},
      {type:'qcu',q:'La résection iléale étendue cause une diarrhée à acides biliaires (cholérhétique) car :',
       opts:['Les acides biliaires, non réabsorbés, stimulent la sécrétion d\'eau et d\'électrolytes dans le côlon','Le déficit en acides biliaires provoque une stase colique par manque de stimulation motrice','La résection détruit les cellules entérochromaffines productrices de 5-HT','La réabsorption de la vitamine B12 est compromise, causant une neuropathie motrice'],correct:[0],
       explanation:'Après résection iléale : ↓ réabsorption des acides biliaires → arrivée excessive d\'AB dans le côlon → effet pro-sécrétoire direct sur la muqueuse colique (activation de l\'adénylate cyclase → ↑ AMP cyclique → sécrétion d\'eau et de NaCl) → diarrhée sécrétoire. Si résection très étendue, le pool d\'AB est trop diminué → stéatorrhée s\'y ajoute.'},
      {type:'qcu',q:'Un patient sous morphine chronique développe une constipation sévère. Quelle stratégie pharmacologique est la plus ciblée ?',
       opts:['Les laxatifs osmotiques (macrogol) en première ligne uniquement','Les antagonistes périphériques des récepteurs µ (méthylnaltrexone) qui bloquent les récepteurs digestifs sans lever l\'analgésie centrale','Les prokinétiques dopaminergiques (métoclopramide) qui restaurent le péristaltisme','Les laxatifs stimulants (séné) qui activent directement les neurones myentériques'],correct:[1],
       explanation:'La méthylnaltrexone (Relistor) est un antagoniste des récepteurs µ qui ne passe pas la BHE → bloque les effets digestifs des opioïdes (constipation, ralentissement du transit) sans antagoniser l\'analgésie centrale. C\'est l\'approche la plus ciblée. Les laxatifs classiques restent utiles mais moins spécifiques.'},
      {type:'vf',q:'Le sphincter anal externe peut maintenir une contraction efficace aussi longtemps que nécessaire car c\'est un muscle strié entraîné.',
       opts:['Vrai','Faux'],correct:[1],
       explanation:'FAUX. Le sphincter anal externe (SAE), bien que strié, est fatigable. Il ne peut maintenir une contraction efficace que pendant 40 secondes maximum. Heureusement, la compliance rectale réduit la pression intra-rectale en 20 secondes, puis c\'est le SAI (muscle lisse, tonus permanent) qui assure la continence durable.'},
      {type:'cc',context:'Femme 68 ans, antécédents de 4 accouchements dont 2 forceps. Incontinence fécale aux gaz et selles liquides depuis 10 ans. Manométrie ano-rectale : pression de repos SAI normale, pression maximale de serrage SAE = 55 mmHg (N > 120 mmHg). Échographie endo-anale : rupture antérieure du SAE.',
       q:'Pourquoi ce tableau d\'incontinence respecte-t-il la continence aux selles solides ?',
       opts:['Les selles solides activent le RRAI de façon plus intense, compensant le déficit du SAE','Le SAE déficient ne peut contenir que les gaz et liquides (hautes vitesses d\'expulsion) ; les solides, plus lents et déclenchant un besoin perçu, laissent le temps de trouver des toilettes','Le SAI, intact, suffit à lui seul à retenir les selles solides en toutes circonstances','Les selles solides sont retenues par les haustrations coliques indépendamment du SAE'],correct:[1],
       explanation:'Le SAE déficient (55 vs 120 mmHg) ne peut contenir que les matières à passage rapide (gaz, liquides) qui génèrent des pressions ponctuelles élevées dépassant la faible pression du SAE résiduel. Les selles solides ont un passage plus lent, déclenchent un besoin conscient perçu à temps, et leur passage peut être retardé jusqu\'aux toilettes même avec un SAE affaibli.'},
    ]},
    hard:{label:'Difficile',desc:'Cas cliniques intégrés, physiopathologie avancée',questions:[
      {type:'cc',context:'Patient 32 ans. Manométrie haute résolution : pression de repos SIO = 58 mmHg (N < 45), absence complète de relaxation du SIO lors de la déglutition, péristaltisme œsophagien absent. Scanner : pas de tumeur. Histo : infiltrat inflammatoire du plexus myentérique sans cellules ganglionnaires résiduelles dans le SIO.',
       q:'Quel traitement curatif et quel mécanisme justifie l\'efficacité de l\'injection de toxine botulique comme bridge ?',
       opts:['Fundoplicature de Nissen ; la toxine botulique inhibe la sécrétion acide gastrique associée','Myotomie de Heller (curatif) ; la toxine botulique inhibe la libération d\'ACh des neurones excitateurs cholinergiques → ↓ tonus du SIO temporairement','Dilatation œsophagienne aux bougies (curatif) ; la toxine botulique inhibe les neurones nitrergiques','Vagotomie tronculaire (curatif) ; la toxine botulique désensibilise les mécanorécepteurs du SIO'],correct:[1],
       explanation:'Achalasie : traitement curatif = myotomie de Heller (section des fibres musculaires du SIO). La toxine botulique (Botox) inhibe la libération d\'ACh dans la jonction neuromusculaire des neurones cholinergiques du SIO → ↓ tonus temporaire (3-6 mois) → soulagement de la dysphagie. Utilisée chez les patients non opérables ou en attente de chirurgie. Pas curative car pas d\'action sur les neurones nitrergiques détruits.'},
      {type:'cc',context:'Garçon 3 semaines. Constipation sévère depuis la naissance, ballonnement abdominal important. Biopsie rectale : absence de cellules ganglionnaires dans les 8 derniers centimètres du rectum. Manométrie : absence du RRAI lors du gonflement d\'un ballonnet rectal.',
       q:'Quel est l\'effet direct de l\'absence du RRAI sur la mécanique défécatoire ?',
       opts:['Le SAE se contracte de façon permanente, bloquant la sortie des selles','Le SAI ne se relâche jamais lors du remplissage rectal → le rectum se remplit mais les matières ne peuvent progresser vers le canal anal → obstruction fonctionnelle en amont','Le rectum perd sa compliance et ne peut plus se distendre','La motricité colique devient chaotique par rétroaction sur le plexus myentérique'],correct:[1],
       explanation:'Dans la maladie de Hirschsprung, l\'aganglionisme empêche la relaxation réflexe du SAI. Or, le SAI doit se relâcher (RRAI) pour que les matières descendent du rectum dans le canal anal. Sans cette relaxation : accumulation de matières dans le rectum → mégacôlon → distension abdominale. Traitement : résection du segment aganglionnaire + abaissement colorectal de Duhamel ou Swenson.'},
      {type:'qcu',q:'Un patient obèse subit une sleeve gastrectomy. Six mois après, il signale une faim persistante plus forte qu\'après un bypass. Quelle différence hormonale l\'explique le mieux ?',
       opts:['La sleeve conserve plus de muqueuse fundique productrice de ghréline que le bypass','Le bypass ne modifie pas les taux de leptine alors que la sleeve les normalise rapidement','La sleeve supprime davantage le GLP-1 iléal que le bypass','Le bypass génère une hypergastrinosémie réactionnelle qui stimule l\'appétit'],correct:[0],
       explanation:'Dans la sleeve, bien que le fundus soit exclu, il persiste davantage de tissu fundique producteur de ghréline qu\'après le bypass (où le fundus est complètement dérivé). De plus, le bypass provoque une arrivée directe du chyme en iléon → ↑ GLP-1/PYY précoces et intenses. Ces deux effets hormonaux combinés rendent le bypass plus efficace sur la réduction de la faim que la sleeve seule.'},
      {type:'qcu',q:'La somnolence postprandiale est médiée par l\'activation des neurones CRF/AVP du PVN. Quelle information permet d\'affirmer que ce phénomène est d\'origine hypothalamique et non une hypoglycémie réactionnelle ?',
       opts:['Elle survient uniquement après les repas riches en glucides, suggérant une hypoglycémie','Elle survient même avec des repas normoglycémiques et débute avant que la glycémie commence à varier','La glycémie est toujours basse pendant la somnolence postprandiale','Elle est corrélée au taux d\'insuline postprandiale uniquement'],correct:[1],
       explanation:'La somnolence postprandiale survient quelques minutes après le repas, bien avant qu\'une hypoglycémie réactionnelle puisse s\'installer (qui surviendrait à 2-3h). Elle est liée à l\'activation des hormones anorexigènes → voie α-MSH → neurones CRF/AVP du PVN → satiété + sommeil → inhibition des neurones à orexines (qui maintiennent l\'éveil). Ce mécanisme est donc d\'origine hypothalamique directe.'},
      {type:'cc',context:'Patient 25 ans, SII (syndrome de l\'intestin irritable) à prédominance diarrhéique. À chaque repas, douleurs abdominales diffuses dans les 15 minutes et besoin urgent de déféquer. Coloscopie normale. Manométrie colique : HAPC anormalement fréquentes et précoces après ingestion.',
       q:'Pourquoi les douleurs de ce patient sont-elles disproportionnées par rapport aux HAPC observées ?',
       opts:['Les HAPC dans le SII sont de plus haute amplitude qu\'en situation normale','Le SII s\'accompagne d\'une hypersensibilité viscérale : le seuil de perception des contractions coliques normales est abaissé','Le côlon du patient présente une inflammation microscopique abaissant le seuil douloureux','Le stress amplifie la contraction des muscles abdominaux autour du côlon'],correct:[1],
       explanation:'Dans le SII, deux phénomènes coexistent : (1) hyperactivité motrice (HAPC précoces et fréquentes après le repas) ; (2) hypersensibilité viscérale (le seuil de perception des mécanorécepteurs coliques est abaissé → des contractions d\'amplitude normale sont perçues comme douloureuses). C\'est la combinaison des deux qui génère des douleurs intenses avec des contractions qui ne seraient pas perçues chez un sujet sain.'},
      {type:'qcu',q:'La résection iléale étendue compromet aussi l\'absorption de la vitamine B12 (cobalamine). Quel mécanisme précis est en cause ?',
       opts:['La vitamine B12 est absorbée dans tout l\'intestin grêle de façon passive','Le complexe vitamine B12 - facteur intrinsèque n\'est reconnu que par les récepteurs cubiline de l\'iléon distal','La vitamine B12 est produite par les bactéries de l\'iléon et non apportée par l\'alimentation','La vitamine B12 nécessite la bile pour être solubilisée et seule l\'iléon peut la concentrer'],correct:[1],
       explanation:'L\'absorption de la vitamine B12 est strictement limitée à l\'iléon distal : le complexe B12-facteur intrinsèque (FI) est capté par les récepteurs cubiline (cubulin) situés exclusivement dans cette région. Aucune autre portion de l\'intestin ne peut compenser. La résection iléale → carence en B12 → anémie mégaloblastique + neuropathie.'},
      {type:'vf',q:'La vagotomie tronculaire bilatérale ne supprime que les phases III de la motricité intestinale, sans affecter la vidange gastrique.',
       opts:['Vrai','Faux'],correct:[1],
       explanation:'FAUX. La vagotomie affecte les deux : (1) suppression des phases III → pullulation bactérienne dans l\'intestin grêle ; (2) gastroparésie → retard de vidange gastrique car le nerf vague contrôle la contraction antrale et la coordination avec le pylore. C\'est pourquoi les vagotomies (autrefois utilisées pour les ulcères) sont systématiquement associées à une pyloroplastie et ont été largement abandonnées.'},
      {type:'cc',context:'Femme 55 ans, incontinence anale aux solides depuis 1 an. Manométrie : pression SAI = 12 mmHg (N > 40 mmHg), RRAI présent et normal, compliance rectale normale. Échographie : SAI intact, pas de rupture sphinctérienne.',
       q:'Quel mécanisme physiopathologique est le plus probable pour expliquer ce tableau ?',
       opts:['Rupture musculaire du SAI non visible en échographie 2D','Hypertonie du SAE compensatoire entraînant un méga-rectum','Déficit neurogène du SAI (innervation parasympathique sacrée déficiente) réduisant son tonus de repos','Lésion isolée du RRAE entraînant une absence de contraction réflexe du SAE'],correct:[2],
       explanation:'SAI intact à l\'écho mais hypotone → cause neurogène. L\'innervation parasympathique sacrée (S2-S4 → nerf pelvien) maintient le tonus du SAI. Une lésion des racines sacrées (chirurgie pelvienne, radiothérapie, protrusion discale) → dénervation → ↓ tonus SAI → incontinence aux solides (le RRAI est préservé car le SNE intrinsèque est intact, mais le muscle ne répond plus correctement aux signaux extrinsèques).'},
      {type:'qcu',q:'Dans le syndrome de l\'intestin court post-résection étendue, quelle adaptation intestinale limite la malabsorption à long terme ?',
       opts:['Hypertrophie des cellules de Cajal dans le segment restant','Hyperplasie des entérocytes (villosités plus longues, cryptes plus profondes) via le GLP-2, augmentant la surface absorbante résiduelle','Augmentation de la fréquence des ondes lentes pour ralentir le transit','Transfert de la réabsorption des acides biliaires vers le jéjunum'],correct:[1],
       explanation:'Après résection intestinale étendue, l\'adaptation intestinale (sur 1-2 ans) est médiée notamment par le GLP-2 (glucagon-like peptide 2), libéré par les cellules L iléales restantes : ↑ prolifération des entérocytes → villosités plus longues, cryptes plus profondes → ↑ surface absorbante par cm de muqueuse résiduelle. Le téduglutide (analogue du GLP-2) est utilisé en thérapeutique pour accélérer cette adaptation.'},
      {type:'qcu',q:'Pourquoi les opioïdes endogènes (enképhalines) ralentissent-ils physiologiquement le transit en période postprandiale ?',
       opts:['Ils inhibent directement les cellules de Cajal gastriques en période digestive','Ils activent les récepteurs µ des neurones myentériques → inhibition des neurones excitateurs → ↓ péristaltisme post-prandial → ↑ temps de contact pour l\'absorption','Ils stimulent les récepteurs δ du plexus sous-muqueux → ↑ absorption d\'eau','Ils inhibent la sécrétion de 5-HT par les cellules entérochromaffines de façon préférentielle'],correct:[1],
       explanation:'Les enképhalines endogènes, libérées par des interneurones du plexus myentérique, activent les récepteurs µ → inhibition des neurones excitateurs → ↓ motricité intestinale postprandiale → ralentissement du transit → ↑ temps de contact avec la muqueuse → ↑ absorption. C\'est le mécanisme physiologique que la morphine imite de façon exogène et massive, causant la constipation.'},
    ]}
  }
},

{
  id:'hepato',title:'Physiologie Hépatique',icon:'🫀',color:'#dc2626',iconBg:'#fef2f2',
  tags:['Hémodynamique portale','Bilirubine','Acides biliaires','CYP450','HTP'],
  levels:{
    easy:{label:'Facile',desc:'Anatomie fonctionnelle, bile, métabolisme de base',questions:[
      {type:'qcu',q:'La veine porte assure quelle proportion du débit sanguin hépatique total ?',
       opts:['25 %','50 %','75 %','90 %'],correct:[2],
       explanation:'La veine porte = 75 % du débit hépatique (mais seulement 25 % de l\'O2 car sang déjà partiellement désoxygéné). L\'artère hépatique = 25 % du débit mais 75 % de l\'O2. Résumé : VP = débit / AH = oxygénation.'},
      {type:'qcu',q:'Le gradient porto-cave normal chez un sujet sain est :',
       opts:['Nul (pas de différence de pression)','Négatif (cave > porte)','Positif mais inférieur à 5 mmHg','Supérieur à 10 mmHg'],correct:[2],
       explanation:'Le gradient porto-cave est toujours positif (porte > cave) chez tout sujet, sain ou non. Il est inférieur à 5 mmHg chez le sujet sain, permettant un écoulement lent du sang à travers les sinusoïdes. Au-delà de 5 mmHg → hypertension portale cliniquement significative.'},
      {type:'qcu',q:'Quel facteur de coagulation est synthétisé par l\'hépatocyte sans nécessiter de vitamine K ?',
       opts:['Facteur II (prothrombine)','Facteur VII','Facteur V','Facteur X'],correct:[2],
       explanation:'Le facteur V (facteur labile) est synthétisé par les hépatocytes mais indépendamment de la vitamine K. Son intérêt clinique est majeur : si le TP est effondré mais le facteur V est normal → carence en VitK ou anti-VK. Si le facteur V est aussi bas → insuffisance hépatocellulaire (les hépatocytes sont détruits).'},
      {type:'qcu',q:'L\'albumine est principalement synthétisée par :',
       opts:['Les cellules de Kupffer','Le pancréas exocrine','Les hépatocytes','Les cellules stellaires hépatiques'],correct:[2],
       explanation:'L\'albumine est synthétisée exclusivement par les hépatocytes. Elle assure la pression oncotique plasmatique et transporte de nombreuses molécules (bilirubine libre, médicaments, acides gras). Sa chute en cas d\'insuffisance hépatocellulaire provoque des œdèmes et une ascite par baisse de la pression oncotique.'},
      {type:'qcu',q:'La bilirubine libre (non conjuguée) est caractérisée par :',
       opts:['Sa solubilité dans l\'eau permettant une élimination rénale directe','Son caractère hydrophobe nécessitant une liaison à l\'albumine pour circuler','Son absence de neurotoxicité contrairement à la bilirubine conjuguée','Sa production exclusive dans les hépatocytes à partir du CYP450'],correct:[1],
       explanation:'La bilirubine libre (non conjuguée) est hydrophobe/liposoluble et neurotoxique. Elle circule liée à l\'albumine car elle est insoluble dans l\'eau seule. Cette liaison la rend trop volumineuse pour être filtrée par le glomérule rénal → pas éliminée dans les urines en cas d\'excès.'},
      {type:'qcu',q:'Un ictère avec urines bière brune et selles blanches évoque avant tout :',
       opts:['Une hémolyse massive avec excès de bilirubine non conjuguée','Un défaut de conjugaison hépatocytaire','Une obstruction des voies biliaires avec refoulement de bilirubine conjuguée','Une insuffisance hépatocellulaire sévère avec cholestase mixte'],correct:[2],
       explanation:'Urines foncées (bilirubine conjuguée hydrosoluble filtrée par le rein) + selles blanches (pas de bilirubine dans le tube digestif → pas de stercobiline) = cholestase obstructive. La bilirubine conjuguée (BC) reflue dans le sang car son excrétion biliaire est bloquée. Dans l\'hémolyse : bilirubine libre ↑ → urines claires (BNC hydrophobe → pas dans les urines), selles normales.'},
      {type:'qcu',q:'Les acides biliaires primaires sont :',
       opts:['L\'acide désoxycholique et l\'acide lithocholique','L\'acide cholique et l\'acide chénodesoxycholique','Le glycocholate et le taurocholate','L\'acide ursodésoxycholique et l\'acide hyodésoxycholique'],correct:[1],
       explanation:'Les acides biliaires PRIMAIRES = synthétisés directement par l\'hépatocyte à partir du cholestérol : acide CHOLIQUE et acide CHÉNODESOXYCHOLIQUE. Ils sont ensuite conjugués (glyco- ou tauro-) → acides biliaires conjugués. Les acides SECONDAIRES (désoxycholique, lithocholique) sont produits par les bactéries coliques par déshydrogénation.'},
      {type:'qcu',q:'La réabsorption active des acides biliaires se fait principalement au niveau de :',
       opts:['L\'estomac antral','Le jéjunum proximal','L\'iléon distal','Le côlon transverse'],correct:[2],
       explanation:'La réabsorption active et majoritaire des acides biliaires se fait dans l\'ILÉON DISTAL via des transporteurs spécifiques (ASBT). Une réabsorption passive existe dans tout l\'intestin grêle. Au total, 90 % des AB sont réabsorbés dans l\'intestin grêle. Seuls 10 % atteignent le côlon, dont 90 % seront encore réabsorbés (passif). Perte fécale finale = 1 %.'},
      {type:'qcu',q:'L\'HMG-CoA réductase est l\'enzyme limitante de la synthèse de :',
       opts:['Les triglycérides hépatiques','Le cholestérol','Les acides biliaires primaires','La bilirubine conjuguée'],correct:[1],
       explanation:'L\'HMG-CoA réductase est l\'étape limitante de la synthèse endogène du cholestérol par l\'hépatocyte à partir de l\'Acétyl-CoA. C\'est la cible des statines (inhibiteurs de l\'HMG-CoA réductase). 80 % des médicaments hypolipémiants ciblent cette enzyme.'},
      {type:'qcu',q:'Les 3 composants principaux de la bile sont :',
       opts:['Bilirubine libre, albumine, eau','Cholestérol, acides biliaires, phospholipides','Acides biliaires, triglycérides, bicarbonates','Phospholipides, bilirubine conjuguée, glucuronates'],correct:[1],
       explanation:'Les 3 composants principaux : CHOLESTÉROL (20 %), ACIDES BILIAIRES conjugués (55 %) et PHOSPHOLIPIDES (25 %). La bile contient aussi de la bilirubine conjuguée (responsable de la couleur jaune), du glutathion, de l\'eau et des électrolytes.'},
      {type:'qcu',q:'La vésicule biliaire concentre la bile en période interdigestive en réabsorbant environ :',
       opts:['30 % de l\'eau','60 % de l\'eau','90 % de l\'eau','100 % de l\'eau'],correct:[2],
       explanation:'En période interdigestive (sphincter d\'Oddi fermé), la vésicule réabsorbe 90 % de l\'eau de la bile hépatocytaire → bile vésiculaire très concentrée. Cette concentration est essentielle pour une digestion lipidique efficace lors du prochain repas (libération d\'un bolus de bile très concentrée sous stimulation CCK).'},
      {type:'qcu',q:'L\'insuline stimule quelle voie métabolique glucidique dans les hépatocytes ?',
       opts:['La néoglucogenèse','La glycogénolyse','La glycogénèse (synthèse de glycogène)','La bêta-oxydation mitochondriale'],correct:[2],
       explanation:'L\'insuline + le SN parasympathique (nerf vague) → GLYCOGÉNÈSE (synthèse de glycogène → stockage du glucose). À l\'inverse, le glucagon + le SN sympathique → GLYCOGÉNOLYSE (libération du glucose depuis le glycogène) + NÉOGLUCOGENÈSE (synthèse de novo de glucose depuis AA et acides gras).'},
      {type:'qcu',q:'La splénomégalie dans l\'hypertension portale est due au fait que :',
       opts:['La rate produit plus de cellules en réponse à l\'anémie hémolytique associée','La veine splénique n\'a pas d\'anastomoses porto-caves, donc le sang s\'accumule dans la rate','La cirrhose entraîne une infiltration directe de la rate par du tissu fibreux','Le système sympathique provoque une vasoconstriction splénique lors de l\'HTP'],correct:[1],
       explanation:'Contrairement aux veines hémorroïdales et œsophagiennes, la veine splénique n\'a PAS d\'anastomoses porto-caves permettant de dériver le flux. En HTP, le sang ne peut pas contourner l\'obstacle → stase splénique → ↑ volume splénique → splénomégalie → parfois hypersplénisme (destruction cellulaire exessive → pancytopénie).'},
      {type:'qcu',q:'La perte fécale quotidienne d\'acides biliaires représente environ :',
       opts:['10 %','5 %','1 %','50 %'],correct:[2],
       explanation:'Grâce au cycle entéro-hépatique, 99 % des acides biliaires sont recyclés. La perte fécale n\'est que de 1 %, ce qui illustre l\'efficacité remarquable de ce système. Le foie synthétise de novo seulement 5-10 % des AB chaque jour pour compenser ces pertes.'},
      {type:'qcu',q:'La bilirubine provient principalement de la dégradation de :',
       opts:['L\'albumine circulante','L\'hème (hémoglobine des GR sénescents et CYP450 hépatique)','Le glucose hépatique par la voie des pentoses','Les acides aminés aromatiques dans les hépatocytes'],correct:[1],
       explanation:'La bilirubine est un produit de dégradation de l\'HÈME : (1) bilirubine TARDIVE (90 %) provenant de la dégradation des GR âgés de 90 jours (hémoglobine) par le système réticulo-endothélial ; (2) bilirubine PRÉCOCE (10 %) provenant du CYP450 hépatique et des érythrocytes immatures détruits dans la moelle.'},
    ]},
    medium:{label:'Moyen',desc:'Physiopathologie hépatique et interactions',questions:[
      {type:'qcu',q:'Un TP effondré avec facteur V normal oriente vers :',
       opts:['Une insuffisance hépatocellulaire sévère avec destruction de tous les hépatocytes','Une carence en vitamine K ou un traitement anti-VK, les hépatocytes étant fonctionnels','Une coagulopathie de consommation (CIVD) avec épuisement de tous les facteurs','Une thrombopénie profonde inhibant la production de prothrombine'],correct:[1],
       explanation:'Raisonnement clé : facteur V synthétisé par l\'hépatocyte SANS VitK. TP bas + facteur V NORMAL → les hépatocytes fonctionnent encore (sinon le V aussi serait bas) → la cause est externe à la cellule hépatique : carence en VitK ou traitement anti-VK. Si le facteur V est aussi bas → insuffisance hépatocellulaire (tous les facteurs, y compris le V, sont abaissés).'},
      {type:'qcu',q:'La lithiase biliaire cholestérolique se forme quand :',
       opts:['La concentration en phospholipides est trop élevée, déstabilisant les micelles','Il y a trop de cholestérol et/ou trop peu d\'acides biliaires → bile sursaturée → vésicules → cristaux','La production hépatique d\'acides biliaires primaires est excessive','Les bactéries de l\'iléon déconjuguent massivement les acides biliaires'],correct:[1],
       explanation:'Mécanisme de la lithiase cholestérolique : excès de cholestérol et/ou déficit en AB → bile dans la zone de sursaturation du diagramme triangulaire → formation de vésicules (cholestérol + PL sans AB pour les solubiliser en micelles) → cristallisation → calculs. Facteurs de risque : obésité, régimes hypocaloriques rapides, grossesse, jeûnes prolongés.'},
      {type:'qcu',q:'Un patient traité par rifampicine et contraceptif oral oral: quel mécanisme compromet la contraception ?',
       opts:['La rifampicine inhibe le CYP450 intestinal, bloquant l\'absorption du contraceptif','La rifampicine est un inducteur enzymatique du CYP450 → ↑ métabolisme du contraceptif → taux circulants insuffisants','La rifampicine déplace le contraceptif de sa liaison à l\'albumine','La rifampicine inhibe la glucuronoconjugaison dans les hépatocytes'],correct:[1],
       explanation:'La rifampicine est un puissant INDUCTEUR enzymatique : elle stimule la transcription des gènes codant le CYP450 → ↑ production de CYP450 → ↑ oxydation des contraceptifs → taux circulants insuffisants pour bloquer l\'ovulation. C\'est un exemple classique d\'interaction médicamenteuse par induction enzymatique (à l\'opposé de l\'inhibition enzymatique qui augmente les taux).'},
      {type:'qcu',q:'Dans la cirrhose, l\'hypertension portale est principalement :',
       opts:['Pré-sinusoïdale sous-hépatique (thrombose de la veine porte)','Sinusoïdale intra-hépatique (fibrose → ↑ résistances sinusoïdales)','Post-sinusoïdale sus-hépatique (occlusion des veines sus-hépatiques)','Artérielle hépatique (spasme de l\'artère hépatique)'],correct:[1],
       explanation:'Dans la cirrhose, la fibrose hépatique désorganise l\'architecture lobulaire et réduit le calibre des sinusoïdes → ↑ résistances intra-hépatiques sinusoïdales → stase en amont → ↑ pression portale. C\'est la cause la plus fréquente d\'HTP en France. Les autres types (pré-sinusoïdale: thrombose porte ; post-sinusoïdale: Budd-Chiari) sont moins fréquents.'},
      {type:'qcu',q:'La résection iléale étendue provoque deux conséquences digestives principales :',
       opts:['Constipation et hypercholestérolémie par réabsorption excessive du cholestérol','Diarrhée à AB (effet laxatif colique) et stéatorrhée (déficit en AB pour l\'émulsification des graisses)','Ictère à bilirubine non conjuguée et pancréatite chronique','Obstipation et reflux gastro-œsophagien par hypertonicité du sphincter iléo-cæcal'],correct:[1],
       explanation:'Résection iléale étendue : (1) AB non réabsorbés → côlon → effet pro-sécrétoire → DIARRHÉE cholérétique ; (2) Pool d\'AB diminué → insuffisant pour émulsionner les graisses → STÉATORRHÉE. Si résection très étendue, carence en vitamine B12 (récepteurs cubiline iléaux détruits) → anémie mégaloblastique.'},
      {type:'qcu',q:'Le cycle entéro-hépatique peut être interrompu thérapeutiquement par la cholestyramine. Quel est son mécanisme de réduction du LDL ?',
       opts:['Inhibition directe de l\'HMG-CoA réductase hépatique par effet de concentration intracellulaire','Chélation des AB dans l\'intestin → ↓ retour hépatique → ↑ synthèse hépatique d\'AB depuis le cholestérol → ↑ LDL-récepteurs → captation du LDL circulant','Inhibition de l\'absorption intestinale directe du cholestérol alimentaire','Induction de la bêta-oxydation hépatique des LDL'],correct:[1],
       explanation:'La cholestyramine fixe les AB dans l\'intestin → ↓ retour au foie → le foie doit synthétiser de nouveaux AB à partir du cholestérol intracellulaire → ↓ cholestérol intrahépatique → ↑ expression des récepteurs LDL → ↑ captation du LDL circulant → ↓ LDLémie. Effet synergique avec les statines (qui inhibent l\'HMG-CoA réductase).'},
      {type:'qcu',q:'Pourquoi un patient cholécystectomisé peut-il avoir une stéatorrhée modérée lors des repas très lipidiques ?',
       opts:['La cholécystectomie supprime la sécrétion hépatique de bile','Sans vésicule, la bile hépatocytaire dilule coule en continu ; le pic de bile concentrée postprandial ne peut plus se constituer','Le sphincter d\'Oddi se contracte de façon permanente après cholécystectomie','La cholécystectomie réduit la sécrétion de CCK duodénale'],correct:[1],
       explanation:'Sans vésicule : la bile s\'écoule en continu dans le duodénum (500-800 mL/j de bile diluée). Lors d\'un repas très riche en graisses, le pic de bile concentrée (normalement libéré en bolus sous CCK) n\'existe plus → émulsification des graisses moins efficace → stéatorrhée modérée, surtout pour les repas très lipidiques. Pour les repas normaux, l\'adaptation compense généralement.'},
      {type:'qcu',q:'L\'ictère à bilirubine non conjuguée se caractérise par des urines claires car :',
       opts:['La BNC est rapidement éliminée dans les urines sans laisser de pigment','La BNC, hydrophobe et liée à l\'albumine, ne peut pas être filtrée par le glomérule rénal','La BNC inhibe la sécrétion tubulaire de pigments dans les urines','La BNC est directement convertie en stercobiline urinaire sans passer par la bilirubinurie'],correct:[1],
       explanation:'La BNC est hydrophobe → liée à l\'albumine (pour circuler) → complexe trop volumineux pour franchir le filtre glomérulaire → pas éliminée dans les urines. D\'où des urines CLAIRES dans l\'ictère hémolytique et dans les défauts de conjugaison. À l\'opposé, la BC (conjuguée avec acide glucuronique) est hydrosoluble → filtrée → urines foncées (bilirubinurie).'},
      {type:'qcu',q:'Le syndrome de Budd-Chiari correspond à une HTP de type :',
       opts:['Pré-sinusoïdale intra-hépatique','Sinusoïdale intra-hépatique','Post-sinusoïdale sus-hépatique','Pré-sinusoïdale sous-hépatique'],correct:[2],
       explanation:'Le syndrome de Budd-Chiari est une thrombose des VEINES SUS-HÉPATIQUES → obstacle post-sinusoïdal sus-hépatique → ↑ pression sinusoïdale → HTP. Se présente avec ascite brutale, hépatomégalie douloureuse, ictère. À distinguer de la thrombose portale (pré-sinusoïdale sous-hépatique) et de la cirrhose (sinusoïdale intra-hépatique).'},
      {type:'qcu',q:'Un patient hépatique présente un taux de prothrombine effondré. On lui administre de la vitamine K IV sans amélioration. Quelle conclusion s\'impose ?',
       opts:['Le traitement anti-VK oral pris par le patient inhibe la vitamine K IV','L\'insuffisance hépatocellulaire est sévère : les hépatocytes sont incapables de synthétiser les facteurs même avec le cofacteur VitK disponible','La voie d\'administration intraveineuse est moins efficace que la voie orale pour la VitK','La VitK IV ne corrige que le facteur VII et non les autres facteurs'],correct:[1],
       explanation:'La vitamine K est un cofacteur : elle ne "fabrique" pas les facteurs de coagulation, elle permet aux hépatocytes de les gamma-carboxylaser. Si les hépatocytes sont massivement détruits (IHC), apporter de la VitK ne sert à rien → le TP reste bas. En pratique : on teste la correction du TP après VitK IV pour distinguer carence en VitK (correction) de IHC (absence de correction).'},
      {type:'qcu',q:'Les β-bloquants non sélectifs sont utilisés en prévention des hémorragies par varices œsophagiennes car :',
       opts:['Ils induisent une vasoconstriction directe des parois des varices','Ils bloquent le SN sympathique → ↓ pression portale et ↓ débit splanchnique','Ils inhibent la sécrétion de gastrine → ↓ acidité → ↓ érosion des varices','Ils stimulent la lithostatine hépatique → ↓ fibrose sinusoïdale'],correct:[1],
       explanation:'β-bloquants non sélectifs (propranolol, carvédilol) : (1) β1-blocage → ↓ débit cardiaque → ↓ débit splanchnique ; (2) β2-blocage → ↓ vasodilatation mésentérielle → ↓ débit portal. Résultat : ↓ gradient porto-cave → ↓ pression dans les varices → ↓ risque de rupture hémorragique. Efficaces en prophylaxie primaire (varice ≥ stade II) et secondaire.'},
      {type:'qcu',q:'La micelle biliaire se forme car les acides biliaires sont amphiphiles. Comment s\'organisent-ils dans la micelle ?',
       opts:['Les pôles hydrophobes tournés vers l\'extérieur, les pôles hydrophiles vers l\'intérieur','Les pôles hydrophiles tournés vers l\'extérieur aqueux, les pôles hydrophobes vers l\'intérieur (capturant cholestérol et phospholipides)','Les AB s\'alignent parallèlement sans distinction de pôles','Les AB forment un réseau cristallin autour des molécules de cholestérol'],correct:[1],
       explanation:'Les acides biliaires amphiphiles (pôle hydrophile : alcools + glycine/taurine ; pôle hydrophobe : noyau stéroïdien) s\'organisent en micelle : pôles hydrophiles → extérieur (contact avec la bile aqueuse) ; pôles hydrophobes → intérieur (captent cholestérol et phospholipides hydrophobes). Sans assez d\'AB → micelles impossibles → vésicules → lithiase.'},
      {type:'vf',q:'Les acides biliaires secondaires (désoxycholique, lithocholique) sont synthétisés par le foie à partir des acides biliaires primaires.',
       opts:['Vrai','Faux'],correct:[1],
       explanation:'FAUX. Les acides biliaires SECONDAIRES sont produits par les BACTÉRIES COLIQUES par déshydrogénation : cholique → désoxycholique ; chénodesoxycholique → lithocholique. Ces AB secondaires, plus hydrosolubles, sont ensuite réabsorbés passivement au niveau du côlon et rejoignent le cycle entéro-hépatique.'},
      {type:'cc',context:'Homme 58 ans, alcoolisme chronique (40g/j depuis 25 ans). Ascite, ictère modéré. Bilan : TP = 35 %, albumine = 21 g/L, facteur V = 30 %, facteur VII = 20 %, transaminases modérément élevées.',
       q:'Comment ce bilan distingue-t-il une insuffisance hépatocellulaire d\'une simple carence en vitamine K ?',
       opts:['L\'albumine basse plaide pour la carence en VitK car la VitK contrôle aussi la synthèse d\'albumine','Le facteur V abaissé (30 %) signe l\'IHC : le facteur V est synthétisé par les hépatocytes sans VitK, donc sa chute prouve la destruction hépatocytaire','La chute des facteurs VitK-dépendants (VII à 20 %) plaide pour la carence en VitK seule car ils sont les plus sensibles','Le bilan est inconcluant sans test de correction par vitamine K IV'],correct:[1],
       explanation:'Raisonnement : facteur V = 30 % (bas). Le facteur V est synthétisé par l\'hépatocyte SANS vitamine K. Sa chute indique donc une destruction hépatocytaire → insuffisance hépatocellulaire. Dans une simple carence en VitK : seuls les facteurs VK-dépendants (II, VII, IX, X, protéine C/S) seraient bas, le facteur V serait normal. Ici : tous les facteurs sont bas → IHC confirmée.'},
    ]},
    hard:{label:'Difficile',desc:'Cas cliniques complexes et raisonnement intégré',questions:[
      {type:'cc',context:'Patiente 28 ans. Ictère progressif sur 3 semaines. BT = 195 μmol/L, BC = 170 μmol/L (87 %), BNC = 25 μmol/L. Urines foncées. Selles décolorées. Échographie : dilatation des voies biliaires intra et extra-hépatiques. Pas de douleur, pas de fièvre.',
       q:'Quel diagnostic est le plus probable et quelle est la cause la plus fréquente chez une femme de 28 ans sans fièvre ?',
       opts:['Hépatite virale aiguë cholestatique à VHE avec cholestase intra-hépatique','Cholestase extra-hépatique par obstruction, à étiologie tumorale à rechercher en priorité (cholangiocarcinome, tumeur de la tête du pancréas)','Syndrome de Dubin-Johnson (défaut d\'exportation de la BC sans dilatation des voies biliaires)','Cirrhose biliaire primitive avec cholestase intra-hépatique progressive'],correct:[1],
       explanation:'Analyse : BC dominante (87 %) + VB dilatées à l\'écho → cholestase EXTRA-HÉPATIQUE par obstacle mécanique. Sans fièvre → pas d\'angiocholite. Chez une femme de 28 ans sans fièvre, les causes tumorales sont rares mais possibles (cholangiocarcinome, tumeur ampullaire). Bilan de 1ère intention : bili-IRM. Les VB dilatées éliminent le syndrome de Dubin-Johnson (où il n\'y a pas de dilatation des VB).'},
      {type:'cc',context:'Homme 45 ans, maladie de Wilson confirmée (accumulation de cuivre). Hospitalisation en urgence : ictère brutal, douleurs abdominales, Hb = 6,8 g/dL. Bilan : BT = 230 μmol/L dont BNC = 185 μmol/L, BC = 45 μmol/L. TP = 25 %, facteur V = 20 %, LDH très élevée.',
       q:'Deux mécanismes coexistent dans ce tableau. Lesquels et comment le bilan biologique permet-il de les identifier ?',
       opts:['Obstruction biliaire (BC dominante + VB dilatées) et anémie ferriprive (Hb basse)','Hémolyse (BNC >> BC, Hb effondrée, LDH élevée) et IHC (facteur V abaissé, albumine basse attendue)','Carence en VitK (TP bas, facteur V normal attendu) et hémolyse auto-immune','Hepatite médicamenteuse cholestatique (BC dominante) et thrombocytopénie'],correct:[1],
       explanation:'Double mécanisme : (1) HÉMOLYSE par toxicité du cuivre sur les GR → ↑ BNC (BNC = 185 >> BC = 45), Hb effondrée, LDH très élevée ; (2) IHC par hépatotoxicité directe du cuivre → ↓ facteur V (20 %, non VitK-dépendant), confirmant la destruction hépatocytaire. Le bilan biologique permet d\'identifier les deux car BNC >> BC (hémolyse) et facteur V bas (IHC, pas seulement carence VitK).'},
      {type:'qcu',q:'Un patient syndrome de Gilbert (mutation UGT1A1) développe un ictère lors d\'un jeûne de 48h. Quel mécanisme précis explique l\'aggravation par le jeûne ?',
       opts:['Le jeûne active directement la transcription des gènes UGT1A1 mutés, aggravant le déficit','Le jeûne augmente le catabolisme protéique → ↑ AA circulants → compétition avec la BNC pour l\'entrée hépatocytaire (OATP) + légère ↑ de production de BNC → la conjugaison déjà limitée est débordée','Le jeûne provoque une hémolyse en réponse au stress énergétique, augmentant la production de BNC','Le jeûne induit une vasoconstriction portale réduisant l\'apport de BNC aux hépatocytes'],correct:[1],
       explanation:'Mécanisme du jeûne dans le syndrome de Gilbert : (1) ↑ catabolisme → ↑ AA → compétition sur les transporteurs OATP (entrée hépatocytaire) → ↓ captation de BNC ; (2) légère ↑ de production de BNC par mobilisation de l\'hème ; (3) UGT1A1 déjà à 30 % de son activité normale → système débordé → ↑ BNC sanguine → ictère. Cliniquement bénin (TP et albumine normaux).'},
      {type:'qcu',q:'La cholestyramine (résine échangeuse d\'anions) peut-elle traiter la diarrhée après résection iléale ? Quel mécanisme ?',
       opts:['Non, elle aggrave la stéatorrhée en captant les AB restants dans la lumière intestinale','Oui, en captant les AB en excès dans le côlon → ↓ effet pro-sécrétoire des AB → ↓ diarrhée ; mais avec un risque de majorer la stéatorrhée si le pool d\'AB est trop réduit','Non, elle n\'agit que sur les AB primaires et pas sur les secondaires qui causent la diarrhée','Oui, en stimulant la réabsorption colique d\'eau en captant les AB irritants'],correct:[1],
       explanation:'La cholestyramine capte les AB dans la lumière digestive → ↓ AB arrivant au côlon → ↓ diarrhée cholérétique. MAIS : si la résection est très étendue, le pool d\'AB est déjà très insuffisant → capter les AB restants aggrave la stéatorrhée (pas assez d\'AB pour l\'émulsification des graisses). Indication : résection courte (< 100 cm) où le pool d\'AB est encore suffisant pour la digestion.'},
      {type:'cc',context:'Femme 35 ans. Ictère depuis 3 semaines. BT = 45 μmol/L, BNC = 40 μmol/L, BC = 5 μmol/L. Urines claires. Selles normalement colorées. TP = 100 %, albumine = 42 g/L, transaminases normales. Pas de douleur abdominale. NFS : Hb = 13,2 g/dL (légèrement abaissée), LDH modérément élevée.',
       q:'Quel diagnostic est le plus probable et quel examen oriente le diagnostic ?',
       opts:['Syndrome de Dubin-Johnson : défaut d\'exportation de la BC → ↑ BC isolée, urines foncées','Syndrome de Gilbert : défaut de conjugaison, mais une NFS normale serait attendue','Hémolyse chronique modérée (BNC dominante, légère anémie, LDH élevée) → Coombs direct, électrophorèse de l\'Hb, frottis sanguin','Cholestase intra-hépatique gravidique (mais la patiente n\'est pas mentionnée comme enceinte)'],correct:[2],
       explanation:'BNC = 88 % de la BT → ictère à BNC. Urines claires (BNC hydrophobe → pas filtrée), selles normales (pas de cholestase). Fonctions hépatiques normales → les hépatocytes conjuguent correctement. Légère anémie + LDH élevée + BNC élevée → hémolyse chronique modérée (GR détruits → hème → BNC ↑). La NFS et la légère anémie font pencher vers l\'hémolyse plutôt que le syndrome de Gilbert (où l\'Hb est normale).'},
      {type:'qcu',q:'Dans un surdosage de paracétamol, quel est le mécanisme d\'hépatotoxicité et quel est le rationnel de la N-acétylcystéine (NAC) ?',
       opts:['Le paracétamol inhibe directement l\'HMG-CoA réductase → stéatose aiguë ; la NAC restaure la synthèse de cholestérol','Le CYP450 oxyde le paracétamol en NAPQI toxique qui, en l\'absence de glutathion suffisant, se lie aux protéines cellulaires ; la NAC est un précurseur du glutathion','Le paracétamol précipite dans les sinusoïdes hépatiques ; la NAC chélate les cristaux de paracétamol','Le paracétamol inhibe la conjugaison glucuronique des AB ; la NAC restaure cette conjugaison'],correct:[1],
       explanation:'(1) En overdose, la voie de glucuronoconjugaison est saturée → ↑ passage par le CYP450 → NAPQI (N-acétyl-para-benzoquinone imine), très réactif ; (2) Épuisement du glutathion (GSH) → NAPQI s\'accumule → liaisons covalentes avec les protéines hépatocytaires → nécrose centrolobulaire. NAC = précurseur de la cystéine → ↑ synthèse de glutathion → neutralise le NAPQI résiduel. Efficace si administrée dans les 10-12h.'},
      {type:'qcu',q:'Le syndrome de Budd-Chiari se distingue de la cirrhose alcoolique comme cause d\'HTP principalement par :',
       opts:['L\'absence de varices œsophagiennes dans le Budd-Chiari','L\'apparition brutale d\'une ascite et d\'une hépatomégalie douloureuse (Budd-Chiari) vs installation lente (cirrhose)','Le gradient porto-cave est négatif dans le Budd-Chiari (inversion du flux portal)','Le facteur V est normal dans le Budd-Chiari car seules les VSH sont obstruées'],correct:[1],
       explanation:'Le syndrome de Budd-Chiari (thrombose des VSH) se présente souvent de façon BRUTALE : ascite rapide, hépatomégalie douloureuse, ictère, parfois détresse hépato-rénale → tableau aigu. La cirrhose installe progressivement son HTP sur des années. Dans les deux cas, le gradient porto-cave est positif (pression portale > cave), mais l\'écho-Doppler montre un flux inversé dans les VSH dans le Budd-Chiari.'},
      {type:'cc',context:'Homme 62 ans, cirrhose Child-B. Hématémèse abondante, Hb = 6,5 g/dL. Endoscopie en urgence : varices œsophagiennes grade III en hémorragie active.',
       q:'Quels sont les deux niveaux d\'action thérapeutique urgente et leurs mécanismes ?',
       opts:['IPP en urgence (protection muqueuse) + terlipressine (vasoconstricteur systémique générique)','Ligature endoscopique (hémostase locale directe) + terlipressine/somatostatine (vasoconstricteurs splanchniques → ↓ débit portal → ↓ pression dans les varices)','Anticoagulation curative (thrombose porte associée) + ligature endoscopique','Transfusion massive + propranolol oral immédiat (↓ pression portale)'],correct:[1],
       explanation:'Double cible en urgence : (1) HÉMOSTASE LOCALE → ligature endoscopique des varices (traitement de référence, supérieur à la sclérose) → oblitération directe des varices hémorragiques ; (2) RÉDUCTION DU DÉBIT PORTAL → terlipressine (analogue de la vasopressine) ou somatostatine/octréotide → vasoconstriction splanchnique → ↓ débit portal → ↓ pression dans les varices → ↓ saignement. Les deux doivent être démarrés simultanément.'},
      {type:'qcu',q:'Dans l\'ictère nucléaire (kernictère) néonatal, quelle triple vulnérabilité explique la neurotoxicité spécifique au nouveau-né ?',
       opts:['Immaturité de la barrière intestinale (réabsorption accrue de BNC), insuffisance rénale néonatale (élimination réduite), hypoalbuminémie','Immaturité de la glucuronoconjugaison (UGT1A1), BHE peu myélinisée (plus perméable à la BNC liposoluble), et capacité de liaison de l\'albumine limitée','Hémolyse physiologique néonatale excessive, absence de cycle entéro-hépatique, et glucuronoconjugaison nulle à la naissance','Perfusion cérébrale élevée (captage accru de BNC), UGT1A1 absente, BHE inexistante chez le prématuré'],correct:[1],
       explanation:'Triple vulnérabilité néonatale : (1) UGT1A1 immature → ↓ conjugaison → ↑ BNC ; (2) si BNC dépasse la capacité de liaison de l\'albumine (limitée) → BNC "libre" non liée → peut traverser la BHE peu myélinisée (plus perméable aux molécules liposolubles) → neurotoxicité directe sur les noyaux gris centraux. Traitement : photothérapie (isomérisation BNC → lumiRubine non toxique) ± exsanguino-transfusion.'},
      {type:'qcu',q:'La pancréatite calcifiante chronique alcoolique est directement liée à quelle modification de la sécrétion pancréatique ?',
       opts:['L\'alcool augmente la sécrétion de trypsinogène qui s\'auto-active dans les canaux','L\'alcool diminue la lithostatine → précipitation de cristaux de CaHCO3 dans les canalicules pancréatiques → obstruction → inflammation → calcifications','L\'alcool stimule la sécrétion de sécrétine → hypersécrétion de HCO3- → alcalinisation excessive → calcifications','L\'alcool inactive le CFTR → diminution des échanges Cl-/HCO3- → obstruction des canaux'],correct:[1],
       explanation:'L\'alcool diminue la production de lithostatine (protéine qui inhibe la nucléation des cristaux de CaHCO3 dans le suc pancréatique). Sans lithostatine, le Ca2+ et le HCO3- abondants précipitent en cristaux → bouchons protéiques calcifiés dans les canalicules → obstruction → inflammation chronique → pancréatite calcifiante. Visible à la radio et au scanner comme calcifications intra-pancréatiques.'},
    ]}
  }
},

{
  id:'pancreas',title:'Pancréas Exocrine & Sécrétion Gastrique',icon:'⚗️',color:'#7c3aed',iconBg:'#f5f3ff',
  tags:['Sécrétion gastrique','IPP','H. pylori','Pancréas exocrine','Proenzymes','CFTR'],
  levels:{
    easy:{label:'Facile',desc:'Sécrétion gastrique, protection muqueuse, pancréas',questions:[
      {type:'qcu',q:'Le fundus gastrique sécrète :',
       opts:['La gastrine et la somatostatine','L\'acide chlorhydrique (HCl) et le facteur intrinsèque','Le mucus alcalin et les ions bicarbonate','Les pepsinogènes uniquement'],correct:[1],
       explanation:'Le FUNDUS sécrète HCl (par les cellules pariétales) + facteur intrinsèque (indispensable à l\'absorption de la vitamine B12 dans l\'iléon). L\'ANTRE sécrète la gastrine. Les cellules principales (fundus) sécrètent les pepsinogènes. Les cellules de surface sécrètent le mucus et les bicarbonates.'},
      {type:'qcu',q:'L\'enzyme-clé de la sécrétion acide gastrique par les cellules pariétales est :',
       opts:['L\'anhydrase carbonique','La gastrine','La pompe à protons H+/K+-ATPase','La pepsinogène convertase'],correct:[2],
       explanation:'La pompe H+/K+-ATPase (pompe à protons) est l\'élément final de la sécrétion acide : elle échange un H+ (vers la lumière) contre un K+ (vers la cellule) en consommant de l\'ATP. C\'est sa phosphorylation qui déclenche ce transport. C\'est la cible directe des IPP (inhibiteurs de la pompe à protons).'},
      {type:'qcu',q:'Les pepsinogènes sont convertis en pepsines actives grâce à :',
       opts:['La gastrine à pH alcalin','L\'acide chlorhydrique à pH < 3','Le facteur intrinsèque à pH neutre','La trypsine duodénale'],correct:[1],
       explanation:'Les pepsinogènes (proenzymes inactifs) sont clivés en pepsines actives par l\'HCl (pH < 3). Une fois formées, les pepsines peuvent aussi cliver les pepsinogènes par réaction autocatalytique. Les pepsines dégradent les protéines en longues chaînes polypeptidiques.'},
      {type:'qcu',q:'La sécrétion gastrique comporte 3 phases. Celle qui représente 70-80 % de la sécrétion acide est :',
       opts:['La phase céphalique (stimuli psychosensoriels)','La phase gastrique (arrivée du bol dans l\'estomac)','La phase intestinale (arrivée du bol dans le duodénum)','La phase interdigestive (entre les repas)'],correct:[1],
       explanation:'Phase céphalique = 20 % (stimuli olfactifs, visuels, masticatoires → nerf vague). Phase GASTRIQUE = 70-80 % (arrivée du bol → distension antrale + chémorécepteurs à gastrine). Phase intestinale = 10 % (frein → sécrétine, somatostatine). La phase gastrique est donc la principale.'},
