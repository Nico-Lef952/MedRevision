   explanation:'La naloxone standard bloque les récepteurs µ partout, y compris dans le SNC (passe la BHE) → antagonisme central des opioïdes → syndrome de sevrage brutal + perte de l\'analgésie. La méthylnaltrexone a une charge ionique quaternaire → ne passe pas la BHE → antagonisme sélectif périphérique (intestin) sans lever l\'analgésie centrale. La naloxone orale est partiellement détruite mais pas totalement.'},
  {type:'cc',context:'Femme 45 ans, syndrome de l\'intestin court sévère (résection de 180 cm d\'iléon + côlon droit après volvulus). Sous nutrition parentérale totale depuis 6 mois. Elle veut reprendre une alimentation orale.',
   q:'Quels sont les deux obstacles majeurs à la reprise de l\'alimentation orale et quelles hormones permettraient d\'y remédier ?',
   opts:['Hyperghrélinémie persistante (faim excessive) + déficit en leptine → correction par sémaglutide','Transit accéléré (perte du "frein iléal" par ↓ PYY/GLP-1) + malabsorption (déficit en AB et surface absorbante réduite) → GLP-2 (teduglutide) pour l\'hyperplasie muqueuse + GLP-1 pour ralentir le transit','Gastroparésie (nerf vague atteint chirurgicalement) + cholestase (perte du cycle entéro-hépatique) → érythromycine + AUDC','Pancréatite récurrente (perte de la régulation par la sécrétine) + SIBO (perte des phases III) → rifaximine + pancréatine'],correct:[1],
   explanation:'Syndrome de l\'intestin court : (1) ↓ frein iléal (↓ PYY/GLP-1 car cellules L perdues) → transit accéléré → temps d\'absorption insuffisant ; (2) ↓ surface absorbante + déficit en AB (cycle entéro-hépatique court-circuité) → malabsorption des graisses et vitamines liposolubles. Thérapeutiques : TEDUGLUTIDE (analogue GLP-2) → hyperplasie muqueuse résiduelle → ↑ surface absorbante ; GLP-1 analogue → ↓ transit. Objectif : sevrer progressivement la NP.'}
);

// ---- COURS 2 : Hépatique — EASY extra ----
COURSES[1].levels.easy.questions.push(
  {type:'qcu',q:'Le sinusoïde hépatique reçoit du sang provenant de :',
   opts:['La veine cave inférieure et les veines sus-hépatiques','L\'artère hépatique et la veine porte via l\'espace porte','La veine centrolobulaire uniquement','L\'artère hépatique uniquement, la veine porte rejoint directement la VCI'],correct:[1],
   explanation:'Le sinusoïde reçoit du sang MIXTE provenant de l\'espace porte où confluent l\'artère hépatique (sang artériel oxygéné) et la veine porte (sang veineux riche en nutriments). Ce sang mixte traverse les sinusoïdes en contact avec les hépatocytes, puis repart via la veine centrolobulaire → veines sus-hépatiques → VCI.'},
  {type:'qcu',q:'Le compartiment pré-sinusoïdal sous-hépatique comprend :',
   opts:['Le sinusoïde et la veine centrolobulaire','La veine porte et l\'artère hépatique (en amont du foie)','Les veines sus-hépatiques et la VCI','L\'espace porte intrahépatique uniquement'],correct:[1],
   explanation:'Classification des 5 territoires hépatiques : pré-sinusoïdal SOUS-hépatique = veine porte + artère hépatique (en amont du foie). Pré-sinusoïdal INTRA-hépatique = espace porte. Sinusoïdal = sinusoïde. Post-sinusoïdal INTRA-hépatique = veine centrolobulaire. Post-sinusoïdal SUS-hépatique = veines sus-hépatiques + VCI.'},
  {type:'qcu',q:'Les varices œsophagiennes se forment via quelle anastomose porto-cave ?',
   opts:['Veine porte → veine mésentérique inférieure → veines hémorroïdales','Veine porte → veine mésentérique supérieure → veine œsophagienne → veines azygos → VCS','Veine splénique → veine rénale gauche → veine cave inférieure','Veine porte → veine ombilicale reperméabilisée → circulation superficielle'],correct:[1],
   explanation:'Deux anastomoses porto-caves principales : (1) Varices HÉMORROÏDALES : VP → VMI → veines hémorroïdales (double drainage VMI et VCI) ; (2) Varices ŒSOPHAGIENNES : VP → VMS → veine œsophagienne (double drainage VMS et veines azygos → VCS). La veine splénique n\'a pas d\'anastomose directe → splénomégalie.'},
  {type:'qcu',q:'La glycogénèse est stimulée par :',
   opts:['Le glucagon et le système nerveux sympathique','L\'insuline et le système nerveux parasympathique','La somatostatine et les prostaglandines','Le cortisol et les catécholamines'],correct:[1],
   explanation:'GLYCOGÉNÈSE (synthèse de glycogène) : stimulée par INSULINE + SN parasympathique (nerf vague) → état postprandial, stockage du glucose. À l\'inverse, GLYCOGÉNOLYSE (dégradation du glycogène) + NÉOGLUCOGENÈSE : stimulées par glucagon + SN sympathique → état de jeûne/stress, libération de glucose.'},
  {type:'qcu',q:'La néoglucogenèse désigne :',
   opts:['La dégradation du glycogène hépatique en glucose','La synthèse de glycogène à partir du glucose absorbé','La synthèse de novo de glucose à partir de composés non glucidiques (AA, AG)','L\'absorption intestinale du galactose et sa conversion en glucose'],correct:[2],
   explanation:'La néoglucogenèse (gluconéogenèse) = synthèse de GLUCOSE à partir de substrats NON glucidiques : acides aminés glucoformateurs, acide lactique, glycérol, acides gras. Elle est stimulée par le glucagon et le SN sympathique (jeûne, stress). Elle maintient la glycémie lors du jeûne prolongé quand le glycogène hépatique est épuisé (après ~12-16h).'},
  {type:'qcu',q:'Les lipoprotéines HDL et VLDL sont synthétisées par :',
   opts:['Le pancréas endocrine pour le transport des hormones lipophiles','Les hépatocytes, pour transporter le cholestérol et les triglycérides dans le sang','Les entérocytes pour absorber les graisses alimentaires dans la lymphe','Les adipocytes pour mobiliser les triglycérides stockés'],correct:[1],
   explanation:'Les LIPOPROTÉINES (HDL, VLDL) sont synthétisées par les HÉPATOCYTES. VLDL = transport des triglycérides du foie vers les tissus périphériques. HDL = transport "reverse" du cholestérol des tissus périphériques vers le foie. (Les entérocytes synthétisent des CHYLOMICRONS pour l\'absorption des graisses alimentaires, différents des VLDL.)'},
  {type:'qcu',q:'Les acides biliaires conjugués sont dits amphiphiles car ils possèdent :',
   opts:['Un pôle hydrophile et un pôle hydrophobe','Deux pôles hydrophiles leur conférant une haute solubilité','Deux pôles hydrophobes permettant de capter le cholestérol','Une charge neutre ne permettant aucune interaction avec l\'eau'],correct:[0],
   explanation:'Les acides biliaires conjugués (avec glycine ou taurine) sont AMPHIPHILES : pôle HYDROPHOBE (noyau stéroïdien) + pôle HYDROPHILE (fonctions alcools + AA glycine ou taurine). Cette dualité leur permet de former des micelles : pôle hydrophobe vers l\'intérieur (capte cholestérol et PL), pôle hydrophile vers l\'extérieur (soluble dans la bile aqueuse).'},
  {type:'qcu',q:'Le cholestérol est métabolisé par l\'hépatocyte en acides biliaires primaires via une étape d\'hydroxylation. Quel pourcentage du cholestérol hépatique est ainsi transformé ?',
   opts:['80 à 90 %','50 %','5 à 10 %','Less de 1 %'],correct:[2],
   explanation:'Seulement 5 à 10 % du cholestérol hépatique est transformé en acides biliaires primaires (acide cholique et chénodesoxycholique). Ce pourcentage limité est compensé par le cycle entéro-hépatique très efficace (99 % de recyclage), qui évite de devoir synthétiser de grandes quantités de novo chaque jour.'},
  {type:'qcu',q:'La bilirubine conjuguée dans le côlon est transformée par les bactéries en :',
   opts:['Bilirubine libre (déconjugaison → retour au cycle entéro-hépatique)','Urobilinogène/stercobilinogène qui, en s\'oxydant, donne la couleur marron des selles','Acides biliaires secondaires par déshydrogénation','Acide glucuronique réutilisé pour la conjugaison de nouveaux xénobiotiques'],correct:[1],
   explanation:'Dans le côlon, les bactéries transforment la bilirubine conjuguée en UROBILINOGÈNE/STERCOBILINOGÈNE. Ces composés sont éliminés dans les selles, et c\'est leur oxydation qui produit la STERCOBILINE, responsable de la couleur MARRON des matières fécales. En l\'absence de bilirubine dans le tube digestif (obstruction), les selles sont blanches (achcoliques).'},
  {type:'qcu',q:'Le CYP450 hépatique permet la transformation de molécules hydrophobes (médicaments). Sa première étape est :',
   opts:['La conjugaison avec l\'acide glucuronique → solubilisation','La glucuronoconjugaison → hydrosolubilité puis élimination rénale','L\'oxydation du xénobiotique → production d\'un métabolite actif (parfois toxique)','La déconjugaison des métabolites actifs pour faciliter leur élimination biliaire'],correct:[2],
   explanation:'Métabolisme hépatique des xénobiotiques : ÉTAPE 1 = OXYDATION par le CYP450 → métabolite actif (parfois toxique, allergique ou inflammatoire). ÉTAPE 2 = conjugaison (glucuronoconjugaison, sulfoconjugaison) → métabolite conjugué HYDROSOLUBLE → élimination rénale ou biliaire via MDR. Le CYP450 est donc la première étape de détoxification.'},
  {type:'qcu',q:'En situation de bile normale (55 % AB, 20 % cholestérol, 25 % PL), la bile se trouve dans quelle zone du diagramme triangulaire ?',
   opts:['Zone de sursaturation (formation de cristaux de cholestérol)','Zone métastable (quelques micro-cristaux, instabilité)','Zone micellaire (pratiquement que des micelles)','Zone de précipitation biliaire (calculs déjà formés)'],correct:[2],
   explanation:'En situation normale (55 % AB, 20 % cholestérol, 25 % PL), la bile se trouve dans la ZONE MICELLAIRE du diagramme triangulaire → quasiment que des micelles stables, pas de cristallisation. La lithiase survient quand le point représentatif monte dans la zone métastable puis de sursaturation (↑ cholestérol et/ou ↓ AB).'},
  {type:'qcu',q:'Le transport de la bilirubine non conjuguée dans le sang nécessite sa liaison à l\'albumine car :',
   opts:['L\'albumine l\'empêche d\'être captée trop rapidement par le foie','La BNC est neurotoxique et hydrophobe, et cette liaison la rend soluble dans le plasma aqueux','L\'albumine active l\'enzyme de conjugaison (UGT1A1) dans les hépatocytes','La BNC liée à l\'albumine peut être filtrée par le glomérule et éliminée dans les urines'],correct:[1],
   explanation:'La BNC est HYDROPHOBE (liposoluble) → insoluble seule dans le plasma aqueux → liaison OBLIGATOIRE à l\'albumine pour circuler. Cette liaison (non covalente, réversible) la rend soluble mais empêche sa filtration glomérulaire (complexe trop volumineux). Au niveau hépatique, elle est libérée de l\'albumine pour être captée par les hépatocytes via les transporteurs OATP.'},
  {type:'qcu',q:'Les facteurs de coagulation synthétisés par les hépatocytes qui nécessitent la vitamine K sont :',
   opts:['II, V, VII, IX, X, protéine C et protéine S','II, VII, IX, X, antithrombine III, protéine C et protéine S (SAUF le facteur V)','Tous les facteurs de la coagulation sans exception','I (fibrinogène), II, V, VIII, IX, X'],correct:[1],
   explanation:'Facteurs VitK-dépendants : II (prothrombine), VII, IX, X, PROTÉINE C, PROTÉINE S et ANTITHROMBINE III (AT III). EXCEPTION : facteur V (synthétisé par l\'hépatocyte sans VitK). Le fibrinogène (facteur I) et le facteur VIII (endothélium + foie) ne nécessitent pas de VitK. Mémotech : "1972" → pas à retenir en détail mais le facteur V est l\'exception cruciale.'},
  {type:'qcu',q:'Les acides biliaires secondaires (désoxycholique et lithocholique) sont plus hydrosolubles que les primaires car :',
   opts:['Les bactéries coliques les conjuguent avec l\'acide glucuronique','Les bactéries coliques les déshydrogènent, modifiant leur configuration spatiale et augmentant leur hydrophilicité relative','Les acides secondaires perdent leur noyau stéroïdien hydrophobe lors de la transformation bactérienne','Les acides secondaires sont conjugués avec la taurine uniquement, rendant la bile plus alcaline'],correct:[1],
   explanation:'Les bactéries coliques DÉSHYDROGÈNENT les acides biliaires primaires (enlèvent un OH) → acides biliaires secondaires. Cette déshydrogénation modifie la configuration (epimérisation) → légèrement plus hydrosolubles → réabsorption passive plus facile au niveau du côlon. (90 % des 10 % restants arrivant au côlon sont ainsi encore réabsorbés.)'},
  {type:'qcu',q:'La cholérèse est maximale en période :',
   opts:['Interdigestive (à jeun), quand le sphincter d\'Oddi est fermé et la bile se concentre','Postprandiale, quand la CCK stimule la contraction vésiculaire et l\'ouverture du sphincter d\'Oddi','Nocturne, quand le foie est le plus actif métaboliquement','Pendant l\'effort physique intense, par augmentation du débit portal'],correct:[1],
   explanation:'La SÉCRÉTION HÉPATIQUE de bile (cholérèse) est un processus continu (500-800 mL/jour). Mais l\'EXCRÉTION dans le duodénum est maximale en PÉRIODE POSTPRANDIALE : la CCK (libérée par les graisses et protéines duodénales) → contraction vésiculaire + ouverture du sphincter d\'Oddi → bile concentrée dans le duodénum pour digérer les lipides du repas.'}
);

// ---- COURS 2 : Hépatique — MEDIUM extra ----
COURSES[1].levels.medium.questions.push(
  {type:'qcu',q:'Un patient présente une angiocholite aiguë (fièvre, ictère, douleur = triade de Charcot). Le mécanisme physiopathologique implique :',
   opts:['Une hémolyse aiguë dépassant les capacités de conjugaison hépatique','Un calcul bloquant le cholédoque → stase biliaire → colonisation bactérienne → infection remontant vers le foie → risque de choc septique','Une insuffisance hépatocellulaire aiguë avec cholestase intra-hépatique','Une thrombose de la veine porte entraînant une ischémie hépatique'],correct:[1],
   explanation:'Angiocholite = urgence infectieuse : calcul dans le cholédoque → obstruction → bile stagne → colonisation bactérienne (E. coli, Klebsiella) → infection ascendante vers les voies biliaires intra-hépatiques → risque de sepsis grave. Triade de Charcot : douleur biliaire + fièvre + ictère. Traitement : ERCP en urgence pour désobstruction + antibiothérapie.'},
  {type:'qcu',q:'Le test de correction du TP par la vitamine K intraveineux permet de distinguer deux situations. Quelle réponse est la plus utile cliniquement ?',
   opts:['Si le TP se corrige → insuffisance hépatocellulaire car le foie répond encore à la VitK','Si le TP se corrige → carence en VitK ou traitement anti-VK (hépatocytes fonctionnels) ; si pas de correction → IHC (hépatocytes détruits)','Ce test est inutile car le facteur V suffit à distinguer IHC et carence en VitK','Si le TP se corrige partiellement → diagnostic de CIVD décompensée'],correct:[1],
   explanation:'Test à la vitamine K : administrer VitK IV → doser le TP à 24h. CORRECTION → les hépatocytes fonctionnent mais manquaient de cofacteur (carence alimentaire, malabsorption des graisses, anti-VK). PAS DE CORRECTION → les hépatocytes sont détruits (IHC) et ne peuvent pas synthétiser les facteurs même avec le cofacteur disponible. C\'est un test thérapeutique ET diagnostique.'},
  {type:'qcu',q:'Dans la cirrhose, l\'ascite se forme par plusieurs mécanismes. Lequel est le plus important ?',
   opts:['Hyperproduction de bile dans les espaces périhépatiques','HTP → ↑ pression sinusoïdale → exsudation dans la cavité péritonéale + ↓ albumine → ↓ pression oncotique → favorise la sortie d\'eau vers le 3e secteur','Hypersécrétion de rénine par le rein résumé par l\'HTP → accumulation de sel et eau','Occlusion des veines sus-hépatiques par le tissu fibreux cirrhotique → syndrome de Budd-Chiari'],correct:[1],
   explanation:'L\'ascite cirrhotique résulte de plusieurs mécanismes synergiques : (1) HTP → ↑ pression sinusoïdale → exsudation lymphatique en excès → ascite ; (2) ↓ albumine (IHC) → ↓ pression oncotique → sortie d\'eau hors des vaisseaux ; (3) vasodilatation splanchnique → activation système rénine-angiotensine-aldostérone → rétention de Na et eau → aggravation. L\'HTP est le mécanisme initiateur principal.'},
  {type:'qcu',q:'Le gallium-67 scintigraphy peut mettre en évidence les zones hépatiques actives. Dans la cirrhose, quelle redistribution du signal est attendue ?',
   opts:['Captation uniforme du gallium dans tout le parenchyme hépatique comme chez le sujet normal','Captation hépatique réduite + captation splénique augmentée (splénomégalie) car les cellules de Kupffer du foie cirrhotique sont moins nombreuses','Captation exclusivement des zones de fibrose hépatique périportale','Captation centrée sur les modules de régénération hépatique'],correct:[1],
   explanation:'Dans la cirrhose : la fibrose et la destruction progressive du parenchyme → ↓ cellules de Kupffer fonctionnelles dans le foie → ↓ captation hépatique du gallium. En parallèle, la splénomégalie (accumulation de cellules réticuloendothéliales dans la rate) → ↑ captation splénique. Ce pattern "captation hépatique réduite + rate marquée" est caractéristique de la cirrhose avancée.'},
  {type:'qcu',q:'Un médicament est inhibiteur du CYP450 (ex : kétoconazole). Quel est l\'effet sur la concentration plasmatique d\'un médicament co-administré métabolisé par ce même CYP450 ?',
   opts:['↓ concentration du médicament co-administré car le CYP450 bloqué ne peut plus l\'activer','↑ concentration du médicament co-administré car son métabolisme est ralenti → accumulation → risque de toxicité','Aucun effet car chaque médicament a son propre CYP450 spécifique','↓ concentration initiale puis rebond après 48h lors de l\'induction compensatrice'],correct:[1],
   explanation:'INHIBITION enzymatique : CYP450 bloqué → ↓ métabolisme du médicament co-administré → accumulation → ↑ concentration plasmatique → risque de TOXICITÉ (effet excessif, effets indésirables). À l\'opposé, INDUCTION enzymatique (ex : rifampicine) → ↑ CYP450 → ↑ métabolisme → ↓ concentration → risque d\'inefficacité. Ces interactions médicamenteuses sont critiques en pratique clinique.'},
  {type:'qcu',q:'La stéatose hépatique non alcoolique (NASH) se caractérise par une accumulation de triglycérides dans les hépatocytes. Quel mécanisme en est responsable dans l\'obésité ?',
   opts:['↑ synthèse d\'albumine détournée vers le stockage de triglycérides intracellulaires','Afflux excessif d\'acides gras libres du tissu adipeux viscéral vers le foie + hyperinsulinémie → ↑ lipogenèse de novo + ↓ bêta-oxydation → accumulation de TG dans les hépatocytes','↓ sécrétion biliaire de cholestérol → reflux du cholestérol dans les hépatocytes sous forme de TG','↓ HMG-CoA réductase → accumulation d\'Acétyl-CoA → conversion en TG par voie de secours'],correct:[1],
   explanation:'NASH dans l\'obésité : (1) ↑ lipolyse dans le tissu adipeux viscéral → ↑ AGL (acides gras libres) vers le foie via la veine porte ; (2) hyperinsulinémie → ↑ lipogenèse de novo hépatique (SREBP-1c) ; (3) résistance à l\'insuline → ↓ inhibition de la lipolyse → cercle vicieux. Les TG s\'accumulent car la synthèse > export (VLDL limitée) + bêta-oxydation insuffisante.'},
  {type:'qcu',q:'Dans la maladie de Wilson (accumulation de cuivre), quelle est la conséquence sur la sécrétion biliaire du cuivre ?',
   opts:['Le cuivre en excès est directement toxique pour les canalicules biliaires, bloquant la sécrétion','Mutation de la protéine ATP7B (transporteur cuivre → canalicule biliaire) → ↓ excrétion biliaire du cuivre → accumulation hépatique puis cérébrale','Le cuivre inhibe la synthèse d\'acides biliaires, réduisant le flux biliaire','Le cuivre remplace le cholestérol dans les micelles biliaires, formant des calculs de cuivre'],correct:[1],
   explanation:'Maladie de Wilson : mutation de la protéine ATP7B (ATPase de type P, exprimée dans les hépatocytes) → ↓ transport du cuivre de l\'hépatocyte vers le canalicule biliaire → ↓ excrétion biliaire du cuivre → accumulation progressive dans le foie (cirrhose), le cerveau (symptômes neurologiques), l\'œil (anneau de Kayser-Fleischer), les GR (hémolyse). Traitement : chélateurs (D-pénicillamine, zinc).'},
  {type:'qcu',q:'Un patient cirrhotique développe un syndrome hépato-rénal. Quel mécanisme physiopathologique en est responsable ?',
   opts:['Dépôt de complexes immuns dans les glomérules rénaux en cas de cirrhose virale','Vasodilatation splanchnique sévère (HTP) → ↓ volume sanguin "efficace" perçu par les reins → activation du système rénine-angiotensine-aldostérone + vasopressine → vasoconstriction rénale intense → insuffisance rénale fonctionnelle sans lésion rénale structurelle','Obstruction des vaisseaux rénaux par des emboles de fibrine provenant d\'une CIVD','Ischémie rénale directe par compression de la veine rénale gauche par le foie hypertrophié'],correct:[1],
   explanation:'Syndrome hépato-rénal : la vasodilatation splanchnique massive (médiée par le NO en réponse à l\'HTP) → ↓ pression artérielle systémique → activation baroreflexe → rénine-angiotensine-aldostérone + ADH + SNS → vasoconstriction rénale intense → ↓ DFG → IRA fonctionnelle. Les reins sont histologiquement normaux (réversible si transplantation hépatique).'},
  {type:'qcu',q:'La zone de sursaturation biliaire favorise la lithiase. Quelle situation thérapeutique peut paradoxalement provoquer ce déséquilibre ?',
   opts:['Un traitement prolongé par statines (↓ HMG-CoA réductase → ↓ cholestérol hépatique)','Un régime amaigrissant très hypocalorique rapide → mobilisation des réserves lipidiques → ↑ sécrétion hépatique de cholestérol + ↓ motricité vésiculaire (↓ CCK) → stase + sursaturation → lithiase','Une antibiothérapie prolongée éliminant les bactéries produisant des AB secondaires','Un traitement par AUDC (acide ursodésoxycholique) qui déplace les AB primaires'],correct:[1],
   explanation:'PARADOXE des régimes rapides : la mobilisation massive des TG stockés → ↑ afflux d\'AG vers le foie → ↑ sécrétion hépatique de cholestérol dans la bile (↑ cholestérol biliaire) ; en même temps, la restriction alimentaire → ↓ stimulation par les repas (↓ CCK) → ↓ contractions vésiculaires → stase de bile concentrée → sursaturation → nucléation → lithiase. Prévention : AUDC préventif lors des régimes très hypocaloriques.'},
  {type:'vf',q:'Dans l\'hypertension portale, la mesure de pression dans la veine porte (cathétérisme direct) est la méthode de référence clinique pour évaluer le gradient porto-cave.',
   opts:['Vrai','Faux'],correct:[1],
   explanation:'FAUX. Le standard clinique est le GRADIENT DE PRESSION VEINEUSE HÉPATIQUE (GPVH) = pression veineuse hépatique bloquée (PVHB, mesurée par cathétérisme transjugulaire avec ballon gonflé) MOINS pression veineuse hépatique libre (PVHL). La ponction directe de la veine porte est risquée. Le GPVH corrèle bien avec le gradient porto-cave intra-hépatique (sinusoïdal). Normal < 5 mmHg ; HTP cliniquement significative ≥ 10 mmHg.'}
);

COURSES[1].levels.hard.questions.push(
  {type:'cc',context:'Homme 48 ans. Cirrhose Child-C connue, MELD = 28. Développe une confusion progressive, flapping tremor, asterixis. Ammoniémie = 180 μmol/L (N < 50). Aucun saignement digestif récent.',
   q:'Quel mécanisme physiopathologique explique l\'encéphalopathie et pourquoi le foie cirrhotique ne peut plus protéger le cerveau ?',
   opts:['Accumulation de bilirubine non conjuguée traversant la BHE par carence de conjugaison','Le foie cirrhotique ne métabolise plus suffisamment l\'ammoniaque produit par les bactéries intestinales et le métabolisme protéique → ↑ NH3 → traverse la BHE → formation de glutamine dans les astrocytes → dysfonction cérébrale ; les shunts porto-systémiques aggravent en court-circuitant le foie','Accumulation d\'acides biliaires neurotoxiques par reflux biliaire systémique','Hypoglycémie chronique par épuisement du glycogène hépatique'],correct:[1],
   explanation:'Encéphalopathie hépatique : (1) NH3 produit par bactéries coliques (désamination des AA) + métabolisme intestinal → normalement métabolisé en urée par le foie (cycle de l\'urée) ; (2) IHC → ↓ capacité de détoxification → ↑ NH3 systémique ; (3) Shunts porto-systémiques (varices) → NH3 bypass le foie → atteint directement la circulation générale → BHE → astrocytes → ↑ glutamine (osmotique) → dysfonction astrocytaire → encéphalopathie. Traitement : lactulose (acidifie le côlon → NH4+ non absorbable) + rifaximine (↓ bactéries productrices d\'NH3).'},
  {type:'qcu',q:'Dans le syndrome de Gilbert, une fièvre banale aggrave transitoirement l\'ictère. Quel mécanisme est en cause, différent de celui du jeûne ?',
   opts:['La fièvre augmente la lipolyse → compétition sur les transporteurs OATP comme lors du jeûne','La fièvre augmente le catabolisme cellulaire → ↑ destruction d\'hème (GR + CYP450) → ↑ production de BNC qui dépasse la conjugaison déjà limitée par l\'UGT1A1 mutée','La fièvre inhibe directement l\'UGT1A1 par dénaturation thermique','La fièvre active les macrophages → hémolyse inflammatoire → ↑ BNC'],correct:[1],
   explanation:'Lors de la fièvre : ↑ catabolisme cellulaire → ↑ destruction des GR + ↑ turnover du CYP450 → ↑ production de BNC (bilirubine précoce ET tardive augmentée). Cette ↑ de production dépasse la capacité de conjugaison de l\'UGT1A1 déjà réduite à 30 % → ↑ BNC sanguine → ictère transitoire. Différent du jeûne (qui agit sur le transport, pas la production).'},
  {type:'qcu',q:'L\'acide ursodésoxycholique (AUDC / UDCA) est utilisé dans la cirrhose biliaire primitive. Par quel mécanisme principal améliore-t-il la cholestase ?',
   opts:['Il inhibe la synthèse hépatique de cholestérol via l\'HMG-CoA réductase','Il déplace les acides biliaires endogènes toxiques (hydrophobes) par des AB hydrophiles → ↓ cytotoxicité hépatocytaire + ↑ flux biliaire + ↓ expression des antigènes HLA II sur les cholangiocytes → ↓ réponse auto-immune','Il inhibe la glucuronoconjugaison pour réduire la production de bilirubine conjuguée toxique','Il stimule la sécrétion de sécrétine → ↑ HCO3- canaliculaire → alcalinisation de la bile'],correct:[1],
   explanation:'L\'AUDC est un AB hydrophile naturellement minoritaire. Ses mécanismes dans la CBP : (1) enrichit le pool d\'AB en molécules moins toxiques (remplace les AB hydrophobes qui lèsent les membranes) ; (2) ↑ flux biliaire (effet choléretique) ; (3) ↓ expression des antigènes HLA-DR sur les cholangiocytes → ↓ réaction auto-immune ; (4) effet anti-apoptotique sur les hépatocytes. Ralentit la progression de la CBP.'},
  {type:'qcu',q:'Un patient éthylique chronique présente une cytolyse hépatique avec ASAT/ALAT = 3 (ratio ASAT/ALAT > 2). Pourquoi ce ratio est-il spécifique de l\'atteinte alcoolique ?',
   opts:['L\'alcool inactive sélectivement l\'ALAT hépatique mais pas l\'ASAT','L\'alcool provoque une carence en pyridoxal phosphate (VitB6), cofacteur de l\'ALAT, réduisant son activité → ALAT artificellement basse ; l\'ASAT est aussi d\'origine mitochondriale (moins dépendante de VitB6)','Les hépatocytes alcooliques libèrent préférentiellement l\'ASAT mitochondriale car l\'alcool lèse d\'abord les mitochondries','L\'alcool stimule la synthèse d\'ASAT par induction enzymatique du CYP2E1'],correct:[1],
   explanation:'Dans l\'hépatopathie alcoolique, le ratio ASAT/ALAT > 2 (souvent proche de 3) s\'explique par : (1) la carence en vitamine B6 (pyridoxal phosphate, cofacteur de l\'ALAT plus que de l\'ASAT) → l\'ALAT est synthétisée en plus petite quantité → ratio augmenté artificiellement ; (2) lésions mitochondriales par l\'alcool → libération préférentielle de l\'ASAT mitochondriale. Ce ratio > 2 oriente fortement vers l\'origine alcoolique.'},
  {type:'cc',context:'Femme 30 ans, grossesse de 36 semaines. Prurit intense des paumes et plantes depuis 3 semaines. Bilan : ASAT/ALAT légèrement élevées, ↑ acides biliaires sériques (> 40 μmol/L), ↑ BC modérée. TP normal. Pas de douleur.',
   q:'Quel diagnostic et quel risque fœtal justifie une surveillance rapprochée voire un déclenchement ?',
   opts:['Cholestase intra-hépatique de la grossesse (CHIG) : les acides biliaires élevés traversent le placenta → toxicité cardiaque fœtale → mort fœtale in utero → déclenchement avant terme si AB > 40 μmol/L','Pré-éclampsie avec HELLP syndrome → déclenchement d\'urgence','Hépatite E gravidique → traitement antiviral et surveillance','Lithiase biliaire compliquée → ERCP en urgence sous AG'],correct:[0],
   explanation:'Cholestase Intra-Hépatique de la Grossesse (CHIG) : les œstrogènes et progestagènes gravidiques → ↓ expression des transporteurs biliaires hépatiques → accumulation d\'AB sériques → prurit intense (AB déposés dans la peau) → risque fœtal direct : les AB traversent le placenta → TOXICITÉ CARDIAQUE FŒTALE (arythmies, mort subite in utero). Si AB > 40 μmol/L → risque élevé → déclenchement du travail à 36-37 SA recommandé. Traitement : AUDC.'},
  {type:'qcu',q:'La bêta-oxydation mitochondriale des acides gras produit de l\'énergie pour l\'hépatocyte. Quelle condition favorise ce catabolisme lipidique hépatique ?',
   opts:['État postprandial avec hyperinsulinémie et excès de glucose','État de jeûne avec glucagon élevé → ↑ lipolyse périphérique → ↑ AGL → bêta-oxydation hépatique → acétyl-CoA → corps cétoniques → énergie pour le cerveau et les muscles','Hyperglycémie chronique du diabète de type 1 non traité','Après un repas très riche en lipides uniquement (CCK stimule la bêta-oxydation directement)'],correct:[1],
   explanation:'En période de JEÛNE : glucagon ↑ → lipolyse du tissu adipeux → ↑ AGL circulants → captés par le foie → bêta-oxydation mitochondriale → acétyl-CoA → CORPS CÉTONIQUES (acétoacétate, bêta-hydroxybutyrate) → exportés vers le cerveau et les muscles. Ce catabolisme lipidique hépatique est maximal lors du jeûne prolongé et de l\'acidocétose diabétique.'}
);

// ---- COURS 3 : Pancréas — EASY extra ----
COURSES[2].levels.easy.questions.push(
  {type:'qcu',q:'La sécrétion d\'acide chlorhydrique par les cellules pariétales nécessite quelle enzyme pour produire les ions H+ ?',
   opts:['La gastrine synthase','L\'anhydrase carbonique (qui transforme CO2 + H2O → HCO3- + H+)','La pepsinogène convertase','L\'histamine décarboxylase'],correct:[1],
   explanation:'L\'ANHYDRASE CARBONIQUE dans les cellules pariétales catalyse : CO2 + H2O → HCO3- + H+. Le H+ est ensuite expulsé dans la lumière gastrique par la pompe H+/K+-ATPase (échange H+/K+). Le HCO3- diffuse au pôle basal vers le sang. C\'est la source des ions H+ de l\'HCl gastrique.'},
  {type:'qcu',q:'Les cellules ductulaires pancréatiques sont stimulées par quelle hormone pour sécréter des bicarbonates ?',
   opts:['La gastrine libérée par l\'antre gastrique','La sécrétine libérée par le duodénum en réponse à l\'acidification','La CCK libérée par les cellules I duodénales en réponse aux graisses','Le GLP-1 libéré par l\'iléon en réponse aux glucides'],correct:[1],
   explanation:'La SÉCRÉTINE (libérée par les cellules S duodénales quand le pH duodénal baisse) → stimule les cellules ductulaires pancréatiques → ↑ sécrétion hydro-bicarbonatée (H2O + HCO3-) → tampon les H+ gastriques dans le duodénum → pH optimal pour les enzymes pancréatiques (pH 7-8).'},
  {type:'qcu',q:'La gastrine est principalement produite par :',
   opts:['Les cellules pariétales fundiques','Les cellules principales du fundus','Les cellules G de l\'antre gastrique','Les cellules chromaffines fundiques'],correct:[2],
   explanation:'La gastrine est produite par les CELLULES G de l\'ANTRE gastrique. Elle stimule les cellules pariétales (récepteur CCK2) → ↑ sécrétion d\'HCl. Elle est aussi produite en petite quantité dans le duodénum. Sa sécrétion est stimulée par les AA, la distension antrale, et le nerf vague. Elle est inhibée par un pH gastrique bas (rétrocontrôle négatif via somatostatine).'},
  {type:'qcu',q:'Le facteur intrinsèque, indispensable à l\'absorption de la vitamine B12, est sécrété par :',
   opts:['Les cellules G de l\'antre','Les cellules de surface de l\'épithélium gastrique','Les cellules pariétales fundiques (même cellule que HCl)','Les cellules principales sécrétant aussi les pepsinogènes'],correct:[2],
   explanation:'Le facteur intrinsèque (FI) est produit par les CELLULES PARIÉTALES FUNDIQUES (la même cellule qui produit HCl). C\'est pourquoi une gastrite auto-immune atrophiante touchant les cellules pariétales → carence en FI → anémie de Biermer (anémie mégaloblastique par déficit en B12). La gastrectomie totale nécessite donc une supplémentation en B12.'},
  {type:'qcu',q:'L\'effet tampon du repas se traduit par une augmentation du pH gastrique pendant la digestion malgré une sécrétion acide maximale. Ce phénomène est :',
   opts:['Un mécanisme pathologique indiquant un défaut de sécrétion acide','Un mécanisme physiologique protégeant la muqueuse gastrique pendant la phase de sécrétion maximale','Une conséquence de la sécrétion d\'HCO3- par les cellules pariétales pendant le repas','Une réponse à l\'inhibition de la sécrétion acide par la sécrétine postprandiale'],correct:[1],
   explanation:'L\'effet tampon du repas est PHYSIOLOGIQUE et protecteur : les aliments tamponnent les H+ produits en grande quantité pendant la phase gastrique → pH intragastrique reste entre 4 et 6 pendant le repas (alors que la sécrétion acide est maximale). C\'est le premier mécanisme de cytoprotection muqueuse, dépendant directement du comportement alimentaire.'},
  {type:'qcu',q:'La distension antrale lors de l\'arrivée du bol alimentaire stimule la sécrétion acide via :',
   opts:['Des chémorécepteurs détectant les acides aminés qui libèrent directement de l\'HCl','Des mécanorécepteurs activant un réflexe vago-vagal → libération d\'ACh → stimulation des cellules pariétales et à gastrine','Des osmorecepteurs mesurant la pression osmotique du bol alimentaire','Des thermorecepteurs sensibles à la chaleur des aliments ingérés'],correct:[1],
   explanation:'La distension antrale active des MÉCANORÉCEPTEURS → réflexe VAGO-VAGAL (nerf vague afférent → SNC → nerf vague efférent → ACh) → stimulation des cellules à gastrine + directement des cellules pariétales. En parallèle, des chémorécepteurs antraux détectent les AA et l\'augmentation du pH du bol alimentaire → libèrent de la gastrine.'},
  {type:'qcu',q:'Quel médicament antiulcéreux agit en bloquant les récepteurs à l\'histamine de type 2 sur les cellules pariétales ?',
   opts:['L\'oméprazole','La ranitidine (ou cimétidine)','Le misoprostol','Le sucralfate'],correct:[1],
   explanation:'Les ANTIHISTAMINIQUES H2 (ranitidine, cimétidine, famotidine) bloquent les récepteurs H2 des cellules pariétales → ↓ activation par l\'histamine → ↓ sécrétion d\'HCl. Moins efficaces que les IPP car ils ne bloquent qu\'un seul des trois stimulateurs de la pompe à protons (histamine, mais pas gastrine ni ACh). Oméprazole = IPP. Misoprostol = analogue des prostaglandines. Sucralfate = cytoprotecteur.'},
  {type:'qcu',q:'Les pepsinogènes sont des proenzymes sécrétées dans l\'estomac. Où sont-ils principalement produits ?',
   opts:['Dans les cellules pariétales du fundus','Dans les cellules principales du fundus et du corps gastrique','Dans les cellules G de l\'antre','Dans les cellules de surface sécrétant le mucus'],correct:[1],
   explanation:'Les PEPSINOGÈNES sont sécrétés par les CELLULES PRINCIPALES (chief cells) du fundus et du corps gastrique. Une fois sécrétés, ils sont clivés en pepsines actives par l\'HCl (pH < 3). Les pepsines débutent la digestion protéique en coupant les protéines en longues chaînes polypeptidiques.'},
  {type:'qcu',q:'La phase céphalique de la sécrétion gastrique est initiée par :',
   opts:['L\'arrivée du bol alimentaire dans l\'estomac','La distension antrale par les aliments','Des stimuli psychosensoriels (odeur, vue, pensée du repas) agissant via le cortex et le nerf vague','Le pH acide du duodénum activant les cellules à sécrétine'],correct:[2],
   explanation:'La PHASE CÉPHALIQUE : stimuli psychosensoriels (vue, odeur, goût, pensée du repas) → cortex → nerf vague → libération d\'ACh → stimulation directe des cellules pariétales + cellules à gastrine. Représente 20 % de la sécrétion totale. Preuve : si on mâche et recrache (sham feeding), l\'estomac sécrète quand même de l\'acide.'},
  {type:'qcu',q:'La somatostatine inhibe la sécrétion gastrique. Elle est libérée par les cellules D. Quelle est sa voie d\'action préférentielle sur les cellules à gastrine ?',
   opts:['Voie endocrine (dans la circulation sanguine vers le fundus)','Voie paracrine (libération locale diffusant vers les cellules à gastrine adjacentes)','Voie neurocrine (nerf vague → libération de SST sur les cellules à gastrine)','Voie autocrine (les cellules à gastrine inhibent leur propre sécrétion via SST)'],correct:[1],
   explanation:'La somatostatine agit principalement par voie PARACRINE : les cellules D antrales libèrent localement la SST qui diffuse vers les cellules G adjacentes → ↓ libération de gastrine. Elle agit aussi par voie paracrine sur les cellules pariétales fundiques (cellules D fundiques). Ces voies courtes permettent une régulation locale rapide et fine de la sécrétion acide.'},
  {type:'qcu',q:'Les ions bicarbonate sécrétés par les cellules ductulaires pancréatiques sont produits à partir de :',
   opts:['Les acides aminés du sang arrivant par la veine porte','La réaction CO2 + H2O → HCO3- + H+ catalysée par l\'anhydrase carbonique','Les ions phosphate filtrés dans la circulation capillaire pancréatique','Le glycogène hépatique métabolisé et envoyé par la veine porte'],correct:[1],
   explanation:'Dans les cellules ductulaires pancréatiques : l\'ANHYDRASE CARBONIQUE catalyse CO2 + H2O → HCO3- + H+. Le HCO3- est exporté dans la lumière canaliculaire via l\'échangeur HCO3-/Cl- au pôle apical (le CFTR maintient le Cl- disponible pour l\'échange). Le H+ est exporté au pôle basal via la pompe Na+/H+.'},
  {type:'qcu',q:'Le mucus gastrique joue un rôle de barrière physique car :',
   opts:['Il est acide et détruit les bactéries avant qu\'elles n\'atteignent l\'épithélium','C\'est un gel adhérant à l\'épithélium dans lequel les HCO3- sont piégés, tamponant les H+ qui tentent de pénétrer','Il contient des enzymes protéolytiques qui détruisent les protéines bactériennes','Il est imperméable à l\'eau, empêchant la dilution de l\'HCl au contact de la muqueuse'],correct:[1],
   explanation:'Le mucus gastrique forme une couche de GEL ADHERENT à la surface de l\'épithélium. Dans ce gel, les ions HCO3- (sécrétés par les cellules de surface) sont emprisonnés → ils tamponnent les H+ qui pénètrent dans le mucus → le gel reste ALCALIN (pH ~7) côté muqueuse, alors que le pH de la lumière est ~1. Les H+ ne peuvent pas diffuser facilement à travers ce gel.'},
  {type:'qcu',q:'Le reflux gastro-œsophagien est PHYSIOLOGIQUE jusqu\'à quelle fréquence par 24 heures ?',
   opts:['10 à 30 épisodes de reflux par 24 heures','50 à 60 épisodes par 24 heures','Tout reflux est pathologique','Moins de 5 épisodes par 24 heures'],correct:[0],
   explanation:'Il est NORMAL d\'avoir 20 à 30 épisodes de reflux gastro-œsophagien par 24 heures → c\'est physiologique. De même, 10 à 20 éructations par jour sont normales. Le RGO devient pathologique au-delà de 70-75 épisodes par jour ou lorsque les épisodes sont perçus comme très désagréables (pyrosis invalidant, régurgitations), ou s\'accompagnent de complications (œsophagite, EBO).'},
  {type:'qcu',q:'Le canal CFTR dans les cellules ductulaires pancréatiques transporte préférentiellement quel ion ?',
   opts:['Les ions bicarbonate (HCO3-) directement','Les ions chlorure (Cl-)','Les ions sodium (Na+)','Les ions calcium (Ca2+)'],correct:[1],
   explanation:'Le CFTR (Cystic Fibrosis Transmembrane conductance Regulator) est principalement un canal à CHLORURE (Cl-). Son rôle dans la sécrétion pancréatique : recycler le Cl- vers la lumière après l\'échange HCO3-/Cl- → maintenir le gradient de Cl- intracellulaire → permettre la poursuite de l\'export de HCO3-. Sans CFTR : accumulation de Cl- intracellulaire → arrêt de l\'export de HCO3- → sécrétions épaisses.'},
  {type:'qcu',q:'Le suc pancréatique en période postprandiale peut atteindre quelle concentration en bicarbonates ?',
   opts:['Moins de 10 mEq/L','Environ 30 mEq/L','Jusqu\'à 140 mEq/L (quasi-isotonique de bicarbonate)','Exactement 7 mEq/L (comme le plasma)'],correct:[2],
   explanation:'Le suc pancréatique peut atteindre 140 mEq/L en HCO3- lors d\'une stimulation maximale par la sécrétine. C\'est la concentration la plus élevée en bicarbonates de toutes les sécrétions digestives. Le volume sécrété est de 1 à 2 L/jour. Ce suc très alcalin est essentiel pour neutraliser le bol alimentaire acide arrivant du pylore dans le duodénum.'}
);

// ---- COURS 3 : Pancréas — MEDIUM extra ----
COURSES[2].levels.medium.questions.push(
  {type:'qcu',q:'Quel mécanisme explique qu\'un patient sous inhibiteur de la pompe à protons à forte dose peut développer une hypomagnesémie sévère ?',
   opts:['Les IPP inhibent directement les transporteurs de magnésium intestinaux','Le blocage de l\'acidité gastrique → ↓ ionisation du magnésium → ↓ absorption passive du Mg intestinal dépendant du pH acide','Les IPP inhibent les canaux TRPM6/TRPM7 (transporteurs actifs du Mg dans l\'intestin) → hypomagnesémie','Les IPP stimulent l\'excrétion rénale du magnésium via la voie de la parathormone'],correct:[2],
   explanation:'Mécanisme non complètement élucidé mais probable : les IPP au long cours inhibent les canaux TRPM6/TRPM7 (transporteurs actifs du magnésium dans le jéjunum) → ↓ absorption active du Mg → hypomagnesémie sévère → risque de tétanie, arythmies. Effet dose-dépendant et durée-dépendant. À surveiller chez les patients sous IPP au long cours, surtout avec diurétiques.'},
  {type:'qcu',q:'Dans le syndrome de Zollinger-Ellison, les ulcères sont souvent multiples et en position atypique. Pourquoi des ulcères jéjunaux peuvent-ils se former ?',
   opts:['La gastrine de la tumeur a un effet trophique direct sur la muqueuse jéjunale','L\'hypersécrétion acide massive dépasse la capacité tampon du duodénum → l\'acide atteint le jéjunum → pH < 3 dans le jéjunum → ulcères en dehors des zones habituelles','Les métastases du gastrinome dans le jéjunum sécrètent localement de l\'HCl','Le jéjunum absorbe trop d\'HCl rétrodiffusé depuis l\'iléon'],correct:[1],
   explanation:'Dans le ZES, la sécrétion acide gastrique est massive et continue → déborde la capacité de neutralisation du duodénum (sécrétine + HCO3- pancréatique insuffisants face au volume acide) → le pH reste < 3 dans le duodénum distal et le jéjunum proximal → ulcères en position atypique (post-bulbaires, jéjunaux). La stéatorrhée est aussi fréquente (HCl inactive la lipase pancréatique à pH < 4).'},
  {type:'qcu',q:'L\'H. pylori survit dans l\'acide gastrique (pH = 1) grâce à :',
   opts:['Une membrane cellulaire imperméable à l\'HCl','Son uréase qui dégrade l\'urée en NH3 → neutralise localement le pH péri-bactérien + forme une couche protectrice alcaline','Sa localisation sous la couche de mucus où le pH est proche de 7 sans activité uréasique','Une pompe à protons bactérienne qui expulse les H+ avant qu\'ils endommagent la bactérie'],correct:[1],
   explanation:'L\'URÉASE d\'H. pylori est son armure : elle hydrolyse l\'urée du suc gastrique (présente en faible quantité) en NH3 et CO2. Le NH3 produit localement neutralise le pH péri-bactérien (alcalinisation locale) → microenvironnement neutre entourant la bactérie dans un milieu très acide. C\'est le principe du test respiratoire à l\'urée marquée (13C-UBT) : si H. pylori présent → uréase → 13CO2 dans l\'air expiré.'},
  {type:'qcu',q:'Les jonctions serrées (tight junctions) entre les cellules épithéliales gastriques protègent contre :',
   opts:['La pénétration des bactéries alimentaires dans la sous-muqueuse','La rétrodiffusion des ions H+ de la lumière vers la muqueuse gastrique','Le passage du mucus de la couche luminale vers la sous-muqueuse','La perte d\'ions bicarbonate des cellules de surface vers la lumière gastrique'],correct:[1],
   explanation:'Les JONCTIONS SERRÉES (imperméables) entre les cellules épithéliales gastriques empêchent la RÉTRODIFFUSION des H+ de la lumière (pH 1) vers la muqueuse (pH intracellulaire ~7). Sans ces jonctions, les H+ détruiraient les cellules épithéliales. Les AINS, l\'alcool et H. pylori altèrent ces jonctions → rétrodiffusion → lésions.'},
  {type:'qcu',q:'La pancréatite aiguë nécrosante sévère peut évoluer vers une défaillance multi-organes. Par quel mécanisme les enzymes pancréatiques activées causent-elles une atteinte systémique ?',
   opts:['Par translocation bactérienne colique vers la circulation porte via les veines pancréatiques','Par passage des enzymes activées (trypsine, phospholipase, élastase) dans la circulation sanguine → activation du complément, destruction des membranes cellulaires à distance, CIVD','Par production de toxines pancréatiques spécifiques diffusant dans les lymphatiques mésentériques','Par hypoglycémie sévère secondaire à la destruction des cellules des îlots de Langerhans'],correct:[1],
   explanation:'Dans la pancréatite nécrosante sévère : enzymes actives (trypsine, phospholipase A2, élastase) + cytokines pro-inflammatoires (IL-1, TNF-α) → passage dans la circulation sanguine → (1) phospholipase A2 → lèse les membranes cellulaires à distance (poumon → SDRA) ; (2) trypsine → active la cascade du complément et de la coagulation → CIVD ; (3) élastase → lèse les parois vasculaires. Score de SIRS.'},
  {type:'qcu',q:'La sécrétion de pepsine dans l\'estomac sous forme de pepsinogène illustre un principe général de protection. Ce principe est :',
   opts:['La compartimentation cellulaire : les enzymes actives sont séparées de leurs substrats par les membranes cellulaires','La sécrétion de proenzymes (précurseurs inactifs) qui ne sont activées qu\'au moment et au lieu où elles doivent agir','La dilution des enzymes dans le suc gastrique pour éviter les concentrations trop élevées','La sécrétion simultanée d\'inhibiteurs qui neutralisent les enzymes jusqu\'au moment de la digestion'],correct:[1],
   explanation:'Le principe des PROENZYMES (zymogènes) protège le tissu sécréteur de son autodigestion. Les enzymes protéolytiques sont synthétisées et stockées sous forme inactive (précurseur inactif) → activées seulement dans la lumière digestive (pH acide pour les pepsines, entérokinase pour le trypsinogène). Ce principe s\'applique à la pepsine, la trypsine, la chymotrypsine, l\'élastase et les phospholipases.'},
  {type:'qcu',q:'Le renouvellement cellulaire de la muqueuse gastrique est un mécanisme de cytoprotection. Quel médiateur le stimule principalement ?',
   opts:['Les ions H+ qui stimulent la mitose des cellules souches des cryptes gastriques','Les prostaglandines (via COX1) qui stimulent la prolifération et la migration des cellules épithéliales','La gastrine qui a un effet trophique direct sur les cellules de surface','Le mucus qui crée un signal osmotique stimulant la division cellulaire'],correct:[1],
   explanation:'Les PROSTAGLANDINES (produites constitutivement par COX1) stimulent le renouvellement cellulaire de la muqueuse gastrique : prolifération des cellules souches dans les cryptes + migration vers la surface. C\'est un des 6 mécanismes de cytoprotection. Les AINS (inhibiteurs de COX) → ↓ prostaglandines → ↓ renouvellement → brèches épithéliales → ulcères.'},
  {type:'qcu',q:'La circulation sanguine splanchnique accélère son débit en période postprandiale dans un but cytoprotecteur. Comment cela protège-t-il la muqueuse gastrique ?',
   opts:['En diluant les enzymes digestives dans le flux sanguin accéléré','En assurant une clairance rapide des ions H+ qui auraient franchi l\'épithélium → ils sont emportés et éliminés par les reins avant de causer des dommages','En apportant plus d\'oxygène aux cellules pariétales en pleine sécrétion','En augmentant la pression hydrostatique capillaire qui repousse les H+ vers la lumière'],correct:[1],
   explanation:'La circulation splanchnique accélérée (5e mécanisme de cytoprotection) réalise une CLAIRANCE des H+ qui ont éventuellement franchi l\'épithélium : le flux capillaire accru emporte rapidement ces H+ avant qu\'ils n\'acidifient la sous-muqueuse et causent des lésions. Ces H+ rejoindront ensuite la circulation générale et seront éliminés par les reins.'},
  {type:'vf',q:'Les anti-COX2 sélectifs (coxibs) ont été développés pour préserver la cytoprotection gastrique tout en conservant l\'effet anti-inflammatoire. Ils ont cependant un risque cardiovasculaire accru comparé aux AINS classiques.',
   opts:['Vrai','Faux'],correct:[0],
   explanation:'VRAI. Les coxibs inhibent COX2 (inductible, pro-inflammatoire) mais épargnent COX1 (constitutive, cytoprotectrice) → moins d\'ulcères gastro-duodénaux. MAIS : COX2 produit aussi de la prostacycline (PGI2) vasculaire (anti-agrégante, vasodilatatrice). Les coxibs en inhibant COX2 → ↓ PGI2 → déséquilibre pro/anti-agrégant → ↑ risque thrombotique cardiovasculaire. Le rofécoxib (Vioxx) a été retiré du marché pour ce risque.'},
  {type:'qcu',q:'L\'achalasie (absence de relaxation du SIO lors de la déglutition) se distingue d\'un spasme œsophagien diffus par :',
   opts:['L\'achalasie présente des contractions péristaltiques normales ; le spasme diffus a un SIO hypotone','L\'achalasie a un SIO hypertonique avec absence ou mauvaise relaxation + absence de péristaltisme ; le spasme diffus a un SIO normal mais des contractions œsophagiennes simultanées et de haute amplitude','L\'achalasie est réversible sous traitement médical ; le spasme diffus nécessite toujours une chirurgie','L\'achalasie affecte uniquement le tiers supérieur strié ; le spasme diffus affecte le tiers inférieur lisse'],correct:[1],
   explanation:'Distinction manométrique : ACHALASIE = SIO hypertonique (↑ pression de repos) + ABSENCE de relaxation du SIO lors de la déglutition + absence de péristaltisme (toutes les contractions sont non propulsives/simultanées). SPASME DIFFUS = SIO NORMAL (pression et relaxation normales) + contractions œsophagiennes SIMULTANÉES de haute amplitude. Deux maladies différentes de la même catégorie (troubles moteurs œsophagiens).'}
);

// ---- COURS 3 : Pancréas — HARD extra ----
COURSES[2].levels.hard.questions.push(
  {type:'cc',context:'Homme 55 ans, diabétique de type 2, traité par metformine + sulfamide hypoglycémiant. Il débute un traitement par clarithromycine (macrolide) pour une pneumopathie. Deux jours plus tard, hospitalisation pour hypoglycémie sévère.',
   q:'Quelle interaction médicamenteuse est en cause et quel mécanisme ?',
   opts:['La clarithromycine inhibe la réabsorption rénale de la metformine → accumulation → hyperlactacidémie','La clarithromycine est un puissant inhibiteur du CYP3A4 → ↓ métabolisme hépatique du sulfamide → accumulation → hypersécrétion d\'insuline → hypoglycémie sévère','La clarithromycine stimule la sécrétion d\'insuline pancréatique directement via des récepteurs aux macrolides','La clarithromycine inhibe la metformine au niveau intestinal, augmentant son biodisponibilité'],correct:[1],
   explanation:'Interaction médicamenteuse classique : la clarithromycine est un puissant INHIBITEUR du CYP3A4 (et CYP2C9) → ↓ métabolisme hépatique du sulfamide hypoglycémiant → accumulation du sulfamide → stimulation prolongée de la sécrétion d\'insuline → HYPOGLYCÉMIE SÉVÈRE. À éviter : macrolides (clarithromycine, érythromycine) + fluconazole, amiodarone chez les patients sous sulfamides. Alternative : azithromycine (pas inhibiteur CYP).'},
  {type:'qcu',q:'Un patient développe une hépatite médicamenteuse à l\'amoxicilline-clavulanate (Augmentin). Quel mécanisme physiopathologique est le plus probable ?',
   opts:['Inhibition directe du CYP450 par l\'amoxicilline → accumulation de bilirubine non conjuguée','Le clavulanate est métabolisé par le CYP450 en métabolite réactif → liaison aux protéines hépatocytaires → réaction immuno-allergique (reconnaissance comme haptène) → hépatite immuno-allergique cholestatique','L\'amoxicilline inhibe la synthèse de glutathion → ↓ détoxification des métabolites réactifs → nécrose centrolobulaire','Le clavulanate inhibe la glycoconjugaison hépatique → accumulation de bilirubine conjuguée'],correct:[1],
   explanation:'L\'hépatite à l\'Augmentin est la plus fréquente hépatite médicamenteuse en France. Mécanisme : le clavulanate (et dans une moindre mesure l\'amoxicilline) → métabolites réactifs via CYP450 → liaison covalente aux protéines hépatocytaires (hapténisation) → reconnaissance par le système immunitaire adaptatif → réaction IDIOSYNCRASIQUE immuno-allergique → hépatite cholestatique ou mixte. Retard diagnostique souvent car la réaction apparaît plusieurs jours à semaines après début du traitement.'},
  {type:'qcu',q:'Dans un contexte de suivi post-opératoire d\'une gastrectomie totale pour cancer, quelles supplémentations sont systématiquement nécessaires et pourquoi ?',
   opts:['Vitamine K uniquement (perte des cellules pariétales → défaut de coagulation)','Vitamine B12 (perte du facteur intrinsèque) + fer (perte de l\'acidité gastrique → ↓ absorption du fer non-hémique) + calcium/vitamine D (duodénum exclu dans certains montages)','Vitamines B1 et B6 uniquement (perturbation de la digestion des glucides et protéines)','Aucune supplémentation si la sleeve est conservée'],correct:[1],
   explanation:'Gastrectomie totale → résection de tout l\'estomac → (1) perte des cellules pariétales → ABSENCE de facteur intrinsèque → carence en VITAMINE B12 (injections IM mensuelles à vie) ; (2) perte de l\'acidité gastrique → le fer non-hémique (Fe3+) n\'est plus réduit en Fe2+ par l\'acide → ↓ absorption du FER ; (3) si duodénum court-circuité (Roux-en-Y) → ↓ absorption du calcium et de la vitamine D → OSTÉOPOROSE précoce.'},
  {type:'cc',context:'Femme 42 ans. Douleurs épigastriques récidivantes depuis 2 ans résistant aux IPP à double dose. Gastroscopie : ulcères bulbaires et post-bulbaires multiples. Gastrinémie à jeun = 850 pg/mL (N < 100). Test à la sécrétine (injection IV) : ↑ gastrine à 1200 pg/mL.',
   q:'Quel diagnostic et quelle est la signification physiopathologique du test à la sécrétine positif ?',
   opts:['Gastrite à H. pylori sévère : la sécrétine stimule les cellules G infectées → hypergastrinémie réactionnelle','Syndrome de Zollinger-Ellison (gastrinome) : les cellules tumorales (néoplasie endocrine) possèdent des récepteurs à la sécrétine → réponse paradoxale hypersécrétion de gastrine (vs ↓ chez le sujet normal où la sécrétine inhibe la gastrine)','Hyperplasie des cellules G par anémie pernicieuse : la sécrétine stimule les cellules G hyperplasiques','Carcinoïde gastrique de type II : la sécrétine libère la gastrine stockée dans les granules de sécrétion'],correct:[1],
   explanation:'Diagnostic : SYNDROME DE ZOLLINGER-ELLISON (gastrinome, tumeur neuroendocrine du pancréas ou duodénum). Le TEST À LA SÉCRÉTINE est pathognomonique : chez le sujet sain, la sécrétine INHIBE la gastrine antrale. Dans le ZES, les cellules tumorales expriment des RÉCEPTEURS À LA SÉCRÉTINE fonctionnels → réponse PARADOXALE : ↑ de la gastrine tumorale après injection de sécrétine (de > 200 pg/mL). Imagerie : octréoscan, IRM, echo-endoscopie pour localiser le gastrinome.'},
  {type:'qcu',q:'La pancréatite chronique alcoolique peut induire un diabète dit "de type 3c". En quoi diffère-t-il du diabète de type 1 et de type 2 dans sa gestion thérapeutique ?',
   opts:['Il est identique au DT2 et se traite par metformine en première intention','Il est lié à la destruction des cellules α ET β → déficit en insuline ET en glucagon → risque d\'hypoglycémies graves sous insuline sans contre-régulation glycémique ; nécessite une insulinothérapie prudente avec surveillance étroite','Il se traite par sulfonylurées car les cellules β résiduelles peuvent encore être stimulées','Il est identique au DT1 avec anticorps anti-îlots et nécessite un régime sans alcool uniquement'],correct:[1],
   explanation:'Diabète de type 3c (pancréatoprival) : la fibrose et calcifications pancréatiques détruisent les îlots de Langerhans → ↓ cellules β (↓ insuline) ET ↓ cellules α (↓ glucagon). Le glucagon est essentiel pour la contre-régulation lors d\'une hypoglycémie (normalement : hypoglycémie → glucagon → libération de glucose hépatique). Sans glucagon → pas de contre-régulation → HYPOGLYCÉMIES GRAVES et prolongées sous insuline. Gestion délicate avec objectifs glycémiques moins stricts.'},
  {type:'qcu',q:'Le sucs gastriques normaux contiennent de la pepsine, de l\'HCl et du facteur intrinsèque. Pourquoi la muqueuse œsophagienne est-elle plus vulnérable que la muqueuse gastrique au RGO ?',
   opts:['L\'œsophage ne produit pas d\'HCl endogène donc ne s\'est jamais adapté à l\'acidité','L\'œsophage ne dispose d\'aucun des mécanismes de cytoprotection gastriques : pas de mucus bicarbonate épais, pas de jonctions serrées robustes, pas de prostaglandines COX1 abondantes → l\'acide cause des lésions directes si le contact est prolongé','L\'œsophage absorbe l\'acide au lieu de le neutraliser car sa vascularisation est pauvre','L\'œsophage a un épithélium glandulaire qui est directement lysé par les H+'],correct:[1],
   explanation:'La muqueuse œsophagienne N\'EST PAS adaptée à l\'acidité contrairement à la muqueuse gastrique qui dispose de 6 mécanismes de cytoprotection (mucus-HCO3-, jonctions serrées, renouvellement, prostaglandines, effet tampon, circulation splanchnique). L\'épithélium malpighien (pavimenteux stratifié) de l\'œsophage peut tolérer de brefs contacts acides mais les expositions prolongées causent inflammation (œsophagite), érosions, ulcérations → endobrachyœsophage (métaplasie de Barrett).'}
);

// ============================================================
// STATE
// ============================================================
let currentCourseIdx=0,currentLevel='easy',currentQ=0,answers=[],submitted=[];
const LEVEL_META={easy:{label:'Facile',emoji:'🟢',cls:'easy'},medium:{label:'Moyen',emoji:'🟠',cls:'medium'},hard:{label:'Difficile',emoji:'🔴',cls:'hard'}};

function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
function el(id){return document.getElementById(id);}

function init(){buildGrid();show('home');}

function buildGrid(){
  el('courses-grid').innerHTML=COURSES.map((c,i)=>{
    const pills=['easy','medium','hard'].map(l=>`<div class="cc-level-pill ${l}"><span class="lp-n">${c.levels[l].questions.length}Q</span>${LEVEL_META[l].label}</div>`).join('');
    return`<div class="course-card" style="--c:${c.color};--ic:${c.iconBg}" onclick="openCourse(${i})"><div class="cc-head"><div class="cc-icon">${c.icon}</div><div><div class="cc-title">${c.title}</div><div class="cc-sub">${c.tags.join(' · ')}</div></div></div><div class="cc-levels">${pills}</div></div>`;
  }).join('');
}

function openCourse(idx){
  currentCourseIdx=idx;const c=COURSES[idx];
  hide('home');show('level-view');
  el('btn-home').classList.add('vis');el('btn-levels').classList.remove('vis');el('score-badge').classList.remove('vis');
  el('lv-name').textContent=c.icon+' '+c.title;el('lv-sub').textContent='Choisissez un niveau pour commencer';
  el('level-cards').innerHTML=['easy','medium','hard'].map(l=>`<div class="level-card ${l}" onclick="selectLevel('${l}')"><div class="lc-badge">${LEVEL_META[l].emoji}</div><div class="lc-info"><div class="lc-title">${LEVEL_META[l].label}</div><div class="lc-desc">${c.levels[l].desc}</div><div class="lc-meta">${c.levels[l].questions.length} questions</div></div></div>`).join('');
  currentLevel=null;el('btn-start').disabled=true;
}

function selectLevel(lvl){
  currentLevel=lvl;
  document.querySelectorAll('.level-card').forEach(c=>{c.classList.remove('active');if(c.classList.contains(lvl))c.classList.add('active');});
  el('btn-start').disabled=false;
}

function startLevel(lvl){
  if(!lvl)return;currentLevel=lvl;currentQ=0;
  const qs=COURSES[currentCourseIdx].levels[lvl].questions;
  answers=qs.map(()=>[]);submitted=new Array(qs.length).fill(false);
  hide('level-view');show('quiz-view');
  el('btn-home').classList.add('vis');el('btn-levels').classList.add('vis');el('score-badge').classList.add('vis');
  const m=LEVEL_META[lvl];
  el('qv-badge').className='qv-level-badge '+m.cls;el('qv-badge').textContent=m.emoji+' '+m.label;
  el('qv-title').textContent=COURSES[currentCourseIdx].title;
  el('qv-fill').className='qv-prog-fill '+m.cls;
  buildDots();renderQuestion(0);updateProgress();updateScore();
}

function buildDots(){
  const qs=COURSES[currentCourseIdx].levels[currentLevel].questions;
  el('q-grid').innerHTML=qs.map((_,i)=>`<div class="q-dot" id="dot-${i}" onclick="jumpTo(${i})">${i+1}</div>`).join('');
}
function jumpTo(i){currentQ=i;renderQuestion(i);}

function renderQuestion(idx){
  const qs=COURSES[currentCourseIdx].levels[currentLevel].questions;
  const q=qs[idx];const isS=submitted[idx];const sel=answers[idx];
  const tmap={qcu:'QCU',qcm:'QCM',vf:'V/F',cc:'Cas'};const tcls={qcu:'qcu',qcm:'qcm',vf:'vf',cc:'cc'};
  const isMulti=q.type==='qcm';
  let optsHtml=q.opts.map((o,i)=>{
    let cls='opt',icon='';
    if(isS){
      cls+=' disabled';const isC=q.correct.includes(i);const wasS=sel.includes(i);
      if(wasS&&isC){cls+=' correct';icon='✓';}else if(wasS&&!isC){cls+=' incorrect';icon='✗';}else if(!wasS&&isC){cls+=' show-correct';icon='✓';}
    }else{if(sel.includes(i))cls+=' selected';}
    return`<div class="${cls}" onclick="toggleOpt(${idx},${i})"><div class="opt-marker${isMulti?' sq':''}">${icon}</div><div class="opt-label">${o}</div></div>`;
  }).join('');
  let fb='';
  if(isS){const ok=answeredCorrectly(idx);fb=`<div class="feedback ${ok?'correct':'incorrect'} vis"><strong>${ok?'✓ Correct':'✗ Incorrect'}</strong>${q.explanation}</div>`;}
  const ctx=q.context?`<div class="q-context">${q.context}</div>`:'';
  let cc='q-card';if(isS)cc+=answeredCorrectly(idx)?' answered':' answered wrong';
  el('questions-container').innerHTML=`<div class="${cc}"><div class="q-top"><div class="q-num">Q${idx+1}</div><div class="q-type ${tcls[q.type]}">${tmap[q.type]}</div><div class="q-text">${q.q}</div></div>${ctx}<div class="q-opts">${optsHtml}</div><div class="q-actions"><button class="btn-submit" onclick="submitAnswer(${idx})" ${isS||sel.length===0?'disabled':''}>Valider</button>${fb}</div></div>`;
  updateDots(idx);
  el('q-counter').textContent=`Question ${idx+1} / ${qs.length}`;
  el('btn-prev').disabled=idx===0;el('btn-next').disabled=idx===qs.length-1;
  el('btn-finish').style.display=submitted.every(Boolean)?'block':'none';
}

function toggleOpt(qIdx,optIdx){
  if(submitted[qIdx])return;const q=COURSES[currentCourseIdx].levels[currentLevel].questions[qIdx];const sel=answers[qIdx];
  if(q.type==='qcm'){const i=sel.indexOf(optIdx);if(i>=0)sel.splice(i,1);else sel.push(optIdx);}else{answers[qIdx]=[optIdx];}
  renderQuestion(qIdx);
}

function submitAnswer(idx){
  if(answers[idx].length===0)return;submitted[idx]=true;renderQuestion(idx);updateProgress();updateScore();updateDots(idx);
  el('btn-finish').style.display=submitted.every(Boolean)?'block':'none';
}

function answeredCorrectly(idx){
  const q=COURSES[currentCourseIdx].levels[currentLevel].questions[idx];const sel=answers[idx];
  return sel.length===q.correct.length&&q.correct.every(c=>sel.includes(c))&&sel.every(s=>q.correct.includes(s));
}

function updateDots(current){
  COURSES[currentCourseIdx].levels[currentLevel].questions.forEach((_,i)=>{
    const d=el('dot-'+i);if(!d)return;d.className='q-dot';
    if(i===current)d.classList.add('current');else if(submitted[i])d.classList.add(answeredCorrectly(i)?'done-ok':'done-bad');
  });
}

function updateProgress(){
  const total=COURSES[currentCourseIdx].levels[currentLevel].questions.length;
  const done=submitted.filter(Boolean).length;
  el('qv-fill').style.width=Math.round(done/total*100)+'%';
  el('qv-done').textContent=done+' répondues';el('qv-total-txt').textContent=total+' questions';
}

function updateScore(){
  const done=submitted.filter(Boolean).length;const correct=submitted.filter((s,i)=>s&&answeredCorrectly(i)).length;
  el('score-badge').textContent=`Score : ${correct}/${done}`;
}

function navigate(delta){
  const n=currentQ+delta;const max=COURSES[currentCourseIdx].levels[currentLevel].questions.length;
  if(n<0||n>=max)return;currentQ=n;renderQuestion(n);
}

function showResults(){
  const total=COURSES[currentCourseIdx].levels[currentLevel].questions.length;
  const correct=submitted.filter((s,i)=>s&&answeredCorrectly(i)).length;
  const wrong=submitted.filter((s,i)=>s&&!answeredCorrectly(i)).length;
  const skip=total-submitted.filter(Boolean).length;
  const pct=Math.round(correct/total*100);
  hide('quiz-view');show('results-view');
  const color=pct>=70?'var(--green)':pct>=50?'var(--orange)':'var(--red)';
  const bg=pct>=70?'var(--green-l)':pct>=50?'var(--orange-l)':'var(--red-l)';
  const rc=el('res-circle');rc.style.background=bg;rc.style.border=`4px solid ${color}`;
  el('res-pct').style.color=color;el('res-pct').textContent=pct+'%';
  const m=LEVEL_META[currentLevel];
  const msg=pct>=80?'Excellent ! 🏆':pct>=60?'Bon score !':pct>=40?'Peut mieux faire':'À retravailler';
  el('res-title').textContent=msg;el('res-sub').textContent=`${COURSES[currentCourseIdx].title} — ${m.label} — ${correct}/${total}`;
  el('rs-correct').textContent=correct;el('rs-wrong').textContent=wrong;el('rs-skip').textContent=skip;
}

function restartQuiz(){startLevel(currentLevel);}
function goLevels(){hide('quiz-view');hide('results-view');show('level-view');el('btn-levels').classList.remove('vis');el('btn-home').classList.add('vis');el('score-badge').classList.remove('vis');}
function goHome(){hide('quiz-view');hide('level-view');hide('results-view');show('home');el('btn-home').classList.remove('vis');el('btn-levels').classList.remove('vis');el('score-badge').classList.remove('vis');}

init();
</script>

</html>
