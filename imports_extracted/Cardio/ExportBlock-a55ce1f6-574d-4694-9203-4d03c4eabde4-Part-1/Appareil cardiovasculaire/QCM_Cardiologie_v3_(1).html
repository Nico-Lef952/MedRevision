    {type:'vf',q:'La toux est un effet indésirable plus fréquent avec les IEC qu\'avec les ARAII.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La toux des IEC est liée à l\'accumulation de bradykinine (non dégradée car ECA bloquée). Les ARAII ne touchent pas la bradykinine → beaucoup moins de toux.'},
    {type:'qcm',q:'Quelles sont les indications des IEC/ARAII ? (Plusieurs réponses)',opts:['HTA','Insuffisance cardiaque','Post-IDM (même sans HTA)','Néphropathie diabétique','Fibrillation auriculaire'],correct:[0,1,2,3],explanation:'IEC/ARAII indiqués dans : HTA, IC, post-IDM (prévention du remodelage), néphropathie diabétique. Pas d\'indication formelle pour la FA.'},
    {type:'qcm',q:'Quelles sont les contre-indications des IEC/ARAII ? (Plusieurs réponses)',opts:['K+ > 5,5 mmol/L','Angiœdème','Grossesse','Sténose bilatérale des artères rénales','AINS (association délétère)'],correct:[0,1,2,3,4],explanation:'CI des IEC/ARAII : hyperkaliémie (K+ > 5,5), angiœdème, grossesse (tératogène), sténose rénale bilatérale (risque IRA), AINS (↓ effet vasodilatateur).'},
    {type:'qcu',q:'Quelle surveillance biologique est indispensable sous IEC/ARAII ?',opts:['Glycémie + hémoglobine','Créatininémie + kaliémie (avant initiation, quelques jours après, puis long cours)','Bilan hépatique + NFS','Troponine + BNP'],correct:[1],explanation:'Surveillance IEC/ARAII : créatininémie (↑ légère normale, ↑ importante = arrêt) + kaliémie (risque d\'hyperkaliémie par blocage de l\'aldostérone).'},
    {type:'qcu',q:'Pourquoi l\'association IEC/ARAII + diurétiques épargneurs de potassium est-elle délétère ?',opts:['Risque d\'hypotension grave','Risque d\'hypokaliémie sévère','Risque d\'HYPERKALIÉMIE sévère','Risque de tachycardie'],correct:[2],explanation:'IEC/ARAII → ↓ aldostérone → ↑ K+. Épargneurs K+ → aussi ↑ K+. L\'association → hyperkaliémie potentiellement létale. Exception : IC avec bénéfice démontré.'},
    {type:'qcu',q:'Quel est le principal bénéfice de l\'association IEC/ARAII + thiazidiques dans l\'HTA ?',opts:['Les thiazidiques bloquent la bradykinine','Les thiazidiques stimulent le SRA ; bloquer le SRA avec IEC/ARAII améliore leur efficacité antihypertensive','L\'association réduit le risque d\'hyperkaliémie','Les thiazidiques augmentent le DFG'],correct:[1],explanation:'Les thiazidiques stimulent le SRA (contraction volémique → ↑ rénine), ce qui limite leur efficacité antihypertensive. Bloquer le SRA avec IEC/ARAII potentialise leur effet.'},
    {type:'vf',q:'Le principe général des diurétiques est que plus on agit tôt dans le néphron, plus l\'effet diurétique est puissant.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Plus le diurétique agit en amont dans le néphron, plus il y a de sodium résiduel à ne pas réabsorber → effet natriurétique plus important. Furosémide (anse) >> Thiazidiques (TCD) >> Spironolactone (tube collecteur).'},
    {type:'qcu',q:'Quel est le diurétique de l\'anse le plus utilisé en clinique ?',opts:['Spironolactone (ALDACTONE)','Hydrochlorothiazide (ESIDREX)','Furosémide (LASILIX)','Amiloride (MODAMIDE)'],correct:[2],explanation:'Furosémide (LASILIX) est le diurétique de l\'anse de référence, le plus utilisé. Effet puissant, rapide (IV) ou prolongé (LP).'},
    {type:'qcm',q:'Les diurétiques de l\'anse bloquent quel transporteur ? Et quels ions éliminent-ils en excès ?',opts:['Na+/2Cl-/K+ (NKCC2)','Na+, K+, Cl-','Ca2+, Mg2+','H+ (indirect)'],correct:[0,1,2,3],explanation:'Diurétiques de l\'anse bloquent Na+/2Cl-/K+ → ↑ élimination Na+, K+, Cl-, H+ (indirect), Ca2+ et Mg2+ (recapture bloquée).'},
    {type:'qcu',q:'Quelle est l\'indication d\'urgence du furosémide IV ?',opts:['HTA chronique mal contrôlée','IRA et OAP (action très rapide et intense)','IC décompensée chronique','Hypokaliémie'],correct:[1],explanation:'Furosémide IV = urgence : IRA (élimination rapide de l\'excès de volume) et OAP (décharge rapide du ventricule gauche). En LP = HTA (3e-4e ligne) et IC (symptomatique).'},
    {type:'vf',q:'Le furosémide améliore le pronostic de l\'insuffisance cardiaque.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Le furosémide est un traitement SYMPTOMATIQUE de l\'IC (réduit les œdèmes, améliore la dyspnée) mais N\'AMÉLIORE PAS le pronostic (pas de réduction de mortalité).'},
    {type:'qcu',q:'L\'hyperuricémie est un effet indésirable SPÉCIFIQUE de quelle classe de diurétiques ?',opts:['Anti-aldostérones','Thiazidiques','DIURÉTIQUES DE L\'ANSE','Épargneurs de K+'],correct:[2],explanation:'L\'hyperuricémie (avec risque de crise de goutte) est spécifique aux diurétiques de l\'ANSE. Elle est aussi retrouvée avec les thiazidiques mais plus caractéristique de l\'anse.'},
    {type:'qcu',q:'L\'ototoxicité est un effet indésirable de :',opts:['Spironolactone','Thiazidiques','Diurétiques de l\'ANSE (furosémide)','IEC'],correct:[2],explanation:'L\'ototoxicité (atteinte cochlée → surdité) est un effet indésirable spécifique des diurétiques de l\'anse, notamment à fortes doses ou IV rapide.'},
    {type:'qcu',q:'Les diurétiques thiazidiques ont la particularité de :',opts:['↑ l\'excrétion de Ca2+','↓ l\'excrétion de Ca2+ → utiles dans l\'HYPERCALCIURIE','N\'avoir aucun effet sur le Ca2+','Augmenter le DFG'],correct:[1],explanation:'Thiazidiques = ↓ excrétion urinaire de Ca2+ → risque d\'hypercalcémie mais utile dans l\'hypercalciurie et les lithiases calciques rénales.'},
    {type:'qcm',q:'Quels effets indésirables sont communs aux diurétiques thiazidiques ? (Plusieurs réponses)',opts:['Hypokaliémie','Hyperglycémie','Hypercholestérolémie','Hyperuricémie','Hypocalcémie'],correct:[0,1,2,3],explanation:'Thiazidiques : hypokaliémie, hyperglycémie, hypercholestérolémie, hyperuricémie. ATTENTION : hypercalcémie (pas hypocalcémie) ! Les diurétiques de l\'anse donnent l\'hypocalcémie.'},
    {type:'vf',q:'En insuffisance rénale sévère (DFG < 30 mL/min), les thiazidiques restent efficaces.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. En IRC sévère (DFG < 30 mL/min), les thiazidiques perdent complètement leur efficacité. Seuls les DIURÉTIQUES DE L\'ANSE gardent leur efficacité (avec augmentation des doses).'},
    {type:'qcu',q:'Les épargneurs de potassium agissent sur quel segment du néphron ?',opts:['Anse de Henlé','Tube contourné proximal (TCP)','Tube contourné DISTAL (TCD)','Capsule de Bowman'],correct:[2],explanation:'Épargneurs de K+ agissent au niveau du TCD, bloquant la pompe Na+/K+ → ↑ Na+ éliminé + ↓ K+ éliminé (épargne potassique).'},
    {type:'qcu',q:'Quelle est la différence principale entre spironolactone et éplérénone ?',opts:['L\'éplérénone est moins puissante','La spironolactone agit sur minéralocorticoïdes et glucocorticoïdes → plus d\'EI endocriniens ; l\'éplérénone est spécifique des minéralocorticoïdes → moins d\'EI','L\'éplérénone ne s\'utilise que dans l\'HTA','La spironolactone est un diurétique de l\'anse'],correct:[1],explanation:'Spironolactone = bloque minéralocorticoïdes + glucocorticoïdes → gynécomastie, impuissance, hirsutisme... Éplérénone = plus spécifique des minéralocorticoïdes → moins de perturbations endocriniennes.'},
    {type:'qcu',q:'Quel paramètre doit être surveillé à l\'initiation de tout traitement diurétique, et en particulier chez le sujet âgé ?',opts:['Troponine','Bilan thyroïdien','Bilan hydro-électrolytique (natrémie, kaliémie, créatinine) + surveillance de la déshydratation','Bilan hépatique'],correct:[2],explanation:'Surveillance diurétiques : bilan hydro-électrolytique (Na+, K+, créatinine) en début de traitement. Sujet âgé : plus vulnérable aux déséquilibres → risque de déshydratation +++.'},
    {type:'qcu',q:'Les inhibiteurs calciques (IC) bloquent quel type de canaux ?',opts:['Canaux Na+ voltage-dépendants','Canaux K+ voltage-dépendants','Canaux Ca2+ voltage-dépendants de type L','Récepteurs cholinergiques'],correct:[2],explanation:'Les IC bloquent les canaux calciques voltage-dépendants de type L, présents dans le cœur et les fibres musculaires lisses vasculaires.'},
    {type:'qcu',q:'Quelle est la particularité des DHP (dihydropyridines) par rapport aux autres IC ?',opts:['Effets cardiaques prédominants (dromotrope et chronotrope négatifs)','Effets VASCULAIRES prédominants (se fixent sur canal inactif des CML vasculaires)','Effets pulmonaires prédominants','Effets diurétiques'],correct:[1],explanation:'DHP = se fixent sur canal INACTIF (présent sur CML vasculaires) → vasodilatation prédominante. VER/DIL = se fixent sur canal OUVERT (présent sur cellules cardiaques) → effets cardiaques.'},
    {type:'qcm',q:'Quels sont les effets cardiaques du vérapamil et du diltiazem ? (Plusieurs réponses)',opts:['Effet inotrope négatif (↓ contractilité)','Effet dromotrope négatif (↓ conduction AV)','Effet chronotrope négatif (↓ automaticité sinusale)','Effet inotrope positif'],correct:[0,1,2],explanation:'VER/DIL = effets dépresseurs cardiaques majeurs : inotrope négatif (contractilité), dromotrope négatif (conduction AV), chronotrope négatif (automaticité sinusale).'},
    {type:'vf',q:'L\'œdème des chevilles est l\'effet indésirable le plus fréquent des DHP.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. L\'œdème des chevilles (vasodilatation artériolaire avec déséquilibre de Starling) touche 5-10 % des patients sous DHP en usage chronique — c\'est le principal EI.'},
    {type:'qcu',q:'Pourquoi l\'association VER/DIL + bêtabloquants est-elle contre-indiquée ?',opts:['Risque d\'hyperkaliémie','Ce sont deux classes dépresseurs cardiaques → risque de BAV, bradycardie severe, décompensation cardiaque','Risque d\'hyperglycémie','Antagonisme pharmacologique sans conséquence clinique'],correct:[1],explanation:'VER/DIL + bêtabloquants = double dépression cardiaque → risque de BAV de haut degré, bradycardie sévère, choc cardiogénique. Contre-indication formelle.'},
    {type:'qcu',q:'Quel récepteur adrénergique, une fois stimulé, provoque une bronchoconstriction ?',opts:['Alpha-1','Alpha-2','Beta-1','Beta-2'],correct:[3],explanation:'ATTENTION : le bêta-2 DILATE les bronches (vasodilatateur + bronchodilatateur). Mais son BLOCAGE (par les bêtabloquants) → BRONCHOCONSTRICTION. C\'est pourquoi les bêtabloquants sont CI chez l\'asthmatique.'},
    {type:'qcu',q:'Le récepteur beta-1 est principalement situé dans :',opts:['Les bronches','Le coeur (inotrope et chronotrope positif)','Les vaisseaux périphériques','Les adipocytes'],correct:[1],explanation:'Beta-1 = cœur → inotrope + (contractilité) + chronotrope + (FC) → ↑ débit cardiaque. Les bêtabloquants cardiosélectifs ciblent spécifiquement ce récepteur.'},
    {type:'vf',q:'Les bêtabloquants cardiosélectifs sont totalement sûrs chez l\'asthmatique.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. La sélectivité n\'est PAS absolue → il existe toujours un risque de bloquer le récepteur bêta-2 bronchique. Les bêtabloquants (même cardiosélectifs) sont CONTRE-INDIQUÉS chez l\'asthmatique.'},
    {type:'qcu',q:'L\'Activité Sympathico-Mimétique Intrinsèque (ASI) des bêtabloquants signifie que :',opts:['Ce sont de puissants agonistes des récepteurs bêta','Ce sont des agonistes PARTIELS — bloquent la noradrénaline mais stimulent partiellement le récepteur → bradycardie et vasoconstriction moindres','Ce sont des antagonistes purs sans effet agoniste','Ils stimulent la sécrétion de noradrénaline'],correct:[1],explanation:'ASI = agoniste partiel. Avantage : moins de bradycardie, moins de vasoconstriction périphérique, moins de bronchoconstriction. Inconvénient : bêtablocage moins puissant.'},
    {type:'qcm',q:'Les 4 bêtabloquants vasodilatateurs à retenir sont : (Plusieurs réponses)',opts:['Labétalol (TRANDATE)','Carvédilol (KREDEX)','Céliprolol','Nébivolol (TEMERIT)'],correct:[0,1,2,3],explanation:'4 bêtabloquants vasodilatateurs : Labétalol + Carvédilol (bloquent bêta1 + alpha1), Céliprolol (bloque bêta1 + active bêta2), Nébivolol (active bêta3 → ↑ NO).'},
    {type:'qcu',q:'Les gliflozines (iSGLT2) constituent la 1ère classe pharmacologique à avoir démontré :',opts:['Une réduction de la PA systolique','Un effet protecteur cardiaque et rénal chez les patients avec IC','Une réduction directe du LDL-cholestérol','Un effet antiarythmique'],correct:[1],explanation:'Les gliflozines sont la 1ère classe pharmacologique à démontrer un effet protecteur cardio-rénal chez les patients avec IC. Révolution thérapeutique.'},
    {type:'qcu',q:'Quelle est la spécificité de la dapagliflozine dans les indications des gliflozines ?',opts:['Elle est indiquée UNIQUEMENT dans le diabète de type 2','Elle est indiquée dans l\'IRC (en plus du DT2 et de l\'IC)','Elle est réservée aux patients non diabétiques','Elle bloque un récepteur différent des autres gliflozines'],correct:[1],explanation:'DAPA = seule gliflozine indiquée dans l\'IRC (insuffisance rénale chronique). EMPA + DAPA = DT2 et IC (FEVG < ou > 40 %). AMM IRC : DFG 25-75 mL/min + RAC 200-5000 mg/g.'},
    {type:'qcu',q:'Le mécanisme de cardioprotection des gliflozines est :',opts:['Bien établi (blocage du SRA)','Pas encore totalement élucidé','Lié à leur effet hypoglycémiant','Lié à leur effet diurétique uniquement'],correct:[1],explanation:'Le mécanisme précis de cardioprotection des gliflozines n\'est pas encore totalement connu (métabolisme, ↑ EPO rénale...). C\'est l\'un des sujets de recherche active.'},
    {type:'vf',q:'Les alpha-bloquants sont le traitement de 1ère intention de l\'HTA.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Les alpha-bloquants sont en 2ème intention pour les HTA résistantes, en raison de leurs effets indésirables importants (hypotension orthostatique ++).'},
    {type:'qcu',q:'Quelle complication redoutée (en suspicion) est associée aux gliflozines ?',opts:['Fibrillation auriculaire','Gangrène de Fournier (périnéale)','Carcinome rénal','Insuffisance hépatique'],correct:[1],explanation:'Gangrène de Fournier (fasciite nécrosante périnéale) est en suspicion avec les gliflozines. Ce risque potentiel a longtemps retardé leur mise sur le marché.'},
    {type:'qcu',q:'La DHP (dihydropyridine) est le traitement de BASE de l\'HTA. Avec quelle(s) classe(s) est-elle préférentiellement associée ?',opts:['Bêtabloquants + diurétiques de l\'anse','ARAII + IEC (qui bloquent l\'effet des IC au niveau rénal et réduisent les œdèmes des MI)','Alpha-bloquants uniquement','Pas d\'association recommandée'],correct:[1],explanation:'DHP ++ en association avec ARAII et IEC. Cette combinaison : synergie antihypertensive + les IEC/ARAII bloquent l\'effet des IC sur le SRA rénal → réduction des œdèmes des membres inférieurs.'},
    {type:'cc',context:'Un patient de 65 ans hypertendu depuis 10 ans est traité par furosémide 40 mg/j. Lors d\'un bilan, kaliémie = 3,0 mmol/L, natrémie = 132 mmol/L, créatinine légèrement élevée. Le patient se plaint de crampes.',q:'Quel ajustement thérapeutique est approprié ?',opts:['Doubler la dose de furosémide','Arrêter tous les médicaments','Ajouter un épargneur de K+ (effets opposés sur la kaliémie) ± supplémentation K+','Passer aux alpha-bloquants'],correct:[2],explanation:'Hypokaliémie (3,0) + hyponatrémie + crampes = signe de déshydratation et déplétion potassique sous furosémide. Ajouter un épargneur de K+ (amiloride ou spironolactone) pour compenser.'},
    {type:'qcu',q:'Dans quelle condition l\'association spironolactone + IEC/ARAII est-elle acceptable malgré le risque d\'hyperkaliémie ?',opts:['Jamais','Hypertension résistante avec kaliémie normale','IC car les patients sont souvent hypokaliémiques et le bénéfice est démontré','Diabète de type 2'],correct:[2],explanation:'Dans l\'IC, les patients ont souvent une hypokaliémie (diurétiques + hyperaldostéronisme secondaire). Le bénéfice de la spironolactone sur la mortalité est clairement démontré → balance bénéfice/risque favorable.'},
    {type:'cc',context:'Un patient asthmatique de 55 ans, hypertendu, angineux. Son cardiologue souhaite prescrire un bêtabloquant.',q:'Quelle est l\'attitude correcte ?',opts:['Prescrire un bêtabloquant cardiosélectif sans problème','Contre-indication aux bêtabloquants même cardiosélectifs car sélectivité non absolue — chercher une alternative','Prescrire un bêtabloquant non sélectif','Pas de problème, les bêtabloquants ne touchent pas les bronches'],correct:[1],explanation:'Les bêtabloquants sont CONTRE-INDIQUÉS chez l\'asthmatique, même les cardiosélectifs, car la sélectivité pour beta1 n\'est pas absolue → risque résiduel de bronchoconstriction.'},
  ]
});

  questions:[
    {type:'qcu',q:'Quel est le diagnostic positif de l\'AOMI ?',opts:['Abolition du pouls poplité','IPS (Index de Pression Systolique) < 0,9','Douleur du mollet à l\'effort','Souffle fémoral auscultatoire'],correct:[1],explanation:'Le diagnostic positif de l\'AOMI repose sur l\'IPS = TAS cheville / TAS bras < 0,9. C\'est le signe le plus important.'},
    {type:'qcu',q:'Comment calcule-t-on l\'IPS ?',opts:['FC cheville / FC bras','TAS cheville / TAS bras','PAD cheville / PAD bras','Pression veineuse / pression artérielle'],correct:[1],explanation:'IPS = Tension Artérielle Systolique cheville / TAS bras. Normale > 0,9. Pathologique < 0,9 (AOMI). Peut être faussé chez le diabétique (médiacalcose).'},
    {type:'vf',q:'L\'IPS peut être faussé chez le patient diabétique.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La médiacalcose (calcification de la média des artérioles) chez les diabétiques rend les artères incompressibles → IPS faussement élevé → résultat non interprétable.'},
    {type:'qcu',q:'La claudication intermittente se caractérise par :',opts:['Douleur au repos, cédant à la marche','Crampe survenant à l\'effort, cédant à l\'ARRÊT en quelques minutes, revenant à la même distance (périmètre de marche)','Douleur nocturne insomniante','Douleur constante tout au long de la journée'],correct:[1],explanation:'Claudication intermittente : crampe musculaire à l\'effort, cédant à l\'arrêt (sans avoir besoin de s\'asseoir), réapparaissant pour la même distance = périmètre de marche.'},
    {type:'qcu',q:'Où se situe la lésion artérielle si la claudication est au mollet ?',opts:['En AVAL du mollet (artères tibiales)','En AMONT = artère fémorale superficielle','Au niveau iliaque interne','Au niveau de la crosse aortique'],correct:[1],explanation:'La lésion est TOUJOURS EN AMONT de la douleur. Douleur du mollet → lésion de l\'artère fémorale superficielle. Douleur de la fesse → lésion de l\'artère iliaque interne.'},
    {type:'qcm',q:'Les stades de l\'AOMI selon la classification HAS sont : (Plusieurs réponses)',opts:['Stade I : asymptomatique (diminution des pouls)','Stade II : claudication intermittente','Stade III : ischémie critique (douleur au repos)','Stade IV : troubles trophiques (ulcère, nécrose)'],correct:[0,1,2,3],explanation:'Classification AOMI : I = asymptomatique, II = claudication, III = ischémie critique (douleur au repos), IV = troubles trophiques (ulcère ou nécrose).'},
    {type:'qcu',q:'L\'ischémie critique se caractérise par des douleurs :',opts:['À l\'effort uniquement','AU REPOS, intenses, insomniantes, soulagées par l\'orthostatisme (jambe pendante)','Diurnes uniquement','Cédant aux antalgiques simples'],correct:[1],explanation:'Ischémie critique = douleurs AU REPOS, intensives, insomniantes (réveillent la nuit), rebelles aux antalgiques, soulagées en position déclive (gravité favorise la circulation).'},
    {type:'vf',q:'L\'ischémie critique a un pronostic favorable avec 75 % de guérison à 5 ans.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Le pronostic de l\'ischémie critique est CATASTROPHIQUE : 1/4 de décès à 5 ans, seulement 1/4 de guérison, le reste reste en ischémie critique.'},
    {type:'qcu',q:'L\'ischémie aiguë des membres inférieurs est :',opts:['Une urgence relative','Une URGENCE ABSOLUE (compromet la viabilité du membre à court terme)','Une pathologie chronique évolutive','Une complication bénigne de l\'AOMI'],correct:[1],explanation:'Ischémie aiguë = URGENCE ABSOLUE. Interruption BRUTALE du flux sanguin, pas de collatérales → risque d\'amputation immédiate si non traitée en urgence.'},
    {type:'qcu',q:'Le signe de GRAVITÉ de l\'ischémie aiguë des MI est :',opts:['L\'abolition du pouls pédieux','La pâleur du membre','Le DÉFICIT NEUROLOGIQUE SENSITIVOMOTEUR du pied','La froideur de l\'extrémité'],correct:[2],explanation:'Le déficit neurologique sensitivomoteur (paresthésies, paralysie) est le signe de GRAVITÉ de l\'ischémie aiguë — les nerfs sont très sensibles à l\'ischémie.'},
    {type:'qcm',q:'Quels sont les signes tardifs de l\'ischémie aiguë dépassée ? (Plusieurs réponses)',opts:['Cyanose cutanée','Nécrose','Phlyctènes (cloques)','Claudication intermittente'],correct:[0,1,2],explanation:'Signes tardifs (ischémie dépassée) : cyanose, nécrose, phlyctènes → « quand c\'est bleu c\'est mort ». À ce stade, rien à faire → amputation directe.'},
    {type:'qcu',q:'Quelle est la principale différence entre l\'AOMI et l\'ischémie aiguë sur le plan des collatérales ?',opts:['Dans l\'AOMI, il n\'y a jamais de collatérales','Dans l\'ischémie aiguë, il n\'y a PAS de collatérales → risque d\'amputation immédiate ; dans l\'AOMI, des collatérales peuvent se développer et compenser','C\'est la même chose','Dans l\'ischémie aiguë, les collatérales sont plus développées'],correct:[1],explanation:'AOMI chronique : réseau de collatérales se développe progressivement → peut compenser la sténose. Ischémie aiguë : installation brutale → pas le temps de développer des collatérales → danger immédiat.'},
    {type:'qcu',q:'Quelle est la conduite à tenir initiale devant une ischémie aiguë des MI ?',opts:['Attendre 24h avant d\'agir','Alerter le centre de chirurgie vasculaire + hydrater + O2 + anticoagulant + antalgiques + transfert','Prescrire des vasodilatateurs oraux','Placer un garrot'],correct:[1],explanation:'Ischémie aiguë : 1) Alerter chirurgie vasculaire 2) Hydrater 3) O2 (même si SaO2 normale) 4) Anticoagulant (héparine) 5) Antalgiques 6) Transfert urgent.'},
    {type:'vf',q:'L\'intensité d\'un souffle vasculaire est corrélée à la sévérité de la sténose.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Il N\'existe PAS de corrélation entre l\'intensité du souffle vasculaire auscultatoire et la sévérité de la sténose.'},
    {type:'qcu',q:'Comment se palpe le pouls poplité ?',opts:['Pression douce, patient debout, genou tendu','Pression FORTE, doigts EN CROCHET dans le creux poplité, genou SEMI-FLÉCHI','Pression légère sur le devant du genou','Avec le pouce uniquement'],correct:[1],explanation:'Pouls poplité = pression FORTE avec doigts en crochet dans le creux poplité, genou semi-fléchi (poids de la jambe sur les doigts). Un pouls poplité trop facile = anévrisme ?'},
    {type:'qcu',q:'Un pouls poplité trop facile à palper doit faire suspecter :',opts:['Une AOMI sévère','Un ANÉVRISME poplité (dilatation focale de l\'artère)','Une TVP','Une ischémie aiguë'],correct:[1],explanation:'Un pouls poplité ample et très facile à palper est INQUIÉTANT — il peut révéler un anévrisme de l\'artère poplitée (dilatation). À confirmer par écho-Doppler.'},
    {type:'qcu',q:'Un pouls est évalué comme :',opts:['Fort, moyen ou faible','PRÉSENT ou ABSENT uniquement','Présent, diminué ou absent','À l\'échelle de 0 à 3'],correct:[1],explanation:'Un pouls est soit PRÉSENT soit ABSENT. Ne jamais noter "moyen" ou "je ne suis pas sûr". Palper avec 3 doigts (pointe) pour éviter de sentir son propre pouls.'},
    {type:'qcu',q:'L\'ulcère artériel se distingue de l\'ulcère veineux par :',opts:['Il est étendu, superficiel, non douloureux','Il est petit, douloureux, profond, creusant, nécrotique, bords réguliers','Il est bilatéral','Il touche la face interne de la jambe'],correct:[1],explanation:'Ulcère artériel : petit + très douloureux + profond/creusant + nécrotique + bords RÉGULIERS (tendons parfois visibles). À l\'opposé de l\'ulcère veineux.'},
    {type:'qcm',q:'L\'examen du patient artéritique comprend à l\'inspection : (Plusieurs réponses)',opts:['Pâleur du membre','Peau fragile, sèche, atrophiée','Dépilation (perte pilosité du territoire)','Ongles cassants','Turgescence jugulaire'],correct:[0,1,2,3],explanation:'Inspection du patient artéritique : pâleur, peau fragile/sèche/atrophiée, dépilation, ongles cassants, plaies des MI. La turgescence jugulaire concerne l\'IC droite.'},
    {type:'qcu',q:'Le temps de recoloration cutanée est pathologique si supérieur à :',opts:['1 seconde','3 secondes (sur la pulpe du gros orteil)','5 secondes','10 secondes'],correct:[1],explanation:'TRC > 3 secondes sur la pulpe du gros orteil = pathologique → signe d\'ischémie périphérique.'},
    {type:'vf',q:'Le système veineux profond des MI draine 90 % du sang du membre.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Le système veineux profond draine 90 % du sang, le système superficiel (grande et petite saphène) draine les 10 % restants.'},
    {type:'qcu',q:'La grande saphène se jette dans :',opts:['La veine poplitée','La veine fémorale (au niveau de la cuisse)','La veine cave inférieure directement','La veine iliaque externe'],correct:[1],explanation:'La grande saphène chemine à la face interne de la jambe et de la cuisse et se jette dans la veine fémorale (à la crosse). La petite saphène se jette dans la veine poplitée.'},
    {type:'qcu',q:'Pour examiner les varices, le patient doit être :',opts:['Allongé sur le dos','DEBOUT — sinon les varices ne sont pas visibles','En décubitus latéral gauche','Assis les jambes pendantes'],correct:[1],explanation:'Les varices ne sont visibles QUE si le patient est DEBOUT. En position allongée, les veines se vident et les varices disparaissent.'},
    {type:'qcm',q:'Les 4 complications de l\'insuffisance veineuse chronique sont : (Plusieurs réponses)',opts:['Dermite ocre','Atrophie blanche de Milian','Dermo-hypodermite de stase','Ulcère veineux/variqueux'],correct:[0,1,2,3],explanation:'4 complications de l\'IVC : dermite ocre (taches brunâtres), atrophie blanche de Milian (dépigmentation), dermo-hypodermite de stase (inflammation), ulcère veineux.'},
    {type:'qcu',q:'La dermite ocre se présente comme :',opts:['Des lésions blanches unilatérales','Des taches brunâtres BILATÉRALES (GR sortant des veines + pigment Hb)','Un ulcère douloureux','Des phlyctènes'],correct:[1],explanation:'Dermite ocre = taches brunâtres bilatérales causées par les hématies qui sortent des veines et libèrent le pigment de l\'hémoglobine dans le derme.'},
    {type:'vf',q:'La dermo-hypodermite de stase peut être unilatérale comme un érysipèle infectieux.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. La dermo-hypodermite de stase est BILATÉRALE (elle touche les deux jambes, liée à l\'hyperpression veineuse bilatérale). L\'érysipèle est toujours UNILATÉRAL et infectieux.'},
    {type:'qcu',q:'L\'ulcère veineux se distingue de l\'ulcère artériel par :',opts:['Bords réguliers, profond, nécrotique, douloureux','Étendu, superficiel, bords IRRÉGULIERS, peau bourgeonnante, NON DOULOUREUX','Situé sur le dos du pied','Présence d\'une nécrose sèche'],correct:[1],explanation:'Ulcère veineux : étendu + superficiel + bords irréguliers + peau rose bourgeonnante + NON DOULOUREUX (≠ artériel = petit, profond, douloureux, régulier, nécrotique).'},
    {type:'qcu',q:'Quelle est la principale complication aiguë d\'une TVP (phlébite) ?',opts:['Insuffisance veineuse chronique','Varicose','EMBOLIE PULMONAIRE','Artérite des membres inférieurs'],correct:[2],explanation:'TVP → embolie pulmonaire (complication aiguë redoutée, peut être fatale). La complication chronique est l\'insuffisance veineuse post-thrombotique.'},
    {type:'qcu',q:'Le signe de Homans est :',opts:['Douleur du mollet lors de la compression manuelle','DOULEUR DU MOLLET provoquée par la DORSIFLEXION DU PIED (spécifique de TVP)','Abolition du pouls tibial postérieur','Œdème unilatéral de la cheville'],correct:[1],explanation:'Signe de Homans = douleur du mollet provoquée par la dorsiflexion passive du pied. Signe physique spécifique de la TVP (phlébite).'},
    {type:'vf',q:'Une TVP peut être asymptomatique.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La TVP peut être totalement ASYMPTOMATIQUE — c\'est particulièrement dangereux car l\'embolie pulmonaire peut survenir sans signes cliniques préalables.'},
    {type:'qcm',q:'Les facteurs favorisants la TVP sont : (Plusieurs réponses)',opts:['Long voyage (immobilisation)','Alitement prolongé','Chirurgie récente (orthopédie, gynécologie)','Cancer actif','Thrombophilie (troubles de l\'hémostase)'],correct:[0,1,2,3,4],explanation:'Tous ces facteurs favorisent la TVP. Ce sont les facteurs de la triade de Virchow : stase sanguine (immobilisation), hypercoagulabilité (cancer, thrombophilie), lésion endothéliale (chirurgie).'},
    {type:'qcu',q:'La perte du ballant du mollet est un signe clinique :',opts:['Non spécifique, présent dans toutes les pathologies vasculaires','ASSEZ SPÉCIFIQUE de la TVP (le mollet reste fixe même lors d\'une percussion)','Signe d\'ischémie artérielle aiguë','Signe d\'insuffisance lymphatique'],correct:[1],explanation:'La perte du ballant du mollet (mollet qui reste fixe = ne se balance pas) est assez spécifique de la TVP. C\'est un signe physique distinctif.'},
    {type:'qcu',q:'L\'insuffisance lymphatique est :',opts:['La plus fréquente des pathologies vasculaires des MI','RARISSIME — plus complexe que la pathologie veineuse','Toujours bilatérale','Facilement traitée par chirurgie'],correct:[1],explanation:'L\'insuffisance lymphatique est RARISSIME. Pas vraiment de traitement à part la compression. Plus complexe et rare que les pathologies veineuses ou artérielles.'},
    {type:'qcu',q:'Le signe de Stemmer (insuffisance lymphatique) consiste en :',opts:['Douleur du mollet à la pression','Impossibilité de plisser la peau des ORTEILS (peau trop épaisse)','Abolition du pouls pédieux','Turgescence jugulaire'],correct:[1],explanation:'Signe de Stemmer = impossibilité de plisser (pincer) la peau des orteils → signe d\'infiltration cutanée lymphœdémateuse. Peu discriminant mais évocateur.'},
    {type:'vf',q:'L\'AOMI est une maladie systémique — un patient avec AOMI a souvent aussi une coronaropathie.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. L\'AOMI témoigne d\'une athérosclérose DIFFUSE → un patient avec AOMI doit être évalué pour une coronaropathie et une atteinte carotidienne associées.'},
    {type:'cc',context:'M. R., 68 ans, fumeur, diabétique, consulte pour des crampes du mollet gauche à la marche depuis 3 mois, cédant après 2-3 minutes de repos, réapparaissant à 200 mètres. Pouls poplité gauche absent, pouls fémoral présent.',q:'Quel est le diagnostic le plus probable et sa localisation ?',opts:['TVP du MI gauche','AOMI stade II (claudication) — lésion probable de l\'artère fémorale superficielle gauche','Ischémie aiguë du MI gauche','Insuffisance veineuse chronique'],correct:[1],explanation:'AOMI stade II : FDR (tabac, diabète) + claudication typique (crampe mollet à l\'effort, cède au repos, périmètre de marche constant 200m) + abolition pouls poplité mais fémoral présent → lésion fémorale superficielle.'},
    {type:'cc',context:'Mme C., 45 ans, de retour d\'un long voyage en avion, présente depuis 2 jours une douleur brutale du mollet gauche avec gonflement unilatéral, rougeur et chaleur. Le signe de Homans est positif.',q:'Quel diagnostic évoquer ?',opts:['Hématome musculaire traumatique','THROMBOSE VEINEUSE PROFONDE — embolie pulmonaire à prévenir','AOMI aiguë','Érysipèle infectieux'],correct:[1],explanation:'TVP : facteur déclenchant (long voyage = immobilisation), installation brutale, unilatéralité, douleur du mollet, œdème inflammatoire, signe de Homans positif → anticoagulation urgente + bilan d\'EP.'},
    {type:'qcu',q:'Le principal mécanisme du retour veineux dans les MI est :',opts:['La pression artérielle systolique','La POMPE MUSCULAIRE du mollet (contraction + valvules)','Le système nerveux sympathique veineux','La pression oncotique'],correct:[1],explanation:'La pompe musculaire du mollet est le principal mécanisme du retour veineux : la contraction musculaire comprime les veines + les valvules empêchent le reflux.'},
    {type:'qcu',q:'Les facteurs aggravant l\'insuffisance veineuse chronique sont :',opts:['Le froid et l\'exercice physique','LA CHALEUR, la station debout prolongée, la grossesse (compression veine cave)','Le port de contention veineuse','La surélévation des membres inférieurs'],correct:[1],explanation:'IVC aggravée par : chaleur, station debout/assise prolongée, fin de journée, grossesse. Améliorée par : froid, surélévation, exercice physique, contention veineuse.'},
  ]
});

// ==================== COURS 6 : SÉMIOLOGIE CARDIAQUE ====================
COURSES.push({
  id:'semio',
  title:'Sémiologie Cardiaque',
  icon:'🩺',
  color:'#0891b2',
  iconBg:'#ecfeff',
  tags:['Interrogatoire','Auscultation','PA','NYHA'],
  questions:[
    {type:'qcu',q:'Combien y a-t-il de signes vitaux en cardiologie ?',opts:['3','4','5','6'],correct:[2],explanation:'5 signes vitaux : PA (pression artérielle), FC (fréquence cardiaque), SaO2 (saturation en O2), FR (fréquence respiratoire), TC (température corporelle).'},
    {type:'qcu',q:'Quelle est la valeur normale de la PA ?',opts:['100/60 mmHg','120/80 mmHg','140/90 mmHg','150/95 mmHg'],correct:[1],explanation:'PA normale = 120/80 mmHg. HTA si PA > 140/90 mmHg mesurée au cabinet lors de différentes consultations.'},
    {type:'qcu',q:'À quel stade NYHA le patient est-il confiné au lit avec un périmètre de marche < 150m ?',opts:['NYHA I','NYHA II','NYHA III','NYHA IV'],correct:[3],explanation:'NYHA IV : aucune activité possible, PM < 150m, confiné au lit ou dans un fauteuil, dyspnée sévère au moindre effort et au repos.'},
    {type:'vf',q:'À NYHA I, le patient est totalement asymptomatique malgré une cardiopathie connue.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. NYHA I = cardiopathie connue mais ASYMPTOMATIQUE, périmètre de marche illimité, pas de limitation des activités normales.'},
    {type:'qcu',q:'La dyspnée de NYHA II survient pour :',opts:['Toute activité physique','Des EFFORTS INTENSES (escaliers, marche en côte)','Le moindre effort quotidien','Au repos'],correct:[1],explanation:'NYHA II : dyspnée pour les efforts intenses uniquement (escaliers, côtes). La vie quotidienne normale est possible.'},
    {type:'qcu',q:'L\'orthopnée est une dyspnée qui survient :',opts:['À l\'effort uniquement','En DÉCUBITUS DORSAL, améliorée en position ASSISE','En décubitus latéral','Au froid uniquement'],correct:[1],explanation:'Orthopnée = dyspnée en décubitus dorsal (allongé), soulagée par la position assise ou semi-assise. Signe typique de l\'IC (redistribution des liquides).'},
    {type:'qcu',q:'Les bruits de Korotkoff correspondent à :',opts:['Les bruits cardiaques B1 et B2','Les bruits ARTÉRIELS entendus lors de la décompression du brassard (mesure PA)','Les souffles cardiaques','Les frottements péricardiques'],correct:[1],explanation:'Bruits de Korotkoff = sons perçus dans le stéthoscope lors de la décompression du brassard. Phase I = PAS (1er bruit), Phase V = PAD (disparition des bruits).'},
    {type:'qcm',q:'Quelles sont les conditions correctes pour la mesure de la PA ? (Plusieurs réponses)',opts:['Patient allongé depuis 5 min au minimum','Au calme (sinon surestimation par hypertonie sympathique)','3 séries de 3 mesures pour le diagnostic d\'HTA','Brassard gonflé jusqu\'à 50 mmHg'],correct:[0,1,2],explanation:'Conditions de mesure PA : allongé 5 min + au calme + 3 × 3 mesures. Le brassard est gonflé jusqu\'à 150 mmHg (ou 20 mmHg au-dessus de la PAS si bruits entendus).'},
    {type:'qcu',q:'Quelle est la définition de l\'hypotension orthostatique ?',opts:['PA systolique < 90 mmHg en permanence','Chute de PA > 20 mmHg entre position couchée et DEBOUT','Différence de PA > 15 mmHg entre les 2 bras','PA < 100/70 mmHg à l\'effort'],correct:[1],explanation:'Hypotension orthostatique = différence de PAS couchée → debout > 20 mmHg. Elle peut causer des malaises ou syncopes au lever.'},
    {type:'qcu',q:'La différence de PA entre les 2 bras est considérée normale si elle est :',opts:['< 5 mmHg','< 10 mmHg','< 15 mmHg','< 25 mmHg'],correct:[2],explanation:'Différence de PA entre 2 bras normale < 15 mmHg en physiologie. > 25 mmHg oriente vers une dissection aortique ou une sténose sous-clavière.'},
    {type:'vf',q:'La mesure de la PA doit se faire au travers des vêtements en consultation.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. La PA ne doit PAS être prise au travers des vêtements — cela fausse la mesure. Le bras doit être nu.'},
    {type:'qcu',q:'Quelle est la fréquence cardiaque normale au repos ?',opts:['40-60 bpm','60-90 bpm','90-120 bpm','30-50 bpm'],correct:[1],explanation:'FC normale au repos = 60-90 bpm. En dessous de 60 = bradycardie. Au-dessus de 100 = tachycardie.'},
    {type:'qcu',q:'Pour palper le pouls radial, quelle technique est correcte ?',opts:['1 doigt + pression forte pour écraser l\'artère','Pulpe de 3 doigts sur l\'artère sans l\'écraser, moyennage sur 30s minimum','Pouce uniquement','Pression intermédiaire, 15 secondes × 4'],correct:[1],explanation:'Pouls radial : pulpe de 3 doigts (↑ sensibilité) sur l\'artère radiale sans l\'écraser. Moyennage sur 30s minimum (idéalement 1 min).'},
    {type:'qcu',q:'La SaO2 (saturation en O2) normale chez l\'adulte en air ambiant est :',opts:['> 80 %','> 88 %','> 94 %','100 % obligatoirement'],correct:[2],explanation:'SaO2 normale adulte > 94 % en air ambiant. Chez l\'enfant : ~92 %. En dessous de 94 % = hypoxémie clinique.'},
    {type:'qcu',q:'B1 correspond à la fermeture de quelles valves ?',opts:['Valves artérielles (aortique et pulmonaire)','Valves auriculo-VENTRICULAIRES (mitrale et tricuspide) — « BOUM »','Valve mitrale uniquement','Valve aortique uniquement'],correct:[1],explanation:'B1 = fermeture des valves AV (mitrale + tricuspide) → entendu aux foyers aortique et pulmonaire → son grave « BOUM », concomitant du pouls.'},
    {type:'qcu',q:'B2 correspond à la fermeture de quelles valves ?',opts:['Valves auriculo-ventriculaires','Valves ARTÉRIELLES (aortique et pulmonaire) — « TAC »','Valve mitrale uniquement','Valve tricuspide uniquement'],correct:[1],explanation:'B2 = fermeture des valves artérielles (aortique + pulmonaire) → entendu aux foyers tricuspidien et mitral → son bref « TAC ».'},
    {type:'vf',q:'Un dédoublement de B2 est pathologique s\'il varie avec la respiration.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Le dédoublement de B2 est PHYSIOLOGIQUE s\'il varie avec la respiration (inspiration = légère asynchronie entre fermeture aortique et pulmonaire). Il devient pathologique s\'il est fixe.'},
    {type:'qcu',q:'Le choc de pointe se palpe normalement au :',opts:['3ème EICG, ligne parasternale','4ème ou 5ème EICG, ligne médioclaviculaire gauche','2ème EICG, ligne sternale','Appendice xiphoïdien'],correct:[1],explanation:'Choc de pointe = 4ème ou 5ème espace intercostal gauche (EICG) sur la ligne médioclaviculaire. Mesure 1-2 cm², faible intensité.'},
    {type:'qcu',q:'Pour mieux palper le choc de pointe, le patient peut être placé en :',opts:['Décubitus dorsal strict','Décubitus LATÉRAL GAUCHE','Position assise penchée en avant','Décubitus ventral'],correct:[1],explanation:'Le décubitus latéral gauche rapproche le cœur de la paroi et facilite la palpation du choc de pointe.'},
    {type:'qcm',q:'Les 3 positions de l\'auscultation cardiaque sont : (Plusieurs réponses)',opts:['Allongé','Décubitus latéral gauche','Assis +/- penché en avant','Debout les bras levés'],correct:[0,1,2],explanation:'3 positions : allongé (standard), décubitus latéral gauche (B3, B4, roulement mitral), assis penché en avant (souffles aortiques, frottement péricardique).'},
    {type:'qcu',q:'Où ausculte-t-on le foyer aortique ?',opts:['2ème EICG le long du sternum','Appendice xiphoïdien','2ème EICD le long du sternum','Au choc de pointe'],correct:[2],explanation:'Foyer aortique = 2ème espace intercostal DROIT (EICD) le long du bord sternal. À ne pas confondre avec le foyer pulmonaire (2ème EICG).'},
    {type:'qcu',q:'Le foyer tricuspidien se situe :',opts:['2ème EICD','2ème EICG','Appendice xiphoïdien (processus xiphoïde)','5ème EICG ligne médioclaviculaire'],correct:[2],explanation:'Foyer tricuspidien = appendice xiphoïdien (ou bord sternal bas). Foyer mitral = choc de pointe (5ème EICG ligne médioclaviculaire gauche).'},
    {type:'vf',q:'La cloche du stéthoscope est utilisée pour entendre les souffles aigus.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. La CLOCHE (bell) = sons GRAVES (frottements, roulements = B3, B4). Le DIAPHRAGME = sons AIGUS (souffles).'},
    {type:'qcu',q:'B3 (bruit proto-diastolique) correspond à :',opts:['Fermeture de la valve aortique','La CONTRACTION ATRIALE (remplissage actif)','Le remplissage passif du ventricule (contraction atriale pour les experts : début du remplissage ventriculaire)','Un bruit normal chez tous les patients'],correct:[2],explanation:'B3 = bruit proto-diastolique (début de diastole) correspondant au remplissage ventriculaire. Non entendu chez le sujet normal — signe de dysfonction diastolique ou IC si présent.'},
    {type:'qcu',q:'La palpation de l\'artère poplitée nécessite :',opts:['Pression légère, genou tendu','Pression FORTE avec doigts en crochet dans le creux poplité, genou semi-fléchi','Pression sur le genou','Percussion du creux poplité'],correct:[1],explanation:'Artère poplitée = difficile à palper → pression FORTE + doigts en crochet + genou semi-fléchi (poids de la jambe sur les doigts du médecin).'},
    {type:'qcu',q:'La turgescence jugulaire est examinée avec le patient en :',opts:['Décubitus dorsal strict','Position PROCLIVE 30°','Position orthostatique (debout)','Décubitus latéral gauche'],correct:[1],explanation:'Veine jugulaire externe examinée patient en PROCLIVE 30°. Normalement non visible. Turgescence = pression veineuse élevée → IC droite.'},
    {type:'vf',q:'La percussion est un temps essentiel de l\'examen cardiovasculaire.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. La percussion n\'est JAMAIS pratiquée en cardiologie. Seules la PALPATION et l\'AUSCULTATION sont utiles.'},
    {type:'qcu',q:'L\'interrogatoire cardiovasculaire doit recueillir quels éléments ?',opts:['Uniquement la douleur','Motif + signes fonctionnels + ATCD + modes de vie + FRCV + traitement','Uniquement les FRCV','Les constantes vitales uniquement'],correct:[1],explanation:'L\'interrogatoire CV est complet : motif + signes fonctionnels (dyspnée, douleur, palpitations, syncope) + ATCD personnels/familiaux + modes de vie + FRCV + traitement.'},
    {type:'qcu',q:'Les palpitations sont définies comme :',opts:['Une douleur thoracique rythmique','La perception ANORMALE des battements cardiaques','Une tachycardie documentée à l\'ECG','Un souffle cardiaque audible par le patient'],correct:[1],explanation:'Palpitations = perception anormale des battements cardiaques. Important : préciser le type (régulier/irrégulier), la durée, la sévérité, le début/fin brusque ou progressif.'},
    {type:'qcu',q:'La syncope se distingue de la lipothymie par :',opts:['La syncope dure plus longtemps','La SYNCOPE = perte de connaissance totale et transitoire ; la lipothymie = sensation de perte de connaissance SANS réelle PCN','La lipothymie est plus grave','Elles sont identiques'],correct:[1],explanation:'Syncope = PCN brutale, totale, transitoire, retour rapide normal (à l\'emporte-pièce). Lipothymie = sensation imminente de PCN SANS vraie perte de connaissance. Mêmes étiologies.'},
    {type:'vf',q:'La syncope à l\'effort doit orienter vers un rétrécissement aortique.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La syncope À L\'EFFORT est très pathologique et doit faire chercher un rétrécissement aortique (obstruction à l\'éjection → débit cérébral insuffisant à l\'effort) ou une cardiopathie obstructive.'},
    {type:'qcu',q:'La syncope vasovagale est causée par :',opts:['Un trouble conductif','Une augmentation brutale du tonus parasympathique → bradycardie + ↓PA','Un spasme coronaire','Une tachycardie ventriculaire'],correct:[1],explanation:'Syncope vasovagale : ↑ brutal du parasympathique → bradycardie + vasodilatation → ↓ PA → ↓ débit cérébral → PCN. Déclenchée par émotion, douleur, chaleur.'},
    {type:'qcu',q:'Pour le calcul des paquets-années (PA) de tabagisme :',opts:['PA = nb de cigarettes × nb d\'années','PA = nb de paquets/jour × nb d\'années','PA = nb de paquets total fumés','PA = nb de cigarettes/jour × 365'],correct:[1],explanation:'PA = nb de paquets/jour × nb d\'années de tabagisme. Exemple : 1 paquet/jour pendant 20 ans = 20 PA.'},
    {type:'qcm',q:'Les 4 symptômes cardinaux en cardiologie sont : (Plusieurs réponses)',opts:['Dyspnée','Douleur thoracique','Palpitations','Syncope et lipothymies'],correct:[0,1,2,3],explanation:'Les 4 symptômes cardinaux : dyspnée, douleur thoracique, palpitations, syncopes/lipothymies. Chacun nécessite un interrogatoire détaillé (ancienneté, sévérité, tests thérapeutiques, évolution, symptômes associés).'},
    {type:'qcu',q:'La dyspnée paroxystique nocturne est caractérisée par :',opts:['Une dyspnée à l\'effort uniquement','Des réveils nocturnes par dyspnée — signe d\'IC gauche','Une dyspnée liée au stress nocturne','Un ronchopathie nocturne'],correct:[1],explanation:'Dyspnée paroxystique nocturne = réveils nocturnes par accès dyspnéiques, signe d\'IC gauche (redistribution nocturne des liquides en décubitus → ↑ retour veineux → surcharge pulmonaire).'},
    {type:'vf',q:'L\'alcool est un facteur de risque cardiovasculaire classique au même titre que le tabac.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. L\'alcool N\'EST PAS un FRCV classique, mais il est important à évaluer car il est responsable de cardiopathies dilatées et joue un rôle dans l\'HTA.'},
    {type:'qcu',q:'Quelle formule permet de calculer la PAM ?',opts:['PAM = PAS × PAD / 2','PAM = (PAS + 2 × PAD) / 3','PAM = (PAS – PAD) × 2','PAM = PAS + PAD'],correct:[1],explanation:'PAM = (PAS + 2 × PAD) / 3. Cette formule tient compte du fait que la diastole est plus longue que la systole dans le cycle cardiaque.'},
    {type:'cc',context:'Un étudiant de 22 ans, anxieux, se plaint de douleurs thoraciques punctiformes, localisation variable, sans lien à l\'effort, depuis 2 ans. ECG, troponines, écho cardio normaux. Examen CV normal.',q:'Quel est le diagnostic à retenir ?',opts:['Angor instable','IDM atypique','Algie précordiale d\'origine NERVEUSE/FONCTIONNELLE — diagnostic d\'élimination','Péricardite chronique'],correct:[2],explanation:'Algies précordiales nerveuses : jeune sujet anxieux, douleurs punctiformes variables, absence de lien à l\'effort, ancienneté +++, bilan cardiaque normal. Diagnostic d\'ÉLIMINATION (après avoir exclu toute cause grave).'},
    {type:'cc',context:'Lors d\'une consultation, la PA mesurée est de 148/96 mmHg. Le patient vient d\'arriver, est stressé et a bu un café.',q:'Quelle est l\'attitude correcte ?',opts:['Diagnostiquer une HTA immédiatement et mettre sous traitement','Répéter les mesures à la fin de la consultation + revoir le patient dans des conditions optimales','Ignorer le résultat','Déclencher une hospitalisation urgente'],correct:[1],explanation:'PA élevée → mesures répétées en fin de consultation + 3 × 3 mesures requises + conditions optimales (repos 5 min, au calme, sans café). L\'HTA ne se diagnostique pas sur une seule mesure de mauvaise qualité.'},
    {type:'qcu',q:'Lors d\'une auscultation cardiaque, la systole correspond à :',opts:['La période entre B2 et B1','La période entre B1 et B2 (concomitante du pouls)','La période de remplissage ventriculaire','La pause diastolique'],correct:[1],explanation:'Systole = entre B1 (fermeture valves AV) et B2 (fermeture valves artérielles). Concomitante du pouls radial. La palpation du pouls permet de repérer les temps cardiaques.'},
    {type:'qcu',q:'Pour l\'examen de la veine jugulaire externe, si elle reste gonflée lors de la pression hépatique, cela évoque :',opts:['Une hypovolémie','L\'IC DROITE (reflux hépato-jugulaire positif = ↑ pression veineuse centrale)','Un épanchement péricardique','Une HTA systémique'],correct:[1],explanation:'Reflux hépato-jugulaire : compression hépatique → ↑ retour veineux → normalement réabsorbé par le VD. Si jugulaire reste gonflée = VD en surcharge → IC droite.'},
    {type:'vf',q:'La surveillance hydroélectrolytique en début de traitement diurétique est particulièrement importante chez le sujet âgé.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Le sujet âgé est plus sensible aux variations électrolytiques et au risque de déshydratation en début de traitement diurétique → surveillance ++ (natrémie, kaliémie, créatinine).'},
  ]
});

// ==================== COURS 7 : INSUFFISANCE CARDIAQUE ====================
COURSES.push({
  id:'ic',
  title:'Insuffisance Cardiaque',
  icon:'🫀',
  color:'#e11d48',
  iconBg:'#fff1f2',
  tags:['FEVG','IC gauche/droite','OAP','BNP'],
  questions:[
    // ---- FACILE ----
    {type:'qcu',q:'Quelle est la définition de l\'insuffisance cardiaque ?',opts:['Hypertension artérielle chronique','Incapacité du cœur à assurer un DC normal ET/OU à fonctionner dans un régime de pression de remplissage normal','Arythmie ventriculaire permanente','Valvulopathie aortique'],correct:[1],explanation:'L\'IC = incapacité du muscle cardiaque à assurer un débit cardiaque normal (adapté aux besoins) et/ou à fonctionner dans un régime de pression de remplissage normal.'},
    {type:'qcu',q:'La formule du débit cardiaque est :',opts:['DC = VTD × FC','DC = VES × FC','DC = FEVG × PA','DC = VTS × FC'],correct:[1],explanation:'DC = VES (Volume d\'Éjection Systolique) × FC. VES = VTD − VTS. Norme : 5-6 L/min.'},
    {type:'qcu',q:'La FEVG normale est de :',opts:['35-45 %','45-55 %','55-65 %','70-80 %'],correct:[2],explanation:'FEVG = VES/VTD = (VTD−VTS)/VTD. Normale : 55-65 %. Paramètre de base de la classification ET du traitement de l\'IC.'},
    {type:'vf',q:'La FEVG est le paramètre clé de la classification et du traitement de l\'IC.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. La FEVG distingue l\'IC à FEVG préservée (≥50%) — problème de compliance — de l\'IC à FEVG réduite (<40%) — problème de débit.'},
    {type:'qcu',q:'L\'IC à FEVG préservée (≥50%) correspond à un problème de :',opts:['Débit cardiaque insuffisant','Compliance/remplissage (cœur rigide, non compliant → ↑ pression de remplissage)','Arythmie chronique','Valvulopathie obstructive'],correct:[1],explanation:'IC FEVG préservée : le cœur est rigide → mauvais remplissage → ↑ pression de remplissage → stase en amont → dyspnée. FEVG normale mais pression de remplissage anormale.'},
    {type:'qcu',q:'Quelle est la 1ère cause d\'hospitalisation après 65 ans ?',opts:['Pneumopathie','Insuffisance cardiaque','IDM','Fibrillation auriculaire'],correct:[1],explanation:'L\'IC est la 1ère cause d\'hospitalisation après 65 ans. Mortalité à 5 ans : 50-65 % (aussi grave qu\'un cancer).'},
    {type:'qcu',q:'L\'orthopnée dans l\'IC est :',opts:['Dyspnée à l\'effort','Dyspnée en DÉCUBITUS DORSAL, améliorée assis — HYPER SPÉCIFIQUE de l\'IC','Dyspnée paroxystique nocturne','Dyspnée au froid'],correct:[1],explanation:'Orthopnée = dyspnée en décubitus dorsal → soulagée en position assise. HYPER SPÉCIFIQUE de l\'IC gauche. Traduit la redistribution liquidienne en décubitus.'},
    {type:'vf',q:'Le BNP < 100 pg/mL permet d\'exclure une IC avec une excellente valeur prédictive négative.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. BNP < 100 pg/mL (ou NT-proBNP < 300 pg/mL) → IC peu probable (excellente VPN). Les peptides natriurétiques sont libérés en réponse à la surcharge de pression/volume cardiaque.'},
    {type:'qcu',q:'Les 4 signes fonctionnels typiques de l\'IC forment le mnémotechnique :',opts:['ACAP','EPOF (Essoufflement, Prise de poids, Œdème, Fatigue)','BODE','NYHA'],correct:[1],explanation:'EPOF : Essoufflement (dyspnée), Prise de poids (>2kg/semaine), Œdème, Fatigue. Si les 4 sont présents simultanément → très spécifique de l\'IC.'},
    {type:'qcu',q:'Une prise de poids > __ kg/semaine est un signe d\'alarme d\'IC ?',opts:['1 kg','2 kg','5 kg','10 kg'],correct:[1],explanation:'Prise de poids > 2 kg/semaine = signe d\'alarme d\'IC → accumulation d\'eau exclusivement (rétention hydrosodée).'},
    {type:'qcu',q:'Quel signe auscultatoire d\'IC gauche correspond au sang arrivant rapidement dans le ventricule ?',opts:['B1 renforcé','B2 dédoublé','Galop protodiastolique (B3) — bruit du sang sous pression contre la paroi','Click systolique'],correct:[2],explanation:'Galop protodiastolique (B3) = début de diastole, sang arrivant rapidement et sous pression dans un VG défaillant → claquement contre la paroi. Difficile à entendre mais très évocateur d\'IC.'},
    {type:'vf',q:'Les crépitants pulmonaires dans l\'IC gauche s\'entendent d\'abord aux bases puis montent progressivement vers les apex (marée montante).',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. L\'OAP : pression capillaires pulmonaires > 25 mmHg → transsudat dans les alvéoles → crépitants aux bases d\'abord, puis "en marée montante" vers les apex selon la sévérité.'},
    {type:'qcu',q:'La turgescence jugulaire dans l\'IC droite évoque :',opts:['↓ pression veineuse centrale','↑ pression veineuse centrale → VD défaillant → stase en amont → distension veines jugulaires','Hypovolémie','HTA sévère'],correct:[1],explanation:'Turgescence jugulaire = VD défaillant → stase en amont → ↑ pression veineuse centrale → distension des veines jugulaires. Signe cardinal d\'IC droite.'},
    {type:'qcu',q:'La flèche hépatique > __ cm définit une hépatomégalie ?',opts:['10 cm','15 cm','20 cm','25 cm'],correct:[1],explanation:'Flèche hépatique > 15 cm (mesurée par percussion) = hépatomégalie. Dans l\'IC droite : foie de stase → hépatomégalie douloureuse.'},
    {type:'vf',q:'Les œdèmes d\'IC sont blancs, mous, bilatéraux, prenant le godet et déclives.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Œdèmes cardiaques : blancs + mous + bilatéraux + prenant le godet (appui → empreinte gardée) + déclives (gravitaires = malléoles, MI). ≠ Œdèmes inflammatoires = rouges, chauds, douloureux, unilatéraux.'},
    {type:'qcu',q:'La classification NYHA IV correspond à :',opts:['Dyspnée pour efforts modérés','Dyspnée pour efforts de la vie courante','Dyspnée quasi de repos, PM < 150m','Asymptomatique'],correct:[2],explanation:'NYHA IV = dyspnée quasi de repos, PM < 150m, confiné au lit/fauteuil. Renseigne sur la sévérité, le pronostic et guide les traitements.'},
    {type:'qcu',q:'L\'index cardiothoracique > 0,5 à la radio thorax définit :',opts:['Une hypertrophie myocardique','Une CARDIOMÉGALIE','Un pneumothorax','Une pleurésie'],correct:[1],explanation:'ICT = plus grand diamètre cardiaque / plus grand diamètre thoracique. > 0,5 = cardiomégalie. Visible sur la radio thorax de face.'},
    {type:'vf',q:'L\'IC à FEVG réduite (<40%) et l\'IC à FEVG préservée (≥50%) ont le même traitement.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Les deux formes sont aussi fréquentes et aussi graves, mais N\'ONT PAS le même traitement. L\'IC FEVG réduite bénéficie de traitements spécifiques (IEC, bêtabloquants, ARM, gliflozines) qui n\'ont pas démontré le même bénéfice dans l\'IC FEVG préservée.'},
    {type:'qcu',q:'La 1ère cause d\'IC droite est :',opts:['Tamponnade péricardique','IC GAUCHE (élévation des pressions pulmonaires → surcharge VD)','BPCO isolée','Valvulopathie tricuspide primitive'],correct:[1],explanation:'1ère cause d\'IC droite = IC gauche. VG défaillant → ↑ pressions pulmonaires → surcharge VD → IVD. C\'est un mécanisme séquentiel.'},
    {type:'qcu',q:'Quel marqueur biologique confirme une surcharge de pression/volume cardiaque ?',opts:['Troponine','CRP ultra-sensible','BNP / NT-proBNP','Créatinine'],correct:[2],explanation:'BNP et NT-proBNP = peptides natriurétiques sécrétés par les ventricules en réponse à une surcharge de pression ou de volume. Marqueurs diagnostiques de l\'IC.'},
    {type:'qcu',q:'La dyspnée paroxystique nocturne évoque :',opts:['Une BPCO','Une IC gauche (redistribution liquidienne nocturne en décubitus → ↑ retour veineux → surcharge pulmonaire)','Un asthme nocturne','Une anxiété'],correct:[1],explanation:'DPN = réveils nocturnes par accès dyspnéiques → redistribution nocturne des liquides en décubitus → ↑ retour veineux → ↑ pression capillaires pulmonaires → OAP partiel.'},
    {type:'vf',q:'L\'OAP (œdème aigu pulmonaire) se produit quand la pression capillaire pulmonaire dépasse 25 mmHg.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Au-delà de 25 mmHg, la membrane alvéolo-capillaire est dépassée → transsudat plasmatique dans les alvéoles et l\'interstitium → OAP.'},
    {type:'qcu',q:'Le signe de Carvallo est un souffle d\'insuffisance tricuspide :',opts:['Diminué à l\'inspiration','Majoré à l\'INSPIRATION profonde — IC droite (VD dilaté → cuspides ne se rejoignent plus → IT)','Présent uniquement en décubitus','Systolique au foyer aortique'],correct:[1],explanation:'Signe de Carvallo = souffle d\'IT majoré à l\'inspiration profonde → IC droite. La dilatation du VD entraîne une dilatation de l\'anneau tricuspide → les cuspides ne se rejoignent plus.'},
    {type:'qcu',q:'Le signe de Harzer est :',opts:['Turgescence jugulaire','Équivalent du choc de pointe pour le VD dilaté (palpé sous l\'appendice xiphoïdien)','Hépatomégalie douloureuse','Reflux hépato-jugulaire'],correct:[1],explanation:'Signe de Harzer = choc systolique palpé sous l\'appendice xiphoïdien → correspond à la pulsatilité du VD dilaté. Équivalent du choc de pointe pour le VD.'},
    {type:'vf',q:'L\'échocardiographie transthoracique est l\'examen clé du diagnostic de l\'IC.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. L\'ETT mesure la FEVG + visualise les cavités, valves et péricarde → diagnostic immédiat et étiologique. Sonde parasternale et sous-mamelonnaire.'},
    {type:'qcu',q:'Les lignes B à l\'échographie pleurale correspondent à :',opts:['Un poumon normal','Un œdème interstitiel pulmonaire (perpendiculaires à la ligne pleurale → lignes "fusées")','Un épanchement pleural pur','Un pneumothorax'],correct:[1],explanation:'Lignes B (ou "comètes pleurales") = perpendiculaires à la ligne pleurale → signe d\'œdème interstitiel. Lignes A = parallèles à la ligne pleurale = normal.'},
    {type:'qcu',q:'L\'hépatalgie d\'effort est un symptôme évocateur de :',opts:['Angor coronarien','IC droite (foie de stase → capsule hépatique distendue → douleur sous-costale droite à l\'effort)','Péricardite constrictive','Dissection aortique'],correct:[1],explanation:'Hépatalgie d\'effort = douleur sous-costale droite à l\'effort → foie de stase (IC droite) → distension de la capsule hépatique de Glisson.'},
    {type:'qcu',q:'Toute cardiopathie peut aboutir à une IC. Parmi ces causes, laquelle est la plus fréquente dans les pays développés ?',opts:['Valvulopathies rhumatismales','Cardiopathie ISCHÉMIQUE (IDM → ↓ contractilité)','Myocardite virale','HTA seule'],correct:[1],explanation:'Cardiopathie ischémique = 1ère cause d\'IC dans les pays développés. IDM → nécrose → ↓ contractilité → IC.'},
    {type:'vf',q:'La mortalité à 5 ans de l\'IC est de 50-65 %, aussi grave qu\'un cancer.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. IC = pronostic très péjoratif : mortalité 50-65 % à 5 ans. D\'où l\'importance des traitements qui ont transformé ce pronostic (IEC, bêtabloquants, ARM, gliflozines).'},
    {type:'qcu',q:'Le choc cardiogénique est défini comme :',opts:['Une IC chronique sévère','Une insuffisance circulatoire AIGUË d\'origine cardiaque → ↓ DC → hypoperfusion multiviscérale','Un OAP isolé','Une tamponnade péricardique'],correct:[1],explanation:'Choc cardiogénique = insuffisance circulatoire aiguë d\'origine cardiaque. Urgence vitale absolue. Traitement : inotropes + assistance circulatoire si réfractaire.'},

    // ---- MOYEN ----
    {type:'qcu',q:'La loi de Frank-Starling stipule que :',opts:['Plus la FC est haute, plus le VES est fort','↑ VTD (précharge) → ↑ étirement fibres → ↑ VES jusqu\'à un optimum ; cœur insuffisant = courbe aplatie','Le VES est constant quelle que soit la précharge','La postcharge n\'influence pas le VES'],correct:[1],explanation:'Frank-Starling : ↑ précharge → ↑ étirement → ↑ force de contraction → ↑ VES. Cœur insuffisant : courbe aplatie → pour le même VTD, le VES est diminué. Au-delà d\'un seuil → mécanisme dépassé → délétère.'},
    {type:'qcu',q:'La loi de Laplace (T = P×d/2e) explique l\'hypertrophie ventriculaire adaptative. Quel est le but ?',opts:['Augmenter la tension pariétale','Réduire la tension pariétale (↑ e → ↓ T) → ↓ MVO2 → compenser la ↑ postcharge','Augmenter le VTD','Réduire la FC compensatrice'],correct:[1],explanation:'Laplace : T = P×d/2e. En cas de ↑ postcharge (HTA), le VG épaissit ses parois (↑ e) → ↓ T → ↓ MVO2. Bénéfique à court terme mais à long terme, l\'hypertrophie rigidifie le VG → IC FEVG préservée.'},
    {type:'qcu',q:'L\'activation du SRA dans l\'IC est délétère à long terme car :',opts:['Elle réduit la PA trop brutalement','Rétention hydrosodée (↑ précharge = surcharge) + aldostérone pro-fibrotique → remodelage cardiaque → aggrave l\'IC (cercle vicieux)','Elle provoque une hypokaliémie seule','Elle bloque les barorécepteurs'],correct:[1],explanation:'SRA dans l\'IC : bénéfique à court terme (↑ volémie → ↑ DC) mais délétère à long terme : ↑ précharge (aggrave la surcharge), aldostérone → fibrose myocardique (remodelage adverse).'},
    {type:'cc',context:'Patient 68 ans, essoufflement progressif en 3 mois, prise de poids de 6 kg, œdèmes des chevilles bilatéraux prenant le godet. À l\'examen : crépitants aux bases, turgescence jugulaire, hépatomégalie.',q:'Quel type d\'IC et quel examen confirme ?',opts:['IC gauche pure — confirmer par IRM','IC GLOBALE (signes gauche = crépitants + signes droite = TJ + hépatomégalie) → confirmer par ETT (mesure FEVG) + BNP','Choc cardiogénique → réanimation','Péricardite constrictive'],correct:[1],explanation:'IC globale : crépitants (IVG) + turgescence jugulaire + hépatomégalie (IVD). ETT = examen clé (mesure FEVG + étiologie). BNP élevé confirme la surcharge. Les 4 signes EPOF sont probablement présents.'},
    {type:'qcu',q:'Le BNP (Brain Natriuretic Peptide) est sécrété par :',opts:['Le cerveau (comme son nom l\'indique)','Les ventricules cardiaques en réponse à une ↑ pression/volume','L\'oreillette gauche exclusivement','Le poumon'],correct:[1],explanation:'BNP = sécrété par les VENTRICULES cardiaques en réponse à une ↑ de pression ou de volume (malgré son nom "Brain" Natriuretic Peptide qui est historique). Effet bénéfique : ↑ natriurèse. NT-proBNP = fragment inactif, aucune action.'},
    {type:'qcu',q:'La down-régulation des récepteurs β1 dans l\'IC chronique entraîne :',opts:['↑ réponse aux catécholamines','↓ du nombre de récepteurs β1 → le cœur ne répond plus aux catécholamines → aggrave la défaillance','↑ contractilité','↑ FC réflexe'],correct:[1],explanation:'IC chronique → ↑ catécholamines → down-régulation β1 (internalisation des récepteurs) → le cœur ne répond plus aux catécholamines. Les bêtabloquants en phase chronique stable permettent la resensibilisation des β1 → ↑ FEVG à long terme.'},
    {type:'cc',context:'Mme V., 72 ans, IC FEVG 35 % connue, se présente pour aggravation dyspnée. PA 95/60 mmHg, FC 112 bpm, K+ 3,0 mmol/L, créatinine 180 μmol/L, Na+ 130 mmol/L. Elle prend furosémide 80 mg/j depuis 6 mois.',q:'Quel tableau et quelle cause ?',opts:['Décompensation par excès de sel','Déshydratation / hypovolémie IATROGÈNE (excès de furosémide) → IRA prérénale + hypokaliémie + hyponatrémie','IC terminale → transplantation urgente','Sepsis'],correct:[1],explanation:'Iatrogénie diurétique : PA basse + hypokaliémie (3,0) + hyponatrémie + IRA fonctionnelle (créatinine ↑) = excès de furosémide. Traitement : ↓ dose furosémide + réhydratation prudente + correction K+.'},
    {type:'vf',q:'L\'OAP (œdème aigu pulmonaire) se caractérise par une polypnée brutale, une orthopnée, des expectorations mousseuses rosées et des crépitants "en marée montante".',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. OAP = présentation très caractéristique : polypnée brutale + orthopnée ++ + angoisse + grésillement laryngé + expectorations mousseuses rosées/saumonées + crépitants aux bases → apex (marée montante selon la classification de Killip 0→3).'},
    {type:'qcu',q:'La classification de Killip dans l\'OAP évalue :',opts:['La sévérité de l\'AOMI','La progression des crépitants pulmonaires : 0 (aucun) → 1 (bases) → 2 (intermédiaire) → 3 (jusqu\'aux apex)','L\'IPS','Le score pronostic de l\'IC'],correct:[1],explanation:'Classification de Killip dans l\'OAP : 0 = aucun crépitant, 1 = bases, 2 = niveau moyen, 3 = jusqu\'aux apex (OAP sévère, "marée montante").'},
    {type:'qcm',q:'Quels examens paracliniques sont systématiques dans le bilan initial d\'une IC ? (Plusieurs réponses)',opts:['ECG (quasi jamais normal dans une IC)','Radio thorax (ICT, redistribution vasculaire, épanchements)','BNP/NT-proBNP','Échocardiographie transthoracique (FEVG, étiologie)'],correct:[0,1,2,3],explanation:'Bilan IC : ECG (quasi jamais normal, valeur étiologique et pour chercher un facteur déclenchant) + radio thorax (ICT > 0,5, redistribution vasculaire, lignes de Kerley) + BNP/NT-proBNP + ETT (FEVG, étiologie). Tous systématiques.'},
    {type:'qcu',q:'La cardiopathie alcoolique est une cause d\'IC. Quelle particularité ?',opts:['Irréversible systématiquement','Le temps d\'exposition est plus important que la dose ; amélioration possible sous traitement (sevrage)','Dose-dépendante avec IDM','Uniquement chez les hommes'],correct:[1],explanation:'Cardiopathie alcoolique : le temps d\'exposition est plus important que la dose. Particularité majeure : possibilité d\'amélioration significative de la FEVG sous traitement ET sevrage alcoolique.'},
    {type:'qcu',q:'Qu\'indique l\'index cardiaque (IC = DC/surface corporelle) ?',opts:['Le niveau d\'entraînement sportif','La comparaison du DC entre individus de morphologies différentes. Normale : 2,5-3,5 L/min/m²','La pression artérielle indexée','La FEVG normalisée'],correct:[1],explanation:'Index cardiaque = DC divisé par la surface corporelle → permet de comparer des individus de morphologies différentes. Normale : 2,5-3,5 L/min/m². Utilisé en réanimation pour évaluer la défaillance cardiaque.'},
    {type:'vf',q:'Dans l\'IC, les mécanismes d\'adaptation (Starling, hypertrophie, activation SRA) sont bénéfiques à court terme mais délétères à long terme.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Paradoxe de l\'adaptation : chaque mécanisme compense initialement (↑ DC) mais aggrave à long terme (↑ MVO2, fibrose, remodelage). C\'est la base rationnelle des traitements de l\'IC (IEC, bêtabloquants, ARM).'},
    {type:'qcu',q:'L\'aldostérone est pro-fibrotique dans l\'IC. Quel traitement bloque cet effet pour améliorer le pronostic ?',opts:['IEC','ARAII','ARM (antagonistes des récepteurs minéralocorticoïdes = spironolactone, éplérénone)','Diurétiques de l\'anse'],correct:[2],explanation:'ARM (spironolactone = RALES / éplérénone = EMPHASIS-HF) bloquent les récepteurs minéralocorticoïdes → ↓ fibrose myocardique → réduction de 30 % de la mortalité dans l\'IC FEVG réduite.'},
    {type:'cc',context:'Patient 60 ans, IC FEVG 28 % sous traitement optimal (IEC + bêtabloquant + ARM). NYHA III. FC = 72 bpm en rythme sinusal malgré bisoprolol 10 mg.',q:'Quelle option thérapeutique complémentaire proposer ?',opts:['Augmenter encore le bisoprolol','Ajouter IVABRADINE (FC ≥ 70 bpm en rythme sinusal malgré bêtabloquant optimal → indication ESC 2021)','Défibrillateur d\'emblée','Transplantation immédiate'],correct:[1],explanation:'Ivabradine = inhibiteur sélectif du courant If (pacemaker sinusal) → ↓ FC sans effet sur la contractilité. Indiquée si FEVG ≤ 35 % + rythme SINUSAL + FC ≥ 70 bpm malgré bêtabloquant optimal. SHIFT : réduction des hospitalisations pour IC.'},
    {type:'qcu',q:'Pourquoi les bêtabloquants sont-ils bénéfiques dans l\'IC CHRONIQUE COMPENSÉE (paradoxalement) ?',opts:['Ils augmentent le DC directement','Ils bloquent l\'hyperactivité sympathique chronique → ↓ cardiotoxicité des catécholamines → resensibilisation des β1 → ↑ FEVG à long terme','Ils réduisent la précharge','Ils augmentent la FC pour compenser'],correct:[1],explanation:'IC chronique stable : hyperactivité sympathique → catécholamines → cardiotoxicité + down-régulation β1. Bêtabloquants → bloquent cet effet → resensibilisation des β1 → ↑ FEVG à long terme. (CI dans l\'IC décompensée).'},

    // ---- DIFFICILE ----
    {type:'cc',context:'Patient 65 ans, IC FEVG 30 %, IRC DFG 35 mL/min, K+ 4,8 mmol/L, PA 128/78 mmHg, FC 65 bpm. Traitement : bisoprolol 5 mg + ramipril 5 mg + furosémide 80 mg. Dyspnée NYHA III stable.',q:'Optimisation thérapeutique selon les guidelines ESC 2021.',opts:['Traitement déjà optimal','Ajouter spironolactone (K+ 4,8 → borderline, surveillance K+ J3/J7/J14) + dapagliflozine (double indication IRC DFG 35 + IC FEVG réduite) + switch ramipril → sacubitril/valsartan si PA tolère (>100 mmHg)','↑ furosémide uniquement','Arrêter l\'IEC car IRC'],correct:[1],explanation:'Quadruple thérapie ESC 2021 : IEC/ARNI + bêtabloquant + ARM + gliflozine. Obstacles : K+ 4,8 (ARM possible si surveillance K+ rapprochée) + DFG 35 (dapagliflozine approuvée dès DFG 25). Switch ARNI si PA tolère.'},
    {type:'qcu',q:'Le sacubitril/valsartan (ARNI) est supérieur à l\'énalapril dans l\'IC FEVG réduite (PARADIGM-HF). Par quel mécanisme supplémentaire ?',opts:['Blocage direct de l\'Ang II uniquement','Sacubitril inhibe la néprilysine → ↑ BNP/ANP non dégradés → natriurèse + vasodilatation + anti-remodelage EN PLUS du blocage AT1 du valsartan','Effet diurétique direct puissant','Remplace le furosémide'],correct:[1],explanation:'ARNI = valsartan (blocage AT1) + sacubitril (↑ BNP/ANP → natriurèse + vasodilatation + anti-remodelage). PARADIGM-HF : −20 % mortalité CV vs énalapril. Délai de 48h obligatoire après arrêt d\'un IEC (risque d\'angiœdème).'},
    {type:'qcu',q:'La dapagliflozine (gliflozine) a un double avantage dans l\'IC. Lequel ?',opts:['IC FEVG réduite uniquement','Double indication : IC FEVG réduite (toutes FEVG) + IRC (DFG 25-75, DAPA-CKD) — améliore pronostic cardio-rénal','Uniquement dans le diabète','Remplace les IEC/ARAII'],correct:[1],explanation:'Dapagliflozine : 1) IC (toutes FEVG selon EMPEROR-Preserved + DELIVER) 2) IRC (DAPA-CKD : DFG 25-75 + RAC élevé) → double indication cardio-rénale indépendamment du diabète.'},
    {type:'cc',context:'Patient 70 ans, IC FEVG 25 %, PA 80/50 mmHg, FC 115 bpm, anurie depuis 2h, crépitants bilatéraux, marbrures des genoux. Sous dobutamine IV + furosémide IV depuis 2h sans amélioration.',q:'Option thérapeutique de dernière ligne.',opts:['Doubler la dobutamine','Arrêter tout traitement','Choc cardiogénique réfractaire aux inotropes → ASSISTANCE CIRCULATOIRE MÉCANIQUE (ECMO-VA ou Impella) en pont à la transplantation','↑ furosémide uniquement'],correct:[2],explanation:'Choc cardiogénique réfractaire → ECMO-VA (support cœur + poumons) ou Impella (décharge VG mécaniquement). Objectif : maintenir la perfusion cérébrale et rénale en attendant la transplantation ou l\'évaluation de la récupérabilité.'},
    {type:'vf',q:'Les gliflozines ont démontré un bénéfice pronostique dans l\'IC à FEVG préservée (EMPEROR-Preserved, DELIVER).',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. EMPEROR-Preserved (empagliflozine) + DELIVER (dapagliflozine) → réduction des hospitalisations pour IC et de la mortalité CV dans l\'IC à FEVG > 40 %. AMM étendue à l\'IC FEVG préservée et moyennement réduite.'},
    {type:'qcm',q:'La quadruple thérapie ESC 2021 pour l\'IC à FEVG réduite comprend : (Plusieurs réponses)',opts:['IEC ou ARNI (sacubitril/valsartan)','Bêtabloquant (bisoprolol, carvédilol, métoprolol)','ARM (spironolactone, éplérénone)','Gliflozine (empagliflozine, dapagliflozine)'],correct:[0,1,2,3],explanation:'Quadruple thérapie ESC 2021 : 1) IEC/ARNI 2) Bêtabloquant 3) ARM 4) Gliflozine. Chaque classe réduit indépendamment la mortalité. Titration progressive vers les doses cibles.'},
    {type:'qcu',q:'La péricardite constrictive (complication d\'une péricardite tuberculeuse) provoque une IC par :',opts:['Réduction de la FEVG par fibrose myocardique','Péricarde fibrosé et calcifié → "carapace" rigide → restriction diastolique → IC à FEVG préservée','Obstruction coronarienne','Arythmie chronique'],correct:[1],explanation:'Péricardite constrictive : péricarde fibrosé + calcifié → restriction diastolique → IC à FEVG préservée (cœur normal mais enveloppé dans une coque rigide). Traitement : quadrithérapie antituberculeuse + péricardectomie chirurgicale.'},
    {type:'cc',context:'Mme L., 55 ans, cardiomyopathie alcoolique, FEVG 25 %. Elle est sevrée depuis 3 mois et suit une quadruple thérapie. FEVG à 6 mois de contrôle : 40 %.',q:'Qu\'illustre cette évolution ?',opts:['Erreur de mesure ETT','AMÉLIORATION POSSIBLE de la cardiopathie alcoolique sous traitement médical optimal + sevrage — c\'est la principale particularité de cette étiologie','Progression normale de la maladie','Effet iatrogène des médicaments'],correct:[1],explanation:'Cardiopathie alcoolique = particularité majeure : amélioration significative de la FEVG possible sous traitement médical optimal + sevrage alcoolique. Contrairement aux cardiopathies ischémiques ou hypertensives où la récupération est moindre.'},
    {type:'qcu',q:'Le VES = VTD − VTS. Si VTD = 130 mL, VTS = 80 mL. Calculez la FEVG.',opts:['38 %','42 %','51 %','62 %'],correct:[0],explanation:'VES = 130 − 80 = 50 mL. FEVG = VES/VTD = 50/130 = 38,5 % ≈ 38 % → IC à FEVG RÉDUITE (< 40 %). Traitement par quadruple thérapie + recherche de l\'étiologie.'},
    {type:'vf',q:'La resynchronisation cardiaque (CRT) est indiquée dans l\'IC FEVG ≤ 35 % avec BBG large (QRS ≥ 150 ms) en rythme sinusal malgré traitement médical optimal.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. CRT (défibrillateur-resynchronisateur ou stimulateur biventriculaire) : indiquée si FEVG ≤ 35 % + BBG (QRS ≥ 150 ms) + rythme sinusal + NYHA II-IV malgré traitement optimal. Améliore la synchronisation VG → ↑ FEVG + ↓ mortalité.'},
    {type:'cc',context:'Patient 58 ans, IC FEVG 32 %, sous quadruple thérapie. PA 118/72, FC 68 bpm. BNP à 6 mois : 1800 pg/mL (N < 100). NYHA III persistant.',q:'Quelle interprétation et quelle orientation ?',opts:['BNP élevé = normal dans l\'IC chronique, rien à faire','BNP très élevé malgré traitement optimal = IC mal contrôlée, surcharge persistante → réévaluation ETT (FEVG, pressions de remplissage) + optimisation posologique (doses cibles de chaque classe) + discuter dispositifs (CRT, DAI) + évaluation pour transplantation cardiaque','Arrêter le traitement médicamenteux','BNP à répéter dans 1 an'],correct:[1],explanation:'BNP très élevé malgré traitement = IC mal contrôlée. Stratégie : ETT de contrôle + optimisation des doses cibles de la quadruple thérapie + discuter CRT/DAI (si QRS large + FEVG ≤ 35 %) + évaluer la transplantation cardiaque si FEVG reste ≤ 25 % et VO2 max < 14 mL/kg/min.'},
  ]
});

// ==================== COURS 8 : SOUFFLES CARDIAQUES ====================
COURSES.push({
  id:'souffles',
  title:'Souffles Cardiaques & Auscultation',
  icon:'🔊',
  color:'#9333ea',
  iconBg:'#faf5ff',
  tags:['B1/B2','RA/IA/IM/RM','Frottement péricardique','Foyers'],
  questions:[
    // ---- FACILE ----
    {type:'qcu',q:'Qui a inventé le stéthoscope ?',opts:['Harvey','Laennec (médecin français)','Korotkoff','Pasteur'],correct:[1],explanation:'René Laennec (médecin français, début XIXe siècle) a inventé le stéthoscope = système d\'amplification des sons. Son conduit auditif doit être orienté en dedans et en avant.'},
    {type:'qcu',q:'Quelle partie du stéthoscope est utilisée dans 99 % des cas ?',opts:['La cloche (cupule) — sons graves','La MEMBRANE (diaphragme) — souffles et sons aigus','Les deux indifféremment','Le pavillon seul'],correct:[1],explanation:'Membrane = 99 % des cas → souffles + sons aigus et doux. Cloche = 1 % des cas → sons GRAVES (frottements, roulements = B3/B4).'},
    {type:'qcu',q:'Lors de l\'auscultation cardiaque, la pulsation du pouls correspond à :',opts:['La diastole','La SYSTOLE — la pulsation = synchrone du systole','Un bruit surajouté','B2'],correct:[1],explanation:'Pulsation du pouls = SYSTOLE. Permet de repérer le temps cardiaque : bruit synchrone du pouls = systolique, bruit dissocié du pouls = diastolique.'},
    {type:'vf',q:'B1 correspond à la fermeture des valves auriculo-ventriculaires (mitrale + tricuspide).',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. B1 = fermeture des valves AV (mitrale + tricuspide) au début de la systole ventriculaire. Tonalité sourde, maximum à la pointe. Onomatopée : "TAC".'},
    {type:'qcu',q:'B2 correspond à la fermeture de :',opts:['Valves auriculo-ventriculaires (mitrale + tricuspide)','Valves ARTÉRIELLES SIGMOÏDES (aortique + pulmonaire) — "TOUM"','Valve mitrale uniquement','Valve pulmonaire uniquement'],correct:[1],explanation:'B2 = fermeture des valves artérielles sigmoïdes (aortique + pulmonaire) au début de la diastole. Tonalité plus haute et plus sèche que B1. Maximum à la base. Onomatopée : "TOUM".'},
    {type:'qcu',q:'Le "petit silence" entre B1 et B2 correspond à :',opts:['La diastole ventriculaire','La SYSTOLE ventriculaire','Une pause cardiaque','Un temps de relaxation'],correct:[1],explanation:'B1 → B2 = petit silence = SYSTOLE. B2 → B1 = grand silence = DIASTOLE. La diastole dure plus longtemps que la systole à fréquence normale.'},
    {type:'vf',q:'Chez l\'adulte, tout dédoublement de B2 est pathologique.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Le dédoublement de B2 est physiologique chez l\'ENFANT (audible au niveau pulmonaire). Chez l\'ADULTE : tout dédoublement de B2 est pathologique.'},
    {type:'qcu',q:'Le foyer aortique se situe au :',opts:['2ème espace intercostal gauche','2ème espace intercostal DROIT le long du sternum','Appendice xiphoïdien','5ème EICG, ligne médioclaviculaire'],correct:[1],explanation:'Foyer aortique = 2ème espace intercostal DROIT le long du sternum. Foyer pulmonaire = 2ème EICG. Foyer tricuspide = appendice xiphoïdien. Foyer mitral = 4-5ème EICG, ligne médioclaviculaire = apex.'},
    {type:'qcu',q:'Le médecin se place lors d\'une auscultation cardiaque :',opts:['À GAUCHE du patient','À DROITE du patient','Derrière le patient','N\'importe quelle position'],correct:[1],explanation:'Médecin TOUJOURS À DROITE du patient lors de l\'auscultation cardiaque. Le silence est de rigueur.'},
    {type:'qcu',q:'La cotation des souffles va de 1 à 6. Le THRILL (frémissement palpable) correspond à un grade :',opts:['≥ 2/6','≥ 3/6','≥ 4/6','≥ 5/6'],correct:[2],explanation:'THRILL = perception du frémissement à la palpation de la paroi thoracique = grade ≥ 4/6 (souffle palpatoire).'},
    {type:'qcu',q:'Un souffle "holo-systolique" s\'étend :',opts:['Du début à mi-systole','De B1 à B2 — toute la systole','Du milieu de la systole jusqu\'à B2','Uniquement en proto-systole'],correct:[1],explanation:'Holo-systolique = de B1 à B2 = toute la durée de la systole. Exemple : insuffisance mitrale (le VG se contracte → sang repart vers l\'OG pendant toute la systole).'},
    {type:'vf',q:'Le rétrécissement aortique est la valvulopathie la plus fréquente (dégénérescence calcifiante liée au vieillissement).',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. RA = la plus fréquente des valvulopathies dans les pays développés, liée au vieillissement de la valve aortique (calcification progressive).'},
