    {type:'qcu',q:'Le souffle du rétrécissement aortique irradie vers :',opts:['Le creux axillaire','Les CAROTIDES (suit le flux éjecté vers le haut)','Le bord gauche du sternum','L\'apex uniquement'],correct:[1],explanation:'RA : souffle éjectionnel méso-systolique qui irradie vers les CAROTIDES (suit le sens du flux éjecté) → un des signes caractéristiques du RA.'},
    {type:'qcu',q:'Dans le rétrécissement aortique, B2 est :',opts:['Renforcé','Dédoublé','DIMINUÉ voire ABOLI (valve sclérosée ne claque plus) → signe la sévérité du RA','Normal'],correct:[2],explanation:'RA sévère : valve aortique calcifiée et rigide → ne peut plus claquer en se fermant → B2 diminué puis ABOLI. L\'abolition de B2 au foyer aortique signe un RA TRÈS SERRÉ.'},
    {type:'qcu',q:'L\'insuffisance aortique donne un souffle de quel temps ?',opts:['Systolique éjectionnel','PROTO-MÉSO DIASTOLIQUE (reflux de l\'aorte vers le VG pendant la diastole)','Holo-systolique','Proto-systolique'],correct:[1],explanation:'IA = souffle diastolique (entre B2 et B1) car le sang reflue de l\'aorte vers le VG pendant la diastole (valve aortique perméable). Toujours pathologique, le plus difficile à entendre.'},
    {type:'vf',q:'L\'insuffisance aortique est le souffle le plus difficile à entendre.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. IA = doux, humé, aspiratif, décroissant → le plus difficile à entendre. Mieux entendu en DÉCUBITUS ASSIS PENCHÉ EN AVANT (position qui amplifie les souffles aortiques).'},
    {type:'qcu',q:'L\'insuffisance mitrale donne un souffle holo-systolique qui irradie vers :',opts:['Les carotides','Le CREUX AXILLAIRE (souffle apexo-axillaire — suit le flux de régurgitation OG)','Le bord gauche sternal','La nuque'],correct:[1],explanation:'IM : holo-systolique + irradiation vers le creux axillaire = souffle apexo-axillaire. Timbre en "jet de vapeur". Mieux entendu en décubitus latéral gauche.'},
    {type:'qcu',q:'Le rétrécissement mitral est mieux ausculté avec :',opts:['La membrane du stéthoscope','La CLOCHE (sons graves) + décubitus latéral gauche','Le diaphragme en décubitus dorsal','La cloche en position assise'],correct:[1],explanation:'RM = sons graves → CLOCHE du stéthoscope + décubitus latéral gauche (luxe le cœur contre la paroi → amplifie les sons mitraux). Rythme de Durozier : éclat B1 + COM + roulement diastolique.'},
    {type:'qcu',q:'Le claquement d\'ouverture mitral (COM) dans le rétrécissement mitral survient :',opts:['Avant B2','0,08-0,12 secondes APRÈS B2 (proto-diastolique) — traduit la sclérose mitrale','Après B1','En mi-systole'],correct:[1],explanation:'COM = bruit sec proto-diastolique survenant 0,08-0,12 secondes après B2 → brusque mouvement en dôme de la valve mitrale sclérosée lors de l\'appel de sang en diastole. Signe pathognomonique du RM.'},
    {type:'vf',q:'Le frottement péricardique persiste en apnée, contrairement au frottement pleural.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Frottement péricardique = lié aux mouvements CARDIAQUES → persiste en apnée. Frottement pleural = lié aux mouvements RESPIRATOIRES → disparaît en apnée. Distinction essentielle.'},
    {type:'qcu',q:'Le frottement péricardique est décrit comme :',opts:['Localisé et irradiant vers le bras gauche','LOCALISÉ ("naît et meurt sur place"), superficiel, 2 temps (systole + diastole), fugace, augmenté par la pression du stéthoscope','Bilatéral, disparaissant à l\'apnée','Identique à un souffle systolique'],correct:[1],explanation:'Frottement péricardique : localisé ("naît et meurt sur place") + superficiel + 2 temps (systole + diastole = va-et-vient) + PERSISTE EN APNÉE + fugace + augmenté par la pression du stéthoscope.'},
    {type:'qcu',q:'L\'auscultation en décubitus latéral gauche amplifie les souffles :',opts:['Aortiques','MITRAUX (le cœur se rapproche de la paroi → amplifie les sons mitraux)','Tricuspidiens','Pulmonaires'],correct:[1],explanation:'Décubitus latéral gauche → luxe le cœur contre la paroi thoracique gauche → amplifie les souffles MITRAUX (IM, RM). Position assis penché en avant → amplifie les souffles AORTIQUES (RA, IA).'},
    {type:'qcu',q:'Le signe de Carvallo est :',opts:['Un souffle d\'IM majoré en inspiration','Un souffle d\'IT (insuffisance tricuspide) MAJORÉ À L\'INSPIRATION PROFONDE','Un signe de RM','Un signe de RA sévère'],correct:[1],explanation:'Signe de Carvallo = souffle d\'IT majoré à l\'INSPIRATION profonde → signe d\'IC droite (VD dilaté → dilatation de l\'anneau tricuspide → les cuspides ne se rejoignent plus).'},
    {type:'vf',q:'Chez l\'enfant, il est fréquent d\'entendre un souffle systolique physiologique qui disparaît à l\'âge adulte.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Souffle fonctionnel de l\'enfant : classiquement systolique, faible intensité, variable avec la position. Disparaît le plus souvent à l\'âge adulte. Chez l\'adulte, tout souffle est pathologique jusqu\'à preuve du contraire.'},
    {type:'qcu',q:'Le foyer mitral se situe au :',opts:['2ème EICD le long du sternum','2ème EICG le long du sternum','4-5ème EICG sur la ligne médioclaviculaire gauche (= APEX)','Appendice xiphoïdien'],correct:[2],explanation:'Foyer mitral = 4-5ème espace intercostal gauche (EICG) sur la ligne médioclaviculaire gauche = APEX (pointe du cœur). Choc de pointe habituellement palpable à ce niveau.'},
    {type:'qcu',q:'Le timbre "jet de vapeur" caractérise quel souffle ?',opts:['Rétrécissement aortique (râpeux)','INSUFFISANCE MITRALE (holo-systolique, doux, "soufflant")','Rétrécissement mitral (roulant)','Insuffisance aortique (humé, aspiratif)'],correct:[1],explanation:'IM : timbre en "jet de vapeur" (doux, soufflant). RA = râpeux et rude. IA = doux, humé, aspiratif, décroissant. RM = roulant (sons graves).'},
    {type:'qcu',q:'Un souffle de grade 2/6 est :',opts:['Très lointain, quasiment inaudible','D\'intensité moyenne, DIFFICILEMENT PERCEPTIBLE','Fort mais sans thrill','Audible à distance de la paroi'],correct:[1],explanation:'Grade 2/6 = intensité moyenne, difficilement perceptible. Grade 1/6 = très lointain. Grade 3/6 = franc, clair. Grade 4/6 = souffle palpatoire (thrill). Grade 5/6 = stéthoscope en biais. Grade 6/6 = audible à l\'oreille nue.'},
    {type:'qcu',q:'Le rythme de Durozier dans le rétrécissement mitral comprend :',opts:['B1 + B2 + B3','ÉCLAT DE B1 + COM (claquement d\'ouverture mitral) + ROULEMENT DIASTOLIQUE — "Rouf-TA TATA"','B1 + souffle systolique + B2','B2 + souffle diastolique uniquement'],correct:[1],explanation:'Rythme mitral de Durozier = 3 temps : 1) Éclat de B1 (renforcé) 2) COM (après B2) 3) Roulement diastolique. Onomatopée : "Rouf-TA TATA". Ausculté avec la CLOCHE en décubitus latéral gauche.'},
    {type:'vf',q:'L\'insuffisance aortique est TOUJOURS pathologique même chez l\'adulte jeune.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Tout souffle diastolique est pathologique. L\'IA est TOUJOURS pathologique → ne jamais le normaliser. Physiopathologie : défaut de coaptation des sigmoïdes aortiques → reflux VG en diastole.'},
    {type:'qcu',q:'Quel est l\'EIC du foyer tricuspide ?',opts:['2ème EICD','2ème EICG','Appendice XIPHOÏDIEN (processus xiphoïde)','5ème EICG'],correct:[2],explanation:'Foyer tricuspide = appendice xiphoïdien (processus xiphoïde) = bord inférieur du sternum. La tricuspide est rétrosternale → s\'ausculte à ce niveau.'},

    // ---- MOYEN ----
    {type:'cc',context:'Homme 72 ans, dyspnée d\'effort progressive depuis 6 mois. À l\'auscultation : souffle méso-systolique 3/6 rude au foyer aortique, irradiant aux carotides. B2 très atténué au foyer aortique.',q:'Quel diagnostic et quelle sévérité ?',opts:['Insuffisance mitrale','RÉTRÉCISSEMENT AORTIQUE SERRÉ : souffle méso-systolique éjectionnel + timbre rude + irradiation carotides + B2 ATTÉNUÉ/ABOLI = sévérité','Insuffisance aortique','Rétrécissement mitral'],correct:[1],explanation:'RA sévère : souffle méso-systolique rude + irradiation carotides + B2 atténué = critères de sévérité (valve rigide ne claque plus). Confirmation par ETT (surface valvulaire < 1 cm², gradient > 40 mmHg). Indication de remplacement valvulaire si symptomatique.'},
    {type:'qcu',q:'Dans l\'insuffisance aortique, quelles particularités hémodynamiques sont caractéristiques ?',opts:['PA normale + pouls filant','POULS BONDISSANT (très pulsatile) + PRESSION DIFFÉRENTIELLE ÉLARGIE (PAS haute + PAD très basse) → ex : 180/30 mmHg','Bradycardie + PA basse','Hypotension orthostatique seule'],correct:[1],explanation:'IA : reflux aortique en diastole → VG se dilate → ↑ VES (pour compenser) → PAS très haute + PAD très basse (reflux passif) → PP élargie + pouls bondissant (pouls de Corrigan). Pouls visible au cou et aux tempes.'},
    {type:'qcu',q:'Pourquoi le frottement péricardique peut-il DISPARAÎTRE dans une péricardite évolutive ?',opts:['Le patient s\'est amélioré','L\'épanchement péricardique abondant éloigne les deux feuillets → plus de friction → frottement DISPARAÎT — signe paradoxal d\'aggravation possible (tamponnade)','Le traitement antibiotique efface le frottement','C\'est un artefact auscultatoire'],correct:[1],explanation:'Frottement péricardique = friction entre les 2 feuillets. Si épanchement abondant → feuillets éloignés → plus de friction → frottement disparaît. Paradoxalement, l\'absence de frottement peut signer une aggravation (tamponnade imminente).'},
    {type:'qcu',q:'La tachycardie réflexe peut masquer les souffles diastoliques. Pourquoi les diastoliques sont-ils plus difficiles à entendre ?',opts:['Ils sont plus forts que les systoliques','La diastole est plus longue mais les sons diastoliques sont plus graves et moins intenses → nécessitent la cloche + silence absolu + position adéquate','Les souffles systoliques sont toujours graves','La diastole n\'existe pas en tachycardie'],correct:[1],explanation:'Souffles diastoliques plus difficiles à entendre : dans le grand silence (diastole), sons plus graves et moins intenses. Nécessitent : cloche (sons graves) + silence absolu + position optimale (penché en avant pour IA). IA = "le plus difficile à entendre".'},
    {type:'cc',context:'Femme 55 ans, rhumatisme articulaire aigu dans l\'enfance. Dyspnée d\'effort. Auscultation : éclat de B1 + bruit sec proto-diastolique après B2 + roulement diastolique à la pointe. Sons graves. Aucun souffle systolique.',q:'Quel diagnostic auscultatoire ?',opts:['Insuffisance mitrale','Rétrécissement aortique','RÉTRÉCISSEMENT MITRAL (rythme de Durozier : éclat B1 + COM + roulement diastolique) — contexte RAA','Insuffisance aortique'],correct:[2],explanation:'RM = rythme de Durozier : éclat B1 + COM (claquement d\'ouverture mitral, proto-diastolique après B2) + roulement diastolique. Sons graves → cloche + décubitus latéral gauche. Contexte : RAA (cause quasi-disparue en France mais présente en Afrique, Asie).'},
    {type:'vf',q:'L\'éclat de B2 au foyer pulmonaire dans le rétrécissement mitral signe une HTAP réactionnelle.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. RM → obstacle au remplissage VG → ↑ pression OG → ↑ pression veines pulmonaires → HTAP réactionnelle → ↑ fermeture de la valve pulmonaire → éclat de B2 au foyer pulmonaire.'},
    {type:'qcu',q:'Le click mitral est un bruit :',opts:['Proto-diastolique après B2 (COM du RM)','MÉSO-TÉLÉ SYSTOLIQUE, en rapport avec des anomalies des cordages/valve mitrale → souvent associé à un souffle d\'IM (prolapsus)','Présystolique','Proto-systolique'],correct:[1],explanation:'Click mitral = claquement méso-télé systolique → anomalies des cordages/valve mitrale (prolapsus valvulaire mitral). Souvent associé à un souffle d\'IM. Bruit de crécelle, souvent unique.'},
    {type:'qcu',q:'Dans l\'IC droite, la dilatation du VD peut créer un souffle. Lequel ?',opts:['Souffle de RA','Souffle d\'IA','SOUFFLE D\'IT (insuffisance tricuspide) — VD dilaté → dilatation de l\'anneau tricuspide → les cuspides ne se rejoignent plus → régurgitation','Souffle de RM'],correct:[2],explanation:'IC droite → VD dilaté → dilatation de l\'anneau tricuspide → les cuspides ne se rejoignent plus → IT fonctionnelle. Souffle systolique au foyer tricuspide, majoré à l\'inspiration (signe de Carvallo).'},
    {type:'qcm',q:'Quelles sont les positions d\'auscultation cardiaque et leurs intérêts ? (Plusieurs réponses correctes)',opts:['Décubitus dorsal — position standard','Décubitus latéral gauche — amplifie souffles MITRAUX','Assis penché en avant — amplifie souffles AORTIQUES (RA, IA)','Debout les bras levés — amplifie tous les souffles'],correct:[0,1,2],explanation:'3 positions d\'auscultation : 1) Décubitus dorsal (standard) 2) Décubitus latéral gauche → souffles mitraux ++ 3) Assis penché en avant → souffles aortiques (RA, IA) + frottement péricardique ++. Position debout les bras levés n\'est pas utilisée en cardiologie.'},
    {type:'qcu',q:'La CIA (communication interauriculaire) donne classiquement un dédoublement de B2. Quel type ?',opts:['Variable avec la respiration (physiologique)','FIXE (ne change pas avec la respiration) — pathologique chez l\'adulte — lié à l\'égalisation des volumes entre OG et OD','Uniquement à l\'expiration','Uniquement lors des efforts'],correct:[1],explanation:'CIA → shunt OG → OD → ↑ volume VD → ↑ durée éjection VD → retard de fermeture de la valve pulmonaire → dédoublement FIXE de B2 (ne varie pas avec la respiration). Pathognomonique.'},
    {type:'cc',context:'Patient 78 ans, dyspnée d\'effort. Auscultation : souffle diastolique 2/6 doux, humé, aspiratif, décroissant, mieux entendu assis penché en avant, bord gauche du sternum. Pouls très bondissant. PA = 175/35 mmHg.',q:'Quel diagnostic et quelles particularités ?',opts:['Rétrécissement aortique','Insuffisance mitrale','INSUFFISANCE AORTIQUE : souffle diastolique doux/humé/aspiratif/décroissant + irradiation BGS + position assis penché en avant + pouls bondissant + pression différentielle élargie (175/35 = PP 140 mmHg)','Rétrécissement mitral'],correct:[2],explanation:'IA confirmée : souffle diastolique (entre B2 et B1) + timbre humé/aspiratif + bord gauche sternal + amplifié assis penché en avant + pouls de Corrigan (bondissant) + PP élargie (175−35 = 140 mmHg, N < 60 mmHg). Signe d\'IA sévère et chronique.'},
    {type:'vf',q:'Le B3 (galop protodiastolique) est pathologique chez l\'adulte et évoque une dysfonction diastolique ou une IC.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. B3 = remplissage rapide du VG. Peut être normal chez le jeune ou l\'athlète. Chez l\'adulte > 40 ans → pathologique → dysfonction diastolique ou IC gauche. À entendre en décubitus latéral gauche avec la cloche.'},
    {type:'qcu',q:'Qu\'est-ce que le B4 (galop présystolique ou télédiastolique) ?',opts:['Remplissage passif du VG','Onde de choc sanguine générée par la CONTRACTION AURICULAIRE (systole atriale) → traduit une rigidité ventriculaire (HVG, IC FEVG préservée)','Fermeture de la valve aortique','Claquement de la valve mitrale'],correct:[1],explanation:'B4 = bruit télédiastolique correspondant à la contraction auriculaire forcée contre un ventricule rigide (HVG, IC FEVG préservée, HTA). Entendre avec la cloche, maximum à l\'apex. Absent en FA (pas de systole atriale).'},
    {type:'qcu',q:'L\'auscultation cardiaque nécessite le silence complet. Pourquoi une apnée peut-elle être nécessaire ?',opts:['Pour mesurer la SA02','Le bruit glottique, le murmure vésiculaire ou les frottements pleuraux peuvent masquer les bruits cardiaques → apnée = silence respiratoire','Pour éviter les syncopes','Pour amplifier les souffles'],correct:[1],explanation:'L\'apnée permet d\'éliminer les bruits respiratoires (murmure vésiculaire, frottements pleuraux, bruits glottiques) qui peuvent masquer les sons cardiaques discrets (notamment l\'IA = le plus difficile à entendre).'},
    {type:'vf',q:'Le click éjectionnel est un bruit proto-systolique qui peut évoquer un rétrécissement aortique serré.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. Click éjectionnel = claquement proto-systolique valvulaire ou pariétal → peut accompagner un RA ou une dilatation aortique (valve bicuspide, HTA). À ne pas confondre avec un B4 (télédiastolique).'},

    // ---- DIFFICILE ----
    {type:'cc',context:'Patient 45 ans, fièvre 38°C depuis 10 jours, asthénie, frissons. Auscultation : souffle systolique 3/6 au foyer mitral, nouveau (absent lors du dernier bilan). Hémocultures : Streptococcus viridans.',q:'Quel diagnostic et quelle complication auscultatoire ?',opts:['Péricardite aiguë','ENDOCARDITE INFECTIEUSE : végétations sur la valve mitrale → IM aiguë (souffle systolique nouveau) — urgence diagnostique et thérapeutique (ETT/ETO + antibiothérapie bactéricide)','Souffle fonctionnel fébrile','Rétrécissement mitral post-RAA'],correct:[1],explanation:'Endocardite infectieuse : fièvre prolongée + frissons + souffle NOUVEAU = critères de Duke positifs. Streptococcus viridans sur hémocultures. Végétations sur la mitrale → IM. ETT/ETO obligatoire. Antibiothérapie IV bactéricide prolongée (4-6 semaines).'},
    {type:'qcu',q:'Le gradient de pression entre le VG et l\'aorte dans le RA sévère est > :',opts:['10 mmHg','20 mmHg','40 mmHg (RA serré) — avec surface valvulaire < 1 cm²','100 mmHg'],correct:[2],explanation:'RA sévère = gradient moyen VG/Ao > 40 mmHg + surface valvulaire < 1 cm² + VG hypercontractile. Triade clinique : angor + dyspnée + syncope à l\'effort. Survie sans chirurgie : 2 ans si syncope, 3 ans si angor, 1-2 ans si dyspnée.'},
    {type:'vf',q:'Une insuffisance mitrale massive peut donner un tableau d\'OAP aigu sans souffle audible en urgence.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. IM aiguë massive (rupture de cordage, dysfonction ischémique de pilier) → OAP brutal → tachycardie + égalisation rapide des pressions OG/VG → le gradient de pression qui génère le souffle disparaît → souffle peut devenir inaudible malgré une IM sévère.'},
    {type:'qcu',q:'Le remplacement valvulaire aortique est indiqué dans le RA symptomatique. Quelle est l\'alternative percutanée chez le sujet à haut risque chirurgical ?',opts:['Plastie valvulaire','TAVI (Transcatheter Aortic Valve Implantation) — remplacement valvulaire aortique par voie percutanée (fémorale)','Valvuloplastie au ballonnet (efficacité limitée)','Traitement médical seul'],correct:[1],explanation:'TAVI = remplacement valvulaire aortique percutané (voie fémorale). Indiqué chez les sujets à haut risque chirurgical (EuroSCORE élevé, âge > 80 ans, comorbidités). Les résultats à long terme s\'améliorent → indications élargies aux sujets à risque intermédiaire.'},
    {type:'cc',context:'Patient 65 ans, IA modérée connue depuis 5 ans, asymptomatique. ETT actuelle : FEVG = 48 % (baisse depuis 55 % l\'an dernier), diamètre VG télésystolique = 48 mm.',q:'Quelle décision thérapeutique ?',opts:['Surveiller 1 an de plus car asymptomatique','IA asymptomatique mais avec MARQUEURS DE DYSFONCTION VG (FEVG 48 % < 55 % ou Dts ≥ 45 mm) → INDICATION CHIRURGICALE même asymptomatique (ESC 2021) pour éviter une dysfonction VG irréversible','Traitement médical seul par ARAII','Attendre la symptomatologie'],correct:[1],explanation:'IA asymptomatique avec marqueurs de dysfonction VG (FEVG < 55 % ou Dts ≥ 45 mm) → indication opératoire même sans symptômes (ESC 2021). L\'attente expose à une dysfonction VG irréversible (dépassement de la capacité de compensation).'},
    {type:'qcm',q:'Les critères de Duke modifiés pour le diagnostic d\'endocardite infectieuse comprennent comme critères MAJEURS : (Plusieurs réponses)',opts:['Hémocultures positives à germe typique (Staphylococcus aureus, streptocoques)','Végétation ou abcès à l\'échocardiographie (ETT/ETO)','Fièvre > 38°C','Nouvelle régurgitation valvulaire (souffle nouveau)'],correct:[0,1,3],explanation:'Critères de Duke majeurs : 1) Hémocultures + à germe typique (2 hémocultures distinctes) 2) Végétation/abcès à l\'ETT/ETO 3) Nouvelle régurgitation valvulaire. Critères mineurs : fièvre, ATCD cardiaques, IVDU, phénomènes vasculaires/immunologiques.'},
    {type:'qcu',q:'La cardiomyopathie hypertrophique obstructive (CMH obstructive) donne un souffle qui se comporte de manière paradoxale. Comment ?',opts:['Il augmente avec la manœuvre de Valsalva (augmentation du retour veineux)','Il AUGMENTE quand le remplissage VG DIMINUE (Valsalva, orthostatisme, effort) → ↓ VTD → ↓ chambre de chasse → ↑ obstruction → ↑ souffle — et DIMINUE avec la manœuvre de Müller','Il est toujours fixe','Il irradie toujours aux carotides'],correct:[1],explanation:'CMH obstructive (anomalie du septum) : souffle qui ↑ quand le VTD ↓ (Valsalva, debout, déshydratation → ↓ remplissage → ↓ chambre de chasse LVOT → ↑ obstruction dynamique → ↑ souffle). À l\'inverse du RA qui ne change pas avec ces manœuvres.'},
    {type:'vf',q:'L\'ETO (échocardiographie transoesophagienne) est supérieure à l\'ETT pour détecter les végétations d\'endocardite et évaluer les prothèses valvulaires.',opts:['Vrai','Faux'],correct:[0],explanation:'Vrai. ETO = sonde dans l\'œsophage (plus proche du cœur) → meilleure résolution spatiale → supérieure pour : végétations < 1 cm, abcès péri-annulaires, fuites paraprothétiques, anatomy de l\'appendice auriculaire gauche (thrombus).'},
    {type:'qcu',q:'La physiopathologie de l\'IM aiguë (rupture de cordage) diffère de l\'IM chronique compensée. Pourquoi l\'IM aiguë est-elle plus grave ?',opts:['Le souffle est plus fort','IM aiguë : OG non dilatée (compliance normale) → le reflux brutal ↑ brusquement la P OG → OAP instantané. IM chronique : OG se dilate progressivement → pression moins élevée → mieux tolérée','L\'IM aiguë touche toujours les 2 feuillets','Il n\'y a pas de différence'],correct:[1],explanation:'IM aiguë (rupture de cordage, ischémie de pilier) : OG non dilatée → compliance normale basse → reflux brutal → ↑ P OG brutale → OAP massif. IM chronique : OG se dilate sur des années (↑ compliance) → ↑ P OG plus progressive → mieux tolérée pendant longtemps.'},
    {type:'cc',context:'Homme 35 ans, valve aortique bicuspide connue. ETT : IA modérée + sténose aortique légère. Dilatation de l\'aorte ascendante à 42 mm. PA 140/85 mmHg.',q:'Quelle prise en charge globale ?',opts:['Rien → surveiller dans 5 ans','IA modérée sur bicuspide : surveillance ETT annuelle + TRAITEMENT HTA (ARAII ou IEC pour ↓ la P aortique) + surveillance de la dilatation aortique (angioscanner si > 45 mm → discuter chirurgie préventive si > 50 mm)','Remplacement valvulaire immédiat','Antibioprophylaxie pour les soins dentaires uniquement'],correct:[1],explanation:'Valve aortique bicuspide : risque de dissection aortique si dilatation (bicuspide = fragilité de la paroi aortique). Aorte 42 mm → surveillance ETT annuelle + angioscanner si > 45 mm. Traitement HTA par ARAII/IEC (↓ pression sur la paroi aortique). Chirurgie si > 50 mm (ou < 50 mm si progression rapide > 5 mm/an).'},
    {type:'qcu',q:'Le score EuroSCORE II est utilisé pour :',opts:['Évaluer le risque de récidive d\'IC','Estimer la mortalité opératoire en chirurgie cardiaque (remplacement valvulaire, pontage) → aide à choisir entre chirurgie conventionnelle et TAVI','Classer la sévérité des souffles','Calculer la FEVG'],correct:[1],explanation:'EuroSCORE II = score de mortalité opératoire prévisionnelle en chirurgie cardiaque (prend en compte : âge, sexe, FEVG, comorbidités, urgence, type de chirurgie). Si EuroSCORE II > 4 % → haut risque → préférer TAVI au remplacement valvulaire chirurgical classique.'},
    {type:'vf',q:'L\'antibioprophylaxie de l\'endocardite infectieuse est recommandée avant tout soin dentaire pour tous les patients avec valvulopathie.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Antibioprophylaxie = indiquée uniquement pour les valvulopathies À HAUT RISQUE (prothèses valvulaires, cardiopathies congénitales cyanogènes, antécédent d\'EI) lors de soins dentaires à risque (extractions, détartrage). PAS pour toutes les valvulopathies.'},
    {type:'cc',context:'Patiente 68 ans, prothèse valvulaire mécanique mitrale posée il y a 8 ans. Elle présente depuis 3 jours une fièvre à 39°C, frissons, et le bruit de la prothèse (cliquetis) semble modifié. CRP : 280 mg/L. Hémocultures en cours.',q:'Quel diagnostic prioritaire et urgence ?',opts:['Grippe saisonnière','ENDOCARDITE SUR PROTHÈSE MÉCANIQUE : fièvre + modification du bruit de prothèse (signe d\'EI sur prothèse) → ETO en urgence + antibiothérapie empirique IV bactéricide + avis chirurgical (mortalité élevée = urgence)','Surinfection pulmonaire','Péricardite postopératoire tardive'],correct:[1],explanation:'EI sur prothèse mécanique = urgence chirurgicale/infectieuse. Mortalité élevée (30-40 %). Signes : fièvre prolongée + modification du bruit de cliquetis prothétique (dysfonction de prothèse). ETO obligatoire (ETT insuffisant pour les prothèses). Antibiothérapie IV bactéricide + discussion chirurgicale (remplacement de la prothèse infectée).'},
  ]
});


// ==================== COURS 9 : IMAGERIE CARDIOVASCULAIRE ====================
COURSES.push({
  id:'imagerie',
  title:'Imagerie Cardiovasculaire',
  icon:'🩻',
  color:'#0891b2',
  iconBg:'#ecfeff',
  tags:['Scanner coronaire','IRM','Coronarographie','VPN'],
  questions:[
    // ---- FACILE ----
    {type:'qcu',q:'Quels sont les 2 grands types d\'imagerie cardiaque ?',opts:['Dynamique et statique','MORPHOLOGIQUE (anatomique) et FONCTIONNELLE','Irradiante et non irradiante','Invasive et non invasive'],correct:[1],explanation:'2 types : imagerie morphologique (coronarographie, scanner coronaire) = analyse la structure anatomique ; imagerie fonctionnelle (échocardiographie, IRM, scintigraphie) = analyse la fonction et la perfusion.'},
    {type:'qcu',q:'La coronarographie est classée comme examen :',opts:['Peu invasif, injection veineuse','INVASIF, injection iodée ARTÉRIELLE (fémorale ou radiale)','Non invasif, pas d\'injection','Peu invasif, injection de gadolinium'],correct:[1],explanation:'Coronarographie = examen invasif : abord artériel (fémoral ou radial) + injection iodée artérielle. Permet l\'angioplastie (interventionnel). Adapté à l\'urgence.'},
    {type:'qcu',q:'Le scanner coronaire (coroscanner) utilise quel type d\'injection ?',opts:['Iodée artérielle','Gadolinium veineux','IODÉE VEINEUSE — peu invasif, non interventionnel','Pas d\'injection'],correct:[2],explanation:'Scanner coronaire = injection iodée VEINEUSE → peu invasif, non interventionnel. Adapté aux patients stables (angor). Mal adapté aux urgences. ≠ Coronarographie (artérielle, interventionnelle).'},
    {type:'vf',q:'Le scanner coronaire a une excellente valeur prédictive négative (VPN) : un examen normal élimine la maladie coronaire.',opts:['Vrai','Faux'],correct:[0],explanation:'VRAI — QCM +++ Le scanner coronaire n\'a pas de faux négatifs → excellente VPN. Un scanner normal permet d\'éliminer la maladie coronaire et d\'éviter la coronarographie. En revanche, spécificité moins bonne (calcifications surestiment les sténoses).'},
    {type:'qcu',q:'L\'IRM cardiaque utilise quel produit de contraste ?',opts:['Iode (artériel)','Iode (veineux)','GADOLINIUM (veineux) — ≠ iode','Pas de produit de contraste'],correct:[2],explanation:'IRM = injection de GADOLINIUM (non iodé). Risque allergique très faible. ≠ Scanner = iode. Gadolinium : accumulation dans les noyaux gris centraux décrite pour les composés linéaires (pas de pathologie prouvée → préférer cycliques).'},
    {type:'qcu',q:'L\'échocardiographie présente la meilleure :',opts:['Résolution spatiale','RÉSOLUTION TEMPORELLE (imagerie en temps réel — on voit le cœur battre)','Précision pour les calcifications','Visualisation de la paroi vasculaire'],correct:[1],explanation:'Échocardiographie = meilleure résolution temporelle → imagerie en TEMPS RÉEL du cœur battant. Optimale chez les enfants/adolescents. Limitation : patients corpulents ou emphysémateux (peu échogènes).'},
    {type:'vf',q:'Tous les examens cardiaques sont synchronisés à l\'ECG.',opts:['Vrai','Faux'],correct:[0],explanation:'VRAI. Tous les examens d\'imagerie cardiaque sont synchronisés à l\'ECG (le cœur bouge). Imagerie en temps réel : écho, angiographie, coronarographie. Imagerie segmentée (reconstruction sur plusieurs cycles) : IRM, scintigraphie.'},
    {type:'qcu',q:'Le plan de référence en imagerie cardiaque est :',opts:['Axial standard','Sagittal','PETIT AXE (perpendiculaire au grand axe du VG) — reconstruction en œil de bœuf','Coronal'],correct:[2],explanation:'Plan de référence = PETIT AXE → reconstruction en œil de bœuf. Le cœur est un organe asymétrique → les plans standards (axial, sagittal, coronal) ne sont pas utilisés. Plans cardio : horizontal long axe (4 cavités), vertical long axe, 3 cavités, petit axe.'},
    {type:'qcu',q:'Le score calcique est réalisé :',opts:['Avec injection de gadolinium','SANS injection, synchronisé à l\'ECG — marqueur du risque coronaire','Avec injection iodée artérielle','Après effort'],correct:[1],explanation:'Score calcique = examen sans injection, synchronisé à l\'ECG. Bon marqueur du risque coronaire. Exprimé en percentile (vs population générale). Attention : score = 0 n\'élimine pas à 100 % la maladie coronaire (plaques non calcifiées invisibles).'},
    {type:'vf',q:'Un score calcique de 0 élimine à 100 % la maladie coronaire.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX — PIÈGE QCM. Score calcique = 0 n\'élimine PAS à 100 % la maladie coronaire. Le patient peut avoir des plaques non calcifiées, invisibles sans injection. Le scanner coronaire avec injection (VPN excellente) est nécessaire pour éliminer la maladie coronaire.'},
    {type:'qcu',q:'La prémédication habituelle avant un scanner coronaire comprend :',opts:['Anticoagulants + antiplaquettaires','β-BLOQUANTS (↓ FC) + DÉRIVÉS NITRÉS (dilatent les coronaires)','Diurétiques + IEC','Antiarythmiques + corticoïdes'],correct:[1],explanation:'Prémédication scanner coronaire : β-bloquants (per os ou IV) pour ralentir et régulariser la FC (meilleure qualité d\'image) + dérivés nitrés (trinitrine sub-linguale) pour dilater les vaisseaux coronaires (surtout utile chez les femmes à petits coronaires).'},
    {type:'qcu',q:'La coronarographie est la seule imagerie urgente en cas de SCA parce qu\'elle permet :',opts:['De mesurer la FEVG','Le diagnostic ET l\'angioplastie (pose de stent) = interventionnelle','D\'évaluer la viabilité myocardique','De faire un score calcique'],correct:[1],explanation:'Coronarographie = seule imagerie urgente dans le SCA. Elle est à la fois diagnostique (visualise l\'occlusion) et thérapeutique (angioplastie = passage du guide + ballonnet + pose de stent). Réalisée en salle de cathétérisme.'},
    {type:'qcu',q:'La dominance coronaire droite concerne :',opts:['20 % de la population','50 % de la population','80 % DE LA POPULATION (coronaire droite volumineuse vascularise la face inférieure)','100 % de la population'],correct:[2],explanation:'Dominance droite = 80 % de la population. La coronaire droite est volumineuse et vascularise la face inférieure du cœur. Dominance gauche (20 %) = artère circonflexe dominante.'},
    {type:'qcu',q:'L\'angor stable avec risque INTERMÉDIAIRE est exploré en première intention par :',opts:['Coronarographie d\'emblée','COROSCANNER (éliminer la maladie coronaire)','IRM de perfusion','Scintigraphie d\'effort'],correct:[1],explanation:'Stratification du risque : risque faible → pas d\'imagerie spécifique / risque intermédiaire → coroscanner (VPN excellente, non invasif) / risque élevé → coronarographie d\'emblée.'},
    {type:'vf',q:'La cardiomégalie est un signe visible à la fois à la radio thoracique et au scanner.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. Cardiomégalie (ICT > 0,5) = signe de la RADIO THORACIQUE uniquement. Pas visible au scanner (le scanner ne permet pas de mesurer le rapport cardio-thoracique de la même façon).'},
    {type:'qcu',q:'L\'OAP se distingue de la pneumonie infectieuse radiologiquement par :',opts:['La présence de bronchogramme aérien','L\'absence de bronchogramme aérien — QCM +++ (pneumonie = AVEC bronchogramme)','L\'aspect en aile de papillon uniquement','La topographie unilatérale'],correct:[1],explanation:'OAP = condensations SANS bronchogramme aérien. QCM +++ Pneumonie infectieuse = condensations AVEC bronchogramme aérien. Autre signe OAP : cardiomégalie (radio), épanchements pleuraux en aile de papillon, opacités interstitielles péri-hilaires.'},
    // ---- MOYEN ----
    {type:'qcu',q:'L\'IRM est la technique de référence pour évaluer la viabilité myocardique grâce à :',opts:['L\'imagerie en temps réel','LE REHAUSSEMENT TARDIF AU GADOLINIUM (10 min après injection)','L\'échocardiographie de stress','La scintigraphie au Tc99m'],correct:[1],explanation:'IRM = technique de référence pour la viabilité myocardique. Principe : gadolinium diffuse dans l\'espace extracellulaire → en zone de nécrose (lyse cellulaire → espace extracellulaire augmenté) → accumulation → zone en blanc au temps tardif (10 min après injection).'},
    {type:'vf',q:'« White is dead » : une zone blanche au rehaussement tardif IRM correspond à une nécrose et il est inutile de poser un stent.',opts:['Vrai','Faux'],correct:[0],explanation:'VRAI. « White is dead » = zone de nécrose → tissu mort → pas de récupération fonctionnelle possible → inutile de revasculariser (stent ou pontage). La revascularisation n\'a d\'intérêt que sur le myocarde viable (zone noire = pas de nécrose).'},
    {type:'qcu',q:'Les critères de viabilité myocardique à l\'IRM sont :',opts:['Zone blanche > 5 mm + cinétique nulle','Zone noire (pas de nécrose) + épaisseur résiduelle > 5 mm + cinétique résiduelle persistante','Zone blanche + FEVG > 50 %','Rehaussement sous-épicardique'],correct:[1],explanation:'Viabilité IRM : 1) Zone NOIRE au rehaussement tardif (pas de nécrose) 2) Épaisseur résiduelle > 5 mm 3) Cinétique résiduelle (persistance d\'un épaississement focal). Ces critères doivent être réunis pour justifier une revascularisation.'},
    {type:'qcu',q:'La réserve coronaire correspond à :',opts:['La pression de perfusion coronaire au repos','La capacité à MULTIPLIER PAR 4 le débit coronaire à l\'effort','Le débit coronaire maximum absolu','La surface totale des coronaires'],correct:[1],explanation:'Réserve coronaire = capacité à ×4 le débit coronaire à l\'effort. Expérience de Gould (chien, 1974) : à partir d\'une sténose > 50 % du diamètre, le débit coronaire s\'effondre à l\'effort. Variabilité inter-individuelle énorme (très différent homme/femme).'},
    {type:'qcu',q:'L\'adénosine (vasodilatateur) utilisée en test fonctionnel provoque :',opts:['Une vasoconstriction des coronaires normales','Une vasodilatation des coronaires NORMALES seulement → vol vasculaire (sang vers les zones saines, hypoperfusion des zones sténosées)','Une augmentation de la fréquence cardiaque','Une vasodilatation de toutes les coronaires uniformément'],correct:[1],explanation:'Adénosine = vasodilatateur : dilate les artères coronaires normales. Les sténosées ne peuvent pas se dilater → vol vasculaire → le sang va vers les zones normales → hypoperfusion des zones sténosées. Révèle une ischémie réversible. Analyse par IRM ou scintigraphie de perfusion.'},
    {type:'qcu',q:'La dobutamine mime l\'effort en :',opts:['Dilatant les coronaires saines','Accélérant la FC + augmentant les besoins en O₂ + augmentant la contraction (réserve contractile) → si ischémie = trouble de la cinétique segmentaire','Comprimant les coronaires sténosées','Bloquant les récepteurs β'],correct:[1],explanation:'Dobutamine = amine vasopressive qui mime l\'effort : ↑ FC + ↑ besoins en O₂ + ↑ contractilité. Si ischémie → défaut d\'O₂ → trouble de la cinétique segmentaire. Utilisée chez les patients incapables de faire un effort. Surveillance étroite obligatoire.'},
    {type:'qcu',q:'L\'infarctus du myocarde a un épicentre de nécrose :',opts:['Sous-épicardique','SOUS-ENDOCARDIQUE (artères arrivent de la périphérie et plongent → zone la plus éloignée = la plus touchée)','Transmural uniformément','Au niveau de l\'épicarde uniquement'],correct:[1],explanation:'IM : épicentre SOUS-ENDOCARDIQUE. Les artères coronaires arrivent de l\'épicarde et plongent vers l\'endocarde → la zone la plus éloignée (endocarde) est la plus hypoxique. La nécrose progresse en front de vague vers l\'épicarde. Peut être transmural si obstruction prolongée.'},
    {type:'qcu',q:'L\'imagerie de référence pour la dissection aortique en urgence est :',opts:['IRM (trop lente)','Échographie transthoracique','SCANNER INJECTÉ EN URGENCE (vital — le plus rapide et le plus disponible)','Coronarographie'],correct:[2],explanation:'Dissection aortique = urgence vitale → scanner injecté en urgence. Mécanisme : rupture de l\'intima → clivage de la média. ETO possible mais moins disponible. IRM possible mais trop lente. Scanner = 1er choix absolu.'},
    {type:'qcu',q:'L\'imagerie de référence pour l\'embolie pulmonaire est :',opts:['IRM pulmonaire','ANGIOSCANNER PULMONAIRE (1ère intention)','Scintigraphie V/P (2ème intention)','Coronarographie'],correct:[1],explanation:'EP = angioscanner pulmonaire (1ère intention). Signes : défect endoluminal artériel + dilatation VD + infarctus pulmonaire + épanchement pleural souvent minime. Scintigraphie ventilation/perfusion = 2ème intention (emboles distaux ou discordance tableau/scanner normal).'},
    {type:'qcu',q:'La myocardite se distingue de l\'infarctus à l\'IRM par le siège du rehaussement tardif :',opts:['Sous-endocardique dans les deux cas','SOUS-ÉPICARDIQUE dans la myocardite (≠ sous-endocardique dans l\'infarctus)','Transmural dans les deux cas','Il n\'y a pas de rehaussement dans la myocardite'],correct:[1],explanation:'PIÈGE IRM : Infarctus → rehaussement SOUS-ENDOCARDIQUE (nécrose ischémique). Myocardite → rehaussement SOUS-ÉPICARDIQUE (inflammation + nécrose d\'origine infectieuse/inflammatoire). Différentiel myocardite vs péricardite = élévation de la troponine (myocardite).'},
    {type:'qcu',q:'Le VG est analysé en 17 segments organisés en couronnes. La couronne basale comprend les segments :',opts:['1 à 6 (basale externe)','7 à 12 (médio-ventriculaire)','13 à 16 (apicale)','Segment 17 uniquement (apex)'],correct:[0],explanation:'Modèle 17 segments du VG : couronne basale (externe) = segments 1 à 6 / médio-ventriculaire = 7 à 12 / apicale = 13 à 16 / apex = segment 17 (au centre de la cible en vue œil de bœuf). Plan de référence = petit axe.'},
    {type:'qcu',q:'La scintigraphie cardiaque couplée au test d\'effort présente comme avantage en France :',opts:['Absence de radiations ionisantes','DISPONIBILITÉ et fréquente utilisation en France malgré radiations ionisantes et coût','Absence d\'injection','Imagerie en temps réel'],correct:[1],explanation:'Scintigraphie cardiaque + effort : disponible et très utilisée en France. Défaut réversible de captation du radiotraceur à l\'effort = ischémie. Inconvénients : radiations ionisantes + coûteuse. Fixation normale au repos mais mauvaise à l\'effort = ischémie.'},
    {type:'vf',q:'L\'épreuve d\'effort simple (sans imagerie) a une excellente sensibilité et spécificité pour détecter l\'ischémie.',opts:['Vrai','Faux'],correct:[1],explanation:'FAUX. L\'épreuve d\'effort simple = sensibilité et spécificité MÉDIOCRES. Faux positifs chez la femme. Risque de mort subite si coronaire sévère. Technique abandonnée dans certains pays. Le prof la qualifie d\'« examen merdique ».'},
    // ---- DIFFICILE ----
    {type:'qcu',q:'Le scanner coronaire a une moins bonne spécificité que la coronarographie parce que :',opts:['Il ne voit pas les petites artères','Les CALCIFICATIONS surestiment les sténoses (artifact de durcissement → le lumen semble plus réduit qu\'il ne l\'est réellement)','La résolution temporelle est insuffisante','Il ne peut pas faire de reconstructions multiplanaires'],correct:[1],explanation:'Scanner coronaire : moins bonne spécificité à cause des calcifications coronaires → les calcifications créent un artifact qui surévalue le degré de sténose. Plus la lésion est calcifiée, moins le scanner est précis. Coronarographie reste le gold standard pour la mesure des sténoses.'},
    {type:'cc',context:'Homme 33 ans, obèse, sédentaire, douleur thoracique. Écho : aorte ascendante dilatée à 43 mm. Scanner cardiaque : sténose IVA proximal 60 % (plaque grise = graisseuse) + sténose IVA moyenne 98 % (plaque blanche = calcifiée). Test adénosine : septum noir (déficit perfusionnel). Rehaussement tardif : tout noir.',q:'Quelle interprétation du rehaussement tardif et quelle décision ?',opts:['Infarctus étendu → traitement médical seul','Noir = PAS DE NÉCROSE = ischémie SANS infarctus → revascularisation indiquée (2 angioplasties) + prévention CV','Tout blanc = nécrose totale → pas de stent','IRM anormale → transplantation'],correct:[1],explanation:'Rehaussement tardif NOIR = pas de blanc = pas de nécrose. Le patient a une ischémie (déficit perfusionnel à l\'adénosine) sans infarctus. Myocarde viable → revascularisation INDIQUÉE. Traitement : angioplastie de la sténose à 98 % d\'abord puis à 60 % + prévention CV intensive.'},
    {type:'qcu',q:'En cas de sténose coronaire SANS retentissement hémodynamique, le traitement est :',opts:['Angioplastie d\'emblée','TRAITEMENT MÉDICAL (statines + antiagrégants plaquettaires) — revascularisation uniquement si retentissement hémodynamique prouvé','Pontage aorto-coronarien','Rien'],correct:[1],explanation:'Principe de l\'imputabilité : une sténose visible au scanner n\'est pas forcément responsable des symptômes. Si sténose sans retentissement hémodynamique → traitement médical. Si sténose avec retentissement → revascularisation (angioplastie ou pontage). L\'imagerie fonctionnelle fait le lien.'},
    {type:'qcu',q:'La plaque graisseuse au scanner coronaire apparaît :',opts:['En blanc (hyperdense)','En GRIS (isodense ou hypodense — lipidique) — ≠ plaque calcifiée = blanche','En noir','En rouge'],correct:[1],explanation:'Scanner coronaire : plaque graisseuse = grise (densité lipidique faible). Plaque calcifiée = blanche (hyperdense). La couleur de la plaque est un critère de composition et de risque de rupture (plaque graisseuse = plus instable = plus à risque de thrombose).'},
    {type:'qcm',q:'Les signes à la radio thoracique d\'un OAP sont : (plusieurs réponses)',opts:['Cardiomégalie (ICT > 0,5)','Épanchements pleuraux en aile de papillon','Opacités interstitielles à prédominance péri-hilaire','Condensations avec bronchogramme aérien'],correct:[0,1,2],explanation:'OAP à la radio thoracique : cardiomégalie (ICT > 0,5) + épanchements pleuraux en aile de papillon + opacités interstitielles péri-hilaires. Condensations SANS bronchogramme (avec bronchogramme = pneumonie infectieuse). La cardiomégalie = signe radio uniquement (pas au scanner).'},
    {type:'qcu',q:'Pour différencier une cardiopathie dilatée ischémique d\'une non ischémique, la technique de référence est :',opts:['L\'échocardiographie (FEVG)','L\'IRM (rehaussement tardif — ischémique = sous-endocardique ; non ischémique = absent ou sous-épicardique)','La scintigraphie cardiaque','Le scanner coronaire'],correct:[1],explanation:'IRM = technique de référence pour différencier cardiopathie ischémique vs non ischémique grâce au rehaussement tardif. Ischémique : rehaussement sous-endocardique (territoire coronarien). Non ischémique (myocardite, sarcoïdose) : rehaussement absent ou sous-épicardique/mésocardique.'},
    {type:'cc',context:'Femme 45 ans, douleur thoracique depuis 3h. ECG : pas de sus-décalage ST. Troponine légèrement élevée. IRM : rehaussement sous-épicardique inféro-latéral, pas de rehaussement sous-endocardique. Pas de sténose coronaire.',q:'Quel diagnostic ?',opts:['Infarctus du myocarde sans sus-décalage ST (NSTEMI)','MYOCARDITE AIGUË : rehaussement SOUS-ÉPICARDIQUE + troponine élevée + absence de sténose coronaire','Dissection aortique','Embolie pulmonaire'],correct:[1],explanation:'Myocardite aiguë : rehaussement SOUS-ÉPICARDIQUE (≠ infarctus = sous-endocardique) + troponine élevée (≠ péricardite = troponine normale) + coronaires saines. IRM = examen de référence pour le diagnostic positif. Complication : cicatrice myocardique → trouble du rythme tardif.'},
    {type:'vf',q:'La toxicité rénale est plus importante avec une injection iodée artérielle que veineuse (phénomène de 1er passage).',opts:['Vrai','Faux'],correct:[0],explanation:'VRAI. Injection artérielle → 1er passage → produit iodé direct dans les artères rénales → toxicité rénale élevée. Injection veineuse → 2ème passage → passe par le poumon, le cœur → beaucoup plus dilué → toxicité rénale quasi nulle (on peut donner à presque tout le monde).'},
    {type:'qcu',q:'L\'IRM cardiaque permet de mesurer pour l\'IC :',opts:['Uniquement la FEVG','FEVG + volumes VG + masse ventriculaire gauche + différenciation cardiopathie ischémique vs non ischémique','Score calcique + sténoses coronaires','Pression artérielle pulmonaire directement'],correct:[1],explanation:'IRM cardiaque pour l\'IC : mesure FEVG + volumes VG + masse ventriculaire gauche + rehaussement tardif (ischémique vs non ischémique). C\'est la technique de référence pour caractériser la cardiopathie dilatée et décider de la revascularisation.'},
  ]
});

// ==================== COURS 10 : EMBRYOLOGIE CARDIAQUE ====================
COURSES.push({
  id:'embryo',
  title:'Embryologie Cardiaque',
  icon:'🧬',
  color:'#16a34a',
  iconBg:'#f0fdf4',
  tags:['Îlots de Wolff','Tube cardiaque','Arcs aortiques','Canal de Botal'],
  questions:[
    // ---- FACILE ----
    {type:'qcu',q:'Tout l\'appareil circulatoire dérive de quel feuillet embryonnaire ?',opts:['Endoblaste','Ectoblaste','MÉSOBLASTE (= mésenchyme = tissu conjonctif)','Trophoblaste'],correct:[2],explanation:'Tout l\'appareil circulatoire dérive du MÉSOBLASTE (= mésenchyme = tissu conjonctif). Le développement débute dans le mésenchyme qui double la vésicule ombilicale (= vésicule vitelline), en dehors de l\'embryon. Raccordement intra-embryonnaire dès la 4ème semaine.'},
    {type:'qcu',q:'Les îlots de Wolff et Pander donnent quelles structures ?',opts:['Centre → cellules endothéliales / Périphérie → cellules souches sanguines','PÉRIPHÉRIE → cellules endothéliales / CENTRE → cellules souches sanguines','Uniquement des cellules sanguines','Uniquement des cellules endothéliales'],correct:[1],explanation:'Îlots de Wolff et Pander : PÉRIPHÉRIE → cellules endothéliales (délimitant les vaisseaux) / CENTRE → cellules souches sanguines (nucléées → hématopoïèse). Les premières cellules sanguines ont la même origine embryologique que les cellules endothéliales.'},
    {type:'qcu',q:'L\'hématopoïèse suit quelle chronologie ?',opts:['Moelle osseuse → foie → vésicule ombilicale','VÉSICULE OMBILICALE → foie → moelle osseuse','Foie → vésicule ombilicale → moelle osseuse','Vésicule ombilicale → moelle osseuse → foie'],correct:[1],explanation:'Hématopoïèse : 1) Vésicule ombilicale (= vésicule vitelline) 2) Foie (dès le milieu de la 3ème semaine dans le septum transversum) 3) Moelle osseuse (définitive). Quand la vésicule ombilicale disparaît (fin 2ème mois), le foie prend le relais.'},
    {type:'vf',q:'La tératologie est maximale pendant les 2 premiers mois (période embryonnaire).',opts:['Vrai','Faux'],correct:[0],explanation:'VRAI. Les organes se forment pendant la PÉRIODE EMBRYONNAIRE (2 premiers mois) → tératologie maximale. Ils se développent ensuite pendant la période fœtale. C\'est pourquoi les médicaments et infections du 1er trimestre sont les plus dangereux.'},
    {type:'qcu',q:'Le développement de l\'appareil circulatoire suit 3 stades dans l\'ordre :',opts:['Placentaire → vitellin → néonatal','VITELLIN → placentaire → néonatal','Néonatal → placentaire → vitellin','Vitellin → néonatal → placentaire'],correct:[1],explanation:'3 stades : 1) VITELLIN (embryon vit sur ses réserves) 2) PLACENTAIRE (organe intermédiaire mère-fœtus, dès J30 environ) 3) NÉONATAL (organisme autonome après la naissance : poumons = O₂, métanéphros = épuration, réseau mésentérique = nutrition).'},
    {type:'qcu',q:'Au stade vitellin, la circulation vitelline disparaît à la fin du 2ème mois. Quel est son vestige ?',opts:['Vaisseaux iliaques','VAISSEAUX MÉSENTÉRIQUES SUPÉRIEURS','Artères ombilicales','Canal artériel'],correct:[1],explanation:'Circulation vitelline disparaît fin 2ème mois → vestige unique = vaisseaux mésentériques SUPÉRIEURS. Pendant le stade placentaire, la circulation allantoïdienne devient placentaire et prédomine (oxygénation + nutrition + épuration).'},
    {type:'qcu',q:'Le tube cardiaque se forme par fusion de :',opts:['2 aortes dorsales','2 TUBES ENDOCARDIQUES (issus de la splanchnopleure, J22 dans le sens cranio-caudal)','4 îlots de Wolff','2 sinus veineux'],correct:[1],explanation:'J20 : apparition d\'îlots dans la splanchnopleure → confluence en 2 TUBES ENDOCARDIQUES. J22 : fusion des 2 tubes dans le sens cranio-caudal → disparition des mésocardes → cavité péricardique. Mésenchyme autour du tube → myocarde.'},
    {type:'qcu',q:'Le tube cardiaque au J25 donne 4 dilatations. De bas en haut, la 1ère (la plus basse) est :',opts:['L\'oreillette primitive','Le bulbe artériel','LE SINUS VEINEUX (reçoit les veines caves, vitellines, ombilicales et canaux de Cuvier)','Le ventricule primitif'],correct:[2],explanation:'4 dilatations J25 (de bas en haut) : 1) SINUS VEINEUX 2) Oreillette primitive 3) Ventricule primitif 4) Bulbe artériel. Après courbure du tube : ventricules en AVANT, oreillettes en ARRIÈRE → correspond à l\'anatomie adulte.'},
    {type:'vf',q:'Après la courbure du tube cardiaque, les ventricules se retrouvent en avant et les oreillettes en arrière.',opts:['Vrai','Faux'],correct:[0],explanation:'VRAI. Le tube cardiaque se plie (limité par l\'espace) : ventricule se retrouve au milieu puis en avant, oreillettes passent en arrière. Courbure dans les 2 plans (sagittal et frontal). C\'est pourquoi chez l\'adulte : ventricules = avant, oreillettes = arrière.'},
    {type:'qcu',q:'Le cloisonnement interauriculaire commence pendant la :',opts:['3ème semaine','4ème semaine','5ÈME SEMAINE','7ème semaine'],correct:[2],explanation:'Cloisonnement interauriculaire = commence au cours de la 5ÈME SEMAINE. Par le septum primum puis le septum secundum. PIÈGE EXAMEN : l\'ostium primum ET l\'ostium secundum sont tous les deux dans le SEPTUM PRIMUM (pas dans le septum secundum).'},
    {type:'qcu',q:'L\'ostium primum et l\'ostium secundum sont situés dans :',opts:['Le septum secundum','LE SEPTUM PRIMUM (les deux — piège d\'examen !)','L\'un dans chaque septum','Le canal de Botal'],correct:[1],explanation:'PIÈGE EXAMEN +++ : L\'ostium primum ET l\'ostium secundum sont tous les deux dans le SEPTUM PRIMUM — pas dans le septum secundum. L\'ostium primum disparaît. Le septum secundum se forme à droite du septum primum et ferme l\'ostium secundum.'},
    {type:'qcu',q:'Le canal de Botal est :',opts:['Une communication VG-OG','UNE COMMUNICATION INTER-AURICULAIRE entre les 2 septums — shunt D→G fœtal','Une communication entre l\'aorte et l\'artère pulmonaire','Un canal veineux hépatique'],correct:[1],explanation:'Canal de Botal = communication inter-auriculaire entre les 2 septums (primum et secundum). Fonctionne comme une valvule : dirige une partie du sang de la VCI vers l\'OG = shunt D→G fœtal. N\'existe pas chez l\'adulte sain. Si persistant → souffle continu.'},
    {type:'qcu',q:'Le cloisonnement interventriculaire a 2 parties d\'origines différentes. La partie haute membraneuse (très fragile) vient des :',opts:['Septum inferius (partie basse musculaire)','BOURRELETS AORTICO-PULMONAIRES — d\'où la fréquence des CIV hautes membraneuses','Septum intermedium','Canal de Cuvier'],correct:[1],explanation:'Septum IV : 2 parties : 1) Basse (musculaire) = septum inferius 2) Haute (membraneuse, très fragile) = bourrelets aortico-pulmonaires. La cloison a donc 2 origines → CIV haute (membraneuse) = très fréquente / CIV basse (musculaire) = beaucoup plus rare.'},
    {type:'qcu',q:'Le bulbe artériel se cloisonne grâce à une cloison :',opts:['Frontale simple','HÉLICOÏDALE (bourrelets aortico-pulmonaires en spirale) → aorte et AP s\'enroulent l\'une autour de l\'autre','Sagittale simple','Transversale'],correct:[1],explanation:'Cloisonnement du bulbe : bourrelets aortico-pulmonaires descendent en SPIRALE → septum aortico-pulmonaire = cloison HÉLICOÏDALE (non frontale). Résultat : aorte (en arrière) et artère pulmonaire (en avant) s\'enroulent l\'une autour de l\'autre. AP est en AVANT de l\'aorte.'},
    {type:'vf',q:'L\'artère pulmonaire est en avant de l\'aorte.',opts:['Vrai','Faux'],correct:[0],explanation:'VRAI. Le bulbe artériel donne l\'aorte (en arrière) et l\'artère pulmonaire (en avant). Le cloisonnement hélicoïdal du bulbe explique cette disposition. De même, chez l\'adulte, l\'artère pulmonaire est antérieure à l\'aorte ascendante.'},
    // ---- MOYEN ----
    {type:'qcu',q:'Il existe 6 paires d\'arcs aortiques. L\'arc LE PLUS IMPORTANT est :',opts:['Arc I (artère maxillaire interne)','Arc III (carotide interne)','ARC IV — gauche = crosse aortique définitive / droite = partie proximale sous-clavière droite','Arc VI (artères pulmonaires)'],correct:[2],explanation:'Arc IV = LE PLUS IMPORTANT (à connaître +++). Gauche → CROSSE AORTIQUE DÉFINITIVE (se continue avec l\'aorte dorsale primitive gauche, sous-clavière gauche naît directement de l\'aorte). Droite → partie proximale de la sous-clavière droite (aorte dorsale droite disparaît).'},
    {type:'qcu',q:'L\'arc VI gauche donne :',opts:['Crosse aortique','Artère carotide primitive','CANAL ARTÉRIEL (persiste jusqu\'à la naissance) — dérive le sang de l\'AP vers l\'aorte','Artère pulmonaire droite uniquement'],correct:[2],explanation:'Arc VI : droite → disparaît totalement. Gauche → artères pulmonaires + CANAL ARTÉRIEL (communication entre AP et aorte dorsale primitive). Persiste jusqu\'à la naissance. Oblitération fonctionnelle puis anatomique dans les jours suivant la naissance.'},
    {type:'qcu',q:'La VCI provient de :',opts:['La veine cardinale antérieure','LA VEINE SOUS-CARDINALE (veine interne du corps de Wolff = veine inter-mésonéphrotique)','La veine ombilicale','Le canal de Cuvier'],correct:[1],explanation:'VCI = veine sous-cardinale (veine interne du corps de Wolff = veine inter-mésonéphrotique). Elle s\'anastomose avec la cardinale postérieure et récupère tout le sang. 3 anastomoses gauche→droite : en haut (tronc brachio-céphalique G) + milieu (système azygos) + bas (veine iliaque primitive G).'},
    {type:'qcu',q:'La VCS définitive est formée par :',opts:['Les 2 canaux de Cuvier','Canal de Cuvier DROIT + partie proximale de la veine cardinale antérieure DROITE','La veine sous-cardinale droite','La veine ombilicale droite'],correct:[1],explanation:'VCS définitive = canal de Cuvier DROIT + partie proximale de la veine cardinale antérieure DROITE. Canal de Cuvier gauche → sinus veineux coronaire (court segment). Veine cardinale antérieure gauche → veine intercostale supérieure gauche.'},
    {type:'qcu',q:'Les veines pulmonaires dérivent de :',opts:['Les veines cardinales antérieures','Les veines vitellines','NÉOGENÈSE (ne dérivent d\'aucun vaisseau primitif)','Les veines ombilicales'],correct:[2],explanation:'Veines pulmonaires = NÉOGENÈSE (formation de novo). 1 seul vaisseau venu des ébauches pulmonaires pénètre dans la paroi dorsale de l\'OG → partiellement incorporé dans la paroi auriculaire jusqu\'à ses branches d\'origine. ≠ autres veines qui dérivent de vaisseaux primitifs.'},
    {type:'qcu',q:'Le canal d\'Arantius (conduit veineux) permet au fœtus de :',opts:['Faire passer le sang de l\'OD vers l\'OG','Court-circuiter les poumons via le canal artériel','COURT-CIRCUITER LE FOIE (sang de la veine ombilicale → VCI directement, sans passer par la veine porte)','Irriguer la moelle épinière'],correct:[2],explanation:'Canal d\'Arantius = conduit veineux. Chez le fœtus : sang oxygéné de la veine ombilicale → VCI en court-circuitant le foie. Avec le foramen ovale (canal de Botal) et le canal artériel = 3 shunts fœtaux essentiels pour la perfusion cérébrale. Fermeture : 1ère semaine de vie → ligament veineux du foie.'},
    {type:'qcm',q:'Les 3 shunts fœtaux sont : (Plusieurs réponses)',opts:['Canal de Botal (foramen ovale) — OD→OG','Canal artériel (arc VI gauche) — AP→Aorte','Canal d\'Arantius (conduit veineux) — V. ombilicale→VCI court-circuit foie','Canal de Cuvier — cardinales→sinus veineux'],correct:[0,1,2],explanation:'3 shunts fœtaux : 1) Canal de Botal (foramen ovale) : OD→OG = court-circuit pulmonaire 2) Canal artériel (arc VI gauche) : AP→Aorte = court-circuit pulmonaire 3) Canal d\'Arantius : V. ombilicale→VCI = court-circuit hépatique. Fermeture à la naissance (O₂, ↑ pression OG, prostaglandines).'},
    {type:'qcu',q:'Si le canal d\'Arantius ne se ferme pas dans la première semaine de vie, cela entraîne :',opts:['Un souffle cardiaque continu','Un SHUNT PORTO-SYSTÉMIQUE intra-hépatique (sang de la porte court-circuite le foie)','Une malformation aortique','Un retard de croissance'],correct:[1],explanation:'Canal d\'Arantius non fermé → shunt porto-systémique INTRA-HÉPATIQUE : le sang veineux portal court-circuite le foie → encéphalopathie hépatique possible. Normalement : fermeture 1ère semaine de vie → vestige = ligament veineux du foie.'},
    {type:'qcu',q:'La tétralogie de Fallot représente quel % des cardiopathies congénitales ?',opts:['2 %','5 %','11 % — la plus fréquente des cardiopathies cyanogènes','25 %'],correct:[2],explanation:'Tétralogie de Fallot = 11 % de l\'ensemble des cardiopathies congénitales = la plus fréquente des cardiopathies cyanogènes. 4 éléments : 1) Sténose artère pulmonaire 2) CIV 3) Aorte à cheval sur les 2 ventricules 4) Hypertrophie VD.'},
    {type:'qcm',q:'La tétralogie de Fallot comprend : (Plusieurs réponses)',opts:['Sténose de l\'artère pulmonaire','CIV (communication inter-ventriculaire)','Aorte à cheval sur les 2 ventricules','Hypertrophie ventriculaire droite'],correct:[0,1,2,3],explanation:'Tétralogie de Fallot = 4 anomalies : 1) Sténose AP 2) CIV 3) Aorte à cheval sur les 2 ventricules (dextroposition) 4) Hypertrophie VD (réactionnelle à la sténose AP). Résultat : shunt D→G → cyanose. Mnémotechnique : « 1234 de Fallot ».'},
    {type:'qcu',q:'L\'atrésie tricuspidienne est caractérisée par :',opts:['Absence de valve aortique','ABSENCE D\'ORIFICE AURICULO-VENTRICULAIRE DROIT → atrophie VD + hypertrophie VG + cyanose très intense','Sténose pulmonaire isolée','CIA uniquement'],correct:[1],explanation:'Atrésie tricuspidienne : absence d\'orifice AV droit → sang ne peut pas passer de l\'OD au VD → atrophie VD + hypertrophie VG + cyanose très intense. Survie uniquement si CIA + CIV ou persistance du canal artériel permettant un shunt.'},
    {type:'vf',q:'Le septum intermedium se forme par soudure de 2 bourrelets endocardiques antérieur et postérieur du canal atrio-ventriculaire.',opts:['Vrai','Faux'],correct:[0],explanation:'VRAI. Septum intermedium : 2 bourrelets endocardiques (sur les parois dorsale et ventrale du canal AV) se soudent → septum intermedium → fermeture entre oreillette et ventricule → futurs orifices mitral (G) et tricuspide (D) au J40.'},
    // ---- DIFFICILE ----
    {type:'qcu',q:'Quelle est la particularité anatomique de l\'artère coronaire droite par rapport à toutes les autres artères du corps ?',opts:['Elle est la seule paire','Elle est la seule qui irrigue le septum','CALIBRE CONSTANT depuis son origine (la seule artère du corps humain avec cette caractéristique) — forme en C','Elle est la seule à ne pas avoir de branches'],correct:[2],explanation:'Artère coronaire droite : artère simple, chemine dans le sillon AV droit → face inférieure du cœur. Forme en C avec CALIBRE CONSTANT depuis son origine = la seule artère du corps humain avec cette particularité. Dominance droite chez 80 % de la population.'},
    {type:'qcu',q:'L\'arc I aortique régresse pour donner :',opts:['Carotide interne','ARTÈRE MAXILLAIRE INTERNE (constitué par incurvation de l\'aorte ventrale, enfoui dans l\'arc mandibulaire)','Sous-clavière gauche','Artère pulmonaire'],correct:[1],explanation:'Arc I → régresse → artère maxillaire interne (enfoui dans l\'arc mandibulaire). Arc II → artère caisse du tympan + artère hyoïdienne (disparaît après le 31ème jour). Arc III → carotide interne (proximale). Arc IV → crosse aortique (gauche) ou sous-clavière droite.'},
    {type:'qcu',q:'Quel est le vestige de la veine cardinale antérieure gauche ?',opts:['Sinus veineux coronaire','VEINE INTERCOSTALE SUPÉRIEURE GAUCHE (court segment résiduel)','Veine cave supérieure gauche','Veine brachio-céphalique gauche'],correct:[1],explanation:'Veine cardinale antérieure gauche → au-dessus de l\'anastomose brachio-céphalique → ne persiste que sur un court segment = VEINE INTERCOSTALE SUPÉRIEURE GAUCHE. Canal de Cuvier gauche → sinus veineux coronaire. Les cardinales antérieures deviennent les jugulaires internes.'},
    {type:'cc',context:'Nouveau-né J2, souffle cardiaque continu, cyanose légère, saturation 88 %. Echo : dilatation du VD et flux continu entre aorte et artère pulmonaire.',q:'Quel diagnostic embryologique et quel mécanisme ?',opts:['CIA avec shunt','PERSISTANCE DU CANAL ARTÉRIEL (arc VI gauche) : communication entre l\'AP et l\'aorte → shunt G→D (ou D→G si résistances pulmonaires élevées) → souffle continu','CIV haute membraneuse','Atrésie aortique'],correct:[1],explanation:'Canal artériel persistant : normalement fermeture fonctionnelle dans les jours suivant la naissance (O₂ + chute des prostaglandines). Persistance → communication AP-aorte → shunt. Traitement : ibuprofène/indométacine (prématurés) ou fermeture chirurgicale/percutanée. Dérive de l\'arc VI gauche.'},
    {type:'qcu',q:'Dans la dissection aortique, l\'arc IV est impliqué. Si la dissection commence en aval de l\'origine de la sous-clavière gauche, elle est classée :',opts:['Stanford A (ascendante, urgence chirurgicale immédiate)','STANFORD B (descendante — origine embryologique arc IV gauche qui devient la crosse aortique) — traitement médical en 1ère intention','Classification DeBakey I','Non classable'],correct:[1],explanation:'Rappel embryo-clinique : arc IV gauche → crosse aortique. Stanford A = aorte ascendante impliquée → urgence chirurgicale absolue. Stanford B = pas d\'aorte ascendante → traitement médical (β-bloquants ↓ PA ↓ dP/dt) ± endoprothèse si complication.'},
    {type:'qcu',q:'La CIV la plus fréquente est de type :',opts:['Basse musculaire (septum inferius)','HAUTE MEMBRANEUSE (bourrelets aortico-pulmonaires) — la plus fréquente car partie la plus fragile','Totale (ventricule unique)','Supracristale (infundibulaire)'],correct:[1],explanation:'CIV haute membraneuse = la plus fréquente (bourrelets aortico-pulmonaires = partie haute très fragile). CIV basse musculaire (septum inferius) = beaucoup plus rare. La localisation haute est plus risquée car proche des valves sigmoïdes.'},
    {type:'cc',context:'Homme 30 ans, syndrôme de Marfan, valvulopathie aortique bicuspide. Aorte ascendante 48 mm. Pas de symptôme.',q:'Quelle surveillance et quel seuil chirurgical compte tenu de l\'origine embryologique de l\'aorte ?',opts:['Rien — asymptomatique','Surveillance ETT/angioscanner annuel ; chirurgie si dilatation ≥ 50 mm (ou < 50 mm si progression rapide > 5 mm/an) car la paroi aortique est fragilisée (valve bicuspide = anomalie de l\'arc IV)','Attendre les symptômes','Coronarographie systématique'],correct:[1],explanation:'Valve aortique bicuspide = anomalie de l\'arc IV + fragilité intrinsèque de la média aortique → risque de dissection. Surveillance ETT/angioscanner annuel. Seuil chirurgical : ≥ 50 mm (ou < 50 mm si progression > 5 mm/an, ou ≥ 45 mm dans le syndrome de Marfan).'},
    {type:'qcu',q:'La cirrhose réactive une circulation collatérale ombilicale par :',opts:['Réouverture du canal d\'Arantius','DÉPLISSEMENT DE L\'OMBILIC avec circulation collatérale ombilicale (réactivation de la veine ombilicale embryonnaire oblitérée)','Formation d\'un nouveau canal veineux','Dilatation des veines azygos uniquement'],correct:[1],explanation:'Cirrhose → hypertension portale → réouverture des veines péri-ombilicales (déplissement de l\'ombilic) → circulation collatérale ombilicale visible cliniquement (tête de méduse). La veine ombilicale gauche persiste comme ligament rond du foie qui peut se recanaliser.'},
    {type:'vf',q:'Le système des veines azygos représente une anastomose capitale entre les 2 veines caves.',opts:['Vrai','Faux'],correct:[0],explanation:'VRAI. Veines azygos = anastomose capitale VCS-VCI. Grande azygos (cardinale postérieure droite proximale) → se jette dans VCS. Petite azygos (cardinale postérieure gauche moyenne) → se jette dans grande azygos. En cas d\'obstruction d\'une veine cave, les azygos permettent le retour veineux.'},
    {type:'cc',context:'Nourrisson 6 mois, cyanose progressive, saturation 75 %, souffle systolique 4/6. Echo : sténose pulmonaire sévère + CIV large + aorte à cheval sur les 2 ventricules + hypertrophie VD.',q:'Quel diagnostic, quelle anatomie embryologique et quel traitement ?',opts:['Atrésie tricuspidienne','TÉTRALOGIE DE FALLOT (4 anomalies) — origine embryologique : malrotation du septum aortico-pulmonaire lors du cloisonnement bulbaire → sténose AP + dextroposition aortique + CIV + HVD réactionnelle — correction chirurgicale','CIA isolée','Transposition des gros vaisseaux'],correct:[1],explanation:'Tétralogie de Fallot : 1) Sténose AP 2) CIV 3) Aorte à cheval 4) HVD. Origine embryologique : malrotation du cloisonnement bulbaire (septum aortico-pulmonaire). Shunt D→G → cyanose. Traitement : correction chirurgicale (fermeture CIV + levée de la sténose pulmonaire). En attente : shunt de Blalock-Taussig (A. sous-clavière → AP).'},
  ]
});

// APP STATE
// ============================================================
let currentCourse = null;
let currentIndex = 0;
let answers = {}; // {qIndex: {selected: [], submitted: bool, correct: bool}}
let courseProgress = {}; // {courseId: {done: 0, correct: 0}}

function init() {
  renderCourseGrid();
}

function renderCourseGrid() {
  const grid = document.getElementById('courses-grid');
  grid.innerHTML = COURSES.map((c, i) => {
    const prog = courseProgress[c.id] || {done:0, correct:0};
    const pct = c.questions.length > 0 ? Math.round(prog.done/c.questions.length*100) : 0;
    const qTypes = countTypes(c.questions);
    return `<div class="course-card" style="--c:${c.color};--ic:${c.iconBg}" onclick="startCourse(${i})">
      <div class="cc-head">
        <div class="cc-icon">${c.icon}</div>
        <div>
          <div class="cc-title">${c.title}</div>
          <div class="cc-sub">${c.questions.length} questions</div>
        </div>
      </div>
      <div class="cc-meta">
        <span class="cc-tag accent">${qTypes.qcu} QCU</span>
        <span class="cc-tag accent">${qTypes.qcm} QCM</span>
        <span class="cc-tag accent">${qTypes.vf} V/F</span>
        <span class="cc-tag accent">${qTypes.cc} Cas cliniques</span>
      </div>
      <div class="cc-prog">
        <div class="cc-prog-txt"><span>Progression</span><span>${prog.done}/${c.questions.length} (${pct}%)</span></div>
        <div class="cc-prog-bar"><div class="cc-prog-fill" style="width:${pct}%;background:${c.color}"></div></div>
      </div>
    </div>`;
  }).join('');
}

function countTypes(qs) {
  const t = {qcu:0,qcm:0,vf:0,cc:0};
  qs.forEach(q => { t[q.type] = (t[q.type]||0)+1; });
  return t;
}

function startCourse(idx) {
  currentCourse = idx;
  currentIndex = 0;
  answers = {};
  document.getElementById('home').style.display='none';
  document.getElementById('quiz-view').style.display='block';
  document.getElementById('results-view').style.display='none';
  document.getElementById('btn-home').classList.add('vis');
  document.getElementById('score-badge').classList.add('vis');
  updateHeader();
  buildDotGrid();
  renderQuestion();
}

function goHome() {
  document.getElementById('home').style.display='block';
  document.getElementById('quiz-view').style.display='none';
  document.getElementById('results-view').style.display='none';
  document.getElementById('btn-home').classList.remove('vis');
  document.getElementById('score-badge').classList.remove('vis');
  renderCourseGrid();
}

function buildDotGrid() {
  const c = COURSES[currentCourse];
  const grid = document.getElementById('q-dot-grid');
  grid.innerHTML = c.questions.map((_,i) => `<div class="q-dot" id="dot-${i}" onclick="jumpTo(${i})">${i+1}</div>`).join('');
}

function updateDot(i) {
  const d = document.getElementById('dot-'+i);
  if(!d) return;
  d.className = 'q-dot';
  if(i === currentIndex) { d.classList.add('current'); return; }
  const ans = answers[i];
  if(ans && ans.submitted) d.classList.add(ans.correct ? 'done-ok' : 'done-bad');
}

function jumpTo(i) {
  currentIndex = i;
  renderQuestion();
}

function navigate(dir) {
  const c = COURSES[currentCourse];
  currentIndex = Math.max(0, Math.min(c.questions.length-1, currentIndex+dir));
  renderQuestion();
}

function updateHeader() {
  const c = COURSES[currentCourse];
  document.getElementById('qv-title').textContent = c.title;
  const done = Object.values(answers).filter(a=>a.submitted).length;
  const correct = Object.values(answers).filter(a=>a.submitted&&a.correct).length;
  document.getElementById('qv-count').textContent = `${c.questions.length} questions`;
  document.getElementById('qv-score-inline').textContent = done > 0 ? `Score : ${correct}/${done}` : '';
  document.getElementById('score-badge').textContent = `Score : ${correct}/${done}`;
  // progress bar
  const pct = Math.round(done/c.questions.length*100);
  document.getElementById('qv-bar').style.width = pct+'%';
  document.getElementById('qv-prog-l').textContent = `${done} répondues`;
  document.getElementById('qv-prog-r').textContent = `${pct}%`;
  // show results btn if all answered
  const allDone = done === c.questions.length;
  document.getElementById('btn-results').style.display = allDone ? 'flex' : 'none';
}

function renderQuestion() {
  const c = COURSES[currentCourse];
  const q = c.questions[currentIndex];
  const ans = answers[currentIndex] || {selected:[], submitted:false};
  const container = document.getElementById('q-container');

  // Update nav dots
  c.questions.forEach((_,i) => updateDot(i));
  document.getElementById('q-counter').textContent = `Question ${currentIndex+1} / ${c.questions.length}`;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === c.questions.length-1;

  const typeLabel = {qcu:'QCU',qcm:'QCM',vf:'Vrai / Faux',cc:'Cas Clinique'}[q.type];
  const isSubmitted = ans.submitted;

  let optHtml = q.opts.map((opt, i) => {
    let cls = 'opt';
    const isSelected = ans.selected.includes(i);
    const isCorrect = q.correct.includes(i);
    const markerShape = (q.type === 'qcm') ? 'sq' : '';
    
    if(isSubmitted) {
      cls += ' disabled';
      if(isCorrect) cls += ' ' + (isSelected ? 'correct' : 'show-correct');
      if(isSelected && !isCorrect) cls += ' incorrect';
    } else if(isSelected) {
      cls += ' selected';
    }
    return `<div class="${cls}" onclick="selectOpt(${i})">
      <div class="opt-marker ${markerShape}">${isSubmitted && isCorrect ? '✓' : (isSubmitted && isSelected && !isCorrect ? '✗' : (isSelected ? '●' : ''))}</div>
      <div class="opt-label">${opt}</div>
    </div>`;
  }).join('');

  let feedbackHtml = '';
  if(isSubmitted) {
    const ok = ans.correct;
    feedbackHtml = `<div class="feedback ${ok?'correct':'incorrect'} vis">
      <strong>${ok ? '✓ Correct !' : '✗ Incorrect'}</strong>
      ${q.explanation}
    </div>`;
  }

  container.innerHTML = `
    <div class="q-card ${isSubmitted ? (ans.correct ? 'answered' : 'answered wrong') : ''}">
      ${q.context ? `<div class="q-context">${q.context}</div>` : ''}
      <div class="q-top">
        <span class="q-num">${currentIndex+1}</span>
        <span class="q-type ${q.type}">${typeLabel}</span>
        <div class="q-text">${q.q}</div>
      </div>
      ${q.type === 'qcm' ? '<div style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem;">Plusieurs réponses possibles</div>' : ''}
      <div class="q-opts">${optHtml}</div>
      <div class="q-actions">
        ${!isSubmitted ? `<button class="btn-submit" id="btn-submit-q" onclick="submitAnswer()" ${(ans.selected.length===0)?'disabled':''}>Valider ma réponse</button>` : ''}
        ${feedbackHtml}
      </div>
    </div>`;

  updateHeader();
}

function selectOpt(i) {
  const ans = answers[currentIndex] || {selected:[], submitted:false};
  if(ans.submitted) return;
  const q = COURSES[currentCourse].questions[currentIndex];
  
  if(q.type === 'qcu' || q.type === 'vf' || q.type === 'cc') {
    ans.selected = [i];
  } else {
    // qcm: toggle
    const idx = ans.selected.indexOf(i);
    if(idx > -1) ans.selected.splice(idx,1);
    else ans.selected.push(i);
  }
  answers[currentIndex] = ans;
  renderQuestion();
}

function submitAnswer() {
  const ans = answers[currentIndex] || {selected:[], submitted:false};
  const q = COURSES[currentCourse].questions[currentIndex];
  
  // check correctness
  const sel = [...ans.selected].sort();
  const cor = [...q.correct].sort();
  ans.correct = sel.length === cor.length && sel.every((v,i)=>v===cor[i]);
  ans.submitted = true;
  answers[currentIndex] = ans;
  
  // update course progress
  const c = COURSES[currentCourse];
  courseProgress[c.id] = courseProgress[c.id] || {done:0,correct:0};
  courseProgress[c.id].done = Object.values(answers).filter(a=>a.submitted).length;
  courseProgress[c.id].correct = Object.values(answers).filter(a=>a.submitted&&a.correct).length;
  
  renderQuestion();
}

function showResults() {
  const c = COURSES[currentCourse];
  const total = c.questions.length;
  const done = Object.values(answers).filter(a=>a.submitted).length;
  const correct = Object.values(answers).filter(a=>a.submitted&&a.correct).length;
  const wrong = done - correct;
  const skip = total - done;
  const pct = Math.round(correct/total*100);
  
  document.getElementById('quiz-view').style.display='none';
  document.getElementById('results-view').style.display='block';
  
  // circle color
  const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
  const rc = document.getElementById('res-circle');
  rc.style.background = pct >= 70 ? 'var(--green-l)' : pct >= 50 ? 'var(--orange-l)' : 'var(--red-l)';
  rc.style.border = `4px solid ${color}`;
  document.getElementById('res-pct').style.color = color;
  document.getElementById('res-pct').textContent = pct+'%';
  
  const msg = pct >= 80 ? 'Excellent travail ! 🏆' : pct >= 60 ? 'Bon score !' : pct >= 40 ? 'Peut mieux faire' : 'À retravailler';
  document.getElementById('res-title').textContent = msg;
  document.getElementById('res-sub').textContent = `${c.title} — ${correct} bonnes réponses sur ${total} questions`;
  document.getElementById('rs-correct').textContent = correct;
  document.getElementById('rs-wrong').textContent = wrong;
  document.getElementById('rs-skip').textContent = skip;
}

function restartQuiz() {
  const idx = currentCourse;
  startCourse(idx);
}

init();
</script>
</body>
</html>
